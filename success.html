<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="docTitle">تم بنجاح | عائلة الحوت 🐋✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { --main-theme: #002349; --accent-theme: #D4AF37; }
        body { font-family: 'Tajawal', sans-serif; background: #f0f4f8; overflow-x: hidden; }
        .main-card { background: #ffffff !important; border-radius: 3.5rem; position: relative; z-index: 10; border-top: 12px solid var(--main-theme); }
        .ticket-design { background: #ffffff !important; position: relative; border: 2px dashed #cbd5e1; border-radius: 1.5rem; }
        .ticket-design::before, .ticket-design::after { content: ''; position: absolute; top: 50%; width: 26px; height: 26px; background: #f0f4f8; border-radius: 50%; transform: translateY(-50%); border: 2px dashed #cbd5e1; z-index: 5; }
        .ticket-design::before { left: -15px; border-left: none; }
        .ticket-design::after { right: -15px; border-right: none; }
        .bounce-in { animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55); }
        @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.3); } 100% { opacity: 1; transform: scale(1); } }
        .btn-download { background: rgba(212, 175, 55, 0.1); color: #b8962d; border: 1px solid rgba(212, 175, 55, 0.3); }
        .no-capture { display: none !important; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <audio id="successSound" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" preload="auto"></audio>

    <div id="captureArea" class="max-w-md w-full main-card p-8 text-center bounce-in">
        <div class="flex justify-center mb-2">
            <dotlottie-player src="https://lottie.host/82823631-f923-4412-bd77-2e9154784411/6vR0FvI7oN.json" background="transparent" speed="1.2" style="width: 140px; height: 120px;" loop autoplay></dotlottie-player>
        </div>

        <h1 id="mainGreeting" class="text-3xl font-black mb-1" style="color: var(--main-theme);">أهلاً بك في العائلة!</h1>
        <h2 id="userNameDisplay" class="text-xl font-black mb-2" style="color: var(--accent-theme);">...</h2>
        
        <div class="flex items-center justify-center gap-2 mb-6 text-slate-500">
            <i class="fas fa-shield-check text-green-500"></i>
            <p class="text-xs font-bold italic">طلبك الآن تحت مراجعة فريق الحوت الفني</p>
        </div>

        <div class="ticket-design p-6 mb-6">
            <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] mb-1">REFERENCE NUMBER</p>
            <p id="orderIDDisplay" class="text-3xl font-black tracking-tighter" style="color: var(--main-theme);">---</p>
            
            <div class="h-[1px] bg-slate-100 my-4"></div>
            
            <div class="grid grid-cols-2 gap-2 text-right text-[11px] font-bold text-slate-600">
                <p>🚗 السيارة: <span id="carDisplay" class="text-slate-900">...</span></p>
                <p>📅 التاريخ: <span id="dateDisplay" class="text-slate-900">...</span></p>
            </div>

            <div id="syncStatus" class="mt-4 flex items-center justify-center gap-2 text-[10px] font-bold text-green-600">
                <i id="syncIcon" class="fas fa-check-double"></i> <span id="syncText">حجزك مؤكد سحابياً ✅</span>
            </div>
        </div>

        <p class="text-[10px] text-slate-400 font-bold mb-6 px-4 leading-relaxed">
            لا داعي للقلق، سيصلك اتصال أو رسالة لتأكيد موقع التسليم خلال وقت قصير جداً.
        </p>

        <div class="space-y-3" id="actionButtons">
            <button onclick="downloadTicket()" class="w-full py-4 rounded-2xl font-black text-sm btn-download flex items-center justify-center gap-2 transition-all active:scale-95">
                <i class="fas fa-camera"></i> حفظ التذكرة في المعرض
            </button>
            <a href="index.html" class="block w-full py-5 rounded-2xl font-black text-xl shadow-xl text-white transition-all active:scale-95" style="background: var(--main-theme);">
                العودة للرئيسية
            </a>
        </div>
    </div>

    <script>
        const u = new URLSearchParams(window.location.search);
        // تأكد من وضع رابط السكريبت الخاص بك هنا
        const scriptURL = "https://script.google.com/macros/s/AKfycbxpAW6PZ9ykBmaIfuDxtxr3YOfcg95jXeFJ2FjX5GxGRiawUNHzs90rKBEUFOcf_z_n/exec";

        window.onload = async () => {
            // تشغيل صوت النجاح وعرض البيانات
            document.getElementById('successSound').play().catch(() => {});
            document.getElementById('userNameDisplay').innerText = u.get('name') || "عميلنا العزيز";
            document.getElementById('carDisplay').innerText = u.get('car') || "غير محدد";
            document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString('ar-EG');
            
            let finalOrderID = u.get('order_id') || "HUT-" + Math.random().toString(36).substr(2, 6).toUpperCase();
            document.getElementById('orderIDDisplay').innerText = "#" + finalOrderID;

            // ضبط الألوان بناءً على نوع الخدمة
            const serviceType = u.get('service') || u.get('type');
            if(serviceType === 'زفاف' || serviceType === 'wedding') document.documentElement.style.setProperty('--main-theme', '#be185d');
            else if(serviceType === 'تدريب قيادة' || serviceType === 'training') document.documentElement.style.setProperty('--main-theme', '#7c3aed');

            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

            // ذكاء معالجة الموقع
            let finalLocation = u.get('location_link');
            if (!finalLocation || finalLocation === "#" || finalLocation === "null") {
                const lat = u.get('lat');
                const lng = u.get('lng');
                finalLocation = (lat && lng) ? `https://www.google.com/maps?q=${lat},${lng}` : "غير متوفر";
            }

            // إرسال البيانات النهائية للسكريبت (شاملة السعر والموقع)
            try {
                await fetch(scriptURL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({
                        order_id: finalOrderID,
                        name: u.get('name'),
                        phone: u.get('phone'),
                        car: u.get('car'),
                        service: serviceType,
                        location_link: finalLocation, 
                        province: u.get('province') || u.get('prov') || "غير محدد",
                        total_price: u.get('total_price') || u.get('price') || 0, // إرسال السعر للعمود 9
                        date: new Date().toLocaleString('en-GB')
                    })
                });
            } catch (e) { console.log("Data Synced"); }
        };

        async function downloadTicket() {
            const btn = event.currentTarget;
            btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i> جاري الحفظ...';
            const area = document.getElementById('captureArea');
            const actions = document.getElementById('actionButtons');
            area.classList.remove('bounce-in'); 
            actions.classList.add('no-capture');

            setTimeout(async () => {
                try {
                    const canvas = await html2canvas(area, { backgroundColor: "#f0f4f8", scale: 2, useCORS: true });
                    const link = document.createElement('a');
                    link.download = `Hut-Ticket-${document.getElementById('orderIDDisplay').innerText}.png`;
                    link.href = canvas.toDataURL("image/png");
                    link.click();
                } catch (e) {
                    alert("يرجى تصوير الشاشة يدوياً");
                } finally {
                    actions.classList.remove('no-capture');
                    btn.innerHTML = '<i class="fas fa-camera"></i> حفظ التذكرة في المعرض';
                }
            }, 100);
        }
    </script>
</body>
</html>
