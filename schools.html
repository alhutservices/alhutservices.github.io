<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>الحوت | مدارس تعليم القيادة</title>
    <link rel="icon" type="image/png" href="Cars/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #FF385C;
            --primary-dark: #E31C5F;
            --dark: #222222;
            --mid: #717171;
            --light: #EBEBEB;
            --bg: #F7F7F7;
            --white: #FFFFFF;
            --green: #00A699;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: var(--bg); color: var(--dark); overflow-x: hidden; }
        button, input, select { outline: none; }
        .dn { display: none !important; }

        /* ── NAVBAR ── */
        .navbar {
            background: var(--white); border-bottom: 1px solid var(--light);
            padding: 0 24px; height: 70px; display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .nav-brand { font-size: 1.4rem; font-weight: 900; color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .back-btn { background: var(--bg); border: 1px solid var(--light); padding: 8px 16px; border-radius: 99px; font-weight: 700; color: var(--dark); text-decoration: none; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        .back-btn:hover { background: var(--light); }

        /* ── HEADER & FILTERS ── */
        .page-header { max-width: 1200px; margin: 0 auto; padding: 40px 24px 20px; }
        .page-title { font-size: 2rem; font-weight: 900; margin-bottom: 8px; }
        .page-sub { color: var(--mid); font-size: 1rem; margin-bottom: 24px; }

        .filters-bar {
            background: var(--white); padding: 12px 20px; border-radius: 99px; border: 1px solid var(--light);
            display: flex; gap: 16px; align-items: center; box-shadow: var(--shadow);
            max-width: fit-content; flex-wrap: wrap; margin-bottom: 30px;
        }
        .filter-item { display: flex; align-items: center; gap: 8px; font-weight: 700; color: var(--dark); }
        .filter-item select { border: none; font-weight: 700; font-size: 0.95rem; color: var(--primary); background: transparent; cursor: pointer; }

        /* ── SCHOOLS GRID ── */
        .schools-grid {
            max-width: 1200px; margin: 0 auto; padding: 0 24px 60px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px;
        }
        
        .school-card {
            background: var(--white); border-radius: var(--radius); overflow: hidden;
            box-shadow: var(--shadow); transition: 0.3s; border: 1px solid var(--light);
            display: flex; flex-direction: column;
        }
        .school-card:hover { transform: translateY(-5px); box-shadow: 0 12px 24px rgba(0,0,0,0.12); }
        
        .sc-img { width: 100%; height: 200px; background: #eee; position: relative; }
        .sc-img img { width: 100%; height: 100%; object-fit: cover; }
        .sc-badge { position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.9); padding: 6px 12px; border-radius: 99px; font-size: 0.75rem; font-weight: 800; backdrop-filter: blur(4px); }
        
        .sc-body { padding: 20px; display: flex; flex-direction: column; flex: 1; }
        .sc-title { font-size: 1.25rem; font-weight: 900; margin-bottom: 6px; }
        .sc-city { font-size: 0.85rem; color: var(--mid); margin-bottom: 16px; display: flex; align-items: center; gap: 4px; }
        
        .sc-features { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
        .feat-tag { background: var(--bg); color: var(--mid); padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; border: 1px solid var(--light); }
        
        .sc-footer { margin-top: auto; display: flex; justify-content: space-between; align-items: center; padding-top: 16px; border-top: 1px solid var(--bg); }
        .sc-price-wrap { display: flex; flex-direction: column; }
        .sc-price-lbl { font-size: 0.7rem; color: var(--mid); font-weight: 700; }
        .sc-price { font-size: 1.2rem; font-weight: 900; color: var(--primary); }
        
        .btn-book {
            background: var(--dark); color: var(--white); border: none; padding: 10px 20px;
            border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s;
        }
        .btn-book:hover { background: var(--primary); }

        /* ── LOADING & EMPTY ── */
        .loading-state, .empty-state { text-align: center; padding: 60px 20px; color: var(--mid); font-weight: 700; grid-column: 1/-1; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--light); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── MODAL (BOOKING) ── */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
            z-index: 90000; display: flex; justify-content: center; align-items: flex-end;
            opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        
        .modal-card {
            background: var(--white); width: 100%; max-width: 500px;
            border-radius: 24px 24px 0 0; padding: 24px;
            transform: translateY(100%); transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-height: 90vh; overflow-y: auto;
        }
        .modal-overlay.open .modal-card { transform: translateY(0); }
        @media(min-width: 768px) {
            .modal-overlay { align-items: center; }
            .modal-card { border-radius: 24px; transform: translateY(20px); }
        }

        .md-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .md-title { font-size: 1.3rem; font-weight: 900; }
        .md-close { background: var(--bg); border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 1rem; cursor: pointer; color: var(--mid); }
        
        .md-school-info { background: var(--bg); padding: 12px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--light); }
        .md-si-name { font-weight: 900; font-size: 1rem; color: var(--primary); margin-bottom: 4px; }
        .md-si-city { font-size: 0.8rem; color: var(--mid); font-weight: 700; }

        .fld { margin-bottom: 16px; }
        .lbl { display: block; font-size: 0.8rem; font-weight: 800; color: var(--dark); margin-bottom: 8px; }
        .inp, .sel {
            width: 100%; padding: 14px; border: 1.5px solid var(--light); border-radius: 12px;
            font-size: 0.95rem; font-weight: 600; background: var(--white); transition: 0.2s;
        }
        .inp:focus, .sel:focus { border-color: var(--primary); }

        .btn-submit {
            width: 100%; background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--white); border: none; padding: 16px; border-radius: 12px;
            font-size: 1.1rem; font-weight: 900; cursor: pointer; margin-top: 10px;
            box-shadow: 0 4px 14px rgba(255,56,92,0.3); transition: 0.2s;
        }
        .btn-submit:active { transform: scale(0.97); }
        .btn-submit:disabled { opacity: 0.7; pointer-events: none; }

        /* TOAST */
        #toasts { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 99999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
        .toast { background: var(--white); border: 1px solid var(--light); border-radius: 12px; padding: 14px 20px; box-shadow: var(--shadow); font-weight: 800; font-size: 0.9rem; animation: tIn 0.3s ease; color: var(--green); display: flex; align-items: center; gap: 10px; }
        .toast.e { color: var(--primary); }
        @keyframes tIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: none; } }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="index.html" class="nav-brand"><span>🐋</span> الحوت</a>
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i> رجوع</a>
</nav>

<header class="page-header">
    <h1 class="page-title">مدارس تعليم القيادة</h1>
    <p class="page-sub">اختر المدرسة الأنسب لك واحجز كورس التدريب بخطوات بسيطة.</p>

    <div class="filters-bar">
        <div class="filter-item">
            <i class="fas fa-map-marker-alt" style="color:var(--mid)"></i>
            <select id="fltCity" onchange="loadSchools()">
                <option value="all">كل المحافظات</option>
                <option value="بغداد">بغداد</option>
                <option value="كركوك">كركوك</option>
                <option value="أربيل">أربيل</option>
                <option value="البصرة">البصرة</option>
                <option value="الموصل">الموصل</option>
                <option value="السليمانية">السليمانية</option>
            </select>
        </div>
        <div class="filter-item">
            <i class="fas fa-calendar-alt" style="color:var(--mid)"></i>
            <input type="date" id="fltDate" style="border:none;background:transparent;font-weight:700;color:var(--primary);outline:none;">
        </div>
    </div>
</header>

<main class="schools-grid" id="schoolsGrid">
    <div class="loading-state">
        <div class="spinner"></div>
        جاري البحث عن المدارس المعتمدة...
    </div>
</main>

<!-- BOOKING MODAL -->
<div class="modal-overlay" id="bookModal" onclick="closeModal()">
    <div class="modal-card" onclick="event.stopPropagation()">
        <div class="md-head">
            <div class="md-title">طلب حجز كورس تدريب</div>
            <button class="md-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
        </div>
        
        <div class="md-school-info">
            <div class="md-si-name" id="mdSchoolName">اسم المدرسة</div>
            <div class="md-si-city" id="mdSchoolCity">المدينة</div>
        </div>

        <div class="fld">
            <label class="lbl">الاسم الكامل للمتدرب</label>
            <input type="text" id="mdName" class="inp" placeholder="اكتب اسمك الثلاثي">
        </div>
        
        <div class="fld">
            <label class="lbl">رقم الهاتف (للتواصل)</label>
            <input type="tel" id="mdPhone" class="inp" placeholder="07XXXXXXXXX" dir="ltr" style="text-align:right">
        </div>

        <div class="fld">
            <label class="lbl">نوع الكورس المطلوب</label>
            <select id="mdCourse" class="sel" onchange="updatePrice()">
                <option value="basic" data-price="0" id="optBasic">كورس أساسي (مبتدئين)</option>
                <option value="advanced" data-price="0" id="optAdv">كورس متقدم (رخصة دولية)</option>
            </select>
        </div>

        <div style="background:var(--bg); border:1px solid var(--light); padding:16px; border-radius:12px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center;">
            <span style="font-weight:800; font-size:0.9rem;">السعر الإجمالي:</span>
            <span id="mdPriceDisp" style="font-weight:900; font-size:1.3rem; color:var(--primary);">0 د.ع</span>
        </div>

        <button class="btn-submit" id="btnSubmit" onclick="confirmBooking()">إرسال الطلب للمدرسة</button>
    </div>
</div>

<div id="toasts"></div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwOZXSohTDG9nayqJ3caUqI6q50rGXaKiAYbBr-W6Xksq8qSQH_mxVU_o-7CJQrpUWa9A/exec";
    const API_TOKEN = "HUT_CLOUD_2026";
    
    let activeSchool = null;
    let schoolsList = [];

    // URL Params
    const urlParams = new URLSearchParams(window.location.search);
    const uCity = urlParams.get('city');
    const uDate = urlParams.get('date');

    document.addEventListener("DOMContentLoaded", () => {
        if(uCity) document.getElementById('fltCity').value = uCity;
        document.getElementById('fltDate').value = uDate || new Date().toISOString().split('T')[0];
        
        loadSchools();
    });

    function toast(msg, type="s") {
        const c = document.getElementById("toasts");
        const el = document.createElement("div"); el.className = `toast ${type}`;
        el.innerHTML = `<i class="fas ${type==='s'?'fa-check-circle':'fa-exclamation-circle'}"></i> ${msg}`;
        c.appendChild(el);
        setTimeout(() => { el.style.opacity="0"; setTimeout(()=>el.remove(),300); }, 3500);
    }

    async function loadSchools() {
        const city = document.getElementById('fltCity').value;
        const grid = document.getElementById('schoolsGrid');
        grid.innerHTML = `<div class="loading-state"><div class="spinner"></div>جاري البحث عن المدارس...</div>`;
        
        try {
            // Note: Currently fetching "Admin Full Data" to extract DriveSchools.
            // When Backend V9.5 is ready, we will switch this to `action=getDriveSchoolsForCity`.
            const res = await fetch(`${API_URL}?action=getAdminFullData&token=${API_TOKEN}`);
            const data = await res.json();
            
            let schools = data.driveSchools || [];
            
            // Filter by city
            if(city !== "all") {
                schools = schools.filter(s => s.city === city);
            }

            // MOCK DATA for Visuals (since backend doesn't have photos for schools yet)
            // This ensures the page looks beautiful even before the backend update.
            schools = schools.map((s, index) => {
                return {
                    ...s,
                    photo_url: s.photo_url || `https://images.unsplash.com/photo-1449965408869-eaa3f722e40d?w=600&q=80`, // placeholder driving image
                    price_basic: s.price_basic || 150000,
                    price_advanced: s.price_advanced || 250000,
                    features: s.features ? s.features.split(',') : ["مدربات نساء", "سيارات حديثة", "تدريب نظري وعملي"]
                };
            });

            schoolsList = schools;
            renderSchools(schools);

        } catch (e) {
            grid.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle" style="font-size:2rem;color:var(--primary);margin-bottom:10px;"></i><br>حدث خطأ في الاتصال بالخادم. يرجى المحاولة لاحقاً.</div>`;
        }
    }

    function renderSchools(schools) {
        const grid = document.getElementById('schoolsGrid');
        if(!schools || schools.length === 0) {
            grid.innerHTML = `<div class="empty-state">لا توجد مدارس قيادة مسجلة في هذه المدينة حالياً.</div>`;
            return;
        }

        grid.innerHTML = schools.map(s => {
            const feats = s.features.map(f => `<span class="feat-tag">${f.trim()}</span>`).join('');
            return `
            <div class="school-card">
                <div class="sc-img">
                    <img src="${s.photo_url}" alt="${s.name}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1449965408869-eaa3f722e40d?w=600&q=80'">
                    <div class="sc-badge"><i class="fas fa-star" style="color:#FFB800"></i> معتمدة</div>
                </div>
                <div class="sc-body">
                    <div class="sc-title">${s.name}</div>
                    <div class="sc-city"><i class="fas fa-map-marker-alt"></i> ${s.city}</div>
                    <div class="sc-features">${feats}</div>
                    <div class="sc-footer">
                        <div class="sc-price-wrap">
                            <span class="sc-price-lbl">يبدأ الكورس من</span>
                            <span class="sc-price">${s.price_basic.toLocaleString('ar-EG')} د.ع</span>
                        </div>
                        <button class="btn-book" onclick="openModal('${s.id}')">احجز الآن</button>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function openModal(id) {
        activeSchool = schoolsList.find(s => s.id === id);
        if(!activeSchool) return;

        document.getElementById('mdSchoolName').innerText = activeSchool.name;
        document.getElementById('mdSchoolCity').innerText = activeSchool.city;
        
        // Setup prices
        const optB = document.getElementById('optBasic');
        const optA = document.getElementById('optAdv');
        optB.dataset.price = activeSchool.price_basic;
        optB.innerText = `كورس أساسي - ${activeSchool.price_basic.toLocaleString('ar-EG')} د.ع`;
        optA.dataset.price = activeSchool.price_advanced;
        optA.innerText = `كورس متقدم - ${activeSchool.price_advanced.toLocaleString('ar-EG')} د.ع`;
        
        updatePrice();
        document.getElementById('bookModal').classList.add('open');
    }

    function closeModal() {
        document.getElementById('bookModal').classList.remove('open');
        activeSchool = null;
    }

    function updatePrice() {
        const sel = document.getElementById('mdCourse');
        const price = Number(sel.options[sel.selectedIndex].dataset.price || 0);
        document.getElementById('mdPriceDisp').innerText = `${price.toLocaleString('ar-EG')} د.ع`;
    }

    async function confirmBooking() {
        const name = document.getElementById('mdName').value.trim();
        const phone = document.getElementById('mdPhone').value.trim();
        const date = document.getElementById('fltDate').value;
        const sel = document.getElementById('mdCourse');
        const courseText = sel.options[sel.selectedIndex].text.split('-')[0].trim();
        const price = Number(sel.options[sel.selectedIndex].dataset.price || 0);

        if(!name || !phone) return toast("يرجى إدخال الاسم ورقم الهاتف", "e");

        const btn = document.getElementById('btnSubmit');
        btn.disabled = true;
        btn.innerText = "جاري إرسال الطلب...";

        const payload = {
            action: "NEW_DRIVE_STUDENT",
            token: API_TOKEN,
            name: name,
            phone: phone,
            city: activeSchool.city,
            course: courseText,
            total_price: price,
            date: date,
            school_id: activeSchool.id
        };

        try {
            const res = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if(data.success) {
                toast("تم إرسال طلبك بنجاح! سيتم التواصل معك قريباً.");
                setTimeout(() => { closeModal(); }, 2000);
            } else {
                toast(data.msg || "حدث خطأ أثناء الحجز", "e");
            }
        } catch(e) {
            toast("فشل الاتصال بالسيرفر", "e");
        } finally {
            btn.disabled = false;
            btn.innerText = "إرسال الطلب للمدرسة";
        }
    }
</script>
</body>
</html>
