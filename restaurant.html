<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الشركاء | منظومة الحوت</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f1f5f9; }
        .input-box { transition: all 0.3s ease; }
        .input-box:focus { border-color: #10b981; box-shadow: 0 0 20px rgba(16,185,129,0.1); }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <nav class="flex justify-between items-center mb-10 bg-white p-6 rounded-[2rem] shadow-sm">
            <div class="flex items-center gap-4">
                <div class="bg-slate-900 p-3 rounded-2xl text-white font-black italic">W</div>
                <h1 class="text-xl font-black">بوابة المطعم الذكية</h1>
            </div>
            <div class="flex items-center gap-3">
                <p class="text-xs text-gray-400 hidden md:block">أهلاً، مطعم "البركة"</p>
                <div class="w-10 h-10 rounded-full bg-slate-200 border-2 border-white"></div>
            </div>
        </nav>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-5 bg-white p-10 rounded-[3rem] shadow-xl border border-slate-100">
                <h2 class="text-2xl font-bold mb-8 flex items-center gap-2">📦 إرسال طلب جديد <span class="text-xs font-normal text-gray-400">للحوت</span></h2>
                <div class="space-y-6">
                    <div>
                        <label class="text-xs font-bold text-slate-500 mr-2 block mb-2">هاتف العميل (كركوك)</label>
                        <input type="tel" class="w-full p-4 bg-slate-50 border-2 border-transparent rounded-2xl outline-none input-box" placeholder="077XXXXXXXX">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-500 mr-2 block mb-2">العنوان / المعلم القريب</label>
                        <input type="text" class="w-full p-4 bg-slate-50 border-2 border-transparent rounded-2xl outline-none input-box" placeholder="حي الواسطي - قرب الصيدلية">
                    </div>
                    <div class="flex gap-4">
                        <div class="flex-1">
                            <label class="text-xs font-bold text-slate-500 mr-2 block mb-2">قيمة الطلب</label>
                            <input type="number" class="w-full p-4 bg-slate-50 border-2 border-transparent rounded-2xl outline-none input-box font-bold" placeholder="0">
                        </div>
                        <div class="flex-1">
                            <label class="text-xs font-bold text-slate-500 mr-2 block mb-2">أجرة التوصيل</label>
                            <input type="text" class="w-full p-4 bg-emerald-50 border-2 border-emerald-100 rounded-2xl outline-none text-emerald-700 font-bold" value="3,000 د.ع" readonly>
                        </div>
                    </div>
                    <button class="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-black text-xl hover:shadow-2xl hover:bg-slate-800 transition-all active:scale-95">بث الطلب للرادار 🚀</button>
                </div>
            </div>

            <div class="lg:col-span-7 bg-white rounded-[3rem] shadow-xl overflow-hidden border border-slate-100">
                <div class="p-8 bg-slate-50 flex justify-between items-center border-b">
                    <h3 class="font-bold">طلباتك الحالية</h3>
                    <span class="text-xs bg-emerald-500 text-white px-4 py-1 rounded-full font-bold animate-pulse">مزامنة حية</span>
                </div>
                <div class="p-8">
                    <table class="w-full text-right">
                        <thead>
                            <tr class="text-gray-400 text-[10px] uppercase tracking-widest border-b">
                                <th class="pb-4">رقم الطلب</th>
                                <th class="pb-4">الوجهة</th>
                                <th class="pb-4 text-center">حالة السائق</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-50">
                            <tr>
                                <td class="py-6 font-bold">#WH-770</td>
                                <td class="py-6 text-sm text-gray-600">حي الواسطي</td>
                                <td class="py-6 text-center">
                                    <span class="bg-blue-100 text-blue-700 px-4 py-1 rounded-full text-[10px] font-bold">السائق في الطريق 🏍️</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
