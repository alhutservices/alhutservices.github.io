<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نحلة 🐝 | تطبيق الكابتن V37.0</title>
    
    <!-- الخطوط والأيقونات -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Bootstrap 5 RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
    
    <!-- Firebase SDK (V8 for simple single-file deployment) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* =========================================
           🐝 الهوية البصرية لشركة نحلة (Driver Theme)
           ========================================= */
        :root {
            --nahla-yellow: #FFC107;
            --nahla-yellow-light: #FFF8E1;
            --nahla-yellow-dark: #F5B041;
            --accent: #111827;
            --success: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --bg-color: #F3F4F6;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, var(--nahla-yellow-light) 0%, transparent 50%),
                              radial-gradient(circle at bottom left, #E5E7EB 0%, transparent 50%);
            background-attachment: fixed;
            color: var(--accent);
            margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* حاويات الزجاج الفاخرة */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 20px;
        }

        /* الأزرار العصرية المخصصة للهواتف */
        .btn-nahla {
            background: var(--nahla-yellow); color: var(--accent);
            border: none; border-radius: 16px; padding: 14px 20px;
            font-weight: 800; font-size: 1.1rem; transition: all 0.2s ease;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%;
        }
        .btn-nahla:active { transform: scale(0.96); background: var(--nahla-yellow-dark); }
        .btn-nahla:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        /* الشاشات */
        .screen {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: opacity 0.4s ease;
        }
        .hidden-section { display: none !important; }
        
        /* 1. شاشة الدخول والتسجيل */
        #auth-screen { justify-content: center; padding: 20px; }
        .auth-box { padding: 30px 20px; text-align: center; }
        .auth-input {
            background: rgba(255,255,255,0.9); border: 2px solid #E5E7EB; border-radius: 14px;
            padding: 14px; text-align: center; font-weight: bold; font-size: 1.1rem;
            width: 100%; margin-bottom: 15px; transition: 0.3s;
        }
        .auth-input:focus { border-color: var(--nahla-yellow); outline: none; box-shadow: 0 0 0 4px rgba(255,193,7,0.2); }

        /* 2. الهيدر (Header) */
        .app-header {
            padding: 20px 20px 30px 20px;
            background: var(--accent); color: white;
            border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
            box-shadow: 0 10px 20px rgba(17,24,39,0.1);
            position: relative;
        }
        .status-dot { width: 12px; height: 12px; background: var(--success); border-radius: 50%; display: inline-block; box-shadow: 0 0 10px var(--success); }
        .wallet-card {
            background: white; color: var(--accent);
            border-radius: 16px; padding: 15px;
            position: absolute; bottom: -30px; left: 20px; right: 20px;
            box-shadow: var(--glass-shadow);
            display: flex; justify-content: space-between; align-items: center;
        }

        /* 3. منطقة الطلبات */
        .main-content { flex: 1; padding: 50px 20px 20px 20px; overflow-y: auto; }
        .order-card {
            padding: 20px; margin-bottom: 15px; position: relative; overflow: hidden;
            border-right: 6px solid var(--nahla-yellow);
        }
        .order-card.ready-pulse { animation: readyPulse 1.5s infinite; border-right-color: var(--success); }
        @keyframes readyPulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
        
        .order-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 5px; }
        .order-detail { font-size: 0.95rem; color: #4B5563; display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        
        .btn-status {
            background: #F3F4F6; color: var(--accent); border: none; border-radius: 12px;
            padding: 12px; font-weight: 700; width: 100%; margin-top: 10px; transition: 0.2s;
        }
        .btn-status.action-arrive { background: #DBEAFE; color: #2563EB; }
        .btn-status.action-pickup { background: var(--nahla-yellow-light); color: var(--warning); }
        .btn-status.action-finish { background: #D1FAE5; color: var(--success); }

        /* 4. رادار الإنذار (Full Screen Overlay) */
        #orderAlertOverlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(17, 24, 39, 0.95); backdrop-filter: blur(10px);
            z-index: 99999; display: flex; align-items: center; justify-content: center; flex-direction: column;
            color: white; padding: 20px; text-align: center;
        }
        .pulse-ring {
            width: 120px; height: 120px; background: var(--nahla-yellow); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; margin-bottom: 30px;
            animation: radarPulse 1.5s infinite;
        }
        @keyframes radarPulse { 0% { box-shadow: 0 0 0 0 rgba(255, 193, 7, 0.7); } 70% { box-shadow: 0 0 0 30px rgba(255, 193, 7, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 193, 7, 0); } }
        
        .timer-circle { font-size: 2rem; font-weight: 900; margin: 20px 0; color: var(--nahla-yellow); }

        /* Toast Notifications */
        .toast-nahla {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: white; padding: 12px 24px;
            border-radius: 30px; font-weight: bold; font-size: 0.9rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 10000;
            display: flex; align-items: center; gap: 8px; opacity: 0; transition: 0.3s;
        }
        .toast-nahla.show { opacity: 1; bottom: 40px; }
    </style>
</head>
<body>

    <!-- أصوات النظام -->
    <audio id="alertSound" loop><source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mp3"></audio>
    <audio id="readySound"><source src="https://assets.mixkit.co/active_storage/sfx/1083/1083-preview.mp3" type="audio/mp3"></audio>

    <!-- 🔐 شاشة المصادقة -->
    <div id="auth-screen" class="screen">
        <div class="auth-box glass-panel">
            <div class="mb-4 d-flex justify-content-center">
                <div style="background:var(--nahla-yellow); padding:15px; border-radius:20px; box-shadow:0 10px 20px rgba(255,193,7,0.3);">
                    <i data-lucide="bike" style="width:40px; height:40px; color:var(--accent);"></i>
                </div>
            </div>
            <h2 class="fw-bold mb-1">نحلة كركوك 🐝</h2>
            <p class="text-muted mb-4">تطبيق الكباتن V37.0</p>
            
            <input type="tel" id="login-phone" class="auth-input" placeholder="رقم الهاتف (مثال: 078...)">
            <input type="password" id="login-pass" class="auth-input" placeholder="كلمة المرور">
            
            <button id="btnLogin" class="btn-nahla mt-2" onclick="loginDriver()">
                تسجيل الدخول <i data-lucide="arrow-left"></i>
            </button>
            
            <div class="mt-4">
                <a href="#" class="text-muted fw-bold text-decoration-none" onclick="toggleReg()">سائق جديد؟ سجل الآن</a>
            </div>
        </div>
    </div>

    <!-- 🚀 التطبيق الرئيسي (Dashboard) -->
    <div id="app-screen" class="screen hidden-section">
        
        <!-- الهيدر -->
        <div class="app-header">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <div>
                    <h5 class="fw-bold m-0" id="driver-name">كابتن ...</h5>
                    <small class="text-white-50">وردية نشطة</small>
                </div>
                <div class="text-end">
                    <span class="status-dot"></span> <span class="fw-bold ms-1">متصل</span>
                    <i data-lucide="power" class="ms-3 text-danger" onclick="logout()" style="cursor:pointer;"></i>
                </div>
            </div>
            
            <!-- بطاقة المحفظة -->
            <div class="wallet-card">
                <div>
                    <small class="text-muted d-block fw-bold mb-1">الديون والعمولات</small>
                    <h3 class="m-0 fw-bold" style="color:var(--danger);" id="statDebt">0 <small class="fs-6">د.ع</small></h3>
                </div>
                <div style="background:rgba(255,193,7,0.2); padding:10px; border-radius:12px;">
                    <i data-lucide="wallet" style="color:var(--warning);"></i>
                </div>
            </div>
        </div>

        <!-- حالة عدم الاتصال (Offline Banner) -->
        <div id="offlineBanner" class="bg-danger text-white text-center py-1 fw-bold hidden-section" style="font-size:0.85rem; margin-top:35px;">
            ⚠️ أنت غير متصل بالإنترنت! جاري حفظ العمليات...
        </div>

        <!-- قائمة الطلبات -->
        <div class="main-content" id="active-orders-container">
            <div class="text-center text-muted mt-5 fw-bold" id="empty-state">
                <i data-lucide="radar" style="width:40px;height:40px;opacity:0.3;margin-bottom:10px;"></i><br>
                في انتظار طلبات جديدة...<br><small>المحرك الذكي يبحث لك عن أقرب طلب</small>
            </div>
            <!-- تُضاف الطلبات هنا عبر JS -->
        </div>
    </div>

    <!-- 🚨 رادار الإنذار (طلب جديد) -->
    <div id="orderAlertOverlay" class="hidden-section">
        <div class="pulse-ring">
            <i data-lucide="bell-ring" style="width:50px;height:50px;color:var(--accent);"></i>
        </div>
        <h2 class="fw-bold mb-2">طلب جديد!</h2>
        <h4 class="mb-4 text-warning fw-bold" id="alert-res-name">اسم المطعم</h4>
        
        <div class="glass-panel w-100 p-3 mb-4 text-start" style="background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.2);">
            <div class="d-flex gap-2 mb-2"><i data-lucide="map-pin" class="text-warning"></i> <span id="alert-area">المنطقة</span></div>
            <div class="d-flex gap-2 mb-2"><i data-lucide="banknote" class="text-success"></i> <span id="alert-price">0 د.ع</span></div>
            <div class="d-flex gap-2"><i data-lucide="info" class="text-info"></i> <span id="alert-details" style="font-size:0.9rem;">تفاصيل...</span></div>
        </div>

        <div class="timer-circle" id="alert-timer">60</div>
        
        <button id="btnAcceptOrder" class="btn-nahla py-3 fs-4" onclick="acceptOrder()">
            استلام الطلب الآن ✅
        </button>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast-nahla">
        <i data-lucide="check-circle"></i> <span id="toast-msg">تم بنجاح!</span>
    </div>

    <!-- ==========================================
         🐝 المنطق البرمجي للكابتن (V37.0 Backend)
         ========================================== -->
    <script>
        lucide.createIcons();

        // 1️⃣ الإعدادات الثابتة (كما وفرتها)
        const API_URL = "https://script.google.com/macros/s/AKfycbyA5NXtyt_PelH9IKtZyBLd9UH0x_sn3dKKiak7N2mHahYUAN7Mz7ocYUB3BE4_mby4Ag/exec";
        const API_TOKEN = "NAHLA_SECURE_TOKEN_2026";
        
        const firebaseConfig = {
            databaseURL: "https://nahla-delivery-6b06f-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2️⃣ المتغيرات المحلية (State)
        let driverData = JSON.parse(localStorage.getItem('hut_driver_session')) || null;
        let activeOrders = JSON.parse(localStorage.getItem('hut_active_orders')) || [];
        let offlineActionQueue = JSON.parse(localStorage.getItem('hut_offline_queue')) || [];
        let readyNotifiedOrders = new Set();
        
        let currentOrderData = null; // للطلب الوارد حالياً
        let countdownInterval;
        let lastSentLat = null; let lastSentLng = null;

        // تهيئة التطبيق عند الفتح
        window.onload = () => {
            if (driverData) {
                // الكابتن مسجل دخول مسبقاً
                document.getElementById('auth-screen').classList.add('hidden-section');
                document.getElementById('app-screen').classList.remove('hidden-section');
                document.getElementById('driver-name').innerText = driverData.name || "كابتن نحلة";
                initApp();
            }
        };

        // 3️⃣ دوال الواجهة المساعدة
        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerHTML = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // 4️⃣ تسجيل الدخول (Login)
        async function loginDriver() {
            const phone = document.getElementById('login-phone').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            const btn = document.getElementById('btnLogin');
            
            if(!phone || !pass) return showToast("أدخل البيانات كاملة");
            btn.innerHTML = "جاري التحقق... <i class='fa-spin' data-lucide='loader'></i>"; lucide.createIcons();
            btn.disabled = true;

            try {
                // تفعيل الصوت هنا (يتطلب تفاعل المستخدم الأول)
                document.getElementById('alertSound').play().then(() => document.getElementById('alertSound').pause()).catch(e=>{});

                const res = await fetch(`${API_URL}?action=checkDriver&phone=${phone}&password=${pass}&token=${API_TOKEN}`);
                const data = await res.json();
                
                if (data.status === "active") {
                    // بدء الشفت في الخادم
                    const shiftRes = await fetch(`${API_URL}?action=START_SHIFT&phone=${phone}&token=${API_TOKEN}`);
                    const shiftData = await shiftRes.json();

                    driverData = {
                        phone: phone, name: data.name, shift: data.shift,
                        shiftEnd: shiftData.shift_end || new Date(Date.now() + 10*3600000).toISOString()
                    };
                    localStorage.setItem('hut_driver_session', JSON.stringify(driverData));
                    
                    showToast("تم الدخول وبدء الوردية!");
                    setTimeout(()=> location.reload(), 1000);
                } else if (data.status === "banned") {
                    showToast("❌ حسابك محظور. راجع الإدارة.");
                } else if (data.status === "pending") {
                    showToast("⏳ حسابك قيد المراجعة.");
                } else {
                    showToast("❌ بيانات خاطئة أو حساب غير موجود.");
                }
            } catch(e) { showToast("خطأ في الاتصال بالشبكة."); }
            btn.innerHTML = "تسجيل الدخول <i data-lucide='arrow-left'></i>"; lucide.createIcons();
            btn.disabled = false;
        }

        function logout() {
            localStorage.removeItem('hut_driver_session');
            localStorage.removeItem('hut_active_orders');
            location.reload();
        }

        // 5️⃣ تهيئة التطبيق الأساسي (بعد الدخول)
        function initApp() {
            displayActiveOrders();
            startLocationTracking();
            startFirebaseListeners();
            
            // مستمعو الإنترنت (Offline Queue)
            window.addEventListener('online', () => { document.getElementById('offlineBanner').classList.add('hidden-section'); });
            window.addEventListener('offline', () => { document.getElementById('offlineBanner').classList.remove('hidden-section'); });
        }

        // 6️⃣ تتبع الموقع الجغرافي
        function startLocationTracking() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition((position) => {
                    lastSentLat = position.coords.latitude;
                    lastSentLng = position.coords.longitude;
                    
                    // تحديث Firebase مباشرة (الموقع والحالة)
                    const updates = {};
                    updates[`drivers_locations/${driverData.phone}/lat`] = lastSentLat;
                    updates[`drivers_locations/${driverData.phone}/lng`] = lastSentLng;
                    updates[`drivers_locations/${driverData.phone}/status`] = 'active';
                    updates[`drivers_locations/${driverData.phone}/last_update`] = new Date().toISOString();
                    db.ref().update(updates).catch(()=>{});

                    // تحديث احتياطي لـ Google Script (كل فترة)
                    syncLocationToScript(lastSentLat, lastSentLng);

                }, (error) => console.error(error), { enableHighAccuracy: true, maximumAge: 10000 });
            }
        }

        let lastScriptSync = 0;
        function syncLocationToScript(lat, lng) {
            if (Date.now() - lastScriptSync < 900000) return; // مزامنة Script كل 15 دقيقة فقط لتخفيف الضغط
            fetch(`${API_URL}?action=DRIVER_UPDATE&phone=${driverData.phone}&lat=${lat}&lng=${lng}&token=${API_TOKEN}`).catch(()=>{});
            lastScriptSync = Date.now();
        }

        // 7️⃣ مستمعو Firebase (الحقيقي الفوري)
        function startFirebaseListeners() {
            const cleanPhone = String(driverData.phone).replace(/^0+/, '');

            // أ. استماع الطلبات النشطة (الرادار)
            db.ref('active_orders').on('value', (snapshot) => {
                const fbOrders = snapshot.val() || {};
                
                // فحص هل هناك طلب موجه لي ولم أقبله بعد؟
                let foundNew = false;
                Object.values(fbOrders).forEach(o => {
                    const oPhone = String(o.driverPhone).replace(/^0+/, '');
                    if (oPhone === cleanPhone && (o.status === 'pending_driver' || o.status === 'manual_pending')) {
                        const alreadyAccepted = activeOrders.find(localO => localO.id === o.id);
                        if (!alreadyAccepted) {
                            foundNew = true;
                            triggerOrderAlert(o); // إطلاق الإنذار!
                        }
                    }
                });

                // فحص تحديثات للطلبات التي أمتلكها (إلغاء من الإدارة، طلب جاهز)
                let needsRender = false;
                activeOrders.forEach(localO => {
                    const fbOrder = fbOrders[localO.id];
                    if (!fbOrder || fbOrder.status === 'deleted' || fbOrder.status === 'completed') {
                        // الطلب تم حذفه أو إنهاؤه من مكان آخر
                        activeOrders = activeOrders.filter(x => x.id !== localO.id);
                        needsRender = true;
                        showToast(`تم إزالة الطلب ${localO.resName} من الإدارة.`);
                    } else if (fbOrder.ready_for_pickup && !localO.readyForPickup) {
                        // إشعار المطعم بأن الطلب جاهز
                        localO.readyForPickup = true; needsRender = true;
                        document.getElementById('readySound').play().catch(()=>{});
                        showToast(`🍽️ طلب ${localO.resName} جاهز للاستلام!`);
                    }
                });
                
                if (needsRender) {
                    localStorage.setItem('hut_active_orders', JSON.stringify(activeOrders));
                    displayActiveOrders();
                }
            });

            // ب. استماع الديون (Ledger)
            db.ref(`ledgers/drivers/${driverData.phone}`).on('value', (snap) => {
                const ledger = snap.val() || { debt: 0 };
                const todayISO = new Date().toISOString().split('T')[0];
                
                db.ref(`daily_ledgers/${driverData.phone}/${todayISO}`).on('value', (dailySnap) => {
                    const dailyData = dailySnap.val() || {};
                    let liveDebtToday = 0;
                    Object.values(dailyData).forEach(d => liveDebtToday += (parseFloat(d.comm) || 0));
                    
                    const totalDebt = (parseFloat(ledger.debt) || 0) + liveDebtToday;
                    document.getElementById('statDebt').innerHTML = `${totalDebt} <small class="fs-6">د.ع</small>`;
                });
            });
        }

        // 8️⃣ منطق استلام الطلب (Radar Alert)
        function triggerOrderAlert(fbOrder) {
            if (document.getElementById('orderAlertOverlay').classList.contains('hidden-section') === false) return; // إنذار شغال أصلاً
            
            currentOrderData = fbOrder;
            document.getElementById('alert-res-name').innerText = fbOrder.restaurant || "مطعم";
            document.getElementById('alert-area').innerText = fbOrder.area || "غير محدد";
            document.getElementById('alert-price').innerText = (fbOrder.price || 0) + " د.ع";
            document.getElementById('alert-details').innerText = fbOrder.details || "لا توجد تفاصيل";
            
            document.getElementById('orderAlertOverlay').classList.remove('hidden-section');
            document.getElementById('btnAcceptOrder').disabled = false;
            document.getElementById('btnAcceptOrder').innerHTML = "استلام الطلب الآن ✅";
            
            document.getElementById('alertSound').currentTime = 0;
            document.getElementById('alertSound').play().catch(()=>{});

            let timeLeft = 60;
            document.getElementById('alert-timer').innerText = timeLeft;
            countdownInterval = setInterval(() => {
                timeLeft--; document.getElementById('alert-timer').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    document.getElementById('alertSound').pause();
                    document.getElementById('orderAlertOverlay').classList.add('hidden-section');
                    // السيرفر سيسحبه آلياً بواسطة الـ Watchdog
                }
            }, 1000);
        }

        // الكابتن يضغط "استلام الطلب"
        async function acceptOrder() {
            const btn = document.getElementById('btnAcceptOrder');
            btn.disabled = true; btn.innerHTML = "جاري التأمين...";
            
            clearInterval(countdownInterval);
            document.getElementById('alertSound').pause();

            try {
                // تحديث Firebase بقبولي
                await db.ref(`active_orders/${currentOrderData.id}`).update({
                    status: 'accepted', driverPhone: driverData.phone, last_update: new Date().toISOString()
                });

                // إضافته للمحلي
                const newOrder = {
                    id: currentOrderData.id, resName: currentOrderData.restaurant, area: currentOrderData.area,
                    details: currentOrderData.details, price: currentOrderData.price,
                    state: 'heading', // متوجه للمطعم
                    acceptedTime: Date.now(), readyForPickup: currentOrderData.ready_for_pickup || false,
                    comm: currentOrderData.comm || '0', payType: currentOrderData.payType || ''
                };
                
                activeOrders.push(newOrder);
                localStorage.setItem('hut_active_orders', JSON.stringify(activeOrders));
                
                document.getElementById('orderAlertOverlay').classList.add('hidden-section');
                displayActiveOrders();
                showToast("✅ تم تأمين الطلب بنجاح. انطلق!");

            } catch (error) {
                showToast("❌ خطأ في تأمين الطلب. قد يكون سُحب.");
                document.getElementById('orderAlertOverlay').classList.add('hidden-section');
            }
        }

        // 9️⃣ رسم وتحديث شاشة الطلبات النشطة
        function displayActiveOrders() {
            const container = document.getElementById('active-orders-container');
            const emptyState = document.getElementById('empty-state');
            
            // تنظيف الحاوية
            Array.from(container.children).forEach(child => { if(child.id !== 'empty-state') child.remove(); });
            
            if (activeOrders.length === 0) { emptyState.classList.remove('hidden-section'); return; }
            emptyState.classList.add('hidden-section');

            activeOrders.forEach(order => {
                const card = document.createElement('div');
                card.className = `glass-panel order-card ${order.readyForPickup && order.state !== 'picked_up' ? 'ready-pulse' : ''}`;
                
                // تحديد الزر والإجراء حسب الحالة
                let actionBtnHTML = '';
                if (order.state === 'heading') {
                    actionBtnHTML = `<button class="btn-status action-arrive" onclick="updateOrderStatus('${order.id}', 'arrive', this)"><i data-lucide="map-pin"></i> تأكيد الوصول للمطعم</button>`;
                } else if (order.state === 'arrived') {
                    actionBtnHTML = `<button class="btn-status action-pickup" onclick="updateOrderStatus('${order.id}', 'pickup', this)"><i data-lucide="package"></i> تم استلام الطلب</button>`;
                } else if (order.state === 'picked_up') {
                    actionBtnHTML = `<button class="btn-status action-finish" onclick="updateOrderStatus('${order.id}', 'finish', this)"><i data-lucide="check-circle"></i> إنهاء (تسليم للعميل)</button>`;
                }

                card.innerHTML = `
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <div class="order-title">${order.resName}</div>
                            <div class="order-detail"><i data-lucide="map"></i> ${order.area}</div>
                            <div class="order-detail"><i data-lucide="banknote" class="text-success"></i> ${order.price} د.ع (المطلوب)</div>
                            ${order.readyForPickup && order.state !== 'picked_up' ? `<div class="badge bg-success mb-2"><i data-lucide="flame" style="width:12px;"></i> الطلب جاهز استلمه الآن!</div>` : ''}
                        </div>
                        <div class="text-end">
                            <span class="badge bg-light text-dark shadow-sm">#${order.id.substring(0,5)}</span>
                        </div>
                    </div>
                    <div class="mt-2 pt-2 border-top border-light">
                        <small class="text-muted d-block mb-2"><b>التفاصيل:</b> ${order.details}</small>
                        ${actionBtnHTML}
                    </div>
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
        }

        // 🔟 تغيير حالة الطلب (Arrive -> Pickup -> Finish)
        async function updateOrderStatus(orderId, action, btn) {
            const order = activeOrders.find(o => o.id === orderId);
            if (!order) return;
            
            btn.disabled = true; btn.innerHTML = "جاري التحديث...";

            try {
                if (action === 'arrive') {
                    order.state = 'arrived';
                    await db.ref(`active_orders/${orderId}`).update({ status: 'arrived_at_res', last_update: new Date().toISOString() });
                } 
                else if (action === 'pickup') {
                    order.state = 'picked_up'; order.pickupTime = Date.now();
                    await db.ref(`active_orders/${orderId}`).update({ status: 'picked_up', last_update: new Date().toISOString() });
                } 
                else if (action === 'finish') {
                    // حماية: يجب أن يمر دقيقة على الأقل من الاستلام
                    if (Date.now() - (order.pickupTime || 0) < 60000) {
                        showToast("⚠️ يجب الانتظار دقيقة للوصول للعميل");
                        btn.disabled = false; btn.innerHTML = "إنهاء (تسليم للعميل)";
                        return;
                    }

                    // حساب العمولة حسب قواعد V88.0.0
                    let driverCommission = 0;
                    const commStr = String(order.comm).toLowerCase();
                    if (!commStr.includes('شهري') && !commStr.includes('monthly')) {
                        if (commStr.includes('/')) {
                            driverCommission = parseFloat(commStr.split('/')[0].replace(/\D/g, '')) || 0;
                        } else {
                            let val = parseFloat(commStr.replace(/\D/g, '')) || 0;
                            if (String(order.payType).includes("مناصفة")) driverCommission = val / 2;
                        }
                    }

                    const todayISO = new Date().toISOString().split('T')[0];
                    const updates = {};
                    updates[`active_orders/${orderId}/status`] = 'completed';
                    updates[`active_orders/${orderId}/last_update`] = new Date().toISOString();
                    // إضافة إلى الخزنة اليومية
                    updates[`daily_ledgers/${driverData.phone}/${todayISO}/${orderId}`] = {
                        orderId: orderId, resName: order.resName, price: order.price, comm: driverCommission, timestamp: Date.now()
                    };

                    await db.ref().update(updates);
                    
                    // إزالة من المحلي
                    activeOrders = activeOrders.filter(o => o.id !== orderId);
                    showToast("🎉 عاشت إيدك! تم التسليم.");
                }
                
                // حفظ ورسم
                localStorage.setItem('hut_active_orders', JSON.stringify(activeOrders));
                displayActiveOrders();
            } catch (error) {
                showToast("❌ فشل التحديث. تأكد من الإنترنت.");
                btn.disabled = false; btn.innerHTML = "إعادة المحاولة";
            }
        }
    </script>
</body>
</html>
