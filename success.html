<style>
/* ═══════════════════════════════════════════
   DESIGN SYSTEM
   Theme: Celebration White — Fresh & Memorable
═══════════════════════════════════════════ */
:root {
  --bg:       #f0f4f8;
  --card:     #ffffff;

  /* Brand blue (matches partners app) */
  --blue:     #2563eb;
  --blue-d:   #1d4ed8;
  --blue-l:   #eff6ff;
  --blue-g:   linear-gradient(135deg,#2563eb,#1d4ed8);

  /* Emerald success */
  --green:    #059669;
  --green-l:  #ecfdf5;
  --green-g:  linear-gradient(135deg,#059669,#047857);

  /* Gold accent */
  --gold:     #d97706;
  --gold-l:   #fffbeb;

  /* Text */
  --tx0:  #0f172a;
  --tx1:  #1e293b;
  --tx2:  #475569;
  --tx3:  #94a3b8;

  /* Borders & shadows */
  --bdr:  rgba(15,23,42,.08);
  --bdr2: rgba(15,23,42,.05);
  --sh-xs:0 1px 4px rgba(15,23,42,.06);
  --sh-sm:0 4px 16px rgba(15,23,42,.07);
  --sh-md:0 12px 40px rgba(15,23,42,.10);
  --sh-lg:0 24px 64px rgba(15,23,42,.12);
  --sh-blue:0 8px 28px rgba(37,99,235,.25);
  --sh-green:0 8px 28px rgba(5,150,105,.22);

  --r3:10px;--r4:14px;--r5:18px;--r6:24px;--r7:32px;--r8:40px;
}

*,::before,::after{box-sizing:border-box;margin:0;padding:0;}
html,body{
  min-height:100vh;
  background:var(--bg);
  font-family:'Cairo',sans-serif;
  color:var(--tx0);
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
}

/* ── Page Enter Animation ── */
body{animation:pageIn .6s ease both;}
@keyframes pageIn{from{opacity:0}to{opacity:1}}

/* ── Background mesh ── */
body::before{
  content:'';
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 40% at 30% 0%,rgba(37,99,235,.07) 0%,transparent 60%),
    radial-gradient(ellipse 50% 50% at 80% 100%,rgba(5,150,105,.05) 0%,transparent 60%);
}

/* ── Canvas (confetti sits here) ── */
canvas#confettiCanvas{
  position:fixed;inset:0;z-index:100;pointer-events:none;
}

/* ── Layout ── */
.page{
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:24px 16px;
  position:relative;z-index:1;
}

/* ── Card ── */
.card{
  background:var(--card);
  border-radius:var(--r7);
  border:1px solid var(--bdr);
  box-shadow:var(--sh-lg);
  width:100%;max-width:460px;
  overflow:hidden;
  animation:cardIn .7s cubic-bezier(.34,1.3,.64,1) .1s both;
}
@keyframes cardIn{
  from{opacity:0;transform:scale(.88) translateY(24px);}
  to{opacity:1;transform:none;}
}

/* ── Card Header (service-themed gradient) ── */
.card-hero{
  padding:36px 32px 28px;
  text-align:center;
  position:relative;overflow:hidden;
  background:var(--blue-g); /* default, overridden by JS */
}
.card-hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 100%,rgba(255,255,255,.1),transparent);
}
.card-hero::after{
  content:'';
  position:absolute;bottom:-1px;left:0;right:0;
  height:32px;background:var(--card);
  border-radius:32px 32px 0 0;
}

/* ── Success icon ── */
.s-icon{
  width:84px;height:84px;border-radius:50%;
  background:rgba(255,255,255,.18);
  border:2px solid rgba(255,255,255,.3);
  display:inline-flex;align-items:center;justify-content:center;
  font-size:2.6rem;margin-bottom:16px;
  position:relative;z-index:1;
  animation:iconPop .6s cubic-bezier(.34,1.6,.64,1) .4s both;
  box-shadow:0 8px 24px rgba(0,0,0,.15);
}
@keyframes iconPop{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:none}}

.hero-title{
  font-size:1.65rem;font-weight:900;color:#fff;
  margin-bottom:4px;letter-spacing:-.02em;
  position:relative;z-index:1;
  animation:fadeUp .5s ease .5s both;
}
.hero-sub{
  font-size:.82rem;font-weight:600;
  color:rgba(255,255,255,.75);
  position:relative;z-index:1;
  animation:fadeUp .5s ease .55s both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ── Card Body ── */
.card-body{padding:4px 28px 32px;}

/* ── Customer Name ── */
.cust-name{
  font-size:1.1rem;font-weight:900;
  color:var(--blue);text-align:center;
  margin-bottom:18px;
  animation:fadeUp .5s ease .6s both;
}

/* ── Status Row ── */
.status-box{
  background:var(--green-l);
  border:1px solid rgba(5,150,105,.2);
  border-radius:var(--r4);
  padding:13px 16px;
  display:flex;align-items:flex-start;gap:10px;
  margin-bottom:18px;
  animation:fadeUp .5s ease .65s both;
}
.status-icon{font-size:1.1rem;flex-shrink:0;margin-top:1px;}
.status-text{font-size:.82rem;font-weight:700;color:#065f46;line-height:1.65;}

/* ── Order ID Box ── */
.order-box{
  border:1.5px dashed var(--bdr);
  border-radius:var(--r5);
  padding:20px;
  text-align:center;
  margin-bottom:20px;
  background:var(--bg);
  animation:fadeUp .5s ease .7s both;
  position:relative;overflow:hidden;
}
.order-box::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(37,99,235,.03),transparent);
}
.order-label{
  font-size:.62rem;font-weight:900;
  color:var(--tx3);text-transform:uppercase;letter-spacing:2px;
  margin-bottom:6px;
}
.order-id{
  font-family:'IBM Plex Mono',monospace;
  font-size:1.85rem;font-weight:700;
  color:var(--tx0);letter-spacing:-.02em;
  margin-bottom:8px;
}
.sync-row{
  display:flex;align-items:center;justify-content:center;
  gap:6px;font-size:.76rem;font-weight:800;
}
.sync-row.pending{color:var(--gold);}
.sync-row.success{color:var(--green);}
.sync-row.error  {color:#dc2626;}
.sync-dot{
  width:7px;height:7px;border-radius:50%;
  background:currentColor;
  animation:syncPulse 1.2s ease-in-out infinite;
}
.sync-row.success .sync-dot,.sync-row.error .sync-dot{animation:none;}
@keyframes syncPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.4}}

/* ── Detail Pills ── */
.detail-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:9px;margin-bottom:20px;
  animation:fadeUp .5s ease .75s both;
}
.det{
  background:var(--bg);border:1px solid var(--bdr);
  border-radius:var(--r3);padding:10px 12px;
}
.det-lbl{font-size:.61rem;font-weight:900;color:var(--tx3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:3px;}
.det-val{font-size:.85rem;font-weight:800;color:var(--tx0);}
.det-val.price{color:var(--green);}

/* ── Sub message ── */
.sub-msg{
  font-size:.8rem;font-weight:600;color:var(--tx2);
  line-height:1.75;text-align:center;margin-bottom:24px;
  animation:fadeUp .5s ease .8s both;
}

/* ── Actions ── */
.actions{
  display:flex;flex-direction:column;gap:10px;
  animation:fadeUp .5s ease .85s both;
}
.btn-primary{
  display:flex;align-items:center;justify-content:center;gap:9px;
  padding:15px;border-radius:var(--r5);
  background:var(--blue-g);color:#fff;
  font-size:.92rem;font-weight:900;
  text-decoration:none;border:none;cursor:pointer;
  box-shadow:var(--sh-blue);transition:.2s;
  font-family:'Cairo',sans-serif;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(37,99,235,.35);}
.btn-primary:active{transform:scale(.97);}
.btn-secondary{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:13px;border-radius:var(--r5);
  background:var(--bg);border:1.5px solid var(--bdr);
  color:var(--tx1);font-size:.85rem;font-weight:800;
  text-decoration:none;cursor:pointer;transition:.18s;
  font-family:'Cairo',sans-serif;
}
.btn-secondary:hover{background:#fff;border-color:rgba(37,99,235,.2);}
.btn-secondary:active{transform:scale(.97);}

/* ── Service badges (right side of hero) ── */
.svc-badge{
  position:absolute;top:14px;left:14px;z-index:2;
  background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);
  border-radius:99px;padding:4px 12px;
  font-size:.68rem;font-weight:900;color:#fff;
}

/* ── Steps strip ── */
.steps{
  display:flex;align-items:stretch;gap:0;
  margin-bottom:20px;
  animation:fadeUp .5s ease .72s both;
  border:1px solid var(--bdr);border-radius:var(--r4);
  overflow:hidden;
}
.step{
  flex:1;padding:11px 8px;text-align:center;
  background:var(--bg);border-left:1px solid var(--bdr);
  position:relative;
}
.step:first-child{border-left:none;}
.step.done{background:#fff;}
.step.active{background:var(--blue-l);}
.step-num{
  width:22px;height:22px;border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:.7rem;font-weight:900;margin-bottom:4px;
}
.step.done   .step-num{background:var(--green);color:#fff;}
.step.active .step-num{background:var(--blue);color:#fff;animation:syncPulse 1.5s infinite;}
.step.next   .step-num{background:var(--bdr);color:var(--tx3);}
.step-lbl{font-size:.6rem;font-weight:800;color:var(--tx3);}
.step.done   .step-lbl{color:var(--green);}
.step.active .step-lbl{color:var(--blue);}

/* ── Retry / error state ── */
.retry-row{
  display:none;align-items:center;justify-content:center;gap:8px;
  margin-top:10px;
}
.retry-row.show{display:flex;}
.btn-retry{
  padding:6px 16px;border-radius:99px;border:1.5px solid rgba(220,38,38,.3);
  background:var(--bg);color:#dc2626;font-size:.76rem;font-weight:900;
  cursor:pointer;font-family:'Cairo',sans-serif;transition:.18s;
}
.btn-retry:hover{background:#fef2f2;}

/* ── Direction helpers ── */
[dir="ltr"] .card-hero{font-family:'Cairo',sans-serif;}
</style>
</head>

</div><!-- /card -->
</div><!-- /page -->

/* ════════════════════════════════════════════════
   SERVICE THEME COLORS

════════════════════════════════════════════════ */

════════════════════════════════════════════════ */
const P = new URLSearchParams(location.search);

// Detect language & service type
const lang    = P.get("lang") || "ar";
const t       = i18n[lang] || i18n.ar;
const svcRaw  = P.get("service") || P.get("type") || "";
const type    = svcRaw === "فندق" || svcRaw === "hotel" ? "hotel"

              : svcRaw === "تدريب قيادة" || svcRaw === "training" ? "training"
              : "personal";
const theme   = svcTheme[type];

// DOM shortcuts
const $ = id => document.getElementById(id);

/* ────── Apply language ────── */
function applyLang() {
  const root = $("htmlRoot");
  root.lang = lang;
  root.dir  = t.dir;
  $("heroTitle").textContent = t.greet;
  $("heroSub").textContent   = t.heroSub;
  $("statusText").textContent= t.status;
  $("subMsg").textContent    = t.sub;

  $("s4l").textContent = t.s4;
  const svcLabel = t.svc?.[type] || "🐋 الحوت";
  $("svcBadge").textContent = svcLabel;
  $("custName").textContent = P.get("name") || t.welcome;
}

/* ────── Apply service theme ────── */
function applyTheme() {
  $("cardHero").style.background = theme.g;
  $("sIcon").textContent         = theme.icon;
  // Tint the customer name
  $("custName").style.color      = theme.color;
}

/* ────── Build detail grid ────── */
function buildDetails() {
  const grid = $("detailGrid");
  const items = [];

  if(type === "hotel") {
    const hotelName = P.get("hotel_name") || P.get("car") || "";
    const roomType  = P.get("room_type") || "";
    const nights    = P.get("nights") || P.get("days") || "";
    const date      = P.get("date") || "";
    const city      = P.get("province") || P.get("city") || "";
    const total     = P.get("total_price") || "";
    if(hotelName) items.push([t.field_hotel, hotelName]);
    if(roomType)  items.push([t.field_room, roomType]);
    if(nights)    items.push([t.field_nights, nights]);
    if(date)      items.push([t.field_date, date]);
    if(city)      items.push([t.field_city, city]);
    if(total)     items.push([t.field_total, fmt(total)+" د.ع", true]);
  } else if(type === "training") {
    const course = P.get("addon_display") || P.get("course") || P.get("car") || "";
    const city   = P.get("province") || "";
    const date   = P.get("date") || "";
    const total  = P.get("total_price") || "";
    if(course) items.push([t.field_course, course]);
    if(city)   items.push([t.field_city, city]);
    if(date)   items.push([t.field_date, date]);
    if(total)  items.push([t.field_total, fmt(total)+" د.ع", true]);
  } else {
    const car   = P.get("car") || "";
    const days  = P.get("days") || "";
    const city  = P.get("province") || P.get("city") || "";
    const date  = P.get("date") || "";
    const addon = P.get("addon_display") || "";
    const total = P.get("total_price") || "";
    if(car)   items.push([t.field_car, car]);
    if(days)  items.push([t.field_days, days + (days ? (lang==="ar"?" يوم":lang==="ku"?" ڕۆژ":lang==="tr"?" Gün":" Day") : "")]);
    if(city)  items.push([t.field_city, city]);
    if(date)  items.push([t.field_date, date]);
    if(addon) items.push(["✨", addon]);
    if(total) items.push([t.field_total, fmt(total)+" د.ع", true]);
  }

  if(!items.length) { grid.style.display = "none"; return; }

  grid.innerHTML = items.map(([lbl, val, isPrice]) => `
    <div class="det">
      <div class="det-lbl">${lbl}</div>
      <div class="det-val${isPrice?" price":""}">${val}</div>
    </div>`).join("");
}

function fmt(n) {
  const num = Number(String(n||"").replace(/[^\d.]/g,""));
  return isNaN(num) ? n : Math.round(num).toLocaleString("ar-EG");
}

/* ────── Confetti ────── */
function fireConfetti() {
  // Burst 1
  confetti({
    particleCount: 120,
    spread: 80,
    origin: { y: 0.55 },
    colors: ["#2563eb","#059669","#d97706","#db2777","#ffffff"],
  });
  // Burst 2 (delayed)
  setTimeout(() => confetti({
    particleCount: 60,
    spread: 120,
    origin: { y: 0.4 },
    colors: ["#ffffff","#2563eb","#fbbf24"],
    scalar: 0.9,
  }), 550);
  // Burst 3 (sides)
  setTimeout(() => {
    confetti({ particleCount: 40, angle: 60, spread: 55, origin: { x: 0, y: 0.6 }, colors: ["#2563eb","#fff"] });
    confetti({ particleCount: 40, angle: 120, spread: 55, origin: { x: 1, y: 0.6 }, colors: ["#059669","#fff"] });
  }, 900);
}

/* ────── Sync state UI helpers ────── */
function setSyncState(state) {
  // state: "pending" | "success" | "error"
  const row = $("syncRow");
  const txt = $("syncTxt");
  row.className = "sync-row " + state;
  if(state === "pending") {
    txt.textContent = t.syncing;
  } else if(state === "success") {
    txt.textContent = t.synced;
    // Advance steps: mark step 3 done, step 4 active
    $("s3").className = "step done";
    $("s3").querySelector(".step-num").textContent = "✓";
    $("s4").className = "step active";
  } else if(state === "error") {
    txt.textContent = t.statusErr;
    $("retryRow").classList.add("show");
  }
}

/* ════════════════════════════════════════════════
   SUBMIT TO SCRIPT V9.2
   Uses POST with action: NEW_CAR_ORDER / NEW_HOTEL_BOOKING / NEW_DRIVE_STUDENT
════════════════════════════════════════════════ */
let finalOrderID = "";
let submitPayload = {};

function buildPayload() {
  // Use the passed order_id or generate a new one
  finalOrderID = P.get("order_id") || `HUT-${new Date().toISOString().slice(0,10).replace(/-/g,"")}-${Math.floor(1000+Math.random()*9000)}`;

  // Choose action based on service type
  let action;
  if(type === "hotel")    action = "NEW_HOTEL_BOOKING";
  else if(type === "training") action = "NEW_DRIVE_STUDENT";
  else                    action = "NEW_CAR_ORDER";

  // Common fields
  const base = {
    action,
    token:       API_TOKEN,
    order_id:    finalOrderID,
    name:        P.get("name")         || "",
    phone:       P.get("phone")        || "",
    province:    P.get("province")     || P.get("city") || "",
    date:        P.get("date")         || new Date().toLocaleDateString("en-GB"),
    total_price: P.get("total_price")  || P.get("total") || "0",
    service:     svcRaw,
    lang,
  };

  if(type === "hotel") {
    Object.assign(base, {
      hotel_name: P.get("hotel_name") || P.get("car") || "",
      hotel_id:   P.get("hotel_id")   || "",
      room_type:  P.get("room_type")  || "",
      nights:     P.get("nights")     || P.get("days") || "1",
      guests:     P.get("guests")     || "1",
      national_id:P.get("national_id")|| "",
      special_req:P.get("special_req")|| "",
      city:       P.get("province")   || "",
    });
  } else if(type === "training") {
    Object.assign(base, {
      course:       P.get("addon_display") || P.get("course") || "",
      city:         P.get("province") || "",
      school_id:    P.get("school_id") || "",
      addon_display:P.get("addon_display") || "",
    });
  } else {
    Object.assign(base, {
      car:          P.get("car")           || "",
      days:         P.get("days")          || "1",
      addon_display:P.get("addon_display") || "",
      location_link:P.get("location_link") || "",
      national_id:  P.get("national_id")   || "",
    });
  }

  return base;
}

async function submitToServer(payload) {
  // POST to GAS with JSON body
  const res = await fetch(SCRIPT_URL, {
    method:  "POST",
    mode:    "no-cors",   // GAS doesn't return CORS headers
    headers: { "Content-Type": "application/json" },
    body:    JSON.stringify(payload),
  });
  // no-cors → opaque response, treat as success if no exception thrown
  return true;
}

async function retrySubmit() {
  $("retryRow").classList.remove("show");
  setSyncState("pending");
  await doSubmit();
}
window.retrySubmit = retrySubmit;

async function doSubmit() {
  // Check sessionStorage dedup
  const dedupKey = "hut_sent_" + finalOrderID;
  if(sessionStorage.getItem(dedupKey)) {
    setSyncState("success");
    $("syncTxt").textContent = t.synced_prev;
    return;
  }

  setSyncState("pending");

  try {
    await submitToServer(submitPayload);
    sessionStorage.setItem(dedupKey, "1");
    setSyncState("success");
  } catch(err) {
    console.warn("Submit error:", err);
    setSyncState("error");
    // Queue for retry when back online
    window.addEventListener("online", () => {
      if(!sessionStorage.getItem(dedupKey)) doSubmit();
    }, { once: true });
  }
}

/* ════════════════════════════════════════════════
   SHARE API
════════════════════════════════════════════════ */
function buildShareBtn() {
  if(!navigator.share) return;
  const shareBtn = document.createElement("button");
  shareBtn.className = "btn-secondary";
  shareBtn.textContent = "📤 " + t.share;
  shareBtn.onclick = () => {
    navigator.share({
      title: `الحوت | ${t.greet}`,
      text: `${t.greet}\n#${finalOrderID}`,
      url: location.href,
    }).catch(()=>{});
  };
  $("actionsArea").appendChild(shareBtn);
}

/* ════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════ */
window.onload = () => {
  applyLang();
  applyTheme();

  // Build and show order ID
  submitPayload = buildPayload();
  $("orderIdEl").textContent = "#" + finalOrderID;

  // Build detail grid
  buildDetails();

  // Confetti 🎉
  fireConfetti();

  // Submit to server
  doSubmit();

  // Share button
  buildShareBtn();
};
</script>
