<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المطعم الذكية | نظام المدير</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; }</style>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-slate-900 text-white p-4 shadow-lg flex justify-between items-center px-8">
        <h1 class="text-xl font-bold">بوابة المطعم - إشراف المدير</h1>
        <span class="bg-green-500 px-3 py-1 rounded-full text-[10px] animate-pulse">متصل بالسيادة ⚡</span>
    </nav>
    <div class="container mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-1 bg-white p-6 rounded-2xl shadow-xl border-t-4 border-slate-900">
            <h2 class="font-bold mb-4">➕ إدخال طلب سريع</h2>
            <form class="space-y-4">
                <input type="tel" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-slate-900" placeholder="رقم هاتف الزبون" required>
                <input type="text" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-slate-900" placeholder="عنوان التوصيل" required>
                <div class="relative">
                    <input type="number" class="w-full p-3 border rounded-xl pr-10 outline-none focus:ring-2 focus:ring-slate-900" placeholder="سعر الطلب" required>
                    <span class="absolute left-3 top-3 text-gray-400 text-sm">د.ع</span>
                </div>
                <button class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold hover:bg-slate-800 transition-all shadow-lg active:scale-95">إرسال لنظام المدير الذكي 🚀</button>
            </form>
        </div>
        <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-xl">
            <h2 class="font-bold mb-6 flex justify-between">⏳ مراقبة الطلبات الحية <span class="text-xs text-gray-400">تحديث لحظي</span></h2>
            <table class="w-full text-right">
                <thead><tr class="bg-gray-50 text-gray-600"><th class="p-4 border-b">الطلب</th><th class="p-4 border-b">السعر</th><th class="p-4 border-b text-center">الحالة</th></tr></thead>
                <tbody>
                    <tr><td class="p-4 border-b font-bold">#HK-5501</td><td class="p-4 border-b text-emerald-600 font-bold">25,000 د.ع</td><td class="p-4 border-b text-center"><span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-[10px] font-bold">خوارزمية المدير تبحث.. ⚖️</span></td></tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
