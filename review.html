<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>مراجعة الطلب | الحوت</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary:#FF385C; --primary-dark:#E31C5F; --dark:#222222; --mid:#717171; --light:#DDDDDD; --bg:#F7F7F7; --radius:16px; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Tajawal',sans-serif; background:var(--bg); color:var(--dark); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
        .card { background:white; border-radius:24px; max-width:480px; width:100%; padding:32px; box-shadow:0 8px 40px rgba(0,0,0,0.12); border:1px solid var(--light); animation:slideUp 0.5s ease; }
        @keyframes slideUp { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
        .card-header { text-align:center; margin-bottom:28px; }
        .card-emoji { font-size:3rem; margin-bottom:12px; display:block; }
        .card-title { font-size:1.5rem; font-weight:900; margin-bottom:4px; }
        .order-id { font-size:0.82rem; color:var(--mid); font-weight:600; }
        .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
        .info-item { background:var(--bg); padding:12px 14px; border-radius:12px; }
        .info-label { font-size:0.65rem; font-weight:800; color:var(--mid); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:4px; display:block; }
        .info-value { font-size:0.9rem; font-weight:800; color:var(--dark); }
        .price-box { background:var(--dark); color:white; border-radius:16px; padding:20px 24px; text-align:center; margin-bottom:20px; }
        .price-label { font-size:0.75rem; font-weight:800; opacity:0.6; text-transform:uppercase; margin-bottom:6px; }
        .price-value { font-size:2rem; font-weight:900; color:#FFD700; }
        .price-curr { font-size:0.85rem; font-weight:600; opacity:0.8; margin-top:2px; }
        .map-link { display:inline-flex; align-items:center; gap:6px; background:var(--bg); color:var(--dark); text-decoration:none; padding:8px 16px; border-radius:10px; font-size:0.82rem; font-weight:700; margin-bottom:20px; transition:0.2s; border:1.5px solid var(--light); }
        .map-link:hover { border-color:var(--primary); color:var(--primary); }
        .confirm-btn { width:100%; background:var(--primary); color:white; border:none; padding:16px; border-radius:12px; font-weight:900; font-size:1rem; cursor:pointer; transition:0.2s; font-family:'Tajawal',sans-serif; margin-bottom:10px; }
        .confirm-btn:hover { background:var(--primary-dark); }
        .back-link { display:block; text-align:center; color:var(--mid); font-size:0.82rem; font-weight:700; cursor:pointer; padding:8px; transition:0.2s; }
        .back-link:hover { color:var(--primary); }
    </style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <span class="card-emoji" id="cardEmoji">📋</span>
        <h1 class="card-title" id="cardTitle">مراجعة التفاصيل</h1>
        <div class="order-id" id="orderIdText"></div>
    </div>

    <div class="info-grid" id="infoGrid"></div>

    <div id="mapLinkWrap" style="display:none;">
        <a id="mapLink" href="#" target="_blank" class="map-link">
            <i class="fas fa-map-marker-alt" style="color:var(--primary)"></i>
            <span id="mapTxt">عرض الموقع على الخريطة</span>
        </a>
    </div>

    <div class="price-box">
        <div class="price-label" id="totalLabel">إجمالي المبلغ</div>
        <div class="price-value" id="totalVal">0</div>
        <div class="price-curr" id="currLabel">دينار عراقي</div>
    </div>

    <button class="confirm-btn" onclick="confirmAndSubmit()">
        <i class="fas fa-check-circle"></i> <span id="confirmTxt">تأكيد وإرسال الطلب</span>
    </button>
    <div class="back-link" onclick="history.back()" id="backTxt">
        <i class="fas fa-edit"></i> رجوع للتعديل
    </div>
</div>

<script>
    const u = new URLSearchParams(window.location.search);
    const type = u.get('type') || 'personal';
    const service = u.get('service') || '';
    const lang = u.get('lang') || 'ar';

    const emojis = { hotel:'🏨', training:'🎓', wedding:'💍', personal:'🚗', 'فندق':'🏨', 'تدريب قيادة':'🎓', 'زفاف':'💍' };

    const ui = {
        ar:{dir:'rtl',title:'مراجعة التفاصيل',total:'إجمالي المبلغ',curr:'دينار عراقي',confirm:'تأكيد وإرسال الطلب',back:'رجوع للتعديل',map:'عرض الموقع على الخريطة',fields:{name:'الاسم',phone:'الهاتف',province:'المدينة',car:'الخدمة/السيارة',date:'التاريخ',gender:'الجنس',days:'الأيام',service:'نوع الخدمة'}},
        ku:{dir:'rtl',title:'پێداچوونەوە',total:'کۆی گشتی',curr:'دینار عێراقی',confirm:'ناردنی داواکاری',back:'گەڕانەوە',map:'بینینی شوێن',fields:{name:'ناو',phone:'تەلەفۆن',province:'شار',car:'خزمەتگوزاری',date:'بەروار',gender:'ڕەگەز',days:'ڕۆژ',service:'جۆری خزمەتگوزاری'}},
        tr:{dir:'ltr',title:'Detayları İncele',total:'Toplam Tutar',curr:'Irak Dinarı',confirm:'Onayla ve Gönder',back:'Düzenlemek için geri dön',map:'Konumu Görüntüle',fields:{name:'İsim',phone:'Telefon',province:'Şehir',car:'Hizmet/Araç',date:'Tarih',gender:'Cinsiyet',days:'Gün',service:'Hizmet Türü'}},
        en:{dir:'ltr',title:'Review Details',total:'Total Amount',curr:'Iraqi Dinar',confirm:'Confirm & Submit',back:'Back to Edit',map:'View Location',fields:{name:'Name',phone:'Phone',province:'City',car:'Service/Car',date:'Date',gender:'Gender',days:'Days',service:'Service Type'}},
    };

    window.onload = () => {
        const l = ui[lang] || ui.ar;
        const isRtl = (lang==='ar'||lang==='ku');
        document.getElementById('htmlTag').dir = l.dir;
        document.getElementById('cardTitle').innerText = l.title;
        document.getElementById('totalLabel').innerText = l.total;
        document.getElementById('currLabel').innerText = l.curr;
        document.getElementById('confirmTxt').innerText = l.confirm;
        document.getElementById('backTxt').innerHTML = `<i class="fas fa-edit"></i> ${l.back}`;
        document.getElementById('mapTxt').innerText = l.map;

        const emojiKey = service || type;
        document.getElementById('cardEmoji').innerText = emojis[emojiKey] || '📋';

        if(u.get('order_id')) document.getElementById('orderIdText').innerText = `#${u.get('order_id')}`;

        // Build info grid
        let html = '';
        Object.keys(l.fields).forEach(key => {
            let val = u.get(key);
            if(val && val !== 'null' && val !== 'undefined' && val !== '---') {
                html += `<div class="info-item"><span class="info-label">${l.fields[key]}</span><span class="info-value">${val}</span></div>`;
            }
        });
        document.getElementById('infoGrid').innerHTML = html;

        const total = parseInt(u.get('total_price') || 0);
        document.getElementById('totalVal').innerText = total.toLocaleString();

        if(u.get('location_link') && u.get('location_link') !== '') {
            document.getElementById('mapLinkWrap').style.display = 'block';
            document.getElementById('mapLink').href = u.get('location_link');
        }
    };

    function confirmAndSubmit() {
        window.location.href = `success.html?${u.toString()}`;
    }
</script>
</body>
</html>
