<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الحوت العليا 👑</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: white; overflow-x: hidden; }
        .admin-card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 2rem; transition: 0.4s; }
        .tab-btn { padding: 12px; border-radius: 15px; font-weight: bold; transition: 0.3s; cursor: pointer; }
        .tab-active { background: #D4AF37; color: #020617; box-shadow: 0 10px 20px -5px rgba(212, 175, 55, 0.4); }
        .status-badge { padding: 2px 10px; border-radius: 8px; font-size: 10px; font-weight: 900; }
        
        .order-new { border-right: 8px solid #3b82f6; } 
        .order-completed { border-right: 8px solid #22c55e; background: rgba(34, 197, 94, 0.1); } 
        .order-trouble { border-right: 8px solid #a855f7; background: rgba(168, 85, 247, 0.1); }

        #authOverlay { transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .whale-float { animation: floating 3s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body class="p-4 pb-20">

    <div id="authOverlay" class="fixed inset-0 z-[100] bg-[#020617] flex flex-col items-center justify-center p-6">
        <div class="whale-float mb-8 text-7xl">🐋</div>
        <h2 class="text-[#D4AF37] text-2xl font-black mb-6 tracking-tighter text-center">غرفة العمليات المركزية<br><span class="text-xs text-slate-500 uppercase italic tracking-widest">Master Control Room</span></h2>
        <div class="relative w-full max-w-xs">
            <input type="password" id="masterKey" autofocus
                   class="w-full bg-slate-900 border-2 border-slate-800 rounded-2xl p-5 text-center text-2xl text-[#D4AF37] tracking-[0.5em] outline-none focus:border-[#D4AF37] transition-all"
                   placeholder="****">
            <button onclick="checkMasterKey()" class="w-full mt-4 bg-[#D4AF37] text-[#020617] py-4 rounded-2xl font-black hover:bg-yellow-500 transition-all shadow-xl shadow-yellow-500/10">
                تأكيد الدخول 🔑
            </button>
        </div>
        <p id="errorMsg" class="text-red-500 text-xs mt-6 font-bold opacity-0 transition-opacity">عذراً، رمز السيادة غير صحيح ⚠️</p>
    </div>

    <div id="mainContent" class="opacity-0 transition-opacity duration-1000">
        <header class="max-w-4xl mx-auto mb-8 flex justify-between items-end border-b border-slate-800 pb-4">
            <div>
                <h1 class="text-3xl font-black text-[#D4AF37]">غرفة العمليات 🔱</h1>
                <p class="text-slate-400 text-xs mt-1 italic uppercase tracking-tighter">نظام إدارة النزاعات والطلبات</p>
            </div>
            <button onclick="loadData()" class="bg-slate-800 p-3 px-5 rounded-2xl border border-slate-700 hover:bg-slate-700 text-xs font-bold text-blue-400">
                <i class="fas fa-sync-alt ml-1"></i> تحديث الرادار
            </button>
        </header>

        <div class="max-w-4xl mx-auto flex gap-3 mb-8">
            <button onclick="switchTab('orders')" id="btnOrders" class="tab-btn flex-1 tab-active text-sm">مراقبة الطلبات 🛰️</button>
            <button onclick="switchTab('offices')" id="btnOffices" class="tab-btn flex-1 bg-slate-900 text-slate-500 text-sm">شركاء الخدمة 🤝</button>
        </div>

        <main class="max-w-4xl mx-auto space-y-4" id="content">
            <div class="text-center py-20 opacity-40 italic font-bold">بانتظار وصول إشارات الرادار...</div>
        </main>
    </div>

    <script>
        // الرابط الجديد لمنظومة الحوت
        const scriptURL = "https://script.google.com/macros/s/AKfycbxpAW6PZ9ykBmaIfuDxtxr3YOfcg95jXeFJ2FjX5GxGRiawUNHzs90rKBEUFOcf_z_n/exec";
        const MASTER_PASS = "2026"; 
        let currentTab = 'orders';
        let data = { orders: [], offices: [] };

        function checkMasterKey() {
            const pass = document.getElementById('masterKey').value;
            if(pass === MASTER_PASS) {
                document.getElementById('authOverlay').classList.add('opacity-0', 'pointer-events-none', 'scale-150');
                document.getElementById('mainContent').classList.remove('opacity-0');
                loadData();
                setInterval(loadData, 40000); 
            } else {
                document.getElementById('errorMsg').classList.remove('opacity-0');
                document.getElementById('masterKey').value = "";
            }
        }

        async function loadData() {
            try {
                const res = await fetch(`${scriptURL}?action=getAdminFullData&t=${Date.now()}`, {
                    method: 'GET',
                    redirect: 'follow'
                });
                data = await res.json();
                render();
            } catch (e) { 
                document.getElementById('content').innerHTML = `<div class="text-center p-10 text-red-400 font-bold">❌ فشل الاتصال.. تأكد من توفر مساحة في Drive</div>`;
            }
        }

        function render() {
            const container = document.getElementById('content');
            if (currentTab === 'orders') {
                let html = data.orders.slice().reverse().map(o => renderOrderCard(o)).join('');
                container.innerHTML = html || `<div class="text-center py-20 opacity-30">لا توجد طلبات حالياً</div>`;
            } else {
                container.innerHTML = data.offices.slice().reverse().map(of => `
                    <div class="admin-card p-6 mb-4 border-r-8 ${of.status === 'نشط' ? 'border-green-500' : 'border-red-500'}">
                        <div class="flex justify-between items-center text-right">
                            <div>
                                <h3 class="text-lg font-black text-white">${of.name}</h3>
                                <p class="text-[10px] text-slate-400 font-bold mt-1">${of.city} | ID: ${of.id}</p>
                                <span class="status-badge mt-2 inline-block ${of.status==='نشط'?'bg-green-500/10 text-green-500':'bg-red-500/10 text-red-500'}">${of.status}</span>
                            </div>
                            <div class="flex gap-2">
                                ${of.status !== 'نشط' ? `<button onclick="action('approveOffice', '${of.id}')" class="btn-action bg-green-600 text-white p-3 px-5 rounded-2xl text-[10px] font-black">تفعيل</button>` : ''}
                                <button onclick="action('blockOffice', '${of.id}')" class="btn-action bg-orange-600/20 text-orange-400 p-3 rounded-2xl text-[10px] font-bold border border-orange-600/10">حظر</button>
                                <button onclick="action('deleteOffice', '${of.id}')" class="btn-action bg-red-600/20 text-red-400 p-3 rounded-2xl text-xs"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        }

        function renderOrderCard(o) {
            const isTrouble = (o.status || "").includes('⚠️');
            const isCompleted = (o.status || "").includes('✅');
            const orderId = o.id || o.order_id;
            
            return `
            <div class="admin-card p-6 mb-4 ${isCompleted?'order-completed':isTrouble?'order-trouble':'order-new'} text-right">
                <div class="flex flex-col md:flex-row justify-between items-start gap-4">
                    <div class="flex-1 w-full">
                        <span class="status-badge ${isCompleted ? 'bg-green-500/20 text-green-400' : isTrouble ? 'bg-red-500 text-white' : 'bg-blue-500/20 text-blue-400'}">${o.status}</span>
                        <h3 class="text-xl font-black text-white mt-2">${o.car || 'سيارة'}</h3>
                        <p class="text-sm text-[#D4AF37] font-black">${Number(o.price || 0).toLocaleString()} د.ع</p>
                        <div class="mt-4 grid grid-cols-2 gap-2 text-[11px] text-slate-300">
                            <p>👤 ${o.name}</p>
                            <p>📍 ${o.province || o.prov}</p>
                            <p>📞 ${o.phone}</p>
                            <p>🏢 <span class="text-orange-400">${o.office || 'بدون مكتب'}</span></p>
                        </div>
                    </div>
                    <div class="flex gap-2 w-full md:w-auto">
                        <button onclick="action('complete', '${orderId}')" class="flex-1 btn-action bg-green-600 text-white p-2.5 rounded-xl text-[10px] font-black">إتمام</button>
                        <button onclick="action('adminReset', '${orderId}')" class="flex-1 btn-action bg-blue-600/20 text-blue-400 p-2.5 rounded-xl text-[10px] font-black">إعادة</button>
                        <button onclick="action('deleteOrder', '${orderId}')" class="btn-action bg-red-600/10 text-red-500/60 p-2.5 rounded-xl"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            </div>`;
        }

        async function action(act, id) {
            if(!confirm("تأكيد هذا الإجراء الإداري؟")) return;
            try {
                const res = await fetch(`${scriptURL}?action=${act}&id=${id}`, {
                    method: 'GET',
                    redirect: 'follow'
                });
                const result = await res.json();
                if(result.success) loadData();
                else alert("فشل: " + result.message);
            } catch (e) { alert("خطأ في الاتصال"); }
        }

        function switchTab(t) {
            currentTab = t;
            document.getElementById('btnOrders').className = `tab-btn flex-1 ${t==='orders' ? 'tab-active' : 'bg-slate-900 text-slate-500'}`;
            document.getElementById('btnOffices').className = `tab-btn flex-1 ${t==='offices' ? 'tab-active' : 'bg-slate-900 text-slate-500'}`;
            render();
        }

        document.getElementById('masterKey').addEventListener('keypress', (e) => { if(e.key === 'Enter') checkMasterKey(); });
    </script>
</body>
</html>
