<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver App | أسطول الحوت</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #000; color: white; }
        .order-card { background: linear-gradient(145deg, #111, #000); border: 1px solid #222; }
        .neon-text { text-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
    </style>
</head>
<body class="max-w-md mx-auto pb-20">
    <div class="p-8 flex justify-between items-center">
        <div>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Status</p>
            <h1 class="text-xl font-bold neon-text text-emerald-500 italic uppercase">Whale Driver</h1>
        </div>
        <div class="w-12 h-12 rounded-2xl bg-slate-900 border border-white/10 flex items-center justify-center shadow-2xl">👤</div>
    </div>

    <div class="px-8 mb-10">
        <div class="order-card p-6 rounded-[2.5rem] flex justify-between items-center border-emerald-500/20">
            <div><p class="text-[10px] text-gray-500 mb-1">صافي ربحك اليوم</p><p class="text-3xl font-bold cyber-font tracking-tighter">48,750 <span class="text-xs text-emerald-500">د.ع</span></p></div>
            <div class="text-left"><p class="text-[10px] text-gray-500 mb-1">التقييم</p><p class="text-xl font-bold text-amber-500">5.0 ⭐</p></div>
        </div>
    </div>

    <div class="px-8">
        <div class="order-card p-8 rounded-[3rem] border-emerald-500 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-emerald-500/10 blur-[50px]"></div>
            <div class="flex justify-between items-start mb-6">
                <span class="text-[10px] bg-emerald-500 text-black px-3 py-1 rounded-full font-bold uppercase tracking-widest">New Order Available</span>
                <span class="text-xs text-gray-400">2.4 KM 📍</span>
            </div>
            <h3 class="text-2xl font-bold mb-2">مطعم الباشا المركزي</h3>
            <p class="text-gray-400 text-sm mb-6">التوصيل إلى: كركوك - طريق بغداد</p>
            <div class="flex items-end justify-between mb-8">
                <div><p class="text-[10px] text-gray-500 uppercase">سعر الطلب</p><p class="text-xl font-bold">18,000 د.ع</p></div>
                <div class="text-left"><p class="text-[10px] text-gray-500 uppercase">أجرتك</p><p class="text-2xl font-bold text-emerald-500 neon-text">3,500 <span class="text-[10px]">د.ع</span></p></div>
            </div>
            <button class="w-full bg-emerald-500 text-black py-5 rounded-[2rem] font-bold text-lg shadow-2xl shadow-emerald-500/20 active:scale-95 transition-all">
                قبول المهمة السيادية ✅
            </button>
        </div>
    </div>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass rounded-full p-4 flex justify-around border-white/5">
        <span class="text-xl opacity-100 text-emerald-500">🏠</span>
        <span class="text-xl opacity-30">📦</span>
        <span class="text-xl opacity-30">💰</span>
        <span class="text-xl opacity-30">⚙️</span>
    </div>
</body>
</html>
