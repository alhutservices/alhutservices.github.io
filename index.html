            const date = document.getElementById('dateInput').value;
            const time = document.getElementById('timeInput').value;
            const d = document.getElementById('daysInput').value || "1";
            const lang = document.getElementById('htmlTag').lang;

            if(!svc || !date || !time) return alert("يرجى ملء جميع الحقول 🐋");

            if (svc === 'training') {
                window.location.href = `addons.html?type=${svc}&city=${encodeURIComponent(c)}&date=${date}&time=${time}&lang=${lang}`;
            } else {
                window.location.href = `fleet.html?type=${svc}&city=${encodeURIComponent(c)}&date=${date}&time=${time}&days=${d}&lang=${lang}`;
            }
        }

        // دوال الخرائط الشاملة
        function initMap(mapId) {
            let m = L.map(mapId).setView([33.3152, 44.3661], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);
            let mk = L.marker([33.3152, 44.3661], {draggable: true}).addTo(m);
            
            L.Control.geocoder({ defaultMarkGeocode: false, placeholder: "ابحث..." })
            .on('markgeocode', function(e) { m.setView(e.geocode.center, 16); mk.setLatLng(e.geocode.center); }).addTo(m);

            if(mapId === 'map_personal') { map_personal = m; marker_personal = mk; }
            if(mapId === 'map_wedding') { map_wedding = m; marker_wedding = mk; }
            if(mapId === 'map_training') { map_training = m; marker_training = mk; }
        }

        function getGPS(mapId, markerObj) {
            navigator.geolocation.getCurrentPosition(p => { 
                const c = [p.coords.latitude, p.coords.longitude]; 
                if(mapId === 'map_personal') { map_personal.setView(c, 16); marker_personal.setLatLng(c); }
                if(mapId === 'map_wedding') { map_wedding.setView(c, 16); marker_wedding.setLatLng(c); }
                if(mapId === 'map_training') { map_training.setView(c, 16); marker_training.setLatLng(c); }
            }); 
        }

        function setGender(group, val, btn) {
            selections[group] = val;
            document.querySelectorAll(`.${group}`).forEach(el => el.classList.remove('active'));
