<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>كورس تعليم القيادة | الحوت</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <style>
        :root { --primary:#FF385C; --primary-dark:#E31C5F; --dark:#222222; --mid:#717171; --light:#DDDDDD; --bg:#F7F7F7; --shadow:0 6px 20px rgba(0,0,0,0.12); --radius:16px; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Tajawal',sans-serif; background:var(--bg); color:var(--dark); }
        .navbar { background:white; border-bottom:1px solid var(--light); padding:0 24px; height:72px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:0 1px 12px rgba(0,0,0,0.06); }
        .logo { font-size:1.3rem; font-weight:900; color:var(--primary); text-decoration:none; display:flex; align-items:center; gap:8px; }
        .back-btn { display:flex; align-items:center; gap:8px; color:var(--dark); font-weight:700; font-size:0.9rem; padding:10px 18px; border-radius:12px; border:1.5px solid var(--light); transition:0.2s; cursor:pointer; background:white; }
        .back-btn:hover { border-color:var(--dark); }
        .layout { max-width:960px; margin:0 auto; padding:32px 24px 40px; display:grid; grid-template-columns:1fr 340px; gap:32px; align-items:start; }
        .form-section { background:white; border-radius:var(--radius); padding:28px; border:1px solid var(--light); margin-bottom:24px; }
        .section-header { display:flex; align-items:center; gap:12px; margin-bottom:22px; padding-bottom:14px; border-bottom:1px solid var(--bg); }
        .section-icon { width:44px; height:44px; background:var(--bg); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.1rem; }
        .section-title { font-size:1.1rem; font-weight:900; }
        .field-group { margin-bottom:20px; }
        .field-label { display:block; font-size:0.8rem; font-weight:800; color:var(--mid); margin-bottom:8px; text-transform:uppercase; letter-spacing:0.04em; }
        .field-input { width:100%; padding:14px 16px; border:1.5px solid var(--light); border-radius:12px; font-family:'Tajawal',sans-serif; font-size:0.95rem; font-weight:600; color:var(--dark); outline:none; transition:0.2s; background:white; }
        .field-input:focus { border-color:var(--dark); }
        .fields-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
        .gender-group { display:flex; gap:12px; }
        .gender-btn { flex:1; padding:12px; border:1.5px solid var(--light); border-radius:12px; font-weight:800; cursor:pointer; text-align:center; background:white; transition:0.2s; font-family:'Tajawal',sans-serif; font-size:0.9rem; }
        .gender-btn.active { background:var(--dark); color:white; border-color:var(--dark); }
        .tip-box { background:#f0fdf4; border:1px solid #86efac; border-radius:12px; padding:14px; display:flex; gap:10px; margin-top:16px; }
        .tip-box p { font-size:0.82rem; color:#166534; line-height:1.6; font-weight:600; }
        #map { height:260px; border-radius:12px; border:1.5px solid var(--light); margin-top:8px; }
        .gps-btn { display:flex; align-items:center; gap:6px; background:var(--bg); border:1.5px solid var(--light); border-radius:10px; padding:8px 16px; font-weight:700; font-size:0.82rem; cursor:pointer; transition:0.2s; margin-bottom:8px; }
        .gps-btn:hover { border-color:var(--dark); }
        .summary-card { background:white; border-radius:var(--radius); border:1px solid var(--light); padding:24px; position:sticky; top:96px; }
        .summary-title { font-size:1rem; font-weight:900; margin-bottom:20px; padding-bottom:14px; border-bottom:1px solid var(--light); }
        .summary-row { display:flex; justify-content:space-between; margin-bottom:12px; font-size:0.9rem; }
        .summary-row .label { color:var(--mid); }
        .summary-row .value { font-weight:700; }
        .summary-total { display:flex; justify-content:space-between; padding-top:14px; border-top:1.5px solid var(--dark); margin-top:14px; font-size:1.1rem; font-weight:900; }
        .confirm-btn { width:100%; background:var(--primary); color:white; border:none; padding:16px; border-radius:12px; font-weight:900; font-size:1rem; cursor:pointer; transition:0.2s; margin-top:16px; font-family:'Tajawal',sans-serif; }
        .confirm-btn:hover { background:var(--primary-dark); }
        @media(max-width:768px) { .layout{grid-template-columns:1fr;} .summary-card{position:static;} .fields-row{grid-template-columns:1fr;} }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="index.html" class="logo"><span>🐋</span> <span id="logoTxt">الحوت</span></a>
    <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-right"></i> <span id="backTxt">رجوع</span></button>
</nav>

<div class="layout">
    <div>
        <div class="form-section">
            <div class="section-header">
                <div class="section-icon">🎓</div>
                <div class="section-title" id="sec1Title">بيانات المتدرب</div>
            </div>
            <div class="field-group">
                <label class="field-label" id="lblName">اسم المتدرب الكامل</label>
                <input type="text" id="tName" class="field-input">
            </div>
            <div class="fields-row">
                <div class="field-group">
                    <label class="field-label" id="lblPhone">رقم الهاتف</label>
                    <input type="tel" id="tPhone" class="field-input" dir="ltr" placeholder="07xx xxx xxxx">
                </div>
                <div class="field-group">
                    <label class="field-label" id="lblAge">العمر</label>
                    <input type="number" id="tAge" class="field-input" value="18">
                </div>
            </div>
            <div class="field-group">
                <label class="field-label" id="lblGender">الجنس</label>
                <div class="gender-group">
                    <div class="gender-btn active" id="maleBtn" onclick="setGender('Male')">👨 <span id="maleTxt">ذكر</span></div>
                    <div class="gender-btn" id="femaleBtn" onclick="setGender('Female')">👩 <span id="femaleTxt">أنثى</span></div>
                </div>
            </div>
        </div>

        <div class="form-section">
            <div class="section-header">
                <div class="section-icon">🪪</div>
                <div class="section-title" id="sec2Title">الوثائق الثبوتية</div>
            </div>
            <div class="field-group">
                <label class="field-label" id="lblID">رقم الهوية / الجواز</label>
                <input type="text" id="tNationalID" class="field-input">
            </div>
            <div class="tip-box">
                <span>💡</span>
                <p id="tipText">سيتم التواصل معك لتحديد موعد البدء بعد مراجعة بياناتك رسمياً.</p>
            </div>
        </div>

        <div class="form-section">
            <div class="section-header">
                <div class="section-icon">📍</div>
                <div class="section-title" id="sec3Title">موقع السكن التقريبي</div>
            </div>
            <button class="gps-btn" onclick="getGPS()"><i class="fas fa-satellite-dish"></i> <span id="gpsTxt">تحديد موقعي</span></button>
            <div id="map"></div>
        </div>
    </div>

    <div class="summary-card">
        <div class="summary-title" id="sumTitle">ملخص الكورس</div>
        <div class="summary-row"><span class="label" id="sumCourseLbl">الكورس</span><span class="value" id="sumCourse">—</span></div>
        <div class="summary-row"><span class="label" id="sumCityLbl">المدينة</span><span class="value" id="sumCity">—</span></div>
        <div class="summary-total">
            <span id="totalLbl">رسوم الكورس</span>
            <span id="totalVal">—</span>
        </div>
        <button class="confirm-btn" onclick="goToReview()">
            <span id="confirmTxt">مراجعة الطلب</span> <i class="fas fa-chevron-left" id="confirmIcon"></i>
        </button>
    </div>
</div>

<script>
    let map, marker, selectedGender = 'Male';
    const p = new URLSearchParams(window.location.search);
    const lang = p.get('lang') || 'ar';
    const city = p.get('city') || 'كركوك';

    const data = {
        ar:{dir:'rtl',logo:'الحوت',back:'رجوع',sec1:'بيانات المتدرب',sec2:'الوثائق الثبوتية',sec3:'موقع السكن',lblName:'اسم المتدرب الكامل',lblPhone:'رقم الهاتف',lblAge:'العمر',lblGender:'الجنس',male:'ذكر',female:'أنثى',lblID:'رقم الهوية / الجواز',tip:'سيتم التواصل معك لتحديد موعد البدء بعد مراجعة بياناتك.',gps:'تحديد موقعي',sum:'ملخص الكورس',sumCourse:'الكورس',sumCity:'المدينة',total:'رسوم الكورس',confirm:'مراجعة الطلب',curr:'د.ع',alert:'يرجى إكمال جميع الحقول 🐋',mapP:'ابحث عن منطقة...'},
        ku:{dir:'rtl',logo:'ئەلحووت',back:'گەڕانەوە',sec1:'زانیارییەکانی فێرخواز',sec2:'بەڵگەنامەکان',sec3:'شوێنی نیشتەجێبوون',lblName:'ناوی تەواوی فێرخواز',lblPhone:'مۆبایل',lblAge:'تەمەن',lblGender:'ڕەگەز',male:'نێر',female:'مێ',lblID:'ناسنامە',tip:'پەیوەندیت پێوە دەکەین بۆ دەستپێکردن.',gps:'دیاریکردنی شوێن',sum:'پوختەی کۆرس',sumCourse:'کۆرس',sumCity:'شار',total:'کرێی کۆرس',confirm:'پێداچوونەوە',curr:'د.ع',alert:'تکایە هەموو خانەکان پڕبکەرەوە 🐋',mapP:'بگەڕێ...'},
        tr:{dir:'ltr',logo:'AL-HUT',back:'Geri',sec1:'Öğrenci Bilgileri',sec2:'Gerekli Belgeler',sec3:'Yaklaşık Adres',lblName:'Öğrencinin Tam Adı',lblPhone:'Telefon',lblAge:'Yaş',lblGender:'Cinsiyet',male:'Erkek',female:'Kadın',lblID:'Kimlik No',tip:'Bilgileriniz incelendikten sonra başlangıç tarihi için sizinle iletişime geçilecektir.',gps:'Konumumu Bul',sum:'Kurs Özeti',sumCourse:'Kurs',sumCity:'Şehir',total:'Kurs Ücreti',confirm:'Siparişi İncele',curr:'IQD',alert:'Lütfen tüm alanları doldurun 🐋',mapP:'Bölge ara...'},
        en:{dir:'ltr',logo:'AL-HUT',back:'Back',sec1:'Student Information',sec2:'Required Documents',sec3:'Approximate Location',lblName:'Student Full Name',lblPhone:'Phone Number',lblAge:'Age',lblGender:'Gender',male:'Male',female:'Female',lblID:'ID / Passport No',tip:'We will contact you to schedule the start date after reviewing your details.',gps:'Get Location',sum:'Course Summary',sumCourse:'Course',sumCity:'City',total:'Course Fee',confirm:'Review Request',curr:'IQD',alert:'Please fill in all fields 🐋',mapP:'Search area...'},
    };

    window.onload = function() {
        const l = data[lang] || data.ar;
        const isRtl = (lang==='ar'||lang==='ku');
        document.getElementById('htmlTag').dir = l.dir;
        document.getElementById('logoTxt').innerText = l.logo;
        document.getElementById('backTxt').innerText = l.back;
        document.getElementById('sec1Title').innerText = l.sec1;
        document.getElementById('sec2Title').innerText = l.sec2;
        document.getElementById('sec3Title').innerText = l.sec3;
        document.getElementById('lblName').innerText = l.lblName;
        document.getElementById('lblPhone').innerText = l.lblPhone;
        document.getElementById('lblAge').innerText = l.lblAge;
        document.getElementById('lblGender').innerText = l.lblGender;
        document.getElementById('maleTxt').innerText = l.male;
        document.getElementById('femaleTxt').innerText = l.female;
        document.getElementById('lblID').innerText = l.lblID;
        document.getElementById('tipText').innerText = l.tip;
        document.getElementById('gpsTxt').innerText = l.gps;
        document.getElementById('sumTitle').innerText = l.sum;
        document.getElementById('sumCourseLbl').innerText = l.sumCourse;
        document.getElementById('sumCityLbl').innerText = l.sumCity;
        document.getElementById('totalLbl').innerText = l.total;
        document.getElementById('confirmTxt').innerText = l.confirm;
        document.getElementById('confirmIcon').className = `fas fa-chevron-${isRtl?'left':'right'}`;
        document.getElementById('sumCourse').innerText = p.get('addon_display') || '—';
        document.getElementById('sumCity').innerText = city;
        const price = parseInt(p.get('addon_price') || 0);
        document.getElementById('totalVal').innerText = `${price.toLocaleString()} ${l.curr}`;

        map = L.map('map').setView([33.3152, 44.3661], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        marker = L.marker([33.3152, 44.3661], {draggable:true}).addTo(map);
        L.Control.geocoder({defaultMarkGeocode:false, placeholder:l.mapP}).on('markgeocode', e => { map.setView(e.geocode.center,16); marker.setLatLng(e.geocode.center); }).addTo(map);
    };

    function setGender(g) { selectedGender=g; document.getElementById('maleBtn').classList.toggle('active',g==='Male'); document.getElementById('femaleBtn').classList.toggle('active',g==='Female'); }
    function getGPS() { navigator.geolocation.getCurrentPosition(pos => { const c=[pos.coords.latitude,pos.coords.longitude]; map.setView(c,17); marker.setLatLng(c); }); }

    function goToReview() {
        const l = data[lang] || data.ar;
        const name = document.getElementById('tName').value;
        const phone = document.getElementById('tPhone').value;
        const id_no = document.getElementById('tNationalID').value;
        if(!name||!phone||!id_no) { alert(l.alert); return; }
        const orderId = 'EDU-' + Math.floor(1000+Math.random()*9000);
        const pos = marker.getLatLng();
        p.set('order_id', orderId);
        p.set('name', name);
        p.set('phone', phone);
        p.set('national_id', id_no);
        p.set('age', document.getElementById('tAge').value);
        p.set('gender', selectedGender==='Male'?'ذكر':'أنثى');
        p.set('province', city);
        p.set('location_link', `https://www.google.com/maps?q=${pos.lat},${pos.lng}`);
        p.set('service', 'تدريب قيادة');
        p.set('car', p.get('addon_display'));
        p.set('total_price', p.get('addon_price'));
        p.set('license_no', 'Training-No-License');
        window.location.href = `review.html?${p.toString()}`;
    }
</script>
</body>
</html>
