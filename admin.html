let lastKnownOrderIds = new Set();
let toastTimer = null;

const $ = id => document.getElementById(id);
const fmt = n => Math.round(Number(n)||0).toLocaleString("ar-EG");
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function safeJSON(o){ return JSON.stringify(o).replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }

function toast(msg, type="s"){
  const c=$("toasts"), el=document.createElement("div");
  el.className=`ti t${type}`;
  el.innerHTML=`<div class="ti-ico">${type==="s"?"✅":"❌"}</div><span class="ti-msg">${msg}</span>`;
  c.appendChild(el);
  setTimeout(()=>{el.style.opacity="0";el.style.transition=".3s";setTimeout(()=>el.remove(),300);},3500);
}

function setBtn(id, loading){
  const el=$(id); if(!el) return;
  el.classList.toggle("btn-ld", loading);
  el.disabled = loading;
}

function startClock(){
  setInterval(()=>{
    const t = new Date().toLocaleTimeString("ar-EG",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
    const c=$("clk"); if(c) c.textContent=t;
  }, 1000);
}

══════════════════════════════════════════════════════ */
window.doAuth = async function(){
  const pass = $("mPW").value.trim();
  if(!pass){ $("authErr").textContent="أدخل رمز المرور"; return; }
  MP = pass; setBtn("authB", true); $("authErr").textContent = "";
  try{
    const res = await fetch(API_URL,{method:"POST",body:JSON.stringify({action:"VERIFY_MASTER_PASS",pass,token:API_TOKEN})});
    const d = await res.json();
    if(d.success){
      $("auth").style.display = "none";
      $("app").classList.remove("dn");
      startClock(); initMap(); loadSystemData(); startFirebaseListeners();
    } else { MP = ""; $("authErr").textContent = "❌ رمز خاطئ"; }
  } catch(e){ MP=""; $("authErr").textContent = "فشل الاتصال"; }
  finally{ setBtn("authB", false); }
};

async function loadSystemData(){
  try{
    const res = await fetch(`${API_URL}?action=getAdminFullData&token=${API_TOKEN}&_t=${Date.now()}`);
    gD = await res.json();
    if(gD?.success) {
      $("lk-offices").textContent = (gD.carOffices||[]).filter(x=>x.status==="active").length;
      placeMarkers();
    }
  } catch(e){}
}

function startFirebaseListeners(){
  if(!db) return;
  db.ref(".info/connected").on("value", snap => {
    const on = snap.val();
    const dot = $("fbDot"), txt = $("fbTxt");
    if(dot) dot.className = "sb-dot"+(on?"":" off");
    if(txt){ txt.textContent = on ? "رادار متصل" : "غير متصل"; txt.className = "sb-ct"+(on?"":" off"); }
  });
  db.ref("hut_car_orders").on("value", snap => { carOrdersFB = snap.val() ? Object.values(snap.val()) : []; refreshLivePanel(); checkNewOrders(); });
  db.ref("hut_hotel_bookings").on("value", snap => { hotelBookingsFB = snap.val() ? Object.values(snap.val()) : []; refreshLivePanel(); checkNewOrders(); });
}

function checkNewOrders(){
  const all = getMergedOrders().filter(o=>o.status==="pending");
  all.forEach(o => {
    const sid = String(o.id);
    if(!lastKnownOrderIds.has(sid)){
      lastKnownOrderIds.add(sid);
      showNewOrderToast(o);
    }
  });
}

function showNewOrderToast(o){
  $("nt-title").textContent = o.type==="car" ? "🚗 طلب تأجير جديد!" : "🏨 حجز فندقي جديد!";
  $("nt-sub").textContent = `#${o.id} · ${o.city||"—"} · ${fmt(o.price)} د.ع`;
  $("newOrderToast").classList.add("show");
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>$("newOrderToast").classList.remove("show"), 10000);
}
window.hideNewOrderToast = () => $("newOrderToast").classList.remove("show");
window.goTabAndShowOrder = () => { hideNewOrderToast(); goTab("live"); };

function getMergedOrders(){
  const list=[];
  carOrdersFB.forEach(o=>list.push({id:o.id, type:"car", title:(o.car||"سيارة"), name:o.name||"—", entity:o.office||"جاري التحديد", city:o.city||"—", price:Number(o.total)||0, status:o.status, date:o.date||o.created_at||""}));
  hotelBookingsFB.forEach(b=>list.push({id:b.id, type:"hotel", title:(b.hotel_name||"فندق"), name:b.guest_name||b.name||"—", entity:b.hotel_name||"—", city:b.city||"—", price:Number(b.total)||0, status:b.status, date:b.date_arrive||b.created_at||""}));
  return list.sort((a,b)=>new Date(b.date)-new Date(a.date));
}

function refreshLivePanel(){
  const all = getMergedOrders();
  const pend = all.filter(x=>x.status==="pending").length;
  const act  = all.filter(x=>["active","confirmed"].includes(x.status)).length;

  $("fn-all").textContent = all.length; $("fn-p").textContent = pend; $("fn-a").textContent = act;
  $("lk-active").textContent = pend+act;
  $("lp-cnt").textContent = pend;

  let filtered = all;
  if(liveFilt==="pending") filtered=all.filter(x=>x.status==="pending");
  if(liveFilt==="active")  filtered=all.filter(x=>["active","confirmed"].includes(x.status));

  const list = $("lp-list");
  if(!filtered.length){ list.innerHTML=`<div class="lp-empty">🐋 لا طلبات تطابق الفلتر</div>`; return; }

  list.innerHTML = filtered.map(x=>{
    let sc, sl, strClass;
    if(x.status==="pending"){ sc="stb-p"; sl="معلق"; strClass="str-p"; }
    else if(["active","confirmed"].includes(x.status)){ sc="stb-a"; sl="جاري"; strClass="str-a"; }
    else if(x.status==="completed"){ sc="stb-g"; sl="مكتمل"; strClass="str-c"; }
    else { sc="stb-x"; sl="ملغي"; strClass="str-x"; }

    return `
    <div class="oc">
      <div class="oc-stripe ${strClass}"></div>
      <div class="oc-hd">
        <div class="oc-id">#${esc(x.id)}</div>
        <span class="oc-stb ${sc}">${sl}</span>
      </div>
      <div class="oc-bd">
        <div class="oc-ti">${x.type==="car"?"🚗":"🏨"} ${esc(x.title)}</div>
        <div class="oc-det">👤 ${esc(x.name)} · 📍 ${esc(x.city)} · 🏢 ${esc(x.entity)}</div>
      </div>
      <div class="oc-ft">
        <div class="oc-price">${fmt(x.price)} د.ع</div>
        <div class="oc-acts">
          <button class="ob ob-track" title="تتبع الشريك" onclick="trackPartner('${esc(x.entity)}', '${x.type}')">📍</button>
          <button class="ob ob-withdraw" title="سحب قسري" onclick="forceWithdraw('${x.id}', '${x.type}')">↩</button>
          <button class="ob ob-ok" title="إكمال قسري" onclick="forceComplete('${x.type}','${x.id}')">✓</button>
          <button class="ob ob-del" title="إلغاء قسري" onclick="forceCancel('${x.id}')">✕</button>
        </div>
      </div>
    </div>`;
  }).join("");
}

window.setLiveFilt = function(f, btn){
  liveFilt = f;
  document.querySelectorAll(".fbar .fp").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  refreshLivePanel();
};

/* ══════════════════════════════════════════════════════
   SOVEREIGN ACTIONS (الأزرار السيادية)
══════════════════════════════════════════════════════ */
window.trackPartner = function(entityName, type) {
  if(!map || !gD) return;
  const list = type === 'car' ? gD.carOffices : gD.hotels;
  const partner = (list||[]).find(p => p.name === entityName);
  if(partner && partner.lat && partner.lng) {
     map.flyTo([partner.lat, partner.lng], 17, {duration: 1.5});
     toast("📍 جاري تتبع: " + entityName);
  } else {
     toast("لا توجد إحداثيات لهذا الشريك", "e");
  }
};

window.forceWithdraw = async function(id, type) {
  if(!confirm("تأكيد سحب الطلب من الشريك وإعادته للرادار للبحث عن شريك آخر؟")) return;
  try {
    const path = type === 'car' ? `hut_car_orders/${id}` : `hut_hotel_bookings/${id}`;
    if(db) {
      if(type === 'car') {
        await db.ref(path).update({status: 'pending', office: '', last_update: new Date().toISOString()});
      } else {
        await db.ref(path).update({status: 'pending', last_update: new Date().toISOString()});
      }
      toast("تم سحب الطلب بنجاح ✅");
    }
  } catch(e) { toast("فشل السحب", "e"); }
};

window.forceComplete = async function(type, id){
  if(!confirm("تأكيد إكمال الطلب يدوياً وتسجيل العمولة؟")) return;
  const action = type==="car" ? "completeOrder" : "confirmBooking";
  const body = type==="car" ? {action,id,office:"الإدارة العامة",token:API_TOKEN} : {action,id,hotel:"الإدارة العامة",token:API_TOKEN};
  try{
    await fetch(API_URL,{method:"POST",body:JSON.stringify(body)});
    toast("تم إنهاء الطلب ✅");
  }catch(e){toast("تم إرسال الأمر");}
};

window.forceCancel = async function(id){
  if(!confirm("تأكيد إلغاء الطلب وحذفه من الرادار نهائياً؟")) return;
  try{
    await fetch(API_URL,{method:"POST",body:JSON.stringify({action:"cancelRequest",id,token:API_TOKEN})});
    toast("تم الإلغاء ✅");
  }catch(e){toast("تم الإرسال");}
};

/* ══════════════════════════════════════════════════════
   MAP & NAVIGATION
══════════════════════════════════════════════════════ */
function initMap(){
  map = L.map("amap",{zoomControl:false,attributionControl:false}).setView([35.468,44.392],11);
  L.control.zoom({position:"bottomright"}).addTo(map);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{maxZoom:19}).addTo(map);
  clusterLayer = L.markerClusterGroup({
    iconCreateFunction: cluster => L.divIcon({
      html:`<div style="background:var(--gold);color:#000;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-weight:900;border:2px solid #000;">${cluster.getChildCount()}</div>`,
      className:"",iconSize:[34,34]
    })
  });
  map.addLayer(clusterLayer);
  setTimeout(()=>map.invalidateSize(),400);
}

function placeMarkers(){
  if(!map||!gD) return;
  clusterLayer.clearLayers();
  (gD.carOffices||[]).forEach(off=>{
    const lat=parseFloat(off.lat), lng=parseFloat(off.lng);
    if(!lat||!lng) return;
    const ico = L.divIcon({className:"",html:`<div style="background:#fff;border:2px solid var(--gold);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:14px;">🚗</div>`,iconSize:[30,30],iconAnchor:[15,15]});
    L.marker([lat,lng],{icon:ico}).bindPopup(`<b>${off.name}</b><br>📍 ${off.city}`).addTo(clusterLayer);
  });
}

window.goTab = function(name, btn){
  document.querySelectorAll(".tab-page").forEach(p=>p.classList.remove("on"));
  const pg=$("pg-"+name); if(pg)pg.classList.add("on");
  document.querySelectorAll(".sbn,.bni").forEach(b=>b.classList.remove("on"));
  if(btn) btn.classList.add("on");
  if(name==="live" && map) setTimeout(()=>map.invalidateSize(), 300);
};

window.doLogout = function(){
  if(!confirm("تأكيد مغادرة النظام؟"))return;
  MP=""; location.reload();
};
