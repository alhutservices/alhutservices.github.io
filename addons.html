<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإضافات | الحوت</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary:#FF385C; --primary-dark:#E31C5F; --dark:#222222; --mid:#717171; --light:#DDDDDD; --bg:#F7F7F7; --shadow:0 6px 20px rgba(0,0,0,0.12); --radius:16px; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Tajawal',sans-serif; background:var(--bg); color:var(--dark); min-height:100vh; }

        .navbar { background:white; border-bottom:1px solid var(--light); padding:0 24px; height:72px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:0 1px 12px rgba(0,0,0,0.06); }
        .logo { font-size:1.3rem; font-weight:900; color:var(--primary); text-decoration:none; display:flex; align-items:center; gap:8px; }
        .back-btn { display:flex; align-items:center; gap:8px; color:var(--dark); text-decoration:none; font-weight:700; font-size:0.9rem; padding:10px 18px; border-radius:12px; border:1.5px solid var(--light); transition:0.2s; cursor:pointer; background:white; }
        .back-btn:hover { border-color:var(--dark); }

        .page-hero { padding:40px 24px; text-align:center; border-bottom:1px solid var(--light); background:white; }
        .page-hero h1 { font-size:1.8rem; font-weight:900; margin-bottom:8px; }
        .page-hero p { color:var(--mid); }

        .main { max-width:860px; margin:0 auto; padding:40px 24px 120px; }

        .options-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:20px; margin-bottom:48px; }

        .option-card {
            background:white;
            border-radius:var(--radius);
            padding:28px 24px;
            cursor:pointer;
            border:2px solid var(--light);
            transition:all 0.25s;
            position:relative;
            text-align:center;
        }
        .option-card:hover { border-color:#aaa; box-shadow:var(--shadow); transform:translateY(-3px); }
        .option-card.selected {
            border-color:var(--primary);
            box-shadow:0 0 0 3px rgba(255,56,92,0.12);
        }
        .check-icon {
            position:absolute; top:14px; right:14px;
            width:28px; height:28px;
            background:var(--primary); color:white;
            border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            font-size:0.75rem;
            opacity:0; transform:scale(0.5);
            transition:0.25s;
        }
        .option-card.selected .check-icon { opacity:1; transform:scale(1); }
        .option-icon { font-size:3rem; margin-bottom:14px; display:block; }
        .option-name { font-size:1.05rem; font-weight:800; margin-bottom:8px; }
        .option-desc { font-size:0.85rem; color:var(--mid); line-height:1.6; margin-bottom:16px; }
        .option-price { font-weight:900; font-size:1rem; color:var(--dark); }
        .option-price.free { color:#22c55e; }

        .sticky-footer {
            position:fixed; bottom:0; left:0; right:0;
            background:white;
            border-top:1px solid var(--light);
            padding:16px 24px;
            display:flex; align-items:center; justify-content:space-between;
            box-shadow:0 -4px 20px rgba(0,0,0,0.08);
            z-index:200;
        }
        .footer-price { font-size:1.1rem; font-weight:900; }
        .footer-price small { font-size:0.8rem; font-weight:500; color:var(--mid); font-weight:400; }
        .proceed-btn {
            background:var(--primary); color:white; border:none;
            padding:14px 32px; border-radius:12px; font-weight:800; font-size:1rem;
            cursor:pointer; transition:0.2s;
            opacity:0.4; pointer-events:none;
        }
        .proceed-btn.ready { opacity:1; pointer-events:all; }
        .proceed-btn.ready:hover { background:var(--primary-dark); transform:scale(1.02); }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="index.html" class="logo"><span>🐋</span> <span id="logoTxt">الحوت</span></a>
    <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-right"></i> <span id="backTxt">رجوع</span></button>
</nav>

<div class="page-hero">
    <h1 id="pageTitle">✨ اختر إضافاتك</h1>
    <p id="pageSub">خصص تجربتك لراحتك وأمانك</p>
</div>

<div class="main">
    <div class="options-grid" id="optionsGrid"></div>
</div>

<div class="sticky-footer">
    <div>
        <div class="footer-price" id="footerPrice">—</div>
        <small id="footerLabel" style="color:var(--mid);font-size:0.8rem;">اختر خياراً للمتابعة</small>
    </div>
    <button class="proceed-btn" id="proceedBtn" onclick="proceed()">
        <span id="proceedTxt">متابعة</span> &nbsp;<i class="fas fa-arrow-left" id="proceedIcon"></i>
    </button>
</div>

<script>
    const u = new URLSearchParams(window.location.search);
    const type = u.get('type') || 'personal';
    const lang = u.get('lang') || 'ar';
    const city = u.get('city') || 'كركوك';
    let choice = null;

    const content = {
        ar:{
            dir:'rtl', logo:'الحوت', back:'رجوع',
            title:'✨ اختر إضافاتك', sub:'خصص تجربتك لراحتك وأمانك',
            proceed:'متابعة', curr:'د.ع', free:'مجاني',
            training:{ title:'🎓 اختر باقة التدريب', sub:'أفضل مكاتب تعليم السياقة', opts:[{n:'كورس أساسي (3 أيام)',d:'تعلم مبادئ القيادة للمبتدئين',p:100000,i:'🥉'},{n:'كورس ذهبي (5 أيام)',d:'تدريب مكثف واحترافي',p:150000,i:'🥇'}] },
            wedding:{ title:'💍 تزيين سيارة العرس', sub:'اجعل ليلة زفافك ملكية', opts:[{n:'باقة الزهور الطبيعية',d:'تزيين بورد طبيعي فاخر',p:75000,i:'💐'},{n:'باقة الموكب الملكي',d:'تزيين كامل + سائق مخصص',p:125000,i:'👑'}] },
            personal:{ title:'🛡️ الإضافات والتأمين', sub:'خدمات إضافية لراحتك وأمانك', opts:[{n:'تأمين شامل',d:'حماية تامة من حوادث الطرق في العراق',p:25000,i:'🛡️'},{n:'بدون إضافات',d:'تأجير سيارة بالمواصفات القياسية',p:0,i:'🚗'}] }
        },
        ku:{
            dir:'rtl', logo:'ئەلحووت', back:'گەڕانەوە',
            title:'✨ هەڵبژاردنی زیادکراو', sub:'تایبەتمەندکردنی گەشتەکەت',
            proceed:'بەردەوام بە', curr:'د.ع', free:'بێ بەرامبەر',
            training:{ title:'🎓 پاکێجی ڕاهێنان', sub:'باشترین کۆرسی شۆفێری', opts:[{n:'کۆرسی سەرەکی (3 ڕۆژ)',d:'بنەماکانی شۆفێری',p:100000,i:'🥉'},{n:'کۆرسی زێڕین (5 ڕۆژ)',d:'ڕاهێنانی پیشەیی',p:150000,i:'🥇'}] },
            wedding:{ title:'💍 ڕازاندنەوەی سەیارە', sub:'شەوەکەت شاهانە بکە', opts:[{n:'پاکێجی گوڵ',d:'ڕازاندنەوە بە گوڵی فرێش',p:75000,i:'💐'},{n:'کاروانی شاهانە',d:'ڕازاندنەوە + شۆفێر',p:125000,i:'👑'}] },
            personal:{ title:'🛡️ زیادکراوەکان', sub:'خزمەتگوزاری زیادە', opts:[{n:'دڵنیایی گشتگیر',d:'پاراستن لە ڕووداوەکان',p:25000,i:'🛡️'},{n:'بێ زیادکراو',d:'ستاندارد',p:0,i:'🚗'}] }
        },
        tr:{
            dir:'ltr', logo:'AL-HUT', back:'Geri',
            title:'✨ Ekstralarınızı Seçin', sub:'Deneyiminizi özelleştirin',
            proceed:'Devam Et', curr:'IQD', free:'Ücretsiz',
            training:{ title:'🎓 Eğitim Paketi', sub:'En iyi ehliyet kursları', opts:[{n:'Temel Kurs (3 Gün)',d:'Sürüş temelleri',p:100000,i:'🥉'},{n:'Altın Kurs (5 Gün)',d:'Tam profesyonel eğitim',p:150000,i:'🥇'}] },
            wedding:{ title:'💍 Düğün Paketi', sub:'Gecenizi unutulmaz kılın', opts:[{n:'Çiçek Paketi',d:'Taze çiçek süsleme',p:75000,i:'💐'},{n:'Kraliyet Konvoyu',d:'Süsleme + Şoför',p:125000,i:'👑'}] },
            personal:{ title:'🛡️ Ekstralar', sub:'Güvenli ve konforlu sürüş', opts:[{n:'Tam Sigorta',d:'Kaza koruma',p:25000,i:'🛡️'},{n:'Ekstra Yok',d:'Standart paket',p:0,i:'🚗'}] }
        },
        en:{
            dir:'ltr', logo:'AL-HUT', back:'Back',
            title:'✨ Choose Your Add-ons', sub:'Customize your experience',
            proceed:'Continue', curr:'IQD', free:'Free',
            training:{ title:'🎓 Training Package', sub:'Best driving schools near you', opts:[{n:'Basic Course (3 Days)',d:'Driving basics for beginners',p:100000,i:'🥉'},{n:'Golden Course (5 Days)',d:'Full professional training',p:150000,i:'🥇'}] },
            wedding:{ title:'💍 Wedding Package', sub:'Make it a royal night', opts:[{n:'Flowers Bundle',d:'Fresh natural decoration',p:75000,i:'💐'},{n:'Royal Convoy',d:'Decoration + Driver',p:125000,i:'👑'}] },
            personal:{ title:'🛡️ Add-ons', sub:'Extras for your safety', opts:[{n:'Full Insurance',d:'Complete accident protection',p:25000,i:'🛡️'},{n:'No Add-ons',d:'Standard specification',p:0,i:'🚗'}] }
        }
    };

    function init() {
        const l = content[lang] || content.ar;
        const cfg = l[type] || l.personal;
        const isRtl = (lang==='ar'||lang==='ku');
        document.getElementById('htmlTag').dir = l.dir;
        document.getElementById('logoTxt').innerText = l.logo;
        document.getElementById('backTxt').innerText = l.back;
        document.getElementById('pageTitle').innerText = cfg.title;
        document.getElementById('pageSub').innerText = cfg.sub;
        document.getElementById('proceedTxt').innerText = l.proceed;
        document.getElementById('proceedIcon').className = `fas fa-arrow-${isRtl?'left':'right'}`;

        const grid = document.getElementById('optionsGrid');
        grid.innerHTML = cfg.opts.map((opt,i) => `
            <div class="option-card" onclick="select(${i},'${opt.n.replace(/'/g,"\\'")}',${opt.p})" id="opt-${i}">
                <div class="check-icon"><i class="fas fa-check"></i></div>
                <span class="option-icon">${opt.i}</span>
                <div class="option-name">${opt.n}</div>
                <div class="option-desc">${opt.d}</div>
                <div class="option-price ${opt.p===0?'free':''}">${opt.p===0 ? l.free : opt.p.toLocaleString()+' '+l.curr}</div>
            </div>
        `).join('');
    }

    function select(i, name, price) {
        choice = {name, price};
        document.querySelectorAll('.option-card').forEach(c=>c.classList.remove('selected'));
        document.getElementById('opt-'+i).classList.add('selected');
        const l = content[lang] || content.ar;
        document.getElementById('footerPrice').innerText = price===0 ? l.free : price.toLocaleString()+' '+l.curr;
        document.getElementById('footerLabel').innerText = name;
        document.getElementById('proceedBtn').classList.add('ready');
    }

    function proceed() {
        if(!choice) return;
        let target = 'booking_personal.html';
        if(type==='training') target = 'training.html';
        else if(type==='wedding') target = 'booking_personal.html';
        u.set('addon_display', choice.name);
        u.set('addon_price', choice.price);
        if(!u.has('days')) u.set('days','1');
        window.location.href = `${target}?${u.toString()}`;
    }

    window.onload = init;
</script>
</body>
</html>
