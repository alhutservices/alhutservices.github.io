<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>أسطول الحوت | تأجير سيارات في بغداد، كركوك، أربيل وكافة مدن العراق</title>
    <meta name="description" content="اختر سيارتك من أسطول الحوت. نوفر تويوتا كورولا، هيونداي توسان، وسيارات VIP للايجار في العراق. أفضل الأسعار في البصرة، الموصل، الأنبار، والسليمانية.">
    <meta name="keywords" content="تأجير تويوتا كورولا العراق، حجز هيونداي توسان بغداد، سيارات أعراس كركوك، ايجار سيارات دفع رباعي أربيل، اسعار تأجير السيارات في الموصل، الحوت لتاجير السيارات">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f0f2f5; transition: 0.5s; overflow-x: hidden; }
        .hero-bg { background: linear-gradient(135deg, #002349 0%, #004d99 100%); transition: 1s; position: relative; padding-top: 5rem; padding-bottom: 14rem; overflow: hidden; border-bottom: 4px solid #D4AF37; }
        .map-pattern { position: absolute; inset: 0; opacity: 0.20; pointer-events: none; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120"><text y="60" x="10" font-size="45">🚗</text></svg>'); background-repeat: repeat; animation: bgMove 40s linear infinite; }
        @keyframes bgMove { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }
        .city-overlay { position: absolute; inset: 0; opacity: 0.7; transition: 1s; pointer-events: none; }
        .whale-logo { font-size: 5rem; animation: floating 4s ease-in-out infinite; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3)); }
        @keyframes floating { 0%, 100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-15px) rotate(5deg); } }
        .car-card { transition: all 0.4s ease; border-radius: 3rem; overflow: hidden; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        .car-card:hover { transform: translateY(-12px); border-color: #D4AF37; box-shadow: 0 25px 50px rgba(0,35,73,0.15); }
        .price-badge { background: #002349; color: #D4AF37; padding: 10px 22px; border-radius: 1.5rem; font-weight: 900; display: inline-block; }
        .filter-box { background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(20px); border-radius: 3rem; box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.2); transform: translateY(-80px); position: relative; z-index: 30; border: 1px solid white; }
        .smart-select { padding: 1.1rem; background-color: #f8fafc; border-radius: 1.5rem; font-weight: 900; color: #002349; border: 2px solid transparent; transition: 0.3s; width: 100%; text-align: center; cursor: pointer; }
        .smart-select:focus { border-color: #D4AF37; background-color: #fff; }
        .btn-select { background: #002349; color: white; transition: 0.3s; font-weight: 900; border-radius: 1.5rem; width: 100%; }
        .btn-select:hover { background: #D4AF37; color: #002349; transform: scale(1.02); }
    </style>
</head>
<body class="text-[#002349]">

    <header class="hero-bg text-white pt-16 pb-32 text-center relative">
        <div id="cityOverlay" class="city-overlay"></div>
        <div id="patternBox" class="map-pattern"></div>
        <div class="container mx-auto px-6 relative z-10">
            <div class="whale-logo mb-4">🐋</div>
            <h1 id="pageTitle" class="text-4xl md:text-6xl font-black text-[#D4AF37] drop-shadow-md">أسطول سيارات الحوت</h1>
            <p id="serviceLabel" class="text-lg md:text-2xl opacity-90 mt-3 font-bold px-4 italic"></p>
        </div>
    </header>

    <main class="container mx-auto px-4 relative z-20 pb-20">
        <div class="filter-box p-6 md:p-8 max-w-5xl mx-auto flex flex-col md:flex-row gap-5 items-center justify-center">
            <div class="w-full md:w-1/3">
                <select id="engineFilter" onchange="renderFleet()" class="smart-select">
                    <option value="all" id="optEngAll">كل المحركات</option>
                    <option value="hybrid" id="optEngHybrid">هايبرد</option>
                    <option value="auto" id="optEngAuto">أوتوماتيك</option>
                </select>
            </div>
            <div class="w-full md:w-1/3">
                <select id="categoryFilter" onchange="renderFleet()" class="smart-select">
                    <option value="all" id="optCatAll">كل الفئات</option>
                    <option value="economy" id="optCatEco">اقتصادية</option>
                    <option value="family" id="optCatFam">عائلية / SUV</option>
                    <option value="luxury" id="optCatLux">فاخرة VIP</option>
                </select>
            </div>
        </div>
        <div id="fleetGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 max-w-7xl mx-auto"></div>
        
        <p class="text-center mt-12 text-slate-500 font-bold text-sm px-4" id="availabilityNote"></p>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type') || 'personal'; 
        const currentLang = params.get('lang') || 'ar';
        const city = params.get('city') || 'كركوك';
        const days = params.get('days') || '1'; 
        const date = params.get('date') || '';
        const time = params.get('time') || '';

        const styleColor = { 
            'كركوك': '#004d40', 'بغداد': '#1a237e', 'أربيل': '#2e7d32', 
            'السليمانية': '#6a1b9a', 'الموصل': '#4e342e', 'البصرة': '#0277bd', 
            'الأنبار': '#ef6c00', 'ديالى': '#558b2f' 
        };
        
        const translations = {
            ar: { dir: 'rtl', font: 'Tajawal', title: 'أسطول سيارات الحوت', wedding: '✨ سيارات الأعراس في ' + city, personal: '🚗 السيارات المتوفرة في ' + city, engAll: 'كل المحركات', engHyb: 'هايبرد', engAuto: 'أوتوماتيك', catAll: 'كل الفئات', catEco: 'اقتصادية', catFam: 'عائلية', catLux: 'فاخرة VIP', btn: 'اختيار السيارة', currency: 'د.ع / يوم', empty: 'لا توجد نتائج في هذه المدينة 🐋', modelTag: 'موديل 2020 - 2025', colorNote: 'اللون والموديل حسب المتوفر', footerNote: '* جميع الصور تقريبية، اللون والموديل يعتمدان على التوفر لحظة التجهيز.' },
            ku: { dir: 'rtl', font: 'Tajawal', title: 'ئەلحووت فلێت', wedding: '✨ ئۆتۆمبێلی زەماوەند', personal: '🚗 ئۆتۆمبێلی کەسی', engAll: 'هەموو بزوێنەرەکان', engHyb: 'هایبرید', engAuto: 'ئۆتۆماتیک', catAll: 'هەموو جۆرەکان', catEco: 'ئابووری', catFam: 'خێزانی', catLux: 'ناوازە VIP', btn: 'هەڵبژاردن', currency: 'د.ع / ڕۆژ', empty: 'نەدۆزرایەوە 🐋', modelTag: 'مۆدێل ٢٠٢٠ - ٢٠٢٥', colorNote: 'ڕەنگ و مۆدێل بەپێی بەردەستبوون', footerNote: '* وێنەکان تەنها بۆ نیشاندانن، ڕەنگ و مۆدێل بەپێی بەردەستبوونە.' },
            tr: { dir: 'ltr', font: 'Poppins', title: 'Al-Hut Fleet', wedding: '✨ Wedding Cars in ' + city, personal: '🚗 Personal Cars in ' + city, engAll: 'All Engines', engHyb: 'Hybrid', engAuto: 'Automatic', catAll: 'All Categories', catEco: 'Economy', catFam: 'Family/SUV', catLux: 'Luxury VIP', btn: 'Select Car', currency: 'IQD / Day', empty: 'No cars found 🐋', modelTag: 'Model 2020 - 2025', colorNote: 'Subject to availability', footerNote: '* Images are for illustrative purposes. Color and model depend on availability.' },
            en: { dir: 'ltr', font: 'Poppins', title: 'Al-Hut Fleet', wedding: '✨ Wedding Section in ' + city, personal: '🚗 Personal Section in ' + city, engAll: 'All Engines', engHyb: 'Hybrid', engAuto: 'Automatic', catAll: 'All Categories', catEco: 'Economy', catFam: 'Family/SUV', catLux: 'Luxury VIP', btn: 'Select Car', currency: 'IQD / Day', empty: 'No cars found 🐋', modelTag: 'Model 2020 - 2025', colorNote: 'Subject to availability', footerNote: '* All images are representative. Actual color and model may vary based on availability.' }
        };

        // تم إضافة (أو ما يماثلها) لأسماء السيارات لتكون مطابقة للمعايير العالمية
        const fleet = [
            { name: {ar:"تويوتا كورولا (أو ما يماثلها)", ku:"تۆیۆتا کۆرۆلا", tr:"Toyota Corolla (or similar)", en:"Toyota Corolla (or similar)"}, engine: "hybrid", cat: "economy", price: "45000", img: "Cars/corolla.jpg" },
            { name: {ar:"دودج جارجر (أو ما يماثلها)", ku:"دۆج جارجەر", tr:"Dodge Charger (or similar)", en:"Dodge Charger (or similar)"}, engine: "auto", cat: "luxury", price: "85000", img: "Cars/charger.jpg" },
            { name: {ar:"هيونداي توسان (أو ما يماثلها)", ku:"هیۆندای تۆسۆن", tr:"Hyundai Tucson (or similar)", en:"Hyundai Tucson (or similar)"}, engine: "auto", cat: "family", price: "60000", img: "Cars/tucson.jpg" },
            { name: {ar:"مرسيدس S-Class (أو ما يماثلها)", ku:"مێرسیدس S-Class", tr:"Mercedes S-Class (or similar)", en:"Mercedes S-Class (or similar)"}, engine: "auto", cat: "luxury", price: "150000", img: "Cars/mercedes.jpg" },
            { name: {ar:"تويوتا كامري (أو ما يماثلها)", ku:"تۆیۆتا کامری", tr:"Toyota Camry (or similar)", en:"Toyota Camry (or similar)"}, engine: "hybrid", cat: "economy", price: "55000", img: "Cars/camry.jpg" },
            { name: {ar:"كيا سورينتو (أو ما يماثلها)", ku:"کیا سۆرێنتۆ", tr:"Kia Sorento (or similar)", en:"Kia Sorento (or similar)"}, engine: "auto", cat: "family", price: "70000", img: "Cars/sorento.jpg" }
        ];

        function initLang() {
            const l = translations[currentLang] || translations['ar'];
            document.getElementById('htmlTag').dir = l.dir;
            document.body.style.fontFamily = l.font + ', sans-serif';
            document.getElementById('pageTitle').innerText = l.title;
            document.getElementById('serviceLabel').innerText = type === 'wedding' ? l.wedding : l.personal;
            document.getElementById('cityOverlay').style.backgroundColor = styleColor[city] || '#002349';
            document.getElementById('availabilityNote').innerText = l.footerNote;
            
            const icon = type === 'wedding' ? '🎁' : '🚗';
            document.getElementById('patternBox').style.backgroundImage = `url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120"><text y="60" x="10" font-size="45">${icon}</text></svg>')`;
            
            document.getElementById('optEngAll').innerText = l.engAll;
            document.getElementById('optEngHybrid').innerText = l.engHyb;
            document.getElementById('optEngAuto').innerText = l.engAuto;
            document.getElementById('optCatAll').innerText = l.catAll;
            document.getElementById('optCatEco').innerText = l.catEco;
            document.getElementById('optCatFam').innerText = l.catFam;
            document.getElementById('optCatLux').innerText = l.catLux;
        }

        function renderFleet() {
            const eng = document.getElementById('engineFilter').value;
            const cat = document.getElementById('categoryFilter').value;
            const grid = document.getElementById('fleetGrid');
            const l = translations[currentLang] || translations['ar'];
            grid.innerHTML = '';
            const filtered = fleet.filter(car => (eng === 'all' || car.engine === eng) && (cat === 'all' || car.cat === cat));
            
            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 font-black text-slate-400 text-2xl">${l.empty}</div>`;
                return;
            }

            filtered.forEach(car => {
                const carName = car.name[currentLang] || car.name['ar'];
                const seoAlt = `تأجير ${carName} في ${city} - منصة الحوت`;
                
                grid.innerHTML += `
                    <article class="car-card p-5">
                        <img src="${car.img}" alt="${seoAlt}" title="${seoAlt}" class="w-full h-56 object-cover rounded-[2.5rem] mb-5 shadow-inner" onerror="this.src='https://via.placeholder.com/400x250?text=Al-Hut+${carName}'">
                        <div class="px-2 ${l.dir === 'rtl' ? 'text-right' : 'text-left'}">
                            <h3 class="text-2xl font-black mb-1 text-slate-800">${carName}</h3>
                            
                            <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
                                <span class="text-[11px] font-bold text-slate-500 bg-slate-100 px-2 py-1 rounded-lg">
                                    <i class="fas fa-calendar-alt"></i> ${l.modelTag}
                                </span>
                                <span class="text-[10px] text-[#D4AF37] font-black uppercase">
                                    ${l.colorNote}
                                </span>
                            </div>

                            <div class="price-badge text-lg mb-6">${parseInt(car.price).toLocaleString()} ${l.currency}</div>
                            <button onclick="selectCar('${carName}', '${car.price}')" class="btn-select py-4 text-xl shadow-lg active:scale-95">
                                ${l.btn}
                            </button>
                        </div>
                    </article>
                `;
            });
        }

        function selectCar(carName, carPrice) {
            const nextURL = `addons.html?type=${type}&lang=${currentLang}&city=${encodeURIComponent(city)}&days=${days}&date=${date}&time=${time}&car=${encodeURIComponent(carName)}&basePrice=${carPrice}`;
            window.location.href = nextURL;
        }

        window.onload = () => { initLang(); renderFleet(); };
    </script>
</body>
</html>
