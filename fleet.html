<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أسطول الحوت | اختر سيارتك</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary:#FF385C; --primary-dark:#E31C5F; --dark:#222222; --mid:#717171; --light:#DDDDDD; --bg:#F7F7F7; --shadow:0 6px 20px rgba(0,0,0,0.12); --radius:16px; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Tajawal',sans-serif; background:var(--bg); color:var(--dark); }

        .navbar { background:white; border-bottom:1px solid var(--light); padding:0 24px; height:72px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:0 1px 12px rgba(0,0,0,0.06); }
        .logo { font-size:1.3rem; font-weight:900; color:var(--primary); text-decoration:none; display:flex; align-items:center; gap:8px; }
        .back-btn { display:flex; align-items:center; gap:8px; color:var(--dark); text-decoration:none; font-weight:700; font-size:0.9rem; padding:10px 18px; border-radius:12px; border:1.5px solid var(--light); transition:0.2s; }
        .back-btn:hover { border-color:var(--dark); }

        .service-banner { padding:32px 24px; text-align:center; border-bottom:1px solid var(--light); background:white; }
        .service-banner h1 { font-size:1.8rem; font-weight:900; margin-bottom:6px; }
        .service-banner p { color:var(--mid); }
        .service-pills { display:flex; gap:10px; justify-content:center; margin-top:16px; flex-wrap:wrap; }
        .s-pill { background:var(--bg); padding:6px 14px; border-radius:20px; font-size:0.8rem; font-weight:700; color:var(--mid); }

        .filters-bar { background:white; border-bottom:1px solid var(--light); padding:14px 24px; display:flex; gap:10px; overflow-x:auto; }
        .filter-chip { padding:9px 18px; border-radius:24px; border:1.5px solid var(--light); background:white; font-weight:700; font-size:0.83rem; cursor:pointer; white-space:nowrap; transition:0.2s; }
        .filter-chip:hover { border-color:var(--dark); }
        .filter-chip.active { background:var(--dark); color:white; border-color:var(--dark); }

        .main { max-width:1200px; margin:0 auto; padding:32px 24px; }
        .results-info { font-size:0.9rem; color:var(--mid); margin-bottom:24px; font-weight:600; }
        .results-info strong { color:var(--dark); }

        .fleet-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(290px, 1fr)); gap:24px; }

        .car-card { background:white; border-radius:var(--radius); overflow:hidden; border:1px solid var(--light); transition:0.25s; cursor:pointer; }
        .car-card:hover { box-shadow:var(--shadow); transform:translateY(-4px); }
        .car-img { width:100%; height:180px; object-fit:cover; background:linear-gradient(135deg,#f8f8f8,#ebebeb); display:flex; align-items:center; justify-content:center; font-size:5rem; position:relative; overflow:hidden; }
        .car-img img { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; }
        .car-badge { position:absolute; top:12px; right:12px; background:var(--primary); color:white; font-size:0.7rem; font-weight:800; padding:4px 10px; border-radius:8px; }
        .car-body { padding:16px; }
        .car-type { font-size:0.75rem; font-weight:800; color:var(--mid); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px; }
        .car-name { font-size:1.1rem; font-weight:900; margin-bottom:10px; }
        .car-specs { display:flex; gap:12px; margin-bottom:14px; }
        .spec { display:flex; align-items:center; gap:5px; font-size:0.8rem; color:var(--mid); font-weight:600; }
        .car-footer { display:flex; align-items:center; justify-content:space-between; padding-top:12px; border-top:1px solid var(--bg); }
        .car-price { font-size:1rem; font-weight:900; }
        .car-price small { font-size:0.75rem; font-weight:500; color:var(--mid); }
        .select-btn { background:var(--primary); color:white; border:none; padding:10px 20px; border-radius:12px; font-weight:800; font-size:0.85rem; cursor:pointer; transition:0.2s; }
        .select-btn:hover { background:var(--primary-dark); }

        .cat-labels { ar:{economy:'اقتصادية',family:'عائلية',luxury:'VIP فاخرة'}; }
        @media(max-width:640px){ .fleet-grid{grid-template-columns:1fr;} }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="index.html" class="logo"><span>🐋</span> <span id="logoTxt">الحوت</span></a>
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i> <span id="backTxt">رجوع</span></a>
</nav>

<div class="service-banner">
    <h1 id="pageTitle">أسطول الحوت</h1>
    <p id="serviceLabel"></p>
    <div class="service-pills" id="summaryPills"></div>
</div>

<div class="filters-bar" id="filtersBar"></div>

<div class="main">
    <div class="results-info" id="resultsInfo"></div>
    <div class="fleet-grid" id="fleetGrid"></div>
</div>

<script>
    const p = new URLSearchParams(window.location.search);
    const type = p.get('type') || 'personal';
    const lang = p.get('lang') || 'ar';
    const city = p.get('city') || 'كركوك';
    const days = p.get('days') || '1';
    const date = p.get('date') || '';

    const fleet = [
        { name:{ar:'تويوتا كورولا 2025',ku:'تۆیۆتا کۆرۆلا',tr:'Toyota Corolla 2025',en:'Toyota Corolla 2025'}, engine:'hybrid', cat:'economy', price:45000, img:'Cars/corolla.jpg', seats:5, trans:{ar:'هايبرد',en:'Hybrid',tr:'Hibrit',ku:'هایبرید'} },
        { name:{ar:'تويوتا كامري',ku:'تۆیۆتا کامری',tr:'Toyota Camry',en:'Toyota Camry'}, engine:'hybrid', cat:'economy', price:55000, img:'Cars/camry.jpg', seats:5, trans:{ar:'هايبرد',en:'Hybrid',tr:'Hibrit',ku:'هایبرید'} },
        { name:{ar:'هيونداي توسان',ku:'هیۆندای تۆسۆن',tr:'Hyundai Tucson',en:'Hyundai Tucson'}, engine:'auto', cat:'family', price:60000, img:'Cars/tucson.jpg', seats:5, trans:{ar:'أوتوماتيك',en:'Automatic',tr:'Otomatik',ku:'ئۆتۆماتیک'} },
        { name:{ar:'كيا سورينتو',ku:'کیا سۆرێنتۆ',tr:'Kia Sorento',en:'Kia Sorento'}, engine:'auto', cat:'family', price:70000, img:'Cars/sorento.jpg', seats:7, trans:{ar:'أوتوماتيك',en:'Automatic',tr:'Otomatik',ku:'ئۆتۆماتیک'} },
        { name:{ar:'مرسيدس S-Class',ku:'مێرسیدس S',tr:'Mercedes S-Class',en:'Mercedes S-Class'}, engine:'auto', cat:'luxury', price:150000, img:'Cars/mercedes.jpg', seats:5, trans:{ar:'أوتوماتيك',en:'Automatic',tr:'Otomatik',ku:'ئۆتۆماتیک'} },
        { name:{ar:'دودج جارجر SRT',ku:'دۆج جارجەر',tr:'Dodge Charger SRT',en:'Dodge Charger SRT'}, engine:'auto', cat:'luxury', price:85000, img:'Cars/charger.jpg', seats:5, trans:{ar:'أوتوماتيك',en:'Automatic',tr:'Otomatik',ku:'ئۆتۆماتیک'} },
    ];

    const ui = {
        ar:{ dir:'rtl', logo:'الحوت', back:'رجوع', cats:['الكل','اقتصادية','عائلية/SUV','VIP فاخرة'], catKeys:['all','economy','family','luxury'], eng:['الكل','هايبرد','أوتوماتيك'], engKeys:['all','hybrid','auto'], curr:'د.ع', perDay:'/ يوم', select:'اختر السيارة', res:' سيارة متاحة', svc:{personal:'🚗 تأجير السيارات',wedding:'💍 سيارات الأعراس'} },
        ku:{ dir:'rtl', logo:'ئەلحووت', back:'گەڕانەوە', cats:['هەموو','ئابووری','خێزانی','VIP'], catKeys:['all','economy','family','luxury'], eng:['هەموو','هایبرید','ئۆتۆماتیک'], engKeys:['all','hybrid','auto'], curr:'د.ع', perDay:'/ ڕۆژ', select:'هەڵبژاردن', res:' ئۆتۆمبێل', svc:{personal:'🚗 بەکرێگرتن',wedding:'💍 زەماوەند'} },
        tr:{ dir:'ltr', logo:'AL-HUT', back:'Geri', cats:['Tümü','Ekonomik','Aile/SUV','VIP Lüks'], catKeys:['all','economy','family','luxury'], eng:['Tümü','Hibrit','Otomatik'], engKeys:['all','hybrid','auto'], curr:'IQD', perDay:'/ gün', select:'Seç', res:' araç mevcut', svc:{personal:'🚗 Araç Kiralama',wedding:'💍 Düğün Araçları'} },
        en:{ dir:'ltr', logo:'AL-HUT', back:'Back', cats:['All','Economy','Family/SUV','VIP Luxury'], catKeys:['all','economy','family','luxury'], eng:['All','Hybrid','Automatic'], engKeys:['all','hybrid','auto'], curr:'IQD', perDay:'/ day', select:'Select', res:' cars available', svc:{personal:'🚗 Car Rental',wedding:'💍 Wedding Cars'} },
    };

    let activeCat = 'all', activeEng = 'all';

    function init() {
        const l = ui[lang] || ui.ar;
        document.getElementById('htmlTag').dir = l.dir;
        document.getElementById('logoTxt').innerText = l.logo;
        document.getElementById('backTxt').innerText = l.back;
        document.getElementById('pageTitle').innerText = (lang==='ar'||lang==='ku') ? 'أسطول الحوت' : 'Al-Hut Fleet';
        document.getElementById('serviceLabel').innerText = (l.svc[type] || l.svc.personal);

        // Summary pills
        document.getElementById('summaryPills').innerHTML = [
            `<span class="s-pill">📍 ${city}</span>`,
            date ? `<span class="s-pill">📅 ${date}</span>` : '',
            `<span class="s-pill">🌙 ${days} ${lang==='ar'?'يوم':'day'}</span>`,
        ].join('');

        // Filters
        const fb = document.getElementById('filtersBar');
        fb.innerHTML = l.catKeys.map((k,i) => `<div class="filter-chip ${k==='all'?'active':''}" onclick="filterCat('${k}')" id="chip-${k}">${l.cats[i]}</div>`).join('')
            + '&nbsp;&nbsp;'
            + l.engKeys.map((k,i) => `<div class="filter-chip" onclick="filterEng('${k}')" id="eng-${k}" style="${k==='all'?'background:var(--bg);':''}">${l.eng[i]}</div>`).join('');

        renderFleet();
    }

    function filterCat(c) {
        activeCat = c;
        document.querySelectorAll('[id^="chip-"]').forEach(e=>e.classList.remove('active'));
        document.getElementById('chip-'+c).classList.add('active');
        renderFleet();
    }
    function filterEng(e) {
        activeEng = e;
        document.querySelectorAll('[id^="eng-"]').forEach(el=>el.classList.remove('active'));
        document.getElementById('eng-'+e).classList.add('active');
        renderFleet();
    }

    function renderFleet() {
        const l = ui[lang] || ui.ar;
        const filtered = fleet.filter(c => (activeCat==='all'||c.cat===activeCat) && (activeEng==='all'||c.engine===activeEng));
        document.getElementById('resultsInfo').innerHTML = `<strong>${filtered.length}</strong>${l.res}`;

        const grid = document.getElementById('fleetGrid');
        if (filtered.length === 0) {
            grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--mid);font-weight:700;">لا توجد سيارات بهذه المواصفات 🐋</div>`;
            return;
        }
        const catBadge = {economy:{ar:'اقتصادية',en:'Economy',tr:'Ekonomik',ku:'ئابووری'}, family:{ar:'عائلية',en:'Family',tr:'Aile',ku:'خێزانی'}, luxury:{ar:'VIP فاخرة',en:'VIP Luxury',tr:'VIP Lüks',ku:'VIP'}};
        grid.innerHTML = filtered.map(car => {
            const name = car.name[lang] || car.name.ar;
            const trans = car.trans[lang] || car.trans.ar;
            const badge = catBadge[car.cat][lang] || catBadge[car.cat].ar;
            const seoAlt = `تأجير ${name} في ${city} - منصة الحوت`;
            return `
            <div class="car-card" onclick="selectCar('${encodeURIComponent(name)}',${car.price})">
                <div class="car-img">
                    <img src="${car.img}" alt="${seoAlt}" onerror="this.style.display='none'">
                    🚗
                    <div class="car-badge">${badge}</div>
                </div>
                <div class="car-body">
                    <div class="car-type">${trans}</div>
                    <div class="car-name">${name}</div>
                    <div class="car-specs">
                        <div class="spec"><i class="fas fa-users"></i> ${car.seats}</div>
                        <div class="spec"><i class="fas fa-cog"></i> ${trans}</div>
                    </div>
                    <div class="car-footer">
                        <div class="car-price">${car.price.toLocaleString()} <small>${l.curr}</small> <small>${l.perDay}</small></div>
                        <button class="select-btn">${l.select}</button>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function selectCar(name, price) {
        window.location.href = `addons.html?type=${type}&lang=${lang}&city=${encodeURIComponent(city)}&days=${days}&date=${date}&car=${name}&basePrice=${price}`;
    }

    window.onload = init;
</script>
</body>
</html>
