<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script>
        const CURRENT_APP_VERSION = "88.1";
        try {
            if (localStorage.getItem('nahla_drv_app_version') !== CURRENT_APP_VERSION) {
                localStorage.setItem('nahla_drv_app_version', CURRENT_APP_VERSION);
                if (localStorage.getItem('nahla_drv_app_version') === CURRENT_APP_VERSION) {
                    if ('caches' in window) { caches.keys().then(names => { names.forEach(n => caches.delete(n)); }); }
                    if ('serviceWorker' in navigator) { navigator.serviceWorker.getRegistrations().then(regs => { regs.forEach(r => r.unregister()); }); }
                    window.location.reload();
                }
            }
        } catch(e) {}
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>كباتن نحلة | النمط الليلي</title>
    
    <meta name="theme-color" content="#09090b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* 🐝 الهوية الجديدة: الوضع الليلي الفاخر (Premium Dark Mode) */
        :root { 
            --bg-main: #09090b;       /* أسود عميق جداً */
            --bg-surface: #18181b;    /* رمادي داكن للبطاقات */
            --bg-elevated: #27272a;   
            --primary: #fbbf24;       /* أصفر نيون ساطع */
            --primary-glow: rgba(251, 191, 36, 0.2);
            --success: #10b981; 
            --danger: #ef4444; 
            --text-main: #f8fafc;     /* أبيض ناصع */
            --text-muted: #a1a1aa;    /* رمادي فاتح للتقليل من الإبهار */
            --border: #27272a;
        }
        
        body { background: var(--bg-main); font-family: 'Cairo', sans-serif; color: var(--text-main); -webkit-tap-highlight-color: transparent; user-select: none; overscroll-behavior-y: contain; padding-bottom: 90px; }
        .hidden-section { display: none !important; }
        
        /* شاشات التحميل والإشعارات */
        #offlineBanner { position: fixed; top: 0; left: 0; width: 100%; background: var(--danger); color: white; text-align: center; z-index: 99999; padding: max(5px, env(safe-area-inset-top)) 10px 5px 10px; font-weight: 900; font-size: 0.85rem; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); animation: slideDown 0.3s; }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
        #loadingOverlay, #permissionOverlay { position: fixed; inset: 0; background: rgba(9, 9, 11, 0.95); backdrop-filter: blur(10px); z-index: 30000; display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; padding: 25px; }
        #loadingOverlay { z-index: 20000; display: none; }

        /* ─── واجهة الدخول ─── */
        .login-wrapper { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg-main); padding: 20px; }
        .login-card { background: var(--bg-surface); border-radius: 24px; padding: 35px 25px; width: 100%; max-width: 400px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .form-label { font-weight: 700; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 8px; display: block; text-align: right; }
        .custom-input { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 14px; padding: 16px; font-weight: 700; transition: 0.3s; width: 100%; font-size: 1rem; color: var(--text-main); margin-bottom: 20px; }
        .custom-input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px var(--primary-glow); background: #000; }
        .btn-action { background: var(--primary); color: #000; border: none; border-radius: 14px; padding: 18px; font-weight: 900; width: 100%; font-size: 1.1rem; transition: 0.3s; text-transform: uppercase;}
        .btn-action:active { transform: scale(0.96); }

        /* ─── الهيدر والإحصائيات ─── */
        .dash-header { padding: max(20px, env(safe-area-inset-top)) 20px 20px; background: var(--bg-main); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .profile-pic { width: 45px; height: 45px; border-radius: 14px; background: var(--bg-elevated); display: flex; align-items: center; justify-content: center; color: var(--primary); border: 1px solid var(--border); }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .stat-card { background: var(--bg-surface); border-radius: 20px; padding: 20px; border: 1px solid var(--border); display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden; }
        .stat-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--primary); border-radius: 4px; }
        .stat-title { color: var(--text-muted); font-size: 0.8rem; font-weight: 700; margin-bottom: 5px; }
        .stat-value { color: var(--text-main); font-size: 1.8rem; font-weight: 900; line-height: 1; }
        .stat-value.debt { color: var(--danger); }

        /* ─── الرادار المظلم (الجديد) ─── */
        .radar-box { background: var(--bg-surface); border-radius: 24px; padding: 40px 20px; margin: 0 20px 20px; text-align: center; border: 1px solid var(--border); }
        .radar-box.offline { opacity: 0.6; filter: grayscale(100%); }
        .radar-core { width: 140px; height: 140px; margin: 0 auto 30px; position: relative; display: flex; align-items: center; justify-content: center; }
        .radar-ring { position: absolute; inset: 0; border: 2px solid var(--primary); border-radius: 50%; opacity: 0; animation: scan 2s linear infinite; }
        .radar-ring:nth-child(2) { animation-delay: 0.6s; }
        .radar-ring:nth-child(3) { animation-delay: 1.2s; }
        .radar-box.offline .radar-ring { animation: none; display: none; }
        @keyframes scan { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(1.8); opacity: 0; } }
        .radar-icon { width: 60px; height: 60px; background: var(--primary); border-radius: 18px; display: flex; align-items: center; justify-content: center; color: #000; z-index: 10; box-shadow: 0 0 20px var(--primary-glow); transform: rotate(45deg); }
        .radar-icon svg { transform: rotate(-45deg); }

        /* ─── الزر العائم للاتصال (Bottom Sticky Action) ─── */
        .sticky-bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px 20px max(15px, env(safe-area-inset-bottom)); background: linear-gradient(to top, var(--bg-main) 70%, transparent); z-index: 1000; }
        .btn-toggle-online { width: 100%; background: var(--primary); color: #000; padding: 18px; border-radius: 16px; font-weight: 900; font-size: 1.2rem; border: none; box-shadow: 0 10px 25px var(--primary-glow); transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-toggle-online:active { transform: scale(0.96); }
        .btn-toggle-online.is-online { background: var(--danger); color: white; box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3); }

        /* ─── بطاقات الطلبات (النيون) ─── */
        .dark-order-card { background: var(--bg-surface); border-radius: 20px; padding: 20px; margin: 0 20px 20px; border: 1px solid var(--border); position: relative; }
        .dark-order-card.ready { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }
        .o-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--bg-elevated); padding-bottom: 15px; }
        .o-price { font-size: 1.5rem; font-weight: 900; color: var(--primary); }
        .o-price small { font-size: 0.8rem; color: var(--text-muted); }
        .o-timer { background: var(--bg-elevated); padding: 6px 12px; border-radius: 10px; font-weight: 900; font-size: 0.9rem; color: var(--text-main); display: flex; align-items: center; gap: 6px; }
        .o-timer.danger { color: var(--danger); background: rgba(239, 68, 68, 0.1); }
        
        .timeline { margin: 15px 0; padding-right: 15px; border-right: 2px solid var(--bg-elevated); }
        .t-point { position: relative; padding-right: 15px; margin-bottom: 20px; }
        .t-point::before { content: ''; position: absolute; right: -21px; top: 5px; width: 10px; height: 10px; border-radius: 50%; background: var(--bg-surface); border: 3px solid; }
        .t-point.res::before { border-color: var(--primary); }
        .t-point.cust::before { border-color: var(--success); }
        .t-title { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); }
        .t-name { font-size: 1.05rem; font-weight: 900; color: var(--text-main); margin-bottom: 8px; line-height: 1.4; }
        .t-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        
        .btn-action-sm { flex: 1; background: var(--bg-elevated); color: var(--text-main); border: 1px solid var(--border); padding: 8px; border-radius: 10px; font-size: 0.8rem; font-weight: 800; display: flex; justify-content: center; align-items: center; gap: 5px; cursor: pointer; transition: 0.2s; }
        .btn-action-sm:active { background: var(--border); }
        .btn-action-sm.call { color: var(--success); border-color: rgba(16, 185, 129, 0.3); background: rgba(16, 185, 129, 0.05); }
        
        .btn-status-dark { width: 100%; padding: 16px; border-radius: 14px; font-weight: 900; font-size: 1.1rem; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn-status-dark.heading { background: var(--bg-elevated); color: var(--primary); border: 1px solid var(--primary); }
        .btn-status-dark.arrived { background: var(--primary); color: #000; }
        .btn-status-dark.picked { background: var(--success); color: white; }

        /* الشاشات المنبثقة (Alerts) */
        #orderAlertOverlay { position: fixed; inset: 0; background: rgba(9, 9, 11, 0.98); z-index: 40000; display: flex; flex-direction: column; justify-content: center; padding: 20px; text-align: center; }
        .neon-pulse { width: 100px; height: 100px; border-radius: 50%; background: var(--primary); margin: 0 auto 30px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 40px var(--primary-glow); animation: neonPulse 1s infinite alternate; color: #000;}
        @keyframes neonPulse { from { box-shadow: 0 0 20px var(--primary-glow); transform: scale(0.95); } to { box-shadow: 0 0 60px var(--primary); transform: scale(1.05); } }
        
        .svg-icon { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    </style>
</head>
<body>

<div id="offlineBanner" class="hidden-section">أنت غير متصل بالإنترنت حالياً</div>
<div id="loadingOverlay"><div class="spinner-border text-warning" style="width:3rem;height:3rem;margin-bottom:15px;"></div><h5 class="fw-bold text-white" id="loadingText">جاري الاتصال...</h5></div>

<audio id="alertSound" loop src="https://actions.google.com/sounds/v1/alarms/submarine_dive_horn.ogg"></audio>
<audio id="cancelSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<div id="loginSection" class="login-wrapper">
    <div class="login-card" id="authBox">
        <div style="text-center mb-4 text-center">
            <div style="width: 70px; height: 70px; background: var(--primary); border-radius: 20px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; transform: rotate(45deg);">
                <svg class="svg-icon" style="color: #000; width: 35px; height: 35px; transform: rotate(-45deg);" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            </div>
            <h2 class="fw-black text-white text-center mb-1">نحلة كركوك</h2>
            <p class="fw-bold text-muted text-center mb-4">بوابة الكباتن - V88.1</p>
        </div>
        
        <label class="form-label">رقم الهاتف</label>
        <input type="tel" id="driverPhone" class="custom-input" placeholder="07XXXXXXXXX" dir="ltr">
        
        <label class="form-label">كلمة المرور</label>
        <input type="password" id="driverPassword" class="custom-input text-center" placeholder="********">
        
        <button class="btn-action mt-3" onclick="initAudioAndAuth()">تسجيل الدخول</button>
    </div>
</div>

<div id="dashboardPage" class="hidden-section">
    
    <header class="dash-header">
        <div>
            <h4 class="fw-black m-0" id="driverNameDisplay">...</h4>
            <div id="shiftDisplay" class="text-warning fw-bold small mt-1" style="display: none;">متبقي: <span id="shiftTimeText">---</span></div>
        </div>
        <div class="profile-pic" onclick="window.logout()">
            <svg class="svg-icon" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-title">الطلبات المنجزة</div>
            <div class="stat-value" id="statOrdersCount">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-title">الديون (العمولة)</div>
            <div class="stat-value debt" id="statDebt">0</div>
        </div>
    </div>

    <div id="searchingStatus" class="radar-box offline">
        <div class="radar-core">
            <div class="radar-ring"></div>
            <div class="radar-ring"></div>
            <div class="radar-ring"></div>
            <div class="radar-icon"><svg class="svg-icon" style="width:30px;height:30px;" viewBox="0 0 24 24"><path d="M12 2v20"></path><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg></div>
        </div>
        <h4 class="fw-black text-white mb-2" id="radarTitle">أنت في استراحة</h4>
        <p class="fw-bold text-muted mb-0" id="radarDesc">اضغط على الزر بالأسفل للبدء</p>
    </div>

    <div id="activeOrderBox" class="hidden-section pb-5"></div>

    <div class="sticky-bottom-bar">
        <button id="btnToggleOnline" class="btn-toggle-online" onclick="toggleOnlineStatus()">
            <svg class="svg-icon" viewBox="0 0 24 24"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" y1="2" x2="12" y2="12"></line></svg>
            <span id="btnToggleText">بدء الشفت (متاح)</span>
        </button>
    </div>
</div>

<div id="orderAlertOverlay" class="hidden-section">
    <div class="neon-pulse">
        <svg class="svg-icon" style="width:50px;height:50px;" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
    </div>
    <h1 class="fw-black text-white mb-4">طلب جديد!</h1>
    
    <div style="background: var(--bg-surface); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 30px; text-align: right;">
        <p class="text-muted fw-bold small mb-1">المطعم</p>
        <h3 class="fw-black text-warning mb-3" id="alertResName">---</h3>
        <p class="text-muted fw-bold small mb-1">منطقة التوصيل</p>
        <h4 class="fw-bold text-white m-0" id="alertArea">---</h4>
    </div>

    <button class="btn-action mb-3" onclick="acceptOrder()">تأمين الطلب <span id="seconds" style="background:rgba(0,0,0,0.2); padding:2px 8px; border-radius:8px; margin-right:10px;">60</span></button>
    <button class="btn btn-link text-muted fw-bold text-decoration-none p-3" onclick="declineOrder()">رفض الطلب</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // ⚙️ إعدادات نحلة كركوك V88.0
    const API_URL   = "https://script.google.com/macros/s/AKfycbwS9YOFYGAuM5F5lNHhC3rtuvGzIop_VONWXfj--E9LYuLe8O74D7r0XfiE_Oa4aOXeKw/exec";
    const API_TOKEN = "NAHLA_SECURE_TOKEN_2026";
    const firebaseConfig = { databaseURL: "https://nahla-delivery-6b06f-default-rtdb.europe-west1.firebasedatabase.app" };

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    let driverData = null, countdownInterval, currentOrderData = null, activeOrders = [], isOnline = false;
    let heartbeatInterval = null, shiftTimerInterval = null, lastSentLat = 0, lastSentLng = 0;
    
    const svgMap = `<svg class="svg-icon" viewBox="0 0 24 24"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg>`;
    const svgPhone = `<svg class="svg-icon" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>`;

    window.openSafeLink = function(url) { window.open(url, '_blank'); };
    
    function showToast(msg) { alert(msg); } // للتبسيط يمكن استبدالها بـ Toast مخصص

    window.initAudioAndAuth = function() {
        try{ document.getElementById('alertSound').play().then(()=>document.getElementById('alertSound').pause()).catch(()=>{}); }catch(e){}
        authAction();
    };

    window.onload = function() {
        const sessionStr = localStorage.getItem('nahla_drv_session');
        if (sessionStr) {
            driverData = JSON.parse(sessionStr);
            document.getElementById('driverPhone').value = driverData.phone;
            document.getElementById('loginSection').classList.add('hidden-section');
            document.getElementById('dashboardPage').classList.remove('hidden-section');
            document.getElementById('driverNameDisplay').innerText = driverData.name.split(" ")[0];
            const saved = localStorage.getItem('nahla_active_orders');
            if (saved) activeOrders = JSON.parse(saved);
            startSystem();
        }
    };

    function authAction() {
        let phone = document.getElementById('driverPhone').value.trim().replace(/^0+/, '');
        let pass = document.getElementById('driverPassword').value.trim();
        if(!phone || !pass) return alert("أدخل البيانات");
        
        document.getElementById('loadingOverlay').style.display = 'flex';
        fetch(`${API_URL}?action=checkDriver&phone=${phone}&password=${encodeURIComponent(pass)}&token=${API_TOKEN}`)
            .then(r => r.json()).then(data => {
                document.getElementById('loadingOverlay').style.display = 'none';
                if (data.status === "active" || data.status === "inactive") {
                    driverData = { phone, name: data.name, timestamp: Date.now() };
                    localStorage.setItem('nahla_drv_session', JSON.stringify(driverData));
                    location.reload();
                } else { alert("مرفوض أو كلمة مرور خاطئة"); }
            }).catch(() => { document.getElementById('loadingOverlay').style.display = 'none'; alert("خطأ اتصال"); });
    }

    window.toggleOnlineStatus = async function() {
        isOnline = !isOnline;
        const btn = document.getElementById('btnToggleOnline');
        const radar = document.getElementById('searchingStatus');
        
        if (isOnline) {
            btn.classList.add('is-online');
            document.getElementById('btnToggleText').innerText = "إنهاء الشفت (استراحة)";
            radar.classList.remove('offline');
            document.getElementById('radarTitle').innerText = "جاري البحث عن طلبات...";
            document.getElementById('radarDesc').innerText = "الرادار يعمل، ابق مستعداً";
            updateFirebaseLocationStatus('active');
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    lastSentLat = pos.coords.latitude; lastSentLng = pos.coords.longitude;
                    updateFirebaseLocationStatus('active');
                });
            }
            heartbeatInterval = setInterval(()=>updateFirebaseLocationStatus('active'), 15000);
        } else {
            btn.classList.remove('is-online');
            document.getElementById('btnToggleText').innerText = "بدء الشفت (متاح)";
            radar.classList.add('offline');
            document.getElementById('radarTitle').innerText = "أنت في استراحة";
            document.getElementById('radarDesc').innerText = "اضغط الزر بالأسفل للبدء";
            updateFirebaseLocationStatus('inactive');
            clearInterval(heartbeatInterval);
        }
    };

    function updateFirebaseLocationStatus(statusStr) {
        if (lastSentLat && lastSentLng && driverData) {
            const updates = {};
            updates[`drivers_locations/${driverData.phone}`] = { 
                lat: lastSentLat, lng: lastSentLng, status: statusStr, last_update: new Date().toISOString() 
            };
            update(ref(db), updates);
        }
    }

    function startSystem() {
        const todayStr = new Date().toISOString().split('T')[0];
        onValue(ref(db, `ledgers/drivers/${driverData.phone}`), snap => {
            const l = snap.val() || { completed_orders: 0, debt: 0 };
            document.getElementById('statOrdersCount').innerText = l.completed_orders || 0;
            document.getElementById('statDebt').innerText = l.debt || 0;
        });

        onValue(ref(db, 'active_orders'), snap => {
            const activeFbOrders = snap.val() || {};
            const myId = String(driverData.phone).replace(/^0+/, '').trim();

            for (let i = activeOrders.length - 1; i >= 0; i--) {
                const myOrder  = activeOrders[i];
                const fbOrder  = activeFbOrders[myOrder.id];
                if (!fbOrder || fbOrder.status === 'completed' || fbOrder.status === 'deleted' || fbOrder.driverPhone !== myId) {
                    activeOrders.splice(i, 1);
                    localStorage.setItem('nahla_active_orders', JSON.stringify(activeOrders));
                    displayActiveOrders();
                    if(currentOrderData && currentOrderData.id === myOrder.id) window.declineOrder();
                }
            }

            if (isOnline) {
                Object.values(activeFbOrders).forEach(fbOrder => {
                    const isForMe = (String(fbOrder.driverPhone).trim() === myId) && fbOrder.status === "pending_driver";
                    const notAccepted = !activeOrders.find(o => String(o.id) === String(fbOrder.id));
                    if (isForMe && notAccepted && (!currentOrderData || currentOrderData.id !== fbOrder.id)) {
                        currentOrderData = fbOrder;
                        currentOrderData.expireTime = Date.now() + 60000;
                        document.getElementById('alertResName').innerText = fbOrder.restaurant;
                        document.getElementById('alertArea').innerText = fbOrder.area || "غير محدد";
                        document.getElementById('orderAlertOverlay').classList.remove('hidden-section');
                        document.getElementById('alertSound').play().catch(()=>{});
                        startCountdown();
                    }
                });
            }
        });
        
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                lastSentLat = pos.coords.latitude; lastSentLng = pos.coords.longitude;
            });
        }
    }

    function startCountdown() {
        clearInterval(countdownInterval);
        countdownInterval = setInterval(() => {
            let rem = Math.ceil((currentOrderData.expireTime - Date.now()) / 1000);
            if (rem < 0) rem = 0;
            document.getElementById('seconds').innerText = rem;
            if (rem <= 0) window.declineOrder();
        }, 1000);
    }

    window.declineOrder = function() {
        clearInterval(countdownInterval);
        document.getElementById('orderAlertOverlay').classList.add('hidden-section');
        document.getElementById('alertSound').pause();
        if (currentOrderData) {
            const updates = {};
            updates[`active_orders/${currentOrderData.id}/status`] = "pending_driver";
            updates[`active_orders/${currentOrderData.id}/driverPhone`] = "system_routing";
            updates[`active_orders/${currentOrderData.id}/last_update`] = new Date().toISOString();
            update(ref(db), updates);
            currentOrderData = null;
        }
    };

    window.acceptOrder = function() {
        clearInterval(countdownInterval);
        document.getElementById('orderAlertOverlay').classList.add('hidden-section');
        document.getElementById('alertSound').pause();
        
        const newO = {
            id: currentOrderData.id, resName: currentOrderData.restaurant, area: currentOrderData.area,
            price: currentOrderData.price, details: currentOrderData.details, state: 'heading',
            resPhone: currentOrderData.resPhone, acceptedTime: Date.now()
        };
        activeOrders.push(newO);
        localStorage.setItem('nahla_active_orders', JSON.stringify(activeOrders));
        displayActiveOrders();

        update(ref(db, `active_orders/${newO.id}`), { status: 'accepted', driverPhone: driverData.phone });
        currentOrderData = null;
    };

    function displayActiveOrders() {
        const box = document.getElementById('activeOrderBox');
        if (activeOrders.length === 0) {
            document.getElementById('searchingStatus').classList.remove('hidden-section');
            box.classList.add('hidden-section');
            return;
        }
        document.getElementById('searchingStatus').classList.add('hidden-section');
        box.classList.remove('hidden-section');

        let html = '';
        activeOrders.forEach(order => {
            let btnAction  = order.state === 'heading' ? "arrive"  : order.state === 'arrived' ? "pickup"  : "finish";
            let btnText    = order.state === 'heading' ? "وصلت المطعم" : order.state === 'arrived' ? "استلمت الطلب" : "تم التسليم بنجاح";
            let btnClass   = order.state === 'heading' ? "heading" : order.state === 'arrived' ? "arrived" : "picked";
            
            const waCustHtml = order.details.match(/(07[0-9]{8,9})/) ? `<button class="btn-action-sm call" onclick="window.openSafeLink('tel:${order.details.match(/(07[0-9]{8,9})/)[0]}')">${svgPhone} اتصال بالزبون</button>` : '';

            html += `
            <div class="dark-order-card" id="order-${order.id}">
                <div class="o-header">
                    <div class="o-price">${order.price} <small>د.ع</small></div>
                    <div class="o-timer" id="timer-${order.id}">--:--</div>
                </div>
                <div class="timeline">
                    <div class="t-point res">
                        <div class="t-title">المطعم</div>
                        <div class="t-name">${order.resName}</div>
                        <div class="t-actions">
                            <button class="btn-action-sm" onclick="window.openSafeLink('tel:${order.resPhone}')">${svgPhone} اتصال</button>
                        </div>
                    </div>
                    <div class="t-point cust" style="margin-bottom:0; padding-bottom:10px;">
                        <div class="t-title">الزبون</div>
                        <div class="t-name">${order.details}</div>
                        <div class="t-actions">${waCustHtml}</div>
                    </div>
                </div>
                <button class="btn-status-dark ${btnClass}" onclick="window.updateOrderStatus('${order.id}', '${btnAction}', this)">
                    ${btnText}
                </button>
            </div>`;
        });
        box.innerHTML = html;
    }

    setInterval(() => {
        activeOrders.forEach(order => {
            const timerEl = document.getElementById(`timer-${order.id}`);
            if (!timerEl) return;
            const elapsed = Date.now() - (order.acceptedTime || Date.now());
            const remaining = (30 * 60 * 1000) - elapsed;
            const abs = Math.abs(remaining);
            const min = Math.floor(abs / 60000);
            const sec = Math.floor((abs % 60000) / 1000);
            timerEl.innerHTML = `${remaining < 0 ? '-' : ''}${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
            if (remaining < 0) timerEl.classList.add('danger');
        });
    }, 1000);

    window.updateOrderStatus = function(id, action, btn) {
        const order = activeOrders.find(o => String(o.id) === String(id));
        if (!order) return;
        btn.innerHTML = `جاري الإرسال...`; btn.disabled = true;

        if (action === 'arrive') {
            order.state = 'arrived';
            update(ref(db, `active_orders/${id}`), { status: 'arrived_at_res' });
            localStorage.setItem('nahla_active_orders', JSON.stringify(activeOrders));
            displayActiveOrders();
        } else if (action === 'pickup') {
            order.state = 'picked_up';
            update(ref(db, `active_orders/${id}`), { status: 'picked_up' });
            localStorage.setItem('nahla_active_orders', JSON.stringify(activeOrders));
            displayActiveOrders();
        } else if (action === 'finish') {
            document.getElementById(`order-${id}`).style.display = 'none';
            update(ref(db, `active_orders/${id}`), { status: 'completed' });
            activeOrders = activeOrders.filter(o => String(o.id) !== String(id));
            localStorage.setItem('nahla_active_orders', JSON.stringify(activeOrders));
            displayActiveOrders();
        }
    };
    
    window.logout = function() {
        if(confirm("تأكيد تسجيل الخروج؟")) {
            updateFirebaseLocationStatus('inactive');
            localStorage.removeItem('nahla_drv_session');
            location.reload();
        }
    };
</script>
</body>
</html>
