<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control | سيادة الحوت</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #0f172a; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow-emerald { box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
        .cyber-font { font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body class="min-h-screen">
    <div class="flex">
        <aside class="w-20 hover:w-64 transition-all duration-500 h-screen sticky top-0 glass border-l border-white/10 flex flex-col items-center py-8 z-50 overflow-hidden">
            <div class="mb-12 cyber-font text-2xl font-bold text-emerald-400">WHALE</div>
            <nav class="space-y-8 w-full px-4">
                <div class="flex items-center gap-4 p-3 rounded-xl bg-emerald-500/10 text-emerald-400 cursor-pointer">✨ <span class="hidden group-hover:block">الرئيسية</span></div>
                <div class="flex items-center gap-4 p-3 rounded-xl hover:bg-white/5 cursor-pointer">🏍️</div>
                <div class="flex items-center gap-4 p-3 rounded-xl hover:bg-white/5 cursor-pointer">📊</div>
                <div class="flex items-center gap-4 p-3 rounded-xl hover:bg-white/5 cursor-pointer">⚙️</div>
            </nav>
        </aside>

        <main class="flex-1 p-8">
            <header class="flex justify-between items-center mb-12">
                <div>
                    <h1 class="text-4xl font-bold bg-gradient-to-r from-white to-gray-500 bg-clip-text text-transparent">نظام السيادة المطلقة</h1>
                    <p class="text-emerald-400 cyber-font text-sm mt-2 tracking-widest uppercase">System Operational: Kirkuk Sector</p>
                </div>
                <div class="glass p-4 rounded-2xl flex items-center gap-4">
                    <div class="text-left"><p class="text-[10px] opacity-50">STATUS</p><p class="text-xs font-bold text-emerald-400">SECURE 🛡️</p></div>
                    <div class="w-12 h-12 rounded-full bg-gradient-to-tr from-emerald-500 to-blue-500 animate-pulse"></div>
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12">
                <div class="glass p-6 rounded-[2rem] glow-emerald">
                    <p class="text-gray-400 text-xs mb-2">إجمالي الأرباح اليوم</p>
                    <h2 class="text-3xl font-bold cyber-font">1,240,000<span class="text-sm text-emerald-500 ml-2">IQD</span></h2>
                    <div class="mt-4 h-1 bg-white/10 rounded-full overflow-hidden"><div class="w-3/4 h-full bg-emerald-500"></div></div>
                </div>
                <div class="glass p-6 rounded-[2rem]">
                    <p class="text-gray-400 text-xs mb-2">طلبات قيد المعالجة</p>
                    <h2 class="text-3xl font-bold cyber-font">42</h2>
                    <p class="text-[10px] text-blue-400 mt-2">↑ 12% عن الساعة الماضية</p>
                </div>
                <div class="glass p-6 rounded-[2rem] border-r-4 border-emerald-500">
                    <p class="text-gray-400 text-xs mb-2">صندوق التطوير (80 د.ع)</p>
                    <h2 class="text-3xl font-bold cyber-font text-emerald-400">14,320</h2>
                </div>
                <div class="glass p-6 rounded-[2rem] bg-gradient-to-br from-emerald-500/10 to-transparent">
                    <p class="text-gray-400 text-xs mb-2">تغطية الشبكة</p>
                    <h2 class="text-xl font-bold italic">كركوك - نشط ✅</h2>
                </div>
            </div>

            <div class="relative glass rounded-[3rem] h-[400px] overflow-hidden border border-emerald-500/20 shadow-2xl shadow-emerald-500/5">
                <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-20"></div>
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-center">
                    <div class="w-24 h-24 border-4 border-emerald-500/30 border-t-emerald-500 rounded-full animate-spin mb-4"></div>
                    <p class="cyber-font text-emerald-500 animate-pulse">LIVE SATELLITE TRACKING...</p>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
