<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق السائق | منظومة الحوت</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #000; color: #fff; }
        .receipt-card { background: linear-gradient(145deg, #0f172a, #020617); border: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none; }
        .modal-bg { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(8px); }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-10">
    <header class="p-8 bg-slate-900 rounded-b-[3.5rem] border-b border-emerald-500/30 shadow-2xl">
        <h1 class="text-xl font-black text-emerald-500 italic uppercase tracking-tighter text-center font-mono">Whale Logistics</h1>
        <p class="text-[10px] text-gray-500 text-center mt-2 italic font-bold tracking-widest uppercase italic">نظام التوزيع الذكي - كركوك</p>
    </header>

    <main class="p-6">
        <div class="receipt-card p-8 rounded-[3rem] shadow-2xl relative overflow-hidden border-t-4 border-emerald-500">
            
            <div class="mb-6 flex flex-col items-center border-b border-white/5 pb-6">
                <p class="text-[10px] text-emerald-500 font-black uppercase tracking-widest mb-1 italic">المطعم المصدر</p>
                <h2 id="restaurantTitle" class="text-2xl font-black text-white text-center italic tracking-tight underline decoration-emerald-500/50 decoration-2 underline-offset-8">جاري التحميل...</h2>
            </div>

            <div id="receiptOnlyView" class="space-y-4">
                <div class="flex justify-between items-center mb-4">
                    <span class="bg-amber-500 text-black px-4 py-1 rounded-full text-[10px] font-black italic">وصل مصور 📸</span>
                    <span id="orderID_photo" class="text-xs font-mono text-gray-500">#HK-000</span>
                </div>
                
                <div class="rounded-[2.5rem] overflow-hidden border-2 border-white/10 shadow-2xl shadow-black">
                    <img id="receiptImg" src="https://via.placeholder.com/500x700?text=جاري+تحميل+الوصل..." class="w-full h-auto" alt="Receipt">
                </div>
            </div>

            <div id="manualInfoView" class="hidden space-y-6">
                <div class="flex justify-between items-center mb-4">
                    <span class="bg-emerald-600 text-black px-4 py-1 rounded-full text-[10px] font-black uppercase italic">بيانات يدوية ✍️</span>
                    <span id="orderID_manual" class="text-xs font-mono text-gray-500">#HK-000</span>
                </div>

                <div class="bg-white/5 p-6 rounded-[2rem] border border-white/5 flex items-center gap-5">
                    <span class="text-3xl">📍</span>
                    <div>
                        <p class="text-[10px] text-gray-400 font-bold uppercase italic italic">موقع التوصيل</p>
                        <p id="locationTxt" class="text-xl font-black text-white italic">...</p>
                    </div>
                </div>

                <div class="bg-white/5 p-6 rounded-[2rem] border border-white/5 flex items-center justify-between">
                    <div class="flex items-center gap-5">
                        <span class="text-3xl">📞</span>
                        <div>
                            <p class="text-[10px] text-gray-400 font-bold uppercase italic italic font-bold">هاتف الزبون</p>
                            <p id="phoneTxt" class="text-xl font-black text-blue-400 font-mono tracking-wider italic italic underline">077XXXXXXXX</p>
                        </div>
                    </div>
                    <a id="phoneCall" href="tel:077XXXXXXXX" class="bg-blue-600 p-4 rounded-2xl hover:scale-110 transition-transform shadow-lg shadow-blue-900/40">📱</a>
                </div>
            </div>

            <div class="mt-10 space-y-4">
                <button onclick="confirmDelivery()" class="w-full bg-emerald-500 text-black py-6 rounded-[2rem] font-black text-xl active:scale-95 transition-all shadow-xl shadow-emerald-900/40">
                    تأكيد التسليم بنجاح ✅
                </button>
                
                <button onclick="toggleAppealModal(true)" class="w-full bg-transparent text-red-500/70 py-3 rounded-2xl font-bold text-xs border border-red-500/10 active:bg-red-500/10 transition-all">
                    طلب إلغاء الطلبية ⚠️
                </button>
            </div>
        </div>
        
        <div class="mt-8 text-center px-6">
            <p id="statusMsg" class="text-[10px] text-emerald-500/50 font-bold italic leading-relaxed uppercase tracking-widest italic font-bold">
                "نظام الحوت يضمن حقك؛ كل خطوة موثقة."
            </p>
        </div>
    </main>

    <div id="appealModal" class="hidden fixed inset-0 modal-bg z-50 flex items-center justify-center p-6 text-right">
        <div class="bg-slate-900 w-full rounded-[3rem] p-8 border border-white/10 shadow-2xl">
            <h3 class="text-white font-black text-xl mb-6 text-center italic">لماذا تطلب الإلغاء؟</h3>
            <div class="space-y-3">
                <button onclick="sendAppeal('عطل في الدراجة')" class="w-full p-4 bg-white/5 rounded-2xl text-right text-sm hover:bg-red-500/10 border border-white/5 font-black italic">🚨 عطل مفاجئ أو حادث</button>
                <button onclick="sendAppeal('الزبون لا يرد')" class="w-full p-4 bg-white/5 rounded-2xl text-right text-sm hover:bg-red-500/10 border border-white/5 font-black italic">📞 الزبون لا يرد على الهاتف</button>
                <button onclick="sendAppeal('العنوان خاطئ/بعيد')" class="w-full p-4 bg-white/5 rounded-2xl text-right text-sm hover:bg-red-500/10 border border-white/5 font-black italic">📍 العنوان غير دقيق</button>
                <div class="pt-4 border-t border-white/5">
                    <button onclick="toggleAppealModal(false)" class="w-full p-2 text-gray-600 text-[10px] font-black uppercase italic">تراجع</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // محاكاة البيانات القادمة من السيرفر (ستتغير برمجياً)
        let orderData = {
            id: "#HK-2290",
            restaurantName: "كرز الشام - فرع كركوك", // اسم المطعم المطلوب
            type: "photo", // أو "manual"
            location: "حي الواسطي - قرب الجسر",
            phone: "07713225471",
            img: "https://via.placeholder.com/500x700?text=صورة+الوصل+تظهر+هنا"
        };

        function initApp() {
            // عرض اسم المطعم في كل الحالات
            document.getElementById('restaurantTitle').innerText = orderData.restaurantName;

            if (orderData.type === "manual") {
                document.getElementById('manualInfoView').classList.remove('hidden');
                document.getElementById('receiptOnlyView').classList.add('hidden');
                document.getElementById('orderID_manual').innerText = orderData.id;
                document.getElementById('locationTxt').innerText = orderData.location;
                document.getElementById('phoneTxt').innerText = orderData.phone;
                document.getElementById('phoneCall').href = "tel:" + orderData.phone;
            } else {
                document.getElementById('manualInfoView').classList.add('hidden');
                document.getElementById('receiptOnlyView').classList.remove('hidden');
                document.getElementById('orderID_photo').innerText = orderData.id;
                document.getElementById('receiptImg').src = orderData.img;
            }
        }

        function toggleAppealModal(show) {
            document.getElementById('appealModal').classList.toggle('hidden', !show);
        }

        function sendAppeal(reason) {
            alert("تم إرسال بلاغك للمدير: " + reason);
            toggleAppealModal(false);
            document.getElementById('statusMsg').innerText = "⏳ طلب الإلغاء قيد المراجعة لدى الإدارة...";
            document.getElementById('statusMsg').classList.replace('text-emerald-500/50', 'text-amber-500');
        }

        function confirmDelivery() {
            if(confirm("هل تم تسليم الطلب بنجاح؟")) {
                alert("تم الإكمال ✅");
                // هنا يتم الربط مع Google Sheet لاحقاً
            }
        }

        initApp();
    </script>
</body>
</html>
