<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>تم بنجاح | الحوت 🐋</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary:#FF385C; --dark:#222222; --mid:#717171; --light:#DDDDDD; --bg:#F7F7F7; --radius:16px; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Tajawal',sans-serif; background:var(--bg); color:var(--dark); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
        .card { background:white; border-radius:24px; max-width:460px; width:100%; padding:40px 32px; box-shadow:0 8px 40px rgba(0,0,0,0.12); border:1px solid var(--light); text-align:center; animation:bounceIn 0.7s cubic-bezier(0.68,-0.55,0.27,1.55); }
        @keyframes bounceIn { 0%{opacity:0;transform:scale(0.5) translateY(40px);} 100%{opacity:1;transform:scale(1) translateY(0);} }
        .success-icon { width:80px; height:80px; background:linear-gradient(135deg,#ff385c,#e31c5f); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 20px; font-size:2.5rem; box-shadow:0 10px 30px rgba(255,56,92,0.3); }
        h1 { font-size:1.8rem; font-weight:900; margin-bottom:6px; }
        .user-name { font-size:1.2rem; font-weight:800; color:var(--primary); margin-bottom:16px; }
        .status-msg { background:#f0fff4; border:1px solid #86efac; border-radius:12px; padding:14px 18px; color:#166534; font-weight:700; font-size:0.9rem; line-height:1.6; margin-bottom:20px; }
        .sub-msg { color:var(--mid); font-size:0.85rem; line-height:1.7; margin-bottom:28px; }
        .order-box { border:2px dashed var(--light); border-radius:14px; padding:20px; margin-bottom:28px; }
        .order-label { font-size:0.65rem; font-weight:800; color:var(--mid); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:6px; }
        .order-id { font-size:1.8rem; font-weight:900; color:var(--dark); letter-spacing:-0.02em; }
        .sync-row { display:flex; align-items:center; justify-content:center; gap:6px; margin-top:8px; font-size:0.78rem; font-weight:700; color:#16a34a; }
        .back-btn { display:block; background:var(--dark); color:white; text-decoration:none; padding:16px 32px; border-radius:12px; font-weight:900; font-size:1rem; transition:0.2s; }
        .back-btn:hover { background:var(--primary); }
    </style>
</head>
<body>
<div class="card">
    <div class="success-icon">✅</div>
    <h1 id="greetText">تم الحجز بنجاح!</h1>
    <div class="user-name" id="userNameTxt"></div>
    <div class="status-msg" id="statusMsg">تم إرسال بياناتك إلى خوادم الحوت...</div>
    <p class="sub-msg" id="subMsg">سيقوم فريق الدعم الفني بالتواصل معك خلال دقائق.</p>

    <div class="order-box">
        <div class="order-label">REFERENCE NUMBER</div>
        <div class="order-id" id="orderIdTxt">—</div>
        <div class="sync-row" id="syncRow">
            <i class="fas fa-satellite-dish" id="syncIcon" style="animation:pulse 1s infinite;"></i>
            <span id="syncTxt">جاري الحفظ...</span>
        </div>
    </div>

    <a href="index.html" class="back-btn" id="backBtn">العودة للرئيسية</a>
</div>

<style>
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
</style>

<script>
    const u = new URLSearchParams(window.location.search);
    const lang = u.get('lang') || 'ar';
    const serviceType = u.get('service');
    const type = serviceType==='زفاف'?'wedding':(serviceType==='تدريب قيادة'?'training':(serviceType==='فندق'?'hotel':'personal'));
    const scriptURL = "https://script.google.com/macros/s/AKfycbxpAW6PZ9ykBmaIfuDxtxr3YOfcg95jXeFJ2FjX5GxGRiawUNHzs90rKBEUFOcf_z_n/exec";

    const content = {
        ar:{dir:'rtl',greet:'تم الحجز بنجاح!',status:'تم إرسال بياناتك إلى خوادم الحوت...',sub:'سيقوم فريق الدعم الفني بالتواصل معك خلال دقائق.',sync:'تم المزامنة بنجاح ✅',syncing:'جاري الحفظ...',already:'تم الحفظ مسبقاً ✅',back:'العودة للرئيسية',welcome:'عميلنا العزيز'},
        ku:{dir:'rtl',greet:'سەرکەوتوو بوو!',status:'زانیارییەکانت نێردرا بۆ سێرڤەری حوت...',sub:'تیمی پشتگیری لە ماوەی چەند خولەکێکدا پەیوەندیت پێوە دەکەین.',sync:'زانیارییەکان پارێزراون ✅',syncing:'خەریکی پاراستنە...',already:'پێشتر نێردراوە ✅',back:'گەڕانەوە بۆ سەرەتا',welcome:'کڕیاری بەڕێز'},
        tr:{dir:'ltr',greet:'Rezervasyon Başarılı!',status:'Verileriniz Al-Hut sunucularına gönderildi...',sub:'Destek ekibimiz birkaç dakika içinde sizinle iletişime geçecektir.',sync:'Kayıt Başarılı ✅',syncing:'Kaydediliyor...',already:'Zaten kaydedildi ✅',back:'Ana Sayfaya Dön',welcome:'Değerli Müşterimiz'},
        en:{dir:'ltr',greet:'Booking Successful!',status:'Your data has been sent to Al-Hut servers...',sub:'Our support team will contact you within minutes.',sync:'Record Synchronized ✅',syncing:'Saving now...',already:'Already saved ✅',back:'Back to Home',welcome:'Valued Customer'},
    };

    window.onload = async () => {
        const l = content[lang] || content.ar;
        document.getElementById('htmlTag').dir = l.dir;
        document.getElementById('greetText').innerText = l.greet;
        document.getElementById('statusMsg').innerText = l.status;
        document.getElementById('subMsg').innerText = l.sub;
        document.getElementById('backBtn').innerText = l.back;
        document.getElementById('syncTxt').innerText = l.syncing;
        document.getElementById('userNameTxt').innerText = u.get('name') || l.welcome;

        const finalOrderID = u.get('order_id') || 'HUT-' + Math.random().toString(36).substr(2,6).toUpperCase();
        document.getElementById('orderIdTxt').innerText = '#' + finalOrderID;

        // Confetti
        confetti({ particleCount:160, spread:80, origin:{y:0.6}, colors:['#FF385C','#FFD700','#222222'] });
        setTimeout(() => confetti({ particleCount:60, spread:120, origin:{y:0.4}, colors:['#FF385C','#fff'] }), 600);

        if(sessionStorage.getItem('sent_'+finalOrderID)) {
            document.getElementById('syncTxt').innerText = l.already;
            document.getElementById('syncIcon').style.animation = 'none';
            document.getElementById('syncIcon').className = 'fas fa-check-double';
            document.getElementById('syncIcon').style.color = '#16a34a';
            return;
        }

        const payload = {
            order_id: finalOrderID,
            name: u.get('name'),
            phone: u.get('phone'),
            province: u.get('province'),
            car: u.get('car'),
            days: u.get('days') || '1',
            total_price: u.get('total_price'),
            service: serviceType,
            date: new Date().toLocaleString('en-GB')
        };

        try {
            await fetch(scriptURL, { method:'POST', mode:'no-cors', body:JSON.stringify(payload) });
            sessionStorage.setItem('sent_'+finalOrderID, 'true');
            setTimeout(() => {
                document.getElementById('syncTxt').innerText = l.sync;
                document.getElementById('syncIcon').style.animation = 'none';
                document.getElementById('syncIcon').className = 'fas fa-check-double';
                document.getElementById('syncIcon').style.color = '#16a34a';
            }, 1500);
        } catch(err) {
            document.getElementById('syncTxt').innerText = '✅ ' + (lang==='ar'?'تم الحفظ':'Saved');
        }
    };
</script>
</body>
</html>
