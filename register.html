<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>انضم لأسطول الحوت | طلب تسجيل مطعم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: white; }
        .glass-input { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
        .glass-input:focus { background: rgba(16, 185, 129, 0.05); border-color: #10b981; outline: none; box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); }
        .btn-submit { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-slate-900/50 backdrop-blur-xl p-10 rounded-[3.5rem] border border-white/5 shadow-2xl relative overflow-hidden">
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-emerald-500/10 rounded-full blur-3xl"></div>
        
        <header class="text-center mb-10 relative">
            <div class="w-16 h-16 bg-emerald-500 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-lg shadow-emerald-500/20">
                <span class="text-slate-900 text-3xl font-black font-mono">ح</span>
            </div>
            <h1 class="text-2xl font-black text-white italic">انضم لمنظومة الحوت</h1>
            <p class="text-[10px] text-gray-500 mt-2 uppercase tracking-widest font-bold italic">نموذج تسجيل الشركاء الجدد - كركوك</p>
        </header>

        <form id="registrationForm" class="space-y-5 relative">
            <div>
                <label class="text-[10px] text-emerald-500 font-black uppercase mb-2 block mr-2 italic">اسم المطعم التجاري</label>
                <input type="text" id="resName" required placeholder="مثال: كرز الشام" class="w-full glass-input p-4 rounded-2xl text-sm font-bold italic">
            </div>

            <div>
                <label class="text-[10px] text-emerald-500 font-black uppercase mb-2 block mr-2 italic">موقع المطعم (الحي/الشارع)</label>
                <input type="text" id="resLocationName" required placeholder="مثال: طريق بغداد - مقابل المجسر" class="w-full glass-input p-4 rounded-2xl text-sm font-bold italic">
            </div>

            <div>
                <label class="text-[10px] text-emerald-500 font-black uppercase mb-2 block mr-2 italic">رابط موقع الخريطة (Google Maps)</label>
                <input type="url" id="resMapUrl" required placeholder="ضع رابط الموقع هنا..." class="w-full glass-input p-4 rounded-2xl text-[10px] font-mono text-blue-400">
            </div>

            <div>
                <label class="text-[10px] text-emerald-500 font-black uppercase mb-2 block mr-2 italic">رقم هوية المدير (الرقم الوطني)</label>
                <input type="number" id="managerId" required placeholder="12 رقم للهوية الوطنية" class="w-full glass-input p-4 rounded-2xl text-sm font-mono tracking-widest italic">
            </div>

            <button type="submit" class="w-full btn-submit text-slate-900 py-5 rounded-3xl font-black text-lg active:scale-95 transition-all mt-6">
                إرسال طلب الانضمام 📥
            </button>
        </form>

        <div id="successMsg" class="hidden text-center py-10">
            <div class="text-6xl mb-4">⏳</div>
            <h2 class="text-xl font-black text-emerald-400 italic">تم إرسال طلبك بنجاح!</h2>
            <p class="text-[11px] text-gray-400 mt-4 leading-relaxed italic">يتم الآن مراجعة بياناتك من قبل إدارة "الحوت". سيتم التواصل معك عبر رقم الهاتف المسجل لتفعيل حسابك فور الموافقة.</p>
        </div>
    </div>

    <script>
        document.getElementById('registrationForm').onsubmit = function(e) {
            e.preventDefault();
            // هنا يتم إرسال البيانات لـ Google Apps Script
            const data = {
                name: document.getElementById('resName').value,
                location: document.getElementById('resLocationName').value,
                map: document.getElementById('resMapUrl').value,
                id: document.getElementById('managerId').value
            };
            
            console.log("طلب انضمام جديد:", data);
            
            // إخفاء الفورم وإظهار رسالة النجاح
            this.classList.add('hidden');
            document.getElementById('successMsg').classList.remove('hidden');
        };
    </script>
</body>
</html>
