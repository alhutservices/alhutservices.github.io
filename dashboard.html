<script>
    // الرابط الخاص بك الذي استخرجناه من الصور
    const scriptURL = "https://script.google.com/macros/s/AKfycbznxCVbF350cer5qcXlIROrNmmnf5993r9-AoLbNKqb8YfVNhhT3rREefD7dbK6RFIH/exec";
    
    // جلب بيانات المكتب المسجل دخول
    const officeData = JSON.parse(localStorage.getItem('whale_office_data'));
    let currentTab = 'new', allOrders = [], lastKnownNewOrders = -1;

    // التحقق من تسجيل الدخول
    if(!officeData) {
        window.location.href = 'login.html';
    } else {
        document.getElementById('navOfficeName').innerText = officeData.name;
        document.getElementById('navCity').innerText = `📍 ${officeData.city}`;
    }

    // وظيفة جلب الطلبات من السكريبت
    async function fetchOrders() {
        try {
            // إضافة action=getAllOrders ليتوافق مع السكريبت في الصور
            const res = await fetch(`${scriptURL}?action=getAllOrders&t=${Date.now()}`);
            allOrders = await res.json();
            checkNewOrdersAlert();
            renderCards();
        } catch(e) { 
            console.error("خطأ في جلب البيانات من الحوت:", e); 
        }
    }

    // منطق تحديث حالة الطلب (استلام، اكتمال)
    async function update(id, act) {
        // act قد تكون 'claim' للاستلام أو 'complete' للتنفيذ كما في السكريبت
        if(!confirm("هل أنت متأكد من تنفيذ هذه العملية على نظام الحوت؟")) return;
        
        try {
            // إرسال الأكشن مع المعرف واسم المكتب للسيرفر
            const url = `${scriptURL}?action=${act}&id=${id}&office=${encodeURIComponent(officeData.name)}`;
            const res = await fetch(url);
            const result = await res.json();
            
            if(result.success) {
                // تصفير التنبيه الصوتي عند التفاعل
                stopAlert();
                fetchOrders(); // تحديث القائمة فوراً
            }
        } catch(e) { 
            alert("فشل الاتصال بسيرفر الحوت، يرجى المحاولة لاحقاً"); 
        }
    }

    // منطق رادار الحوت (التنبيه الصوتي)
    function checkNewOrdersAlert() {
        // فلترة الطلبات التي تخص مدينة هذا المكتب وحالتها "قيد الانتظار"
        const myNewOrders = allOrders.filter(o => {
            const orderCity = (o.prov || o.province || "").toString().trim();
            const myCity = (officeData.city || "").toString().trim();
            return orderCity === myCity && (o.status === "قيد الانتظار" || o.status === "طلب جديد");
        }).length;

        // إذا زاد عدد الطلبات الجديدة عن آخر فحص، نطلق الرادار
        if (lastKnownNewOrders !== -1 && myNewOrders > lastKnownNewOrders) {
            playAlert();
        }
        lastKnownNewOrders = myNewOrders;
    }

    // تحديث القائمة تلقائياً كل 15 ثانية لضمان سرعة الرادار
    setInterval(fetchOrders, 15000);
    fetchOrders();
</script>
