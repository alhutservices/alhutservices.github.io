<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Portal | بوابة المدير</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f8fafc; color: #1e293b; }
        .input-focus:focus { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="p-4 md:p-8">
    <nav class="max-w-6xl mx-auto flex justify-between items-center mb-12">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white font-bold italic">W</div>
            <h1 class="text-xl font-bold tracking-tighter">بوابة المطعم <span class="text-emerald-600 font-light">بإشراف المدير</span></h1>
        </div>
        <div class="flex items-center gap-2 bg-white px-4 py-2 rounded-full shadow-sm border">
            <span class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></span>
            <span class="text-xs font-bold">النظام الذكي متصل</span>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-4 bg-white p-8 rounded-[2.5rem] shadow-2xl shadow-slate-200/50 border border-slate-100">
            <h2 class="text-2xl font-bold mb-8">إرسال طلب جديد 🚀</h2>
            <div class="space-y-6">
                <div>
                    <label class="text-xs text-gray-400 block mb-2 mr-2">رقم الهاتف</label>
                    <input type="tel" class="w-full p-4 bg-slate-50 border-none rounded-2xl outline-none input-focus transition-all" placeholder="077XXXXXXXX">
                </div>
                <div>
                    <label class="text-xs text-gray-400 block mb-2 mr-2">العنوان الدقيق</label>
                    <input type="text" class="w-full p-4 bg-slate-50 border-none rounded-2xl outline-none input-focus transition-all" placeholder="المنطقة - المعلم القريب">
                </div>
                <div>
                    <label class="text-xs text-gray-400 block mb-2 mr-2">قيمة الطلب</label>
                    <input type="number" class="w-full p-4 bg-slate-50 border-none rounded-2xl outline-none input-focus transition-all font-bold text-emerald-600" placeholder="0.00">
                </div>
                <button class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold text-lg hover:shadow-xl hover:shadow-slate-900/20 active:scale-95 transition-all">بث للأسطول الآن</button>
            </div>
        </div>

        <div class="lg:col-span-8 bg-white rounded-[2.5rem] shadow-xl border border-slate-100 overflow-hidden">
            <div class="p-8 border-b border-slate-50 flex justify-between items-center">
                <h3 class="font-bold text-lg">الطلبات النشطة (اللحظية)</h3>
                <span class="text-xs bg-blue-50 text-blue-600 px-3 py-1 rounded-full font-bold">4 طلبات تنتظر المدير</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-slate-50 text-gray-400 text-xs text-right uppercase tracking-widest">
                        <tr><th class="p-6">المعرف</th><th class="p-6">المبلغ</th><th class="p-6 text-center">حالة الذكاء الاصطناعي</th></tr>
                    </thead>
                    <tbody class="divide-y divide-slate-50">
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="p-6 font-mono font-bold">#ALHUT-992</td>
                            <td class="p-6 font-bold">32,500 <span class="text-[10px] text-gray-400">د.ع</span></td>
                            <td class="p-6 text-center">
                                <span class="bg-emerald-100 text-emerald-700 px-4 py-2 rounded-xl text-xs font-bold inline-block animate-pulse">جاري تعيين أفضل سائق..</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
