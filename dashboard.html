<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>رادار الحوت | لوحة المكتب</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary:#FF385C; --dark:#222222; --mid:#717171; --light:#DDDDDD; --bg:#F7F7F7; --green:#10b981; --blue:#3b82f6; --radius:16px; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Tajawal',sans-serif; background:var(--bg); color:var(--dark); }
        .navbar { background:white; border-bottom:1px solid var(--light); padding:0 20px; height:72px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:0 1px 12px rgba(0,0,0,0.06); }
        .office-info { display:flex; align-items:center; gap:12px; }
        .office-avatar { width:42px; height:42px; background:var(--dark); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.2rem; color:white; }
        .office-name { font-weight:900; font-size:1rem; }
        .office-city { font-size:0.75rem; color:var(--primary); font-weight:700; }
        .logout-btn { background:none; border:1.5px solid var(--light); border-radius:10px; width:40px; height:40px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--mid); transition:0.2s; }
        .logout-btn:hover { border-color:#dc2626; color:#dc2626; }
        .tabs-bar { background:white; border-bottom:1px solid var(--light); padding:0 20px; display:flex; gap:0; position:sticky; top:72px; z-index:90; }
        .tab-btn { padding:16px 20px; font-weight:700; font-size:0.9rem; cursor:pointer; color:var(--mid); border-bottom:2px solid transparent; transition:0.2s; display:flex; align-items:center; gap:6px; white-space:nowrap; }
        .tab-btn.active { color:var(--dark); border-bottom-color:var(--dark); }
        .tab-btn:hover { color:var(--dark); }
        .main { max-width:640px; margin:0 auto; padding:20px 16px 100px; }
        .empty-state { text-align:center; padding:60px 20px; color:var(--mid); }
        .empty-state .empty-icon { font-size:3rem; margin-bottom:12px; opacity:0.4; }
        .empty-state p { font-weight:700; font-size:0.9rem; }
        .order-card { background:white; border-radius:var(--radius); border:1px solid var(--light); margin-bottom:16px; overflow:hidden; transition:0.25s; }
        .order-card:hover { box-shadow:0 4px 20px rgba(0,0,0,0.08); }
        .order-card.new-pulse { animation:newPulse 2s infinite; }
        @keyframes newPulse { 0%,100%{border-color:var(--light);} 50%{border-color:var(--primary);} }
        .order-header { padding:16px 18px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--bg); }
        .order-badge { padding:4px 12px; border-radius:20px; font-size:0.72rem; font-weight:800; }
        .badge-new { background:rgba(59,130,246,0.1); color:var(--blue); }
        .badge-mine { background:rgba(16,185,129,0.1); color:var(--green); }
        .badge-done { background:rgba(34,197,94,0.08); color:#16a34a; }
        .order-id { font-size:0.75rem; color:var(--mid); font-weight:700; }
        .order-body { padding:16px 18px; }
        .order-car { font-size:1.05rem; font-weight:900; margin-bottom:4px; }
        .order-meta { display:flex; gap:16px; font-size:0.82rem; color:var(--mid); font-weight:600; margin-bottom:14px; flex-wrap:wrap; }
        .meta-item { display:flex; align-items:center; gap:4px; }
        .order-stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
        .stat-box { background:var(--bg); border-radius:10px; padding:10px 12px; }
        .stat-label { font-size:0.65rem; font-weight:800; color:var(--mid); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:3px; }
        .stat-value { font-size:0.9rem; font-weight:900; }
        .stat-value.price { color:var(--green); }
        .order-actions { display:flex; gap:10px; }
        .action-btn { flex:1; padding:12px; border-radius:10px; font-weight:800; font-size:0.85rem; cursor:pointer; transition:0.2s; border:none; font-family:'Tajawal',sans-serif; display:flex; align-items:center; justify-content:center; gap:6px; }
        .btn-claim { background:var(--dark); color:white; }
        .btn-claim:hover { background:var(--primary); }
        .btn-call { background:var(--green); color:white; text-decoration:none; }
        .btn-location { background:var(--bg); color:var(--dark); text-decoration:none; border:1.5px solid var(--light); }
        .btn-complete { background:var(--dark); color:white; }
        .stop-alarm { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--primary); color:white; border:none; padding:14px 28px; border-radius:50px; font-weight:900; font-size:0.9rem; cursor:pointer; box-shadow:0 8px 24px rgba(255,56,92,0.4); display:none; align-items:center; gap:8px; z-index:200; animation:bounce 1s infinite; font-family:'Tajawal',sans-serif; }
        @keyframes bounce { 0%,100%{transform:translateX(-50%) translateY(0);} 50%{transform:translateX(-50%) translateY(-6px);} }
    </style>
</head>
<body>

<audio id="radarSound" src="https://actions.google.com/sounds/v1/alarms/alarm_clock_ringing_rising.ogg" preload="auto" loop></audio>

<nav class="navbar">
    <div class="office-info">
        <div class="office-avatar">🐋</div>
        <div>
            <div class="office-name" id="officeName">...</div>
            <div class="office-city" id="officeCity"></div>
        </div>
    </div>
    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
</nav>

<div class="tabs-bar">
    <div class="tab-btn active" id="tabNew" onclick="switchTab('new')"><i class="fas fa-satellite-dish"></i> الرادار</div>
    <div class="tab-btn" id="tabMine" onclick="switchTab('mine')"><i class="fas fa-box"></i> تنفيذي</div>
    <div class="tab-btn" id="tabDone" onclick="switchTab('done')"><i class="fas fa-check-circle"></i> الأرشيف</div>
</div>

<div class="main" id="mainContainer">
    <div class="empty-state"><div class="empty-icon">📡</div><p>جاري تحميل بيانات الرادار...</p></div>
</div>

<button class="stop-alarm" id="stopAlarmBtn" onclick="stopAlert()">
    <i class="fas fa-bell-slash"></i> إيقاف التنبيه
</button>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbxpAW6PZ9ykBmaIfuDxtxr3YOfcg95jXeFJ2FjX5GxGRiawUNHzs90rKBEUFOcf_z_n/exec";
    const officeData = JSON.parse(localStorage.getItem('whale_office_data'));
    let currentTab='new', allOrders=[], lastKnown=-1;

    if(!officeData) window.location.href='login.html';
    document.getElementById('officeName').innerText = officeData.name;
    document.getElementById('officeCity').innerText = `📍 ${officeData.city}`;

    async function fetchOrders() {
        try {
            const res = await fetch(`${scriptURL}?action=getAllOrders&t=${Date.now()}`, {method:'GET',redirect:'follow'});
            if(!res.ok) throw new Error();
            allOrders = await res.json();
            checkAlert();
            renderCards();
        } catch(e) { setTimeout(fetchOrders, 10000); }
    }

    function checkAlert() {
        const c = (officeData.city||'').trim();
        const n = allOrders.filter(o => (o.province||o.prov||'').trim()===c && (o.status==='قيد الانتظار'||o.status==='طلب جديد')).length;
        if(lastKnown !== -1 && n > lastKnown) playAlert();
        lastKnown = n;
    }

    function playAlert() {
        const s = document.getElementById('radarSound');
        s.play().catch(()=>{});
        document.getElementById('stopAlarmBtn').style.display='flex';
    }

    function stopAlert() {
        const s = document.getElementById('radarSound');
        s.pause(); s.currentTime=0;
        document.getElementById('stopAlarmBtn').style.display='none';
    }

    function renderCards() {
        const c = document.getElementById('mainContainer');
        const city = (officeData.city||'').trim();
        let list = [];
        if(currentTab==='new') list = allOrders.filter(o => (o.province||o.prov||'').trim()===city && (o.status==='قيد الانتظار'||o.status==='طلب جديد'));
        else if(currentTab==='mine') list = allOrders.filter(o => o.office===officeData.name && o.status==='تم الاستلام');
        else list = allOrders.filter(o => o.office===officeData.name && ((o.status||'').includes('✅')||(o.status||'').includes('⚠️')));

        if(list.length===0) {
            const msgs = {new:'لا يوجد طلبات جديدة في رادار '+city+' 📡', mine:'لا يوجد طلبات في تنفيذك حالياً 📦', done:'أرشيف فارغ ✅'};
            c.innerHTML = `<div class="empty-state"><div class="empty-icon">${currentTab==='new'?'📡':currentTab==='mine'?'📦':'✅'}</div><p>${msgs[currentTab]||'لا توجد بيانات'}</p></div>`;
            return;
        }

        c.innerHTML = list.slice().reverse().map(o => {
            const name = o.name||'عميل';
            const car = o.car||'خدمة';
            const price = Number(o.total_price||o.price||0).toLocaleString();
            const id = o.id||o.order_id;
            const phone = o.phone||'07XXXXXXXX';
            const svcEmoji = (o.service||'').includes('فندق')?'🏨':(o.service||'').includes('تدريب')?'🎓':(o.service||'').includes('زفاف')?'💍':'🚗';

            if(currentTab==='new') return `
                <div class="order-card new-pulse">
                    <div class="order-header">
                        <span class="order-badge badge-new">📡 جديد</span>
                        <span class="order-id">#${id}</span>
                    </div>
                    <div class="order-body">
                        <div class="order-car">${svcEmoji} ${car}</div>
                        <div class="order-meta">
                            <span class="meta-item"><i class="fas fa-user"></i>${name}</span>
                            <span class="meta-item"><i class="fas fa-map-marker-alt"></i>${o.province||o.prov}</span>
                        </div>
                        <div class="order-stats">
                            <div class="stat-box"><div class="stat-label">المدة</div><div class="stat-value">${o.days||1} أيام</div></div>
                            <div class="stat-box"><div class="stat-label">المبلغ</div><div class="stat-value price">${price} د.ع</div></div>
                        </div>
                        <div class="order-actions">
                            <button class="action-btn btn-claim" onclick="update('${id}','claim')"><i class="fas fa-bolt"></i> استلام التنفيذ</button>
                        </div>
                    </div>
                </div>`;

            if(currentTab==='mine') return `
                <div class="order-card">
                    <div class="order-header">
                        <span class="order-badge badge-mine">📦 في تنفيذي</span>
                        <span class="order-id">#${id}</span>
                    </div>
                    <div class="order-body">
                        <div class="order-car">${svcEmoji} ${car}</div>
                        <div class="order-meta">
                            <span class="meta-item"><i class="fas fa-user"></i>${name}</span>
                        </div>
                        <div class="order-actions" style="flex-wrap:wrap;gap:10px;">
                            <a href="tel:${phone}" class="action-btn btn-call"><i class="fas fa-phone"></i> اتصال</a>
                            <a href="${o.location_link||'#'}" target="_blank" class="action-btn btn-location"><i class="fas fa-map-marker-alt"></i> الموقع</a>
                            <button class="action-btn btn-complete" style="width:100%" onclick="update('${id}','complete')"><i class="fas fa-check"></i> تأكيد التسليم ✅</button>
                        </div>
                    </div>
                </div>`;

            return `
                <div class="order-card" style="opacity:0.6">
                    <div class="order-header">
                        <span class="order-badge badge-done">${o.status}</span>
                        <span class="order-id">#${id}</span>
                    </div>
                    <div class="order-body">
                        <div class="order-car">${svcEmoji} ${car}</div>
                        <div class="order-meta"><span class="meta-item"><i class="fas fa-user"></i>${name}</span></div>
                    </div>
                </div>`;
        }).join('');
    }

    async function update(id, act) {
        if(!confirm('تأكيد إجراء هذه العملية؟')) return;
        try {
            const res = await fetch(`${scriptURL}?action=${act}&id=${id}&office=${encodeURIComponent(officeData.name)}`, {method:'GET',redirect:'follow'});
            const result = await res.json();
            if(result.success) { stopAlert(); fetchOrders(); }
            else alert('فشل: ' + (result.message||'خطأ'));
        } catch(e) { alert('خطأ في الاتصال'); }
    }

    function switchTab(t) {
        currentTab=t;
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('active');
        renderCards();
    }

    function logout() { localStorage.clear(); window.location.href='login.html'; }

    setInterval(fetchOrders, 20000);
    fetchOrders();
    window.onclick = () => { document.getElementById('radarSound').load(); };
</script>
</body>
</html>
