<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>منصة الحوت | أرخص تأجير سيارات وأفضل تدريب قيادة في العراق</title>
    <meta name="description" content="منصة الحوت: الخيار الأول لـ تأجير سيارات في بغداد، كركوك، أربيل، وكافة مدن العراق. أرخص الأسعار، أفضل تدريب قيادة للنساء، وأحدث سيارات الأعراس.">
    <meta name="keywords" content="سيارات للايجار، سياقة العراق، أرخص مكتب سياقة، أفضل تأجير سيارات، بغداد، كركوك، أربيل، البصرة، الموصل، السليمانية، الأنبار، ديالى">
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "كيف أجد أرخص مكتب تأجير سيارات في بغداد وكركوك؟",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "منصة الحوت تقارن الأسعار في بغداد وكركوك وأربيل لتعطيك أرخص سعر للإيجار اليومي والشهري."
          }
        },
        {
          "@type": "Question",
          "name": "هل يتوفر تدريب قيادة للنساء في البصرة والموصل؟",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "نعم، توفر منصة الحوت أفضل المدربات المحترفات لتعليم السياقة للنساء في البصرة، الموصل، وكافة محافظات العراق."
          }
        }
      ]
    }
    </script>

    <link rel="icon" type="image/png" href="Cars/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; transition: 0.5s; overflow-x: hidden; }
        .hero-bg { background: linear-gradient(135deg, #002349 0%, #004d99 100%); position: relative; padding: 6rem 0 18rem 0; overflow: hidden; }
        .map-pattern {
            position: absolute; inset: 0; opacity: 0.15; pointer-events: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><text y="40" x="10" font-size="20">📍</text><text y="80" x="50" font-size="18">🗺️</text></svg>');
            background-repeat: repeat; animation: bgMove 40s linear infinite;
        }
        @keyframes bgMove { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }
        #cityOverlay { transition: background-color 1s ease-in-out; }
        .glass-box { background: white; box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.2); transform: translateY(-150px); border-radius: 2.5rem; position: relative; z-index: 30; border: 1px solid #e2e8f0; }
        .smart-input { width: 100%; padding: 1.1rem 1rem; background: #f1f5f9; border: 2px solid transparent; border-radius: 1.2rem; font-weight: 700; outline: none; transition: 0.3s; color: #002349; font-size: 0.9rem; }
        .smart-input:focus { border-color: #D4AF37; background: #fff; }
        .lang-btn { background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 12px; color: white; font-weight: 900; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; font-size: 0.85rem; }
        .lang-active { background: #D4AF37 !important; color: #002349 !important; border-color: #D4AF37; }
        .hidden-field { display: none; }
        [dir="rtl"] .text-start-custom { text-align: right; }
        [dir="ltr"] .text-start-custom { text-align: left; }
        .whale-float { animation: floating 4s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-15px) rotate(5deg); } }
    </style>
</head>
<body>

    <div class="fixed top-6 left-0 right-0 z-[100] flex justify-center gap-2 px-4">
        <button onclick="changeLang('ar')" id="btn-ar" class="lang-btn">العربية</button>
        <button onclick="changeLang('ku')" id="btn-ku" class="lang-btn">کوردی</button>
        <button onclick="changeLang('tr')" id="btn-tr" class="lang-btn">Türkçe</button>
        <button onclick="changeLang('en')" id="btn-en" class="lang-btn">English</button>
    </div>

    <header class="hero-bg text-white">
        <div id="cityOverlay" class="absolute inset-0 opacity-50"></div>
        <div class="map-pattern"></div>
        <div class="container mx-auto px-6 relative z-10 flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="text-start-custom w-full">
                <h1 class="text-4xl md:text-6xl font-black mb-4 leading-tight" id="brandName"></h1>
                <p id="dynamicGreeting" class="text-xl md:text-2xl font-bold opacity-90 mb-2 h-8"></p>
                <p id="subGreeting" class="text-lg font-bold text-[#D4AF37]"></p>
            </div>
            <div class="text-center whale-float">
                <div class="text-8xl drop-shadow-2xl">🐋</div>
                <div class="text-3xl font-black mt-2" id="whaleTitle">الحوت</div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 relative z-20">
        <div class="glass-box p-6 md:p-8 max-w-7xl mx-auto">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-4 items-end">
                <div class="md:col-span-2">
                    <label class="block text-[10px] font-black text-slate-500 mb-2 uppercase" id="labelCity"></label>
                    <select id="citySelect" onchange="adaptToCity()" class="smart-input"></select>
                </div>
                <div class="md:col-span-3">
                    <label class="block text-[10px] font-black text-slate-500 mb-2 uppercase" id="labelService"></label>
                    <select id="mainService" onchange="checkService()" class="smart-input"></select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-[10px] font-black text-slate-500 mb-2 uppercase" id="labelDate"></label>
                    <input type="date" id="dateInput" class="smart-input">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-[10px] font-black text-slate-500 mb-2 uppercase" id="labelTime"></label>
                    <input type="time" id="timeInput" class="smart-input">
                </div>
                <div id="daysWrapper" class="md:col-span-1 hidden-field">
                    <label class="block text-[10px] font-black text-slate-500 mb-2 uppercase" id="labelDays"></label>
                    <input type="number" id="daysInput" class="smart-input" value="1" min="1">
                </div>
                <div class="md:col-span-2">
                    <button onclick="startBooking()" class="w-full bg-[#002349] text-white py-4 rounded-xl font-black text-lg hover:bg-[#D4AF37] hover:text-[#002349] transition-all flex items-center justify-center gap-2 shadow-lg">
                        <span id="btnText"></span> <i class="fas fa-arrow-left transition-transform" id="btnIcon"></i>
                    </button>
                </div>
            </div>
        </div>

        <section class="max-w-5xl mx-auto -mt-10 pb-20 text-start-custom">
            <h2 class="text-3xl font-black text-[#002349] mb-8 border-b-4 border-[#D4AF37] w-fit" id="faqTitle"></h2>
            <div id="faqContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </section>
    </main>

    <script>
        const citiesList = ['كركوك', 'بغداد', 'أربيل', 'السليمانية', 'الموصل', 'البصرة', 'الأنبار', 'ديالى'];
        const translations = {
            ar: {
                dir: 'rtl', whale: 'الحوت', brand: 'أرخص تأجير سيارات<br>وأفضل تدريب قيادة', subGreet: 'أحسن منصة خدمات في العراق لعام 2026',
                labelCity: 'المدينة', labelService: 'الخدمة', labelDate: 'التاريخ', labelTime: 'الساعة', labelDays: 'الأيام', btnText: 'استمر',
                faqTitle: 'الأسئلة الشائعة (دليل خدماتنا)',
                faqs: [
                    {q: 'كيف أجد أرخص مكتب تأجير سيارات في بغداد وكركوك؟', a: 'منصة الحوت تقارن الأسعار في بغداد وكركوك وأربيل لتعطيك أرخص سعر للإيجار اليومي والشهري.'},
                    {q: 'هل يتوفر تدريب قيادة للنساء في البصرة والموصل؟', a: 'نعم، نوفر أفضل المدربات لتعليم السياقة للنساء في البصرة، الموصل، وكافة المحافظات.'},
                    {q: 'أين أجد أقرب مكتب سياقة في الأنبار وديالى؟', a: 'بمجرد اختيار مدينتك، يظهر لك موقع الحوت أقرب المكاتب المعتمدة في الأنبار وديالى.'},
                    {q: 'ما هي أسعار تأجير سيارات الأعراس في السليمانية؟', a: 'نحن نوفر أفخم سيارات الزفة في السليمانية وبأفضل الأسعار التنافسية.'}
                ],
                services: { placeholder: '-- اختر الخدمة --', personal: '🚗 تأجير سيارات (الأرخص)', wedding: '🎁 سيارات أعراس (الأفخم)', training: '🎓 تعليم سياقة (الأفضل)' },
                cityNames: { 'كركوك': 'كركوك 💎', 'بغداد': 'بغداد 🏰', 'أربيل': 'أربيل 🏔️', 'السليمانية': 'السليمانية 🌲', 'الموصل': 'الموصل 🏹', 'البصرة': 'البصرة ⚓', 'الأنبار': 'الأنبار 🌴', 'ديالى': 'ديالى 🍊' }
            },
            ku: {
                dir: 'rtl', whale: 'ئەلحووت', brand: 'هەرزانترین بەکرێگرتن<br>باشترین فێربوونی شۆفێری', subGreet: 'هەڵبژاردەی یەکەم لە هەموو عێراق',
                labelCity: 'شار', labelService: 'خزمەتگوزاری', labelDate: 'بەروار', labelTime: 'کاتژمێر', labelDays: 'ڕۆژەکان', btnText: 'بەردەوام بە',
                faqTitle: 'پسیارە باوەکان',
                faqs: [
                    {q: 'هەرزانترین کرێی سەیارە لە کوێیە؟', a: 'ئەلحووت هەرزانترین نرخ لە بەغداد، کەرکوک و هەولێر دابین دەکات.'},
                    {q: 'فێربوونی شۆفێری بۆ ئافرەتان هەیە؟', a: 'بەڵێ، باشترین ڕاهێنەری شارەزامان هەیە لە هەموو پارێزگاکان.'}
                ],
                services: { placeholder: '-- خزمەتگوزاری --', personal: '🚗 بەکرێگرتنی سەیارە', wedding: '🎁 سەیارەی زەماوەند', training: '🎓 فێربوونی شۆفێری' },
                cityNames: { 'كركوك': 'کەرکوک 💎', 'بغداد': 'بەغداد 🏰', 'أربيل': 'هەولێر 🏔️', 'السليمانية': 'سلێمانی 🌲', 'الموصل': 'مووسڵ 🏹', 'البصرة': 'بەسرە ⚓', 'الأنبار': 'ئەنبار 🌴', 'ديالى': 'دیالە 🍊' }
            },
            tr: {
                dir: 'ltr', whale: 'AL-HUT', brand: 'En Ucuz Araç Kiralama<br>En İyi Ehliyet Kursu', subGreet: 'Irak\'ın 1 Numaralı Platformu',
                labelCity: 'Şehir', labelService: 'Hizmet', labelDate: 'Tarih', labelTime: 'Saat', labelDays: 'Gün', btnText: 'Devam Et',
                faqTitle: 'Sıkça Sorulan Sorular',
                faqs: [
                    {q: 'En ucuz araç nerede bulunur?', a: 'Al-Hut, Bağdat ve Kerkük\'te en uygun fiyatlı araç kiralama hizmetini sunar.'},
                    {q: 'Bayanlar için ehliyet kursu var mı?', a: 'Evet, Erbil ve Musul dahil tüm şehirlerde profesyonel bayan eğitmenlerimiz mevcuttur.'}
                ],
                services: { placeholder: '-- Seçiniz --', personal: '🚗 Araç Kiralama', wedding: '🎁 Düğün Arabası', training: '🎓 Ehliyet Kursu' },
                cityNames: { 'كركوك': 'Kerkük 💎', 'بغداد': 'Bağdat 🏰', 'أربيل': 'Erbil 🏔️', 'السليمانية': 'Süleymaniye 🌲', 'الموصل': 'Musul 🏹', 'البصرة': 'Basra ⚓', 'الأنبار': 'Anbar 🌴', 'ديالى': 'Diyala 🍊' }
            },
            en: {
                dir: 'ltr', whale: 'AL-HUT', brand: 'Cheapest Car Rental<br>& Best Driving School', subGreet: 'The Best Choice in Iraq 2026',
                labelCity: 'City', labelService: 'Service', labelDate: 'Date', labelTime: 'Time', labelDays: 'Days', btnText: 'Continue',
                faqTitle: 'General FAQ',
                faqs: [
                    {q: 'Where to find the cheapest car rental in Iraq?', a: 'Al-Hut compares prices in Baghdad, Kirkuk, and Erbil to give you the best deals.'},
                    {q: 'Is there driving training for ladies?', a: 'Yes, we provide professional female instructors in Basra, Mosul, and all provinces.'}
                ],
                services: { placeholder: '-- Select --', personal: '🚗 Car Rental', wedding: '🎁 Wedding Cars', training: '🎓 Driving School' },
                cityNames: { 'كركوك': 'Kirkuk 💎', 'بغداد': 'Baghdad 🏰', 'أربيل': 'Erbil 🏔️', 'السليمانية': 'Sulaymaniyah 🌲', 'الموصل': 'Mosul 🏹', 'البصرة': 'Basra ⚓', 'الأنبار': 'Anbar 🌴', 'ديالى': 'Diyala 🍊' }
            }
        };

        function changeLang(lang) {
            const l = translations[lang];
            document.getElementById('htmlTag').dir = l.dir;
            document.getElementById('htmlTag').lang = lang;
            document.body.style.fontFamily = (lang === 'en' || lang === 'tr') ? 'Poppins' : 'Tajawal';
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('lang-active'));
            document.getElementById('btn-' + lang).classList.add('lang-active');

            document.getElementById('brandName').innerHTML = l.brand;
            document.getElementById('whaleTitle').innerText = l.whale;
            document.getElementById('subGreeting').innerText = l.subGreet;
            document.getElementById('labelCity').innerText = l.labelCity;
            document.getElementById('labelService').innerText = l.labelService;
            document.getElementById('labelDate').innerText = l.labelDate;
            document.getElementById('labelTime').innerText = l.labelTime;
            document.getElementById('labelDays').innerText = l.labelDays;
            document.getElementById('btnText').innerText = l.btnText;
            document.getElementById('faqTitle').innerText = l.faqTitle;
            document.getElementById('btnIcon').style.transform = l.dir === 'rtl' ? 'rotate(0deg)' : 'rotate(180deg)';

            const citySelect = document.getElementById('citySelect');
            const currentC = citySelect.value || 'كركوك';
            citySelect.innerHTML = citiesList.map(c => `<option value="${c}" ${c===currentC?'selected':''}>${l.cityNames[c]}</option>`).join('');

            const svc = document.getElementById('mainService');
            svc.innerHTML = `<option value="">${l.services.placeholder}</option><option value="personal">${l.services.personal}</option><option value="wedding">${l.services.wedding}</option><option value="training">${l.services.training}</option>`;

            document.getElementById('faqContainer').innerHTML = l.faqs.map(f => `
                <div class="bg-white p-6 rounded-2xl shadow-sm border-${l.dir==='rtl'?'r':'l'}-4 border-[#D4AF37]">
                    <h3 class="font-black text-lg text-[#002349] mb-2">${f.q}</h3>
                    <p class="text-slate-600">${f.a}</p>
                </div>`).join('');
            adaptToCity();
        }

        function adaptToCity() {
            const city = document.getElementById('citySelect').value;
            const colors = { 'كركوك': '#0d9488', 'بغداد': '#1e3a8a', 'أربيل': '#15803d', 'السليمانية': '#7e22ce', 'الموصل': '#374151', 'البصرة': '#0369a1', 'الأنبار': '#b45309', 'ديالى': '#65a30d' };
            document.getElementById('cityOverlay').style.backgroundColor = colors[city] || '#002349';
            const greetings = { ar: 'أهلاً بك في', ku: 'بەخێربێیت بۆ', tr: 'Hoş geldiniz', en: 'Welcome to' };
            const lang = document.getElementById('htmlTag').lang;
            const l = translations[lang] || translations['ar'];
            const greetEl = document.getElementById('dynamicGreeting');
            greetEl.style.opacity = 0;
            setTimeout(() => {
                greetEl.innerText = `${greetings[lang]} ${l.cityNames[city].split(' ')[0]}`;
                greetEl.style.opacity = 1;
            }, 200);
        }

        function checkService() {
            const svc = document.getElementById('mainService').value;
            const wrap = document.getElementById('daysWrapper');
            svc === 'personal' ? wrap.classList.remove('hidden-field') : wrap.classList.add('hidden-field');
        }

        function startBooking() {
            const svc = document.getElementById('mainService').value;
            const city = document.getElementById('citySelect').value;
            const date = document.getElementById('dateInput').value;
            const time = document.getElementById('timeInput').value;
            const days = document.getElementById('daysInput').value || "1";
            const lang = document.getElementById('htmlTag').lang;

            if(!svc || !date || !time) {
                return alert(lang === 'ar' ? "يرجى ملء جميع الحقول 🐋" : "Please fill all fields");
            }

            // تم تعديل التوجيه هنا حصراً بناءً على طلبك
            if (svc === 'training') {
                window.location.href = `addons.html?type=${svc}&city=${encodeURIComponent(city)}&date=${date}&time=${time}&lang=${lang}`;
            } else {
                window.location.href = `fleet.html?type=${svc}&city=${encodeURIComponent(city)}&date=${date}&time=${time}&days=${days}&lang=${lang}`;
            }
        }

        window.onload = () => {
            const now = new Date();
            document.getElementById('dateInput').value = now.toISOString().split('T')[0];
            document.getElementById('timeInput').value = now.toTimeString().slice(0,5);
            changeLang('ar');
        };
    </script>
</body>
</html>
