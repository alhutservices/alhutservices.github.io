<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة الشركاء | رادار الحوت 🐋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --whale-navy: #0f172a; --whale-gold: #d4af37; }
        body { font-family: 'Tajawal', sans-serif; background: #f8fafc; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .login-card { background: white; border-radius: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; }
        .whale-input { width: 100%; padding: 1.2rem 3.5rem 1.2rem 1.2rem; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 1.2rem; transition: 0.4s; }
        .whale-input:focus { border-color: var(--whale-navy); background: white; outline: none; box-shadow: 0 10px 20px rgba(15, 23, 42, 0.05); }
        .login-btn { background: var(--whale-navy); color: white; font-weight: 900; border-radius: 1.2rem; transition: 0.3s; }
        .login-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(15, 23, 42, 0.2); }
    </style>
</head>
<body>
    <div class="max-w-md w-full login-card p-10 mx-4">
        <div class="text-center mb-10">
            <div class="w-20 h-20 bg-slate-900 flex items-center justify-center rounded-3xl shadow-xl mx-auto mb-6"><span class="text-4xl">🐋</span></div>
            <h2 class="text-2xl font-black text-slate-900">رادار الحوت</h2>
            <p class="text-slate-400 text-[10px] font-bold mt-2 tracking-widest uppercase">PARTNER GATEWAY</p>
        </div>
        
        <div class="space-y-4">
            <div class="relative">
                <i class="fas fa-building absolute right-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input id="officeName" type="text" placeholder="اسم المكتب" class="whale-input font-bold">
            </div>
            <div class="relative">
                <i class="fas fa-map-marker-alt absolute right-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <select id="citySelect" class="whale-input font-bold appearance-none cursor-pointer">
                    <option value="" disabled selected>اختر المدينة</option>
                    <option value="كركوك">كركوك</option>
                    <option value="بغداد">بغداد</option>
                    <option value="أربيل">أربيل</option>
                    <option value="السليمانية">السليمانية</option>
                </select>
            </div>
            <div class="relative">
                <i class="fas fa-key absolute right-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input id="idNumber" type="password" placeholder="كود المرور" class="whale-input font-black text-center tracking-[0.3em]">
            </div>
            <button onclick="registerOffice()" id="loginBtn" class="w-full py-5 login-btn mt-6 flex items-center justify-center gap-3">
                <span>تفعيل الرادار</span>
                <i class="fas fa-rocket text-xs"></i>
            </button>
        </div>
    </div>

    <script>
        // الرابط الجديد الذي أرسلته أنت
        const scriptURL = "https://script.google.com/macros/s/AKfycbznxCVbF350cer5qcXlIROrNmmnf5993r9-AoLbNKqb8YfVNhhT3rREefD7dbK6RFIH/exec";

        async function registerOffice() {
            const btn = document.getElementById('loginBtn');
            const data = {
                name: document.getElementById('officeName').value.trim(),
                city: document.getElementById('citySelect').value,
                id: document.getElementById('idNumber').value.trim()
            };

            if(!data.name || !data.id || !data.city) return alert("يرجى إكمال البيانات");
            
            btn.disabled = true; 
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> جاري التحقق...`;

            try {
                const query = `?action=checkOfficeStatus&id=${data.id}&name=${encodeURIComponent(data.name)}&city=${encodeURIComponent(data.city)}`;
                const res = await fetch(scriptURL + query);
                const result = await res.json();

                if (result.status === "نشط") {
                    localStorage.setItem('whale_office_data', JSON.stringify(data));
                    window.location.href = 'dashboard.html';
                } else {
                    alert("⏳ الحساب قيد المراجعة أو غير مفعل.");
                }
            } catch (e) {
                alert("❌ فشل الاتصال بخادم الحوت.");
            } finally {
                btn.disabled = false; btn.innerText = "تفعيل الرادار";
            }
        }
    </script>
</body>
</html>
