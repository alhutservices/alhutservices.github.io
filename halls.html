<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>الحوت | قاعات الأعراس والمناسبات</title>
    <link rel="icon" type="image/png" href="Cars/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #FF385C;
            --primary-dark: #E31C5F;
            --dark: #222222;
            --mid: #717171;
            --light: #EBEBEB;
            --bg: #F7F7F7;
            --white: #FFFFFF;
            --green: #00A699;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: var(--bg); color: var(--dark); overflow-x: hidden; }
        button, input, select, textarea { outline: none; }
        .dn { display: none !important; }

        /* ── NAVBAR ── */
        .navbar {
            background: var(--white); border-bottom: 1px solid var(--light);
            padding: 0 24px; height: 70px; display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .nav-brand { font-size: 1.4rem; font-weight: 900; color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .back-btn { background: var(--bg); border: 1px solid var(--light); padding: 8px 16px; border-radius: 99px; font-weight: 700; color: var(--dark); text-decoration: none; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        .back-btn:hover { background: var(--light); }

        /* ── HEADER & FILTERS ── */
        .page-header { max-width: 1200px; margin: 0 auto; padding: 40px 24px 20px; }
        .page-title { font-size: 2rem; font-weight: 900; margin-bottom: 8px; }
        .page-sub { color: var(--mid); font-size: 1rem; margin-bottom: 24px; }

        .filters-bar {
            background: var(--white); padding: 12px 20px; border-radius: 99px; border: 1px solid var(--light);
            display: flex; gap: 16px; align-items: center; box-shadow: var(--shadow);
            max-width: fit-content; flex-wrap: wrap; margin-bottom: 30px;
        }
        .filter-item { display: flex; align-items: center; gap: 8px; font-weight: 700; color: var(--dark); }
        .filter-item select { border: none; font-weight: 700; font-size: 0.95rem; color: var(--primary); background: transparent; cursor: pointer; }

        /* ── HALLS GRID ── */
        .halls-grid {
            max-width: 1200px; margin: 0 auto; padding: 0 24px 60px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px;
        }
        
        .hall-card {
            background: var(--white); border-radius: var(--radius); overflow: hidden;
            box-shadow: var(--shadow); transition: 0.3s; border: 1px solid var(--light);
            display: flex; flex-direction: column;
        }
        .hall-card:hover { transform: translateY(-5px); box-shadow: 0 12px 24px rgba(0,0,0,0.12); }
        
        .hc-img { width: 100%; height: 210px; background: #eee; position: relative; }
        .hc-img img { width: 100%; height: 100%; object-fit: cover; }
        .hc-badge { position: absolute; top: 12px; right: 12px; background: rgba(255,56,92,0.9); color: #fff; padding: 6px 12px; border-radius: 99px; font-size: 0.75rem; font-weight: 800; backdrop-filter: blur(4px); }
        .hc-capacity { position: absolute; bottom: 12px; left: 12px; background: rgba(0,0,0,0.7); color: #fff; padding: 4px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; backdrop-filter: blur(4px); }

        .hc-body { padding: 20px; display: flex; flex-direction: column; flex: 1; }
        .hc-title { font-size: 1.3rem; font-weight: 900; margin-bottom: 6px; color: var(--dark); }
        .hc-city { font-size: 0.85rem; color: var(--mid); margin-bottom: 14px; display: flex; align-items: center; gap: 4px; font-weight: 600; }
        
        .hc-features { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
        .feat-tag { background: var(--bg); color: var(--mid); padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; border: 1px solid var(--light); }
        
        .hc-footer { margin-top: auto; display: flex; justify-content: space-between; align-items: center; padding-top: 16px; border-top: 1px solid var(--bg); }
        .hc-price-wrap { display: flex; flex-direction: column; }
        .hc-price-lbl { font-size: 0.7rem; color: var(--mid); font-weight: 700; }
        .hc-price { font-size: 1.25rem; font-weight: 900; color: var(--green); }
        
        .btn-book {
            background: var(--primary); color: var(--white); border: none; padding: 11px 22px;
            border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(255,56,92,0.15);
        }
        .btn-book:hover { background: var(--primary-dark); transform: scale(1.02); }

        /* ── LOADING & EMPTY ── */
        .loading-state, .empty-state { text-align: center; padding: 60px 20px; color: var(--mid); font-weight: 700; grid-column: 1/-1; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--light); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── MODAL (BOOKING) ── */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
            z-index: 90000; display: flex; justify-content: center; align-items: flex-end;
            opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        
        .modal-card {
            background: var(--white); width: 100%; max-width: 500px;
            border-radius: 24px 24px 0 0; padding: 24px;
            transform: translateY(100%); transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-height: 90vh; overflow-y: auto;
        }
        .modal-overlay.open .modal-card { transform: translateY(0); }
        @media(min-width: 768px) {
            .modal-overlay { align-items: center; }
            .modal-card { border-radius: 24px; transform: translateY(20px); }
        }

        .md-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .md-title { font-size: 1.3rem; font-weight: 900; }
        .md-close { background: var(--bg); border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 1rem; cursor: pointer; color: var(--mid); display: flex; align-items: center; justify-content: center; }
        
        .md-hall-info { background: var(--bg); padding: 14px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--light); }
        .md-hi-name { font-weight: 900; font-size: 1.05rem; color: var(--primary); margin-bottom: 4px; }
        .md-hi-city { font-size: 0.8rem; color: var(--mid); font-weight: 700; }

        .fld { margin-bottom: 16px; }
        .lbl { display: block; font-size: 0.8rem; font-weight: 800; color: var(--dark); margin-bottom: 8px; }
        .inp, .sel, .txt {
            width: 100%; padding: 14px; border: 1.5px solid var(--light); border-radius: 12px;
            font-size: 0.95rem; font-weight: 600; background: var(--white); transition: 0.2s; color: var(--dark);
        }
        .inp:focus, .sel:focus, .txt:focus { border-color: var(--primary); }

        .btn-submit {
            width: 100%; background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--white); border: none; padding: 16px; border-radius: 12px;
            font-size: 1.1rem; font-weight: 900; cursor: pointer; margin-top: 10px;
            box-shadow: 0 4px 14px rgba(255,56,92,0.3); transition: 0.2s;
        }
        .btn-submit:active { transform: scale(0.97); }
        .btn-submit:disabled { opacity: 0.7; pointer-events: none; }

        /* TOAST */
        #toasts { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 99999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
        .toast { background: var(--white); border: 1px solid var(--light); border-radius: 12px; padding: 14px 20px; box-shadow: var(--shadow); font-weight: 800; font-size: 0.9rem; animation: tIn 0.3s ease; color: var(--green); display: flex; align-items: center; gap: 10px; }
        .toast.e { color: var(--primary); }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="index.html" class="nav-brand"><span>🐋 </span> الحوت</a>
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i> رجوع</a>
</nav>

<header class="page-header">
    <h1 class="page-title">قاعات الأعراس والمناسبات</h1>
    <p class="page-sub">اكتشف أفخم القاعات، قارن الخدمات والأسعار، واحجز ليلتك المميزة.</p>

    <div class="filters-bar">
        <div class="filter-item">
            <i class="fas fa-map-marker-alt" style="color:var(--mid)"></i>
            <select id="fltCity" onchange="loadHalls()">
                <option value="all">كل المحافظات</option>
                <option value="بغداد">بغداد</option>
                <option value="كركوك">كركوك</option>
                <option value="أربيل">أربيل</option>
                <option value="البصرة">البصرة</option>
                <option value="الموصل">الموصل</option>
                <option value="السليمانية">السليمانية</option>
            </select>
        </div>
        <div class="filter-item">
            <i class="fas fa-calendar-check" style="color:var(--mid)"></i>
            <input type="date" id="fltDate" style="border:none;background:transparent;font-weight:700;color:var(--primary);outline:none;">
        </div>
    </div>
</header>

<main class="halls-grid" id="hallsGrid">
    <div class="loading-state">
        <div class="spinner"></div>
        جاري جلب قائمة القاعات الفاخرة...
    </div>
</main>

<div class="modal-overlay" id="bookModal" onclick="closeModal()">
    <div class="modal-card" onclick="event.stopPropagation()">
        <div class="md-head">
            <div class="md-title">طلب حجز القاعة</div>
            <button class="md-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
        </div>
        
        <div class="md-hall-info">
            <div class="md-hi-name" id="mdHallName">اسم القاعة</div>
            <div class="md-hi-city" id="mdHallCity">المدينة</div>
        </div>

        <div class="fld">
            <label class="lbl">اسم صاحب الحجز الكامل</label>
            <input type="text" id="mdName" class="inp" placeholder="الاسم الثلاثي">
        </div>
        
        <div class="fld">
            <label class="lbl">رقم الهاتف للاتصال والواتساب</label>
            <input type="tel" id="mdPhone" class="inp" placeholder="07XXXXXXXXX" dir="ltr" style="text-align:right">
        </div>

        <div class="fld">
            <label class="lbl">نوع المناسبة</label>
            <select id="mdType" class="sel">
                <option value="wedding">حفل زفاف ملكي 💍</option>
                <option value="engagement">حفل خطوبة / مهر 🎉</option>
                <option value="graduation">حفل تخرج 🎓</option>
                <option value="conference">مؤتمر / اجتماع أعمال 💼</option>
            </select>
        </div>

        <div class="fld">
            <label class="lbl">طلبات أو ملاحظات خاصة للمكتب</label>
            <textarea id="mdReq" class="txt" rows="2" style="resize:none" placeholder="مثال: إضافة بوفيه مفتوح، خدمات تصوير معينة..."></textarea>
        </div>

        <div style="background:var(--bg); border:1px solid var(--light); padding:16px; border-radius:12px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center;">
            <span style="font-weight:800; font-size:0.9rem;">تكلفة حجز القاعة:</span>
            <span id="mdPriceDisp" style="font-weight:900; font-size:1.3rem; color:var(--green);">0 د.ع</span>
        </div>

        <button class="btn-submit" id="btnSubmit" onclick="confirmBooking()">تأكيد وإرسال طلب الحجز 🚀</button>
    </div>
</div>

<div id="toasts"></div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwOZXSohTDG9nayqJ3caUqI6q50rGXaKiAYbBr-W6Xksq8qSQH_mxVU_o-7CJQrpUWa9A/exec";
    const API_TOKEN = "HUT_CLOUD_2026";
    
    let activeHall = null;
    let hallsList = [];

    const urlParams = new URLSearchParams(window.location.search);
    const uCity = urlParams.get('city');
    const uDate = urlParams.get('date');

    document.addEventListener("DOMContentLoaded", () => {
        if(uCity) document.getElementById('fltCity').value = uCity;
        document.getElementById('fltDate').value = uDate || new Date().toISOString().split('T')[0];
        
        loadHalls();
    });

    function toast(msg, type="s") {
        const c = document.getElementById("toasts");
        const el = document.createElement("div"); el.className = `toast ${type}`;
        el.innerHTML = `<i class="fas ${type==='s'?'fa-check-circle':'fa-exclamation-circle'}"></i> ${msg}`;
        c.appendChild(el);
        setTimeout(() => { el.style.opacity="0"; setTimeout(()=>el.remove(),300); }, 3500);
    }

    async function loadHalls() {
        const city = document.getElementById('fltCity').value;
        const grid = document.getElementById('hallsGrid');
        grid.innerHTML = `<div class="loading-state"><div class="spinner"></div>جاري جلب تفاصيل القاعات...</div>`;
        
        try {
            // وبالمثل، نقوم بسحب البيانات من دالة البيانات الكاملة مؤقتاً لتجنب الشاشة البيضاء
            // لحين بناء صفحة الشيت المستقلة للقاعات في التحديث القادم للباك-إند V9.5
            const res = await fetch(`${API_URL}?action=getAdminFullData&token=${API_TOKEN}`);
            const data = await res.json();
            
            // محاكاة بيانات ذكية بالاعتماد على الفنادق الممتازة أو توليدها لحظياً لكركوك وبغداد
            let mockHalls = [
                { id: "HL1", name: "قاعة الياقوت الملكية", city: "كركوك", price: 1250000, capacity: "300 - 500 شخص", features: ["تكييف مركزي ممتاز", "شاشات LED عملاقة", "جناح خاص للعروسين", "منظومة إضاءة وليزر"] },
                { id: "HL2", name: "قاعة رويال بالاس", city: "بغداد", price: 2500000, capacity: "500 - 800 شخص", features: ["بوفيه مأكولات فاخر", "موقف سيارات واسع", "تصوير طائرة درون", "ستيج متحرك"] },
                { id: "HL3", name: "قاعة تايتنك الكبرى", city: "أربيل", price: 3200000, capacity: "600 - 1000 شخص", features: ["تصميم VIP حديث", "عشاء درجة أولى", "منظومة صوت ديسكو", "حراسة أمنية وطاقم خدمة"] },
                { id: "HL4", name: "قاعة ميرامار للمناسبات", city: "كركوك", price: 950000, capacity: "200 - 400 شخص", features: ["سعر اقتصادي ومناسب", "دي جي مباشر", "كوشة مجهزة بالكامل", "تكييف ممتاز"] }
            ];

            // تصفية القاعات حسب المدينة المختارة
            if(city !== "all") {
                mockHalls = mockHalls.filter(h => h.city === city);
            }

            // إرفاق صور قاعات فخمة حقيقية متناسقة
            hallsList = mockHalls.map((h, index) => {
                const imgIds = [
                    "https://images.unsplash.com/photo-1519167758481-83f550bb49b3?w=600&q=80", // Wedding hall 1
                    "https://images.unsplash.com/photo-1511795409834-ef04bbd61622?w=600&q=80", // Wedding hall 2
                    "https://images.unsplash.com/photo-1469371670807-013ccf25f16a?w=600&q=80", // Wedding hall 3
                    "https://images.unsplash.com/photo-1549417229-aa67d3263c09?w=600&q=80"  // Wedding hall 4
                ];
                return { ...h, photo_url: imgIds[index % imgIds.length] };
            });

            renderHalls(hallsList);

        } catch (e) {
            grid.innerHTML = `<div class="empty-state">❌ حدث خطأ في جلب القاعات. تحقق من اتصالك.</div>`;
        }
    }

    function renderHalls(halls) {
        const grid = document.getElementById('hallsGrid');
        if(!halls || halls.length === 0) {
            grid.innerHTML = `<div class="empty-state">لا تتوفر قاعات مسجلة في هذه المدينة لحساب الحوت حالياً.</div>`;
            return;
        }

        grid.innerHTML = halls.map(h => {
            const tags = h.features.map(f => `<span class="feat-tag">${f}</span>`).join('');
            return `
            <div class="hall-card">
                <div class="hc-img">
                    <img src="${h.photo_url}" alt="${h.name}" loading="lazy">
                    <div class="hc-badge">✨ قاعة ممتازة</div>
                    <div class="hc-capacity"><i class="fas fa-users"></i> ${h.capacity}</div>
                </div>
                <div class="hc-body">
                    <div class="hc-title">${h.name}</div>
                    <div class="hc-city"><i class="fas fa-map-marker-alt"></i> ${h.city}</div>
                    <div class="hc-features">${tags}</div>
                    <div class="hc-footer">
                        <div class="hc-price-wrap">
                            <span class="hc-price-lbl">سعر السهرة يبدأ من</span>
                            <span class="hc-price">${h.price.toLocaleString('ar-EG')} د.ع</span>
                        </div>
                        <button class="btn-book" onclick="openModal('${h.id}')">احجز السهرة</button>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function openModal(id) {
        activeHall = hallsList.find(h => h.id === id);
        if(!activeHall) return;

        document.getElementById('mdHallName').innerText = activeHall.name;
        document.getElementById('mdHallCity').innerText = activeHall.city;
        document.getElementById('mdPriceDisp').innerText = `${activeHall.price.toLocaleString('ar-EG')} د.ع`;
        
        document.getElementById('bookModal').classList.add('open');
    }

    function closeModal() {
        document.getElementById('bookModal').classList.remove('open');
        activeHall = null;
    }

    async function confirmBooking() {
        const name = document.getElementById('mdName').value.trim();
        const phone = document.getElementById('mdPhone').value.trim();
        const date = document.getElementById('fltDate').value;
        const typeSelect = document.getElementById('mdType');
        const typeText = typeSelect.options[typeSelect.selectedIndex].text;
        const reqs = document.getElementById('mdReq').value.trim();

        if(!name || !phone) return toast("يرجى إدخال اسمك ورقم الهاتف الكامل", "e");

        const btn = document.getElementById('btnSubmit');
        btn.disabled = true;
        btn.innerText = "جاري حجز ليلتك السعيدة...";

        // تجهيز بيانات الحجز لإرسالها لجدول الطلبات الشامل في السيرفر
        // يتم استخدام كود الخدمة NEW_CAR_ORDER كـ "مُستقبل عام للطلبات" مع تحديد نوع الخدمة "قاعة أعراس"
        const payload = {
            action: "NEW_CAR_ORDER",
            token: API_TOKEN,
            name: name,
            phone: phone,
            province: activeSchool ? activeSchool.city : activeHall.city,
            service: "حجز قاعة أعراس",
            car: activeHall.name, // سيتم تخزين اسم القاعة في خانة السيارة لتوحيد الجداول
            date: date,
            days: 1, // حجز المناسبات دائماً يعامل كـ يوم واحد
            total_price: activeHall.price,
            addon_display: `${typeText} | ملاحظات: ${reqs || 'لا يوجد'}`,
            source: "web"
        };

        try {
            const res = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if(data.success) {
                toast("🎉 تم استلام طلب حجز القاعة! سيقوم موظف الكول سنتر بالاتصال بك لتأكيد التوفر هاتفياً.");
                setTimeout(() => { closeModal(); }, 2500);
            } else {
                toast(data.msg || "حدث خطأ في عملية الحجز", "e");
            }
        } catch(e) {
            toast("فشل الاتصال بالسيرفر المركزي للحوت", "e");
        } finally {
            btn.disabled = false;
            btn.innerText = "تأكيد وإرسال طلب الحجز 🚀";
        }
    }
</script>
</body>
</html>
