<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#FF385C">
<meta name="description" content="أسطول سيارات الحوت - اختر سيارتك المفضلة">
<title>أسطول الحوت | اختر سيارتك</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">

<style>
/* ════════════════════════════════════════════════════════════════
   DESIGN SYSTEM — Al-Hut Fleet · Airbnb-Inspired Clean Light
════════════════════════════════════════════════════════════════ */
:root{
  --bg:      #F7F7F7;
  --white:   #FFFFFF;
  --border:  #EBEBEB;
  --border-d:#DDDDDD;
  --light:   #EEEEEE;
  
  --red:     #FF385C;
  --red-d:   #E31C5F;
  --red-l:   #FFF0F2;
  --red-m:   rgba(255,56,92,.12);
  --red-g:   linear-gradient(135deg,#FF385C,#E31C5F);
  
  --green:   #00A699;
  --amber:   #FC642D;
  --blue:    #0066CC;
  
  --tx0:     #222222;
  --tx1:     #484848;
  --tx2:     #717171;
  --tx3:     #AAAAAA;
  
  --sh-card: 0 6px 16px rgba(0,0,0,.08);
  --sh-hover:0 12px 28px rgba(0,0,0,.12);
  --sh-nav:  0 1px 0 rgba(0,0,0,.06);
  --sh-btn:  0 4px 14px rgba(255,56,92,.3);
  
  --r3:12px; --r4:16px; --r5:20px;
  --nav-h:72px;
}

*,::before,::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
body{
  min-height:100vh;background:var(--bg);
  font-family:'Cairo',sans-serif;color:var(--tx0);
  overflow-x:hidden;-webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased;
}
img{max-width:100%;display:block;}
button,input{font-family:'Cairo',sans-serif;outline:none;}
.dn{display:none!important;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--border-d);border-radius:99px;}

/* ════ NAVBAR ════ */
.nav{
  height:var(--nav-h);background:rgba(255,255,255,.95);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;position:sticky;top:0;z-index:900;
}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.nav-logo-ic{
  width:38px;height:38px;border-radius:11px;background:var(--red-g);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;box-shadow:var(--sh-btn);
}
.nav-logo-txt{font-size:1.15rem;font-weight:900;color:var(--tx0);letter-spacing:-.5px;}
.nav-back{
  font-size:.85rem;font-weight:800;color:var(--tx1);
  text-decoration:none;padding:8px 16px;border-radius:99px;
  border:1px solid var(--border-d);background:var(--white);
  transition:.2s;display:flex;align-items:center;gap:6px;
}
.nav-back:hover{border-color:var(--tx0);background:var(--bg);}
.nav-back:active{transform:scale(.95);}

/* ════ PAGE HERO ════ */
.hero{
  background:var(--red-g);
  padding:40px 24px 60px;
  text-align:center;position:relative;
}
.hero::after{
  content:'';position:absolute;bottom:-1px;left:0;right:0;
  height:30px;background:var(--bg);border-radius:30px 30px 0 0;
}
.hero-inner{position:relative;z-index:1;}
.hero-title{font-size:clamp(1.6rem,4vw,2.2rem);font-weight:900;color:#fff;margin-bottom:8px;letter-spacing:-.02em;}
.hero-sub{font-size:.9rem;font-weight:600;color:rgba(255,255,255,.8);margin-bottom:20px;}
.hero-pills{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.h-pill{
  background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);
  backdrop-filter:blur(5px);border-radius:99px;padding:6px 14px;
  font-size:.75rem;font-weight:800;color:#fff;
}

/* ════ FILTER BAR ════ */
.filters-wrap{
  background:var(--white);border-bottom:1px solid var(--border);
  position:sticky;top:var(--nav-h);z-index:800;
  box-shadow:var(--sh-sm);
}
.filters{
  display:flex;gap:12px;padding:12px 24px;
  overflow-x:auto;scrollbar-width:none;
}
.filters::-webkit-scrollbar{display:none;}
.fc{
  flex-shrink:0;padding:8px 18px;border-radius:99px;
  background:var(--bg);border:1.5px solid transparent;
  font-size:.8rem;font-weight:800;color:var(--tx1);
  cursor:pointer;transition:.2s;display:flex;align-items:center;gap:6px;
}
.fc:hover{background:var(--light);}
.fc.on{background:var(--white);border-color:var(--tx0);color:var(--tx0);box-shadow:var(--sh-sm);}
.fc .fn{
  font-size:.65rem;font-weight:900;padding:2px 8px;
  border-radius:99px;background:var(--border-d);color:var(--tx1);
}
.fc.on .fn{background:var(--tx0);color:var(--white);}

/* ════ MAIN & SEARCH ════ */
.main{max-width:1200px;margin:0 auto;padding:24px 24px 60px;}
.results-bar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;flex-wrap:wrap;gap:12px;
}
.results-count{font-size:.9rem;font-weight:800;color:var(--tx0);}
.city-search{
  display:flex;align-items:center;gap:8px;
  background:var(--white);border:1px solid var(--border-d);
  border-radius:99px;padding:8px 16px;
  transition:.2s;box-shadow:var(--sh-sm);
}
.city-search:focus-within{border-color:var(--tx0);box-shadow:0 0 0 1px var(--tx0);}
.city-search-ic{color:var(--tx2);font-size:.9rem;}
.city-search input{
  border:none;background:transparent;width:150px;
  font-size:.85rem;font-weight:700;color:var(--tx0);
}
.city-search input::placeholder{color:var(--tx3);}

/* ════ GRID & CARDS ════ */
.fleet-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;
}
.car-card{
  background:var(--white);border:1px solid transparent;
  border-radius:var(--r4);overflow:hidden;cursor:pointer;
  transition:.3s;display:flex;flex-direction:column;
}
.car-card:hover{box-shadow:var(--sh-hover);border-color:var(--border);}
.car-card:active{transform:scale(.98);}

.car-img-wrap{
  width:100%;height:200px;position:relative;background:var(--bg);
  border-radius:var(--r4);overflow:hidden;
}
.car-img-wrap img{width:100%;height:100%;object-fit:cover;transition:.4s ease;}
.car-card:hover .car-img-wrap img{transform:scale(1.05);}
.car-img-fallback{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  flex-direction:column;font-size:3rem;color:var(--border-d);
}

.cat-badge{
  position:absolute;top:12px;left:12px;
  background:rgba(255,255,255,.9);backdrop-filter:blur(4px);
  padding:4px 10px;border-radius:99px;
  font-size:.65rem;font-weight:900;color:var(--tx0);
  box-shadow:var(--sh-sm);
}
.office-badge{
  position:absolute;bottom:12px;right:12px;
  background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  padding:4px 10px;border-radius:99px;
  font-size:.65rem;font-weight:800;color:var(--white);
}

.car-body{padding:16px 4px 8px;flex:1;display:flex;flex-direction:column;}
.car-top{display:flex;justify-content:space-between;align-items:flex-start;}
.car-name{font-size:1.05rem;font-weight:900;color:var(--tx0);line-height:1.3;margin-bottom:4px;}
.car-rating{font-size:.75rem;font-weight:800;color:var(--tx0);display:flex;align-items:center;gap:4px;}

.car-specs{
  font-size:.75rem;font-weight:600;color:var(--tx2);
  display:flex;align-items:center;gap:6px;margin-bottom:12px;
}
.color-dot{
  display:inline-block;width:10px;height:10px;border-radius:50%;
  border:1px solid var(--border-d);margin-right:2px;vertical-align:middle;
}

.car-footer{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:auto;padding-top:8px;
}
.car-price-val{font-size:1.15rem;font-weight:900;color:var(--tx0);}
.car-price-sub{font-size:.75rem;font-weight:600;color:var(--tx2);}
.btn-select{
  background:var(--red-g);color:var(--white);border:none;
  border-radius:var(--r3);padding:10px 20px;font-size:.85rem;font-weight:900;
  cursor:pointer;transition:.2s;box-shadow:var(--sh-btn);
}
.btn-select:hover{opacity:.9;}
.btn-select:active{transform:scale(.95);}

/* ════ SKELETON ════ */
.skeleton{border-radius:var(--r4);overflow:hidden;}
.sk-img{height:200px;border-radius:var(--r4);background:linear-gradient(90deg,var(--bg) 25%,var(--light) 50%,var(--bg) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;}
.sk-body{padding:16px 4px;}
.sk-line{height:14px;border-radius:99px;background:linear-gradient(90deg,var(--bg) 25%,var(--light) 50%,var(--bg) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;margin-bottom:10px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ════ API BANNER ════ */
.api-banner{
  display:none;align-items:center;justify-content:center;gap:10px;
  padding:12px 16px;border-radius:var(--r3);font-size:.8rem;font-weight:800;
  margin-bottom:20px;text-align:center;
}
.api-banner.loading{background:var(--bg);color:var(--tx1);display:flex;}
.api-banner.fallback{background:var(--red-l);color:var(--red);display:flex;}
.api-spin{width:16px;height:16px;border:2.5px solid var(--tx3);border-top-color:var(--tx0);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="nav">
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-ic">🐋</div>
    <span class="nav-logo-txt" id="logoTxt">الحوت</span>
  </a>
  <a href="index.html" class="nav-back" id="backBtn">← رجوع</a>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-inner">
    <div class="hero-title" id="heroTitle">اختر سيارتك</div>
    <div class="hero-sub" id="heroSub">أسطول متكامل وجاهز للانطلاق من مكاتبنا المعتمدة</div>
    <div class="hero-pills" id="heroPills"></div>
  </div>
</div>

<!-- FILTERS BAR -->
<div class="filters-wrap">
  <div class="filters" id="filtersBar"></div>
</div>

<!-- MAIN -->
<div class="main">
  <!-- API status -->
  <div class="api-banner loading" id="apiBanner">
    <div class="api-spin"></div>
    <span id="apiBannerTxt">جاري جلب الأسطول لحظياً من السيرفر...</span>
  </div>

  <!-- Results bar -->
  <div class="results-bar">
    <div class="results-count" id="resultsCount">جاري التحميل...</div>
    <div class="city-search">
      <span class="city-search-ic">📍</span>
      <input type="text" id="cityInput" placeholder="المدينة..." oninput="onCityChange(this.value)">
    </div>
  </div>

  <!-- Fleet grid -->
  <div class="fleet-grid" id="fleetGrid">
    <div class="skeleton"><div class="sk-img"></div><div class="sk-body"><div class="sk-line" style="width:80%"></div><div class="sk-line" style="width:50%"></div></div></div>
    <div class="skeleton"><div class="sk-img"></div><div class="sk-body"><div class="sk-line" style="width:80%"></div><div class="sk-line" style="width:50%"></div></div></div>
    <div class="skeleton"><div class="sk-img"></div><div class="sk-body"><div class="sk-line" style="width:80%"></div><div class="sk-line" style="width:50%"></div></div></div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════════════
   CONFIG & FALLBACK DATA
════════════════════════════════════════════════════════ */
const API_URL   = "https://script.google.com/macros/s/AKfycbwOZXSohTDG9nayqJ3caUqI6q50rGXaKiAYbBr-W6Xksq8qSQH_mxVU_o-7CJQrpUWa9A/exec";
const API_TOKEN = "HUT_CLOUD_2026";

const FALLBACK_CARS = [
  {id:"C001",name:"تويوتا كورولا 2025",cat:"economy",price:45000,color:"أبيض",plate:"كركوك",orders:12,office_id:"مكتب النورس"},
  {id:"C002",name:"مرسيدس S-Class",cat:"luxury",price:150000,color:"أسود",plate:"بغداد",orders:5,office_id:"VIP كلاس"},
  {id:"C003",name:"هيونداي توسان",cat:"family",price:60000,color:"رمادي",plate:"أربيل",orders:8,office_id:"السيف للسيارات"}
];

const i18n = {
  ar:{
    dir:"rtl", logo:"الحوت", back:"← العودة للرئيسية",
    heroTitle:"اختر سيارتك", heroSub:"أسطول متكامل وجاهز للانطلاق",
    cats:["الكل","اقتصادية","عائلية","فاخرة VIP","زفاف"],
    catKeys:["all","economy","family","luxury","wedding"],
    catBadge:{economy:"اقتصادية",family:"عائلية",luxury:"VIP فاخرة",wedding:"للزفاف"},
    available:"سيارة متاحة", perDay:"/ يوم", cur:"د.ع", select:"حجز", cityPH:"ابحث بالمدينة..."
  }
};

/* ════════════════════════════════════════════════════════
   STATE & PARAMS
════════════════════════════════════════════════════════ */
const P = new URLSearchParams(location.search);
const lang = P.get("lang") || "ar";
const type = P.get("type") || "personal";
const days = P.get("days") || "1";
const date = P.get("date") || "";
let cityQuery = P.get("city") || P.get("province") || "";

const t = i18n[lang] || i18n.ar;
let allCars = [];
let filtered = [];
let activeCat = "all";

/* ════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════ */
window.onload = () => {
  applyLang();
  buildFilters();
  fetchFleet();
};

function applyLang() {
  document.getElementById("htmlRoot").dir = t.dir;
  document.getElementById("logoTxt").textContent = t.logo;
  document.getElementById("backBtn").textContent = t.back;
  
  const svcMap = {personal:t.heroTitle, wedding:"سيارات الأعراس والمناسبات"};
  document.getElementById("heroTitle").textContent = svcMap[type] || t.heroTitle;
  document.getElementById("cityInput").placeholder = t.cityPH;
  if(cityQuery) document.getElementById("cityInput").value = cityQuery;

  const pills = [];
  if(cityQuery) pills.push(`<div class="h-pill">📍 ${escHtml(cityQuery)}</div>`);
  if(date)      pills.push(`<div class="h-pill">📅 ${escHtml(date)}</div>`);
  if(days)      pills.push(`<div class="h-pill">🌙 ${escHtml(days)} يوم</div>`);
  document.getElementById("heroPills").innerHTML = pills.join("");
}

function buildFilters() {
  const bar = document.getElementById("filtersBar");
  bar.innerHTML = t.catKeys.map((k,i) => `
    <button class="fc ${k==="all"?"on":""}" id="fc-${k}" onclick="setFilter('${k}')">
      ${t.cats[i]} <span class="fn" id="fn-${k}">0</span>
    </button>
  `).join("");
}

/* ════════════════════════════════════════════════════════
   FETCH FLEET
════════════════════════════════════════════════════════ */
async function fetchFleet() {
  const banner = document.getElementById("apiBanner");
  banner.className = "api-banner loading";
  document.getElementById("apiBannerTxt").textContent = "جاري الاتصال بقاعدة البيانات...";

  let url = `${API_URL}?action=getAvailableCars&token=${API_TOKEN}&_t=${Date.now()}`;
  
  try {
    const controller = new AbortController();
    const timeout = setTimeout(()=>controller.abort(), 10000);
    const res = await fetch(url, { signal: controller.signal });
    clearTimeout(timeout);
    
    if(!res.ok) throw new Error("HTTP Error");
    const data = await res.json();
    
    let cars = Array.isArray(data) ? data : (data.cars || []);
    if(cars.length === 0) cars = FALLBACK_CARS;
    
    allCars = cars;
    banner.style.display = "none";
  } catch(err) {
    allCars = FALLBACK_CARS;
    banner.className = "api-banner fallback";
    document.getElementById("apiBannerTxt").textContent = "تعذر الاتصال بالسيرفر. يتم عرض البيانات المؤقتة.";
  }

  updateFilterCounts();
  renderFleet();
}

/* ════════════════════════════════════════════════════════
   FILTER & RENDER
════════════════════════════════════════════════════════ */
function updateFilterCounts() {
  const counts = { all: 0 };
  allCars.forEach(c => {
    if(c.status && c.status !== "available") return;
    if(cityQuery && c.city && !c.city.includes(cityQuery)) return;
    
    counts["all"]++;
    const cat = (c.cat || "economy").toLowerCase();
    counts[cat] = (counts[cat] || 0) + 1;
  });
  
  t.catKeys.forEach(k => {
    const el = document.getElementById("fn-"+k);
    if(el) el.textContent = counts[k] || 0;
  });
}

window.setFilter = (cat) => {
  activeCat = cat;
  document.querySelectorAll(".fc").forEach(b => b.classList.remove("on"));
  document.getElementById("fc-"+cat)?.classList.add("on");
  renderFleet();
};

window.onCityChange = (val) => {
  cityQuery = val.trim();
  clearTimeout(window._cityTimer);
  window._cityTimer = setTimeout(() => { updateFilterCounts(); renderFleet(); }, 400);
};

function renderFleet() {
  const grid = document.getElementById("fleetGrid");
  
  filtered = allCars.filter(c => {
    if(c.status && c.status !== "available") return false;
    if(cityQuery && c.city && !c.city.includes(cityQuery)) return false;
    if(activeCat !== "all" && (c.cat||"economy").toLowerCase() !== activeCat) return false;
    if(type === "wedding" && !["wedding","luxury"].includes((c.cat||"").toLowerCase())) return false;
    return true;
  });

  filtered.sort((a,b) => (Number(b.orders)||0) - (Number(a.orders)||0));
  
  document.getElementById("resultsCount").innerHTML = `<strong>${filtered.length}</strong> ${t.available}`;

  if(filtered.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px 20px;background:var(--white);border:1px dashed var(--border-d);border-radius:var(--r5);"><div style="font-size:3rem;margin-bottom:10px;opacity:.5">🚗</div><h3 style="font-weight:900;color:var(--tx1);">لا توجد سيارات متاحة</h3><p style="color:var(--tx2);font-size:.85rem;">حاول تعديل خيارات البحث أو المدينة</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(c => buildCard(c)).join("");
}

function buildCard(car) {
  const name  = car.name || "سيارة غير مسماة";
  const price = Number(car.price)||0;
  const cat   = (car.cat||"economy").toLowerCase();
  const color = car.color || "";
  const plate = car.plate || "";
  const offId = car.office_id || "";
  
  const imgHtml = car.photo_url 
    ? `<img src="${escHtml(car.photo_url)}" loading="lazy">` 
    : `<div class="car-img-fallback">🚗</div>`;
    
  return `
  <div class="car-card" onclick='selectCar(${JSON.stringify(car).replace(/'/g, "&#39;")})'>
    <div class="car-img-wrap">
      ${imgHtml}
      <div class="cat-badge">${t.catBadge[cat]||cat}</div>
      ${offId ? `<div class="office-badge">🏢 ${escHtml(offId)}</div>` : ''}
    </div>
    <div class="car-body">
      <div class="car-top">
        <div class="car-name">${escHtml(name)}</div>
        <div class="car-rating">★ 5.0</div>
      </div>
      <div class="car-specs">
        ${color ? `<span>🎨 ${escHtml(color)}</span>` : ''}
        ${plate ? `<span>📍 ${escHtml(plate)}</span>` : ''}
      </div>
      <div class="car-footer">
        <div>
          <span class="car-price-val">${price.toLocaleString("ar-EG")}</span>
          <span class="car-price-sub">${t.cur} ${t.perDay}</span>
        </div>
        <button class="btn-select">${t.select}</button>
      </div>
    </div>
  </div>`;
}

/* ════════════════════════════════════════════════════════
   SELECT CAR & REDIRECT
════════════════════════════════════════════════════════ */
window.selectCar = (car) => {
  const dest = `addons.html`
    + `?type=${encodeURIComponent(type)}`
    + `&lang=${encodeURIComponent(lang)}`
    + `&city=${encodeURIComponent(cityQuery || car.city || "")}`
    + `&days=${encodeURIComponent(days)}`
    + `&date=${encodeURIComponent(date)}`
    + `&car=${encodeURIComponent(car.name)}`
    + `&basePrice=${car.price||0}`
    + `&car_id=${encodeURIComponent(car.id||"")}`
    + `&office_id=${encodeURIComponent(car.office_id||"")}`;

  window.location.href = dest;
};

function escHtml(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
</script>
</body>
</html>
