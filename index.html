        function changeLang(lang) {
            const l = translations[lang];
            document.getElementById('htmlTag').dir = l.dir;
            document.getElementById('htmlTag').lang = lang;
            document.body.style.fontFamily = (lang === 'en' || lang === 'tr') ? 'Poppins' : 'Tajawal';
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('lang-active'));
            document.getElementById('btn-' + lang).classList.add('lang-active');

            document.getElementById('brandName').innerHTML = l.brand;
            document.getElementById('whaleTitle').innerText = l.whale;
            document.getElementById('subGreeting').innerText = l.subGreet;
            document.getElementById('labelCity').innerText = l.labelCity;
            document.getElementById('labelService').innerText = l.labelService;
            document.getElementById('labelDate').innerText = l.labelDate;
            document.getElementById('labelTime').innerText = l.labelTime;
            document.getElementById('labelDays').innerText = l.labelDays;
            document.getElementById('btnText').innerText = l.btnText;
            document.getElementById('faqTitle').innerText = l.faqTitle;
            document.getElementById('btnIcon').style.transform = l.dir === 'rtl' ? 'rotate(0deg)' : 'rotate(180deg)';

            // تحديث نصوص التتبع
            document.getElementById('trackBtnText').innerText = l.trackBtn;
            document.getElementById('trackModalTitle').innerText = l.trackModalTitle;
            document.getElementById('trackInputLabel').innerText = l.trackInputLabel;
            document.getElementById('trackSearchBtn').innerText = l.trackSearchBtn;

            const citySelect = document.getElementById('citySelect');
            const currentC = citySelect.value || 'كركوك';
            citySelect.innerHTML = citiesList.map(c => `<option value="${c}" ${c===currentC?'selected':''}>${l.cityNames[c]}</option>`).join('');

            const svc = document.getElementById('mainService');
            svc.innerHTML = `<option value="">${l.services.placeholder}</option><option value="personal">${l.services.personal}</option><option value="wedding">${l.services.wedding}</option><option value="training">${l.services.training}</option>`;

            document.getElementById('faqContainer').innerHTML = l.faqs.map(f => `
                <div class="bg-white p-6 rounded-2xl shadow-sm border-${l.dir==='rtl'?'r':'l'}-4 border-[#D4AF37]">
                    <h3 class="font-black text-lg text-[#002349] mb-2">${f.q}</h3>
                    <p class="text-slate-600">${f.a}</p>
                </div>`).join('');
            adaptToCity();
        }

        function adaptToCity() {
            const city = document.getElementById('citySelect').value;
            const colors = { 'كركوك': '#0d9488', 'بغداد': '#1e3a8a', 'أربيل': '#15803d', 'السليمانية': '#7e22ce', 'الموصل': '#374151', 'البصرة': '#0369a1', 'الأنبار': '#b45309', 'ديالى': '#65a30d' };
            document.getElementById('cityOverlay').style.backgroundColor = colors[city] || '#002349';
            const greetings = { ar: 'أهلاً بك في', ku: 'بەخێربێیت بۆ', tr: 'Hoş geldiniz', en: 'Welcome to' };
            const lang = document.getElementById('htmlTag').lang;
            const l = translations[lang] || translations['ar'];
            const greetEl = document.getElementById('dynamicGreeting');
            greetEl.style.opacity = 0;
            setTimeout(() => {
                greetEl.innerText = `${greetings[lang]} ${l.cityNames[city].split(' ')[0]}`;
                greetEl.style.opacity = 1;
            }, 200);
        }

        function checkService() {
            const svc = document.getElementById('mainService').value;
            const wrap = document.getElementById('daysWrapper');
            svc === 'personal' ? wrap.classList.remove('hidden-field') : wrap.classList.add('hidden-field');
        }

        function startBooking() {
            const svc = document.getElementById('mainService').value;
            const city = document.getElementById('citySelect').value;
            const date = document.getElementById('dateInput').value;
            const time = document.getElementById('timeInput').value;
            if(!svc || !date || !time) return alert(document.getElementById('htmlTag').lang === 'ar' ? "يرجى ملء جميع الحقول 🐋" : "Please fill all fields");
            window.location.href = `fleet.html?type=${svc}&city=${city}&date=${date}&time=${time}&lang=${document.getElementById('htmlTag').lang}`;
        }

        // --- دوال نافذة التتبع ---
        function openTracker() {
            const modal = document.getElementById('trackerModal');
            const card = document.getElementById('trackerCard');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            card.classList.remove('scale-95');
        }

        function closeTracker() {
            const modal = document.getElementById('trackerModal');
            const card = document.getElementById('trackerCard');
            modal.classList.add('opacity-0', 'pointer-events-none');
            card.classList.add('scale-95');
            document.getElementById('trackOrderId').value = '';
            document.getElementById('trackResult').classList.add('hidden');
        }

        async function checkOrderStatus() {
            const input = document.getElementById('trackOrderId').value.trim().toUpperCase();
            if(!input) return alert("يرجى إدخال رقم الحجز");

            const btn = document.getElementById('btnTrack');
            const originalText = document.getElementById('trackSearchBtn').innerText;
            btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i> جاري البحث...';
            btn.disabled = true;

            try {
                const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getAllOrders&t=${Date.now()}`);
                const orders = await res.json();
                const myOrder = orders.find(o => o.id === input || (o.id && o.id.includes(input)));

                const resDiv = document.getElementById('trackResult');
                const resStatus = document.getElementById('resStatus');
                const resActionBtn = document.getElementById('resActionBtn');

                if (myOrder) {
                    document.getElementById('resCar').innerText = myOrder.car;
                    document.getElementById('resOffice').innerHTML = `<i class="fas fa-building text-[#D4AF37]"></i> المكتب: <span class="text-slate-800">${myOrder.office || "بانتظار التأكيد"}</span>`;
                    
                    resStatus.innerText = myOrder.status;
                    resActionBtn.classList.remove('hidden');

                    if (myOrder.status.includes("تم الاستلام")) {
                        resStatus.className = "inline-block px-3 py-1 bg-green-100 text-green-600 text-xs font-black rounded-lg mb-2 border border-green-200";
                        resActionBtn.className = "w-full py-3 rounded-xl font-bold text-sm bg-green-500 text-white hover:bg-green-600 transition-all flex items-center justify-center gap-2";
                        resActionBtn.innerHTML = '<i class="fab fa-whatsapp text-lg"></i> تواصل مع المكتب الآن';
                        resActionBtn.onclick = () => window.open(`https://wa.me/${ADMIN_PHONE}?text=مرحباً، أود التواصل مع مكتب ${myOrder.office} بخصوص طلبي ${myOrder.id}`, '_blank');
                    } else {
                        resStatus.className = "inline-block px-3 py-1 bg-blue-100 text-blue-600 text-xs font-black rounded-lg mb-2 border border-blue-200";
                        resActionBtn.className = "w-full py-3 rounded-xl font-bold text-sm bg-slate-100 text-[#002349] hover:bg-slate-200 transition-all flex items-center justify-center gap-2";
                        resActionBtn.innerHTML = '<i class="fas fa-headset"></i> الدعم الفني';
                        resActionBtn.onclick = () => window.open(`https://wa.me/${ADMIN_PHONE}?text=مرحباً إدارة الحوت، أستفسر عن طلبي ${myOrder.id}`, '_blank');
                    }
                    resDiv.classList.remove('hidden');
                } else {
                    alert("لم يتم العثور على هذا الطلب! تأكد من الرقم وحاول مجدداً.");
                    resDiv.classList.add('hidden');
                }
            } catch (e) {
                alert("فشل الاتصال بالرادار، تأكد من جودة الإنترنت.");
            } finally {
                btn.innerHTML = `<span id="trackSearchBtn">${originalText}</span> <i class="fas fa-radar"></i>`;
                btn.disabled = false;
            }
        }

        window.onload = () => {
            const now = new Date();
            document.getElementById('dateInput').value = now.toISOString().split('T')[0];
            document.getElementById('timeInput').value = now.toTimeString().slice(0,5);
            changeLang('ar');
        };
    </script>
</body>
</html>
