<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>حجز الفندق | الحوت</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary:#FF385C; --primary-dark:#E31C5F; --dark:#222222; --mid:#717171; --light:#DDDDDD; --bg:#F7F7F7; --shadow:0 6px 20px rgba(0,0,0,0.12); --radius:16px; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Tajawal',sans-serif; background:var(--bg); color:var(--dark); }
        .navbar { background:white; border-bottom:1px solid var(--light); padding:0 24px; height:72px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:0 1px 12px rgba(0,0,0,0.06); }
        .logo { font-size:1.3rem; font-weight:900; color:var(--primary); text-decoration:none; display:flex; align-items:center; gap:8px; }
        .back-btn { display:flex; align-items:center; gap:8px; color:var(--dark); font-weight:700; font-size:0.9rem; padding:10px 18px; border-radius:12px; border:1.5px solid var(--light); transition:0.2s; cursor:pointer; background:white; }
        .back-btn:hover { border-color:var(--dark); }
        .layout { max-width:960px; margin:0 auto; padding:32px 24px 40px; display:grid; grid-template-columns:1fr 340px; gap:32px; align-items:start; }
        .form-section { background:white; border-radius:var(--radius); padding:28px; border:1px solid var(--light); margin-bottom:24px; }
        .section-header { display:flex; align-items:center; gap:12px; margin-bottom:22px; padding-bottom:14px; border-bottom:1px solid var(--bg); }
        .section-icon { width:44px; height:44px; background:var(--bg); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.1rem; }
        .section-title { font-size:1.1rem; font-weight:900; }
        .field-group { margin-bottom:20px; }
        .field-label { display:block; font-size:0.8rem; font-weight:800; color:var(--mid); margin-bottom:8px; text-transform:uppercase; letter-spacing:0.04em; }
        .field-input { width:100%; padding:14px 16px; border:1.5px solid var(--light); border-radius:12px; font-family:'Tajawal',sans-serif; font-size:0.95rem; font-weight:600; color:var(--dark); outline:none; transition:0.2s; background:white; }
        .field-input:focus { border-color:var(--dark); }
        .fields-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
        .room-select { display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; }
        .room-card { border:2px solid var(--light); border-radius:12px; padding:16px; text-align:center; cursor:pointer; transition:0.2s; }
        .room-card.active { border-color:var(--primary); background:rgba(255,56,92,0.04); }
        .room-card:hover { border-color:#aaa; }
        .room-icon { font-size:1.8rem; margin-bottom:6px; }
        .room-name { font-size:0.82rem; font-weight:800; }
        .room-price { font-size:0.75rem; color:var(--mid); margin-top:4px; }
        .info-box { background:#f0f9ff; border:1px solid #bae6fd; border-radius:12px; padding:14px; display:flex; gap:10px; }
        .info-box p { font-size:0.82rem; color:#0369a1; line-height:1.6; font-weight:600; }
        /* Summary */
        .summary-card { background:white; border-radius:var(--radius); border:1px solid var(--light); padding:24px; position:sticky; top:96px; }
        .summary-title { font-size:1rem; font-weight:900; margin-bottom:20px; padding-bottom:14px; border-bottom:1px solid var(--light); }
        .summary-row { display:flex; justify-content:space-between; margin-bottom:12px; font-size:0.9rem; }
        .summary-row .label { color:var(--mid); }
        .summary-row .value { font-weight:700; }
        .summary-total { display:flex; justify-content:space-between; padding-top:14px; border-top:1.5px solid var(--dark); margin-top:14px; font-size:1.1rem; font-weight:900; }
        .confirm-btn { width:100%; background:var(--primary); color:white; border:none; padding:16px; border-radius:12px; font-weight:900; font-size:1rem; cursor:pointer; transition:0.2s; margin-top:16px; font-family:'Tajawal',sans-serif; }
        .confirm-btn:hover { background:var(--primary-dark); }
        @media(max-width:768px) { .layout{grid-template-columns:1fr;} .summary-card{position:static;} .fields-row{grid-template-columns:1fr;} .room-select{grid-template-columns:1fr 1fr;} }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="index.html" class="logo"><span>🐋</span> <span id="logoTxt">الحوت</span></a>
    <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-right"></i> <span id="backTxt">رجوع</span></button>
</nav>

<div class="layout">
    <div>
        <!-- Room Type -->
        <div class="form-section">
            <div class="section-header">
                <div class="section-icon">🏨</div>
                <div class="section-title" id="sec1Title">اختر نوع الغرفة</div>
            </div>
            <div class="room-select" id="roomSelect"></div>
        </div>

        <!-- Guest Info -->
        <div class="form-section">
            <div class="section-header">
                <div class="section-icon">👤</div>
                <div class="section-title" id="sec2Title">معلومات النزيل</div>
            </div>
            <div class="field-group">
                <label class="field-label" id="lblName">الاسم الكامل</label>
                <input type="text" id="guestName" class="field-input">
            </div>
            <div class="fields-row">
                <div class="field-group">
                    <label class="field-label" id="lblPhone">رقم الهاتف</label>
                    <input type="tel" id="guestPhone" class="field-input" dir="ltr" placeholder="07xx xxx xxxx">
                </div>
                <div class="field-group">
                    <label class="field-label" id="lblGuests">عدد النزلاء</label>
                    <input type="number" id="guestCount" class="field-input" value="2" min="1" max="10">
                </div>
            </div>
            <div class="field-group">
                <label class="field-label" id="lblID">رقم الهوية / الجواز</label>
                <input type="text" id="guestID" class="field-input">
            </div>
            <div class="field-group">
                <label class="field-label" id="lblRequests">طلبات خاصة (اختياري)</label>
                <input type="text" id="specialReq" class="field-input" placeholder="...">
            </div>
            <div class="info-box">
                <span>ℹ️</span>
                <p id="infoText">سيتم التواصل معك لتأكيد الحجز وتحديد وقت الوصول.</p>
            </div>
        </div>
    </div>

    <!-- Summary -->
    <div class="summary-card">
        <div class="summary-title" id="sumTitle">ملخص الحجز</div>
        <div class="summary-row"><span class="label" id="sumHotelLbl">الفندق</span><span class="value" id="sumHotel">—</span></div>
        <div class="summary-row"><span class="label" id="sumCityLbl">المدينة</span><span class="value" id="sumCity">—</span></div>
        <div class="summary-row"><span class="label" id="sumDateLbl">تاريخ الوصول</span><span class="value" id="sumDate">—</span></div>
        <div class="summary-row"><span class="label" id="sumNightsLbl">عدد الليالي</span><span class="value" id="sumNights">—</span></div>
        <div class="summary-row"><span class="label" id="sumRoomLbl">نوع الغرفة</span><span class="value" id="sumRoom">—</span></div>
        <div class="summary-total">
            <span id="totalLbl">الإجمالي</span>
            <span id="totalVal">—</span>
        </div>
        <button class="confirm-btn" onclick="confirmHotel()">
            <span id="confirmTxt">مراجعة الحجز</span> <i class="fas fa-chevron-left" id="confirmIcon"></i>
        </button>
    </div>
</div>

<script>
    const u = new URLSearchParams(window.location.search);
    const lang = u.get('lang') || 'ar';
    const city = u.get('city') || 'بغداد';
    const days = parseInt(u.get('days') || '1');
    const hotelName = decodeURIComponent(u.get('hotel_name') || '');
    const basePrice = parseInt(u.get('hotel_price') || 0);
    let selectedRoom = null;

    const rooms = {
        ar:[{key:'single',n:'غرفة مفردة',i:'🛏️',mult:1},{key:'double',n:'غرفة مزدوجة',i:'🛏️🛏️',mult:1.5},{key:'suite',n:'جناح فاخر',i:'👑',mult:2.5}],
        ku:[{key:'single',n:'ژووری تاکەکەس',i:'🛏️',mult:1},{key:'double',n:'ژووری دووکەس',i:'🛏️🛏️',mult:1.5},{key:'suite',n:'سووتی ناوازە',i:'👑',mult:2.5}],
        tr:[{key:'single',n:'Tek Kişilik',i:'🛏️',mult:1},{key:'double',n:'Çift Kişilik',i:'🛏️🛏️',mult:1.5},{key:'suite',n:'Lüks Süit',i:'👑',mult:2.5}],
        en:[{key:'single',n:'Single Room',i:'🛏️',mult:1},{key:'double',n:'Double Room',i:'🛏️🛏️',mult:1.5},{key:'suite',n:'Luxury Suite',i:'👑',mult:2.5}],
    };

    const ui = {
        ar:{dir:'rtl',logo:'الحوت',back:'رجوع',sec1:'اختر نوع الغرفة',sec2:'معلومات النزيل',lblName:'الاسم الكامل',lblPhone:'رقم الهاتف',lblGuests:'عدد النزلاء',lblID:'رقم الهوية / الجواز',lblReq:'طلبات خاصة (اختياري)',info:'سيتم التواصل معك لتأكيد الحجز.',sum:'ملخص الحجز',sumHotel:'الفندق',sumCity:'المدينة',sumDate:'تاريخ الوصول',sumNights:'عدد الليالي',sumRoom:'نوع الغرفة',total:'الإجمالي',confirm:'مراجعة الحجز',curr:'د.ع',night:'ليلة',alert:'يرجى إكمال البيانات 🐋'},
        ku:{dir:'rtl',logo:'ئەلحووت',back:'گەڕانەوە',sec1:'جۆری ژوور هەڵبژێرە',sec2:'زانیارییەکان',lblName:'ناوی تەواو',lblPhone:'مۆبایل',lblGuests:'ژمارەی نزیڤ',lblID:'ناسنامە',lblReq:'داواکارییە تایبەتەکان',info:'پەیوەندیت پێوە دەکەین بۆ پشتڕاستکردن.',sum:'پوختەی حجز',sumHotel:'هۆتێل',sumCity:'شار',sumDate:'بەرواری هاتن',sumNights:'ژمارەی شەو',sumRoom:'جۆری ژوور',total:'کۆی گشتی',confirm:'پێداچوونەوە',curr:'د.ع',night:'شەو',alert:'تکایە زانیارییەکان تەواو بکە 🐋'},
        tr:{dir:'ltr',logo:'AL-HUT',back:'Geri',sec1:'Oda Türü Seçin',sec2:'Misafir Bilgileri',lblName:'Tam Ad',lblPhone:'Telefon',lblGuests:'Misafir Sayısı',lblID:'Kimlik No',lblReq:'Özel İstekler (İsteğe bağlı)',info:'Rezervasyonu onaylamak için sizinle iletişime geçeceğiz.',sum:'Rezervasyon Özeti',sumHotel:'Otel',sumCity:'Şehir',sumDate:'Varış Tarihi',sumNights:'Gece Sayısı',sumRoom:'Oda Türü',total:'Toplam',confirm:'Siparişi İncele',curr:'IQD',night:'gece',alert:'Lütfen tüm alanları doldurun 🐋'},
        en:{dir:'ltr',logo:'AL-HUT',back:'Back',sec1:'Select Room Type',sec2:'Guest Information',lblName:'Full Name',lblPhone:'Phone Number',lblGuests:'Number of Guests',lblID:'ID / Passport No',lblReq:'Special Requests (Optional)',info:'We will contact you to confirm the booking and arrange check-in.',sum:'Booking Summary',sumHotel:'Hotel',sumCity:'City',sumDate:'Check-in Date',sumNights:'Nights',sumRoom:'Room Type',total:'Total',confirm:'Review Booking',curr:'IQD',night:'night',alert:'Please fill in all fields 🐋'},
    };

    window.onload = function() {
        const l = ui[lang] || ui.ar;
        const isRtl = (lang==='ar'||lang==='ku');
        document.getElementById('htmlTag').dir = l.dir;
        ['logoTxt','backTxt','sec1Title','sec2Title','lblName','lblPhone','lblGuests','lblID','infoText','sumTitle','sumHotelLbl','sumCityLbl','sumDateLbl','sumNightsLbl','sumRoomLbl','totalLbl','confirmTxt'].forEach(id => {
            const key = id.replace('Txt','').replace('Title','').replace('Lbl','');
            const map2 = {logoTxt:'logo',backTxt:'back',sec1Title:'sec1',sec2Title:'sec2',lblName:'lblName',lblPhone:'lblPhone',lblGuests:'lblGuests',lblID:'lblID',infoText:'info',sumTitle:'sum',sumHotelLbl:'sumHotel',sumCityLbl:'sumCity',sumDateLbl:'sumDate',sumNightsLbl:'sumNights',sumRoomLbl:'sumRoom',totalLbl:'total',confirmTxt:'confirm'};
            document.getElementById(id).innerText = l[map2[id]] || '';
        });
        document.getElementById('lblRequests').innerText = l.lblReq;
        document.getElementById('confirmIcon').className = `fas fa-chevron-${isRtl?'left':'right'}`;

        // Rooms
        const rs = rooms[lang] || rooms.ar;
        document.getElementById('roomSelect').innerHTML = rs.map((r,i) => `
            <div class="room-card" id="room-${r.key}" onclick="selectRoom('${r.key}','${r.n}',${r.mult})">
                <div class="room-icon">${r.i}</div>
                <div class="room-name">${r.n}</div>
                <div class="room-price">${(basePrice*r.mult).toLocaleString()} ${l.curr}</div>
            </div>
        `).join('');

        // Summary
        document.getElementById('sumHotel').innerText = hotelName;
        document.getElementById('sumCity').innerText = city;
        document.getElementById('sumDate').innerText = u.get('date') || '—';
        document.getElementById('sumNights').innerText = `${days} ${l.night}`;
    };

    function selectRoom(key, name, mult) {
        selectedRoom = {key, name, price: Math.round(basePrice * mult)};
        document.querySelectorAll('.room-card').forEach(c => c.classList.remove('active'));
        document.getElementById('room-'+key).classList.add('active');
        const l = ui[lang] || ui.ar;
        const total = selectedRoom.price * days;
        document.getElementById('sumRoom').innerText = name;
        document.getElementById('totalVal').innerText = `${total.toLocaleString()} ${l.curr}`;
    }

    function confirmHotel() {
        const l = ui[lang] || ui.ar;
        const name = document.getElementById('guestName').value;
        const phone = document.getElementById('guestPhone').value;
        const id_no = document.getElementById('guestID').value;
        if(!name||!phone||!id_no||!selectedRoom) { alert(l.alert); return; }
        const orderId = 'HTL-' + Math.floor(1000+Math.random()*9000);
        const total = selectedRoom.price * days;
        u.set('order_id', orderId);
        u.set('name', name);
        u.set('phone', phone);
        u.set('national_id', id_no);
        u.set('guests', document.getElementById('guestCount').value);
        u.set('special_req', document.getElementById('specialReq').value);
        u.set('province', city);
        u.set('car', hotelName + ' — ' + selectedRoom.name);
        u.set('service', 'فندق');
        u.set('total_price', total);
        u.set('location_link', '');
        window.location.href = `review.html?${u.toString()}`;
    }
</script>
</body>
</html>
