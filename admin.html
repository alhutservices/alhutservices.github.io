<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>الحوت — القيادة العليا</title>
<meta name="theme-color" content="#0f172a">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0f172a; --ink2:#1e293b; --ink3:#334155; --ink4:#64748b;
  --sky:#3b82f6; --sky-d:#2563eb; --sky-l:#eff6ff; --sky-m:#dbeafe;
  --jade:#10b981; --jade-d:#059669; --jade-l:#ecfdf5;
  --fire:#f97316; --fire-d:#ea580c; --fire-l:#fff7ed;
  --rose:#ef4444; --rose-d:#dc2626; --rose-l:#fef2f2;
  --amber:#f59e0b; --amber-l:#fffbeb;
  --base:#ffffff; --base2:#f8fafc; --base3:#f1f5f9;
  --line:rgba(15,23,42,.08); --sh-xs:0 2px 4px rgba(15,23,42,.04);
  --sh-sm:0 4px 12px rgba(15,23,42,.06); --sh-lg:0 20px 40px rgba(15,23,42,.1);
  --sb:260px; --nav:65px; --ease:cubic-bezier(.4,0,.2,1);
}
*,::before,::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--base2);font-family:'Cairo',sans-serif;color:var(--ink);overflow:hidden;height:100vh;}
button,input,select{font-family:'Cairo',sans-serif;}
.dn{display:none!important;}

/* ─── TOAST ─── */
#toasts{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:99999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.ti{background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-radius:12px;padding:12px 20px;box-shadow:var(--sh-lg);display:flex;align-items:center;gap:10px;font-weight:700;font-size:.85rem;border:1px solid rgba(15,23,42,.05);animation:tin .3s var(--ease);}
@keyframes tin{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}

/* ─── AUTH ─── */
#auth{position:fixed;inset:0;z-index:60000;background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);display:flex;align-items:center;justify-content:center;padding:20px;}
.auth-box{width:100%;max-width:360px;background:rgba(255,255,255,.05);backdrop-filter:blur(24px);border-radius:24px;border:1px solid rgba(255,255,255,.1);box-shadow:var(--sh-lg);padding:40px 30px;text-align:center;}
.auth-h{font-size:1.6rem;font-weight:900;color:#fff;margin-bottom:5px;}
.auth-s{font-size:.8rem;font-weight:600;color:#94a3b8;margin-bottom:30px;}
.auth-in{width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:14px;font-size:1rem;color:#fff;text-align:center;outline:none;margin-bottom:15px;letter-spacing:2px;transition:0.3s;}
.auth-in:focus{background:rgba(255,255,255,.15);border-color:var(--sky);}
.auth-btn{width:100%;padding:14px;background:var(--sky);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:800;cursor:pointer;transition:all .2s;}
.auth-btn:hover{background:var(--sky-d);}

/* ─── LAYOUT ─── */
#app{display:flex;height:100%;}
.sidebar{width:var(--sb);background:#fff;border-left:1px solid var(--line);display:flex;flex-direction:column;padding:20px 0;z-index:900;}
.sb-head{padding:0 20px 20px;border-bottom:1px solid var(--line);margin-bottom:15px;display:flex;align-items:center;gap:10px;}
.sb-logo{width:40px;height:40px;background:linear-gradient(135deg,var(--sky),var(--sky-d));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.sb-title{font-size:1rem;font-weight:900;}
.nb{display:flex;align-items:center;gap:10px;padding:12px 20px;color:var(--ink4);font-weight:700;font-size:.9rem;cursor:pointer;border:none;background:none;width:100%;text-align:right;transition:0.2s;border-left:3px solid transparent;}
.nb.on{color:var(--sky);background:var(--sky-l);border-left-color:var(--sky);}
.main{flex:1;overflow-y:auto;padding:30px;background:var(--base2);}
.pg{display:none;} .pg.on{display:block;}

/* ─── CARDS & GRIDS ─── */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;margin-bottom:25px;}
.kc{background:#fff;border-radius:16px;padding:20px;border:1px solid var(--line);box-shadow:var(--sh-xs);display:flex;align-items:center;gap:15px;}
.kc-ic{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.kc-v{font-size:1.6rem;font-weight:900;line-height:1.2;}
.kc-l{font-size:.75rem;font-weight:700;color:var(--ink4);}

.eg{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:15px;}
.ec{background:#fff;border-radius:16px;padding:20px;border:1px solid var(--line);box-shadow:var(--sh-xs);position:relative;display:flex;flex-direction:column;gap:10px;}
.ec-top{display:flex;justify-content:space-between;align-items:flex-start;}
.ec-n{font-size:1rem;font-weight:900;}
.ec-st{padding:4px 10px;border-radius:99px;font-size:.7rem;font-weight:800;}
.st-active{background:var(--jade-l);color:var(--jade-d);}
.st-pending{background:var(--amber-l);color:var(--amber);}
.st-blocked{background:var(--rose-l);color:var(--rose-d);}

.ec-stats{display:flex;justify-content:space-between;background:var(--base2);padding:10px;border-radius:10px;margin-top:auto;}
.ec-st-i{text-align:center;}
.ec-st-v{font-size:1.1rem;font-weight:900;}
.ec-st-l{font-size:.65rem;font-weight:700;color:var(--ink4);}

.ec-acts{display:flex;gap:5px;margin-top:10px;}
.btn-sm{flex:1;padding:8px;border:none;border-radius:8px;font-weight:800;font-size:.75rem;cursor:pointer;transition:0.2s;}
.btn-a{background:var(--jade-l);color:var(--jade-d);} .btn-a:hover{background:var(--jade);color:#fff;}
.btn-b{background:var(--rose-l);color:var(--rose-d);} .btn-b:hover{background:var(--rose);color:#fff;}
.btn-d{background:var(--sky-l);color:var(--sky-d);} .btn-d:hover{background:var(--sky);color:#fff;}

/* ─── MAP & TABLES ─── */
.map-wrap{width:100%;height:400px;border-radius:16px;overflow:hidden;border:1px solid var(--line);box-shadow:var(--sh-xs);margin-bottom:20px;z-index:10;}
.tb-wrap{background:#fff;border-radius:16px;border:1px solid var(--line);overflow:hidden;box-shadow:var(--sh-xs);}
table{width:100%;border-collapse:collapse;text-align:right;}
th{background:var(--base2);padding:15px;font-size:.8rem;font-weight:800;color:var(--ink4);border-bottom:2px solid var(--line);}
td{padding:15px;font-size:.85rem;font-weight:700;border-bottom:1px solid var(--line);}
tr:hover{background:var(--base2);}
.pg-title{font-size:1.5rem;font-weight:900;margin-bottom:20px;}

@media(max-width:768px){
  .sidebar{display:none;}
  .main{padding:15px;}
  .bnav{display:flex;position:fixed;bottom:0;width:100%;background:#fff;border-top:1px solid var(--line);z-index:1000;}
  .bn-i{flex:1;text-align:center;padding:12px;font-size:20px;color:var(--ink4);}
  .bn-i.on{color:var(--sky);border-top:2px solid var(--sky);}
}
</style>
</head>
<body>

<div id="toasts"></div>

<!-- شاشة الدخول -->
<div id="auth">
  <div class="auth-box">
    <div class="auth-h">🐋 منصة الحوت</div>
    <div class="auth-s">القيادة العليا - الإصدار 9.2</div>
    <input type="password" id="mPass" class="auth-in" placeholder="كلمة المرور">
    <button class="auth-btn" onclick="doLogin()">تسجيل الدخول</button>
  </div>
</div>

<!-- التطبيق -->
<div id="app" class="dn">
  <aside class="sidebar">
    <div class="sb-head">
      <div class="sb-logo">🐋</div>
      <div class="sb-title">الحوت<br><span style="font-size:0.7rem;color:#64748b">V9.2 Admin</span></div>
    </div>
    <button class="nb on" onclick="goTab('dash',this)">📊 لوحة القيادة</button>
    <button class="nb" onclick="goTab('offices',this)">🚗 مكاتب السيارات</button>
    <button class="nb" onclick="goTab('hotels',this)">🏨 الفنادق المشتركة</button>
    <button class="nb" onclick="goTab('orders',this)">📑 سجل الطلبات</button>
    <button class="nb" onclick="logout()" style="margin-top:auto;color:#ef4444">🚪 خروج</button>
  </aside>

  <main class="main">
    
    <!-- DASHBOARD -->
    <div id="pg-dash" class="pg on">
      <div class="pg-title">لوحة القيادة والمراقبة</div>
      <div class="kpi-row">
        <div class="kc"><div class="kc-ic" style="background:var(--sky-l);color:var(--sky)">📦</div><div><div class="kc-v" id="k-orders">0</div><div class="kc-l">إجمالي الطلبات</div></div></div>
        <div class="kc"><div class="kc-ic" style="background:var(--amber-l);color:var(--amber)">⏳</div><div><div class="kc-v" id="k-pend">0</div><div class="kc-l">طلبات معلقة</div></div></div>
        <div class="kc"><div class="kc-ic" style="background:var(--jade-l);color:var(--jade)">💵</div><div><div class="kc-v" id="k-rev">0</div><div class="kc-l">أرباح السيارات (د.ع)</div></div></div>
        <div class="kc"><div class="kc-ic" style="background:var(--fire-l);color:var(--fire)">🏨</div><div><div class="kc-v" id="k-hrev">0</div><div class="kc-l">أرباح الفنادق (د.ع)</div></div></div>
      </div>
      <div class="map-wrap" id="radarMap"></div>
    </div>

    <!-- OFFICES -->
    <div id="pg-offices" class="pg">
      <div class="pg-title">إدارة مكاتب السيارات</div>
      <div class="eg" id="officesList"></div>
    </div>

    <!-- HOTELS -->
    <div id="pg-hotels" class="pg">
      <div class="pg-title">إدارة الفنادق</div>
      <div class="eg" id="hotelsList"></div>
    </div>

    <!-- ORDERS -->
    <div id="pg-orders" class="pg">
      <div class="pg-title">الطلبات والحجوزات (سيارات)</div>
      <div class="tb-wrap" style="overflow-x:auto;">
        <table>
          <thead><tr><th>الرقم</th><th>الخدمة</th><th>المكتب المنفذ</th><th>العميل</th><th>السعر</th><th>الحالة</th><th>إجراء</th></tr></thead>
          <tbody id="ordersTb"></tbody>
        </table>
      </div>
    </div>

  </main>

  <nav class="bnav dn" style="display:none">
    <div class="bn-i on" onclick="goTab('dash',this)">📊</div>
    <div class="bn-i" onclick="goTab('offices',this)">🚗</div>
    <div class="bn-i" onclick="goTab('hotels',this)">🏨</div>
    <div class="bn-i" onclick="goTab('orders',this)">📑</div>
  </nav>
</div>

<script>
// ── CONFIG ──
const API_URL = "https://script.google.com/macros/s/AKfycbwOZXSohTDG9nayqJ3caUqI6q50rGXaKiAYbBr-W6Xksq8qSQH_mxVU_o-7CJQrpUWa9A/exec";
const API_TOKEN = "HUT_CLOUD_2026";
let MPASS = "";
let map, markers = [];

// ── UTILS ──
function toast(msg, type="s") {
  const c = document.getElementById("toasts"), e = document.createElement("div");
  e.className = "ti"; e.innerHTML = `<span style="font-size:18px">${type==="s"?"✅":"❌"}</span> <span>${msg}</span>`;
  c.appendChild(e); setTimeout(()=> { e.style.opacity=0; setTimeout(()=>e.remove(),300); }, 3000);
}
function fmt(n) { return Number(n||0).toLocaleString('ar-EG'); }

// ── AUTH ──
window.onload = () => { if(localStorage.getItem('hut_admin')) { MPASS=localStorage.getItem('hut_admin'); initApp(); } };
async function doLogin() {
  const p = document.getElementById('mPass').value; if(!p) return;
  document.querySelector('.auth-btn').textContent = "جاري التحقق...";
  try {
    const res = await fetch(API_URL, {method:'POST', body:JSON.stringify({action:'VERIFY_MASTER_PASS', pass:p, token:API_TOKEN})});
    const d = await res.json();
    if(d.success) { MPASS = p; localStorage.setItem('hut_admin', p); initApp(); }
    else { toast(d.msg, 'e'); document.querySelector('.auth-btn').textContent = "تسجيل الدخول"; }
  } catch(e) { toast("خطأ اتصال", 'e'); document.querySelector('.auth-btn').textContent = "تسجيل الدخول"; }
}
function logout() { localStorage.removeItem('hut_admin'); location.reload(); }

// ── APP INIT ──
function initApp() {
  document.getElementById('auth').classList.add('dn');
  document.getElementById('app').classList.remove('dn');
  if(window.innerWidth <= 768) document.querySelector('.bnav').style.display = "flex";
  
  // Init Map
  map = L.map('radarMap').setView([35.468, 44.392], 12);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

  loadData();
  setInterval(loadData, 20000); // Poll every 20s
}

window.goTab = function(t, el) {
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.getElementById('pg-'+t).classList.add('on');
  document.querySelectorAll('.nb, .bn-i').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  if(t==='dash') setTimeout(()=>map.invalidateSize(), 200);
}

// ── LOAD DATA ──
async function loadData() {
  try {
    const r = await fetch(`${API_URL}?action=getAdminFullData&token=${API_TOKEN}&t=${Date.now()}`);
    const d = await r.json();
    if(d.success) renderAll(d);
  } catch(e) { console.log(e); }
}

function renderAll(d) {
  // KPIs
  document.getElementById('k-orders').textContent = d.stats.car_orders_total;
  document.getElementById('k-pend').textContent = d.stats.car_pending;
  document.getElementById('k-rev').textContent = fmt(d.stats.total_car_revenue);
  document.getElementById('k-hrev').textContent = fmt(d.stats.total_hotel_revenue);

  // Map Markers
  markers.forEach(m=>map.removeLayer(m)); markers = [];
  d.carOffices.forEach(o => {
    if(o.lat && o.lng) {
      const m = L.marker([o.lat, o.lng]).bindPopup(`<b>🚗 ${o.name}</b><br>الطلبات: ${o.total_orders}<br>الديون: ${fmt(o.debt)}`);
      markers.push(m); m.addTo(map);
    }
  });
  d.hotels.forEach(h => {
    if(h.lat && h.lng) {
      const m = L.marker([h.lat, h.lng]).bindPopup(`<b>🏨 ${h.name}</b><br>الحجوزات: ${h.total_bookings}`);
      markers.push(m); m.addTo(map);
    }
  });

  // Render Offices
  const oHtml = d.carOffices.map(o => `
    <div class="ec">
      <div class="ec-top"><div><div class="ec-n">🚗 ${o.name}</div><div style="font-size:.7rem;color:var(--ink4)">${o.phone}</div></div>
      <span class="ec-st st-${o.status}">${o.status}</span></div>
      <div class="ec-stats">
        <div class="ec-st-i"><div class="ec-st-v text-success">${o.total_orders}</div><div class="ec-st-l">مكتملة</div></div>
        <div class="ec-st-i"><div class="ec-st-v" style="color:var(--rose)">${fmt(o.debt)}</div><div class="ec-st-l">ديون مستحقة</div></div>
      </div>
      <div class="ec-acts">
        <button class="btn-sm btn-a" onclick="act('CarOffice','${o.id}','active')">تفعيل</button>
        <button class="btn-sm btn-b" onclick="act('CarOffice','${o.id}','blocked')">حظر</button>
        <button class="btn-sm btn-d" onclick="rst('CarOffice','${o.id}')">تصفير ديون</button>
      </div>
    </div>`).join('');
  document.getElementById('officesList').innerHTML = oHtml || "لا توجد مكاتب.";

  // Render Hotels
  const hHtml = d.hotels.map(h => `
    <div class="ec">
      <div class="ec-top"><div><div class="ec-n">🏨 ${h.name} ${'⭐'.repeat(h.stars||1)}</div><div style="font-size:.7rem;color:var(--ink4)">${h.city}</div></div>
      <span class="ec-st st-${h.status}">${h.status}</span></div>
      <div class="ec-stats">
        <div class="ec-st-i"><div class="ec-st-v text-success">${h.total_bookings}</div><div class="ec-st-l">حجوزات</div></div>
        <div class="ec-st-i"><div class="ec-st-v" style="color:var(--rose)">${fmt(h.debt)}</div><div class="ec-st-l">ديون مستحقة</div></div>
      </div>
      <div class="ec-acts">
        <button class="btn-sm btn-a" onclick="act('Hotel','${h.id}','active')">تفعيل</button>
        <button class="btn-sm btn-b" onclick="act('Hotel','${h.id}','blocked')">حظر</button>
        <button class="btn-sm btn-d" onclick="rst('Hotel','${h.id}')">تصفير ديون</button>
      </div>
    </div>`).join('');
  document.getElementById('hotelsList').innerHTML = hHtml || "لا توجد فنادق.";

  // Render Orders Table
  const tb = d.carOrders.slice(0,50).map(o => `
    <tr>
      <td style="direction:ltr;text-align:right">#${o.id.slice(-6)}</td>
      <td>${o.service}</td>
      <td><span style="background:var(--base2);padding:2px 8px;border-radius:6px;font-size:.7rem">${o.office||'—'}</span></td>
      <td>${o.name}<br><span style="font-size:.65rem;color:var(--ink4)">${o.phone}</span></td>
      <td style="color:var(--jade);font-weight:900">${fmt(o.total)}</td>
      <td><span class="ec-st st-${o.status}">${o.status}</span></td>
      <td><button class="btn-sm btn-b" style="padding:4px 8px" onclick="delOrder('${o.id}')">إلغاء</button></td>
    </tr>`).join('');
  document.getElementById('ordersTb').innerHTML = tb;
}

// ── ADMIN ACTIONS ──
async function postAct(actName, payload) {
  try {
    payload.action = actName; payload.token = API_TOKEN; payload.pass = MPASS;
    const r = await fetch(API_URL, {method:'POST', body:JSON.stringify(payload)});
    const d = await r.json();
    if(d.success) { toast("تمت العملية بنجاح"); loadData(); } else toast(d.msg, 'e');
  } catch(e) { toast("فشل الاتصال", 'e'); }
}

window.act = (type, id, st) => { if(confirm('تأكيد الإجراء؟')) postAct('ADMIN_UPDATE_STATUS', {entityType:type, id:id, status:st}); }
window.rst = (type, id) => { if(confirm('تصفير الديون نهائياً؟')) postAct('resetDebt', {entityType:type, id:id}); }
window.delOrder = (id) => { if(confirm('إلغاء الطلب؟')) postAct('deleteOrder', {id:id}); }

</script>
</body>
</html>
