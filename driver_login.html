<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول الكابتن | منظومة الحوت</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .glass-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-input { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
        .btn-amber { background: linear-gradient(135deg, #fbbf24, #d97706); color: #020617; }
        .hidden { display: none; }
        .animate-fade { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-6 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-slate-900 via-black to-black">

    <div class="max-w-md w-full glass-card p-10 rounded-[3.5rem] shadow-2xl relative">
        
        <div id="loadingSplash" class="text-center py-10">
            <div class="w-16 h-16 border-4 border-amber-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-xs text-amber-500 font-black italic">جاري التعرف على الكابتن...</p>
        </div>

        <div id="mainAuthUI" class="hidden animate-fade">
            <header class="text-center mb-8">
                <div class="w-16 h-16 bg-amber-500 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-xl shadow-amber-500/20">
                    <span class="text-slate-900 text-3xl font-black font-mono italic">ح</span>
                </div>
                <h1 class="text-xl font-black italic text-white">رادار الحوت</h1>
                <p class="text-[9px] text-gray-500 mt-2 uppercase tracking-widest font-black italic">نظام التعرف التلقائي</p>
            </header>

            <form id="smartForm" class="space-y-6">
                <div>
                    <label class="text-[9px] text-amber-500 font-black mb-3 mr-2 block italic">رقم الهوية الوطنية</label>
                    <input type="number" id="driverID" required placeholder="أدخل 12 رقم" 
                           class="w-full glass-input p-5 rounded-2xl text-sm font-mono tracking-[0.3em] text-center text-white"
                           oninput="checkUserStatus(this.value)">
                </div>

                <div id="newUserData" class="hidden space-y-5 border-t border-white/5 pt-6">
                    <input type="text" id="regName" placeholder="الاسم الثلاثي الكامل" class="w-full glass-input p-4 rounded-xl text-sm font-bold italic">
                    <input type="tel" id="regPhone" placeholder="رقم الهاتف (واتساب)" class="w-full glass-input p-4 rounded-xl text-sm font-mono italic text-center" dir="ltr">
                </div>

                <button type="submit" id="mainBtn" class="w-full btn-amber py-5 rounded-3xl font-black text-sm italic shadow-lg active:scale-95 transition-all">
                    استمرار 🚀
                </button>
            </form>
        </div>

        <div id="waitMessage" class="hidden text-center py-8 animate-fade">
            <div class="text-5xl mb-4">⏳</div>
            <h3 class="text-lg font-black text-amber-400 italic font-bold">طلبك قيد المراجعة</h3>
            <p class="text-[10px] text-gray-400 mt-4 leading-relaxed italic">أهلاً بك مجدداً كابتن. طلبك وصل للمدير، بانتظار التفعيل لبدء استلام الطلبيات.</p>
            <button onclick="logout()" class="mt-8 text-[9px] text-red-500 underline font-black italic">إلغاء الطلب والتسجيل من جديد</button>
        </div>
    </div>

    <script>
        // محاكاة قاعدة بيانات (يجب ربطها بـ Google Sheets لاحقاً)
        const mockUsers = [
            { id: "123456789012", status: "active" },
            { id: "000000000000", status: "pending" }
        ];

        window.onload = function() {
            // فحص هل الهاتف "يتذكر" مستخدماً سابقاً؟
            const savedID = localStorage.getItem('whale_driver_id');
            const savedStatus = localStorage.getItem('whale_driver_status');

            setTimeout(() => {
                document.getElementById('loadingSplash').classList.add('hidden');
                
                if (savedID) {
                    if (savedStatus === 'active') {
                        // إذا كان مفعلاً، انقله مباشرة للرادار
                        alert("مرحباً بك مجدداً! جاري فتح الرادار...");
                        // window.location.href = 'driver_dashboard.html';
                    } else {
                        // إذا كان بانتظار الموافقة، أظهر له رسالة الانتظار فوراً
                        document.getElementById('waitMessage').classList.remove('hidden');
                    }
                } else {
                    // إذا لم يسجل من قبل، أظهر واجهة الدخول
                    document.getElementById('mainAuthUI').classList.remove('hidden');
                }
            }, 1000);
        };

        function checkUserStatus(val) {
            const newUserSection = document.getElementById('newUserData');
            const mainBtn = document.getElementById('mainBtn');
            const user = mockUsers.find(u => u.id === val);

            if (user) {
                mainBtn.innerText = user.status === "active" ? "دخول سريع ✅" : "عرض الحالة ⏳";
                newUserSection.classList.add('hidden');
            } else if(val.length > 5) {
                newUserSection.classList.remove('hidden');
                mainBtn.innerText = "تقديم طلب انضمام 📤";
            }
        }

        document.getElementById('smartForm').onsubmit = function(e) {
            e.preventDefault();
            const id = document.getElementById('driverID').value;
            
            // محاكاة حفظ البيانات في المتصفح (تذكرني)
            localStorage.setItem('whale_driver_id', id);
            
            const user = mockUsers.find(u => u.id === id);
            if (user && user.status === "active") {
                localStorage.setItem('whale_driver_status', 'active');
                alert("تم التفعيل! سيتم نقلك للرادار.");
            } else {
                localStorage.setItem('whale_driver_status', 'pending');
                document.getElementById('mainAuthUI').classList.add('hidden');
                document.getElementById('waitMessage').classList.remove('hidden');
            }
        };

        function logout() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
