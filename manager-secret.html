<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة تحكم الحوت العليا 👑</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --whale-gold: #D4AF37; --whale-navy: #020617; }
        body { font-family: 'Tajawal', sans-serif; background: #010409; color: white; overflow-x: hidden; min-height: 100vh; }
        
        /* الخلفيات والتأثيرات */
        .trading-bg { position: fixed; inset: 0; background-image: linear-gradient(rgba(212, 175, 55, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(212, 175, 55, 0.02) 1px, transparent 1px); background-size: 40px 40px; z-index: -1; }
        .radar-scan { position: fixed; top: 0; left: 0; width: 100%; height: 2px; background: var(--whale-gold); animation: scan 6s linear infinite; opacity: 0.2; pointer-events: none; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .whale-float { animation: floating 3s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* تنسيقات البطاقات والأزرار */
        .admin-card { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(212, 175, 55, 0.1); border-radius: 2rem; transition: 0.4s; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .tab-btn { padding: 12px; border-radius: 15px; font-weight: bold; transition: 0.3s; cursor: pointer; position: relative; }
        .tab-active { background: #D4AF37; color: #020617; box-shadow: 0 10px 20px -5px rgba(212, 175, 55, 0.4); }
        .status-badge { padding: 4px 12px; border-radius: 8px; font-size: 10px; font-weight: 900; letter-spacing: 0.5px; }
        
        .order-new { border-right: 8px solid #3b82f6; } 
        .order-completed { border-right: 8px solid #22c55e; background: rgba(34, 197, 94, 0.05); } 
        .order-trouble { border-right: 8px solid #a855f7; background: rgba(168, 85, 247, 0.05); }

        .btn-whatsapp-quick { background: #25D366; color: white; }
        .btn-remind-quick { background: #004d99; color: white; }
        .count-badge { position: absolute; top: -5px; left: -5px; background: #ef4444; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; }
        
        #authOverlay { transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .fade-in { animation: fadeIn 0.8s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); filter: blur(5px); } to { opacity: 1; transform: translateY(0); filter: blur(0); } }
    </style>
</head>
<body class="p-4 pb-20">

    <div class="trading-bg"></div>
    <div class="radar-scan"></div>

    <div id="authOverlay" class="fixed inset-0 z-50 bg-[#010409]/95 backdrop-blur-xl flex flex-col items-center justify-center p-6">
        <div class="whale-float mb-8 text-7xl">🐋</div>
        <h2 class="text-[#D4AF37] text-2xl font-black mb-6 tracking-tighter text-center">غرفة العمليات المركزية<br><span class="text-xs text-slate-500 uppercase italic tracking-widest" style="font-family: 'Orbitron', sans-serif;">Master Control Room</span></h2>
        <div class="relative w-full max-w-xs">
            <input type="password" id="masterKey" autofocus
                   class="w-full bg-slate-900 border-2 border-slate-800 rounded-2xl p-5 text-center text-2xl text-[#D4AF37] tracking-[0.5em] outline-none focus:border-[#D4AF37] transition-all shadow-inner"
                   placeholder="****">
            <button onclick="checkMasterKey()" class="w-full mt-4 bg-[#D4AF37] text-[#020617] py-4 rounded-2xl font-black hover:bg-yellow-500 transition-all shadow-xl shadow-yellow-500/10 active:scale-95">
                تأكيد الدخول 🔑
            </button>
        </div>
        <p id="errorMsg" class="text-red-500 text-xs mt-6 font-bold opacity-0 transition-opacity">عذراً، رمز السيادة غير صحيح ⚠️</p>
    </div>

    <div id="mainContent" class="hidden opacity-0 transition-opacity duration-1000 pt-6">
        <header class="max-w-4xl mx-auto mb-8 flex justify-between items-end border-b border-slate-800 pb-4 fade-in">
            <div>
                <h1 class="text-3xl font-black text-[#D4AF37]">غرفة العمليات 🔱</h1>
                <p class="text-slate-400 text-xs mt-1 italic uppercase tracking-tighter">نظام إدارة الحوت الشامل</p>
            </div>
            <button onclick="loadData()" class="bg-slate-800 p-3 px-5 rounded-2xl border border-slate-700 hover:bg-slate-700 hover:border-[#D4AF37] text-xs font-bold text-blue-400 shadow-lg transition-all flex items-center gap-2">
                <i class="fas fa-sync-alt"></i> تحديث الرادار
            </button>
        </header>

        <div class="max-w-4xl mx-auto flex gap-3 mb-8 fade-in" style="animation-delay: 0.1s;">
            <button onclick="switchTab('orders')" id="btnOrders" class="tab-btn flex-1 tab-active text-sm">
                مراقبة الطلبات 🛰️
                <span id="orderCount" class="count-badge">0</span>
            </button>
            <button onclick="switchTab('offices')" id="btnOffices" class="tab-btn flex-1 bg-slate-900 text-slate-500 text-sm border border-slate-800">
                شركاء الخدمة 🤝
                <span id="officeCount" class="count-badge hidden">0</span>
            </button>
        </div>

        <main class="max-w-4xl mx-auto space-y-4 fade-in" style="animation-delay: 0.2s;" id="content">
            <div class="text-center py-20 opacity-40 italic font-bold tracking-widest animate-pulse">جاري سحب إشارات الحوت من السيرفر...</div>
        </main>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbxpAW6PZ9ykBmaIfuDxtxr3YOfcg95jXeFJ2FjX5GxGRiawUNHzs90rKBEUFOcf_z_n/exec";
        const MASTER_PASS = "2026"; 
        let currentTab = 'orders';
        let data = { orders: [], offices: [] };
        let refreshInterval;

        function checkMasterKey() {
            const pass = document.getElementById('masterKey').value;
            if(pass === MASTER_PASS) {
                document.getElementById('authOverlay').classList.add('opacity-0', 'pointer-events-none', 'scale-110');
                setTimeout(() => {
                    document.getElementById('authOverlay').classList.add('hidden');
                    const main = document.getElementById('mainContent');
                    main.classList.remove('hidden');
                    setTimeout(() => main.classList.remove('opacity-0'), 50);
                }, 600);
                
                loadData();
                refreshInterval = setInterval(loadData, 30000); 
            } else {
                document.getElementById('errorMsg').classList.remove('opacity-0');
                document.getElementById('masterKey').value = "";
                setTimeout(() => document.getElementById('errorMsg').classList.add('opacity-0'), 3000);
            }
        }

        async function loadData() {
            try {
                const res = await fetch(`${scriptURL}?action=getAdminFullData&t=${Date.now()}`);
                data = await res.json();
                
                // تحديث العدادات
                document.getElementById('orderCount').innerText = data.orders.length;
                const pendingOffices = data.offices.filter(of => of.status !== 'نشط').length;
                if(pendingOffices > 0) {
                    document.getElementById('officeCount').innerText = pendingOffices;
                    document.getElementById('officeCount').classList.remove('hidden');
                } else {
                    document.getElementById('officeCount').classList.add('hidden');
                }
                
                render();
            } catch (e) { 
                document.getElementById('content').innerHTML = `<div class="text-center p-10 text-red-400 font-bold bg-red-900/20 rounded-2xl border border-red-500/30">❌ فشل الاتصال.. تأكد من نشر السكريبت كـ Web App للجميع</div>`;
            }
        }

        function render() {
            const container = document.getElementById('content');
            if (currentTab === 'orders') {
                let html = data.orders.slice().reverse().map(o => renderOrderCard(o)).join('');
                container.innerHTML = html || `<div class="text-center py-20 opacity-30 font-bold tracking-widest border border-dashed border-slate-700 rounded-3xl mx-4">لا توجد طلبات في المنظومة</div>`;
            } else {
                container.innerHTML = data.offices.slice().reverse().map(of => `
                    <div class="admin-card p-6 mb-4 border-r-8 ${of.status === 'نشط' ? 'border-green-500' : 'border-red-500'} mx-2">
                        <div class="flex justify-between items-center text-right">
                            <div>
                                <h3 class="text-lg font-black text-white">${of.name}</h3>
                                <p class="text-[10px] text-slate-400 font-bold mt-1">${of.city} | ID: ${of.id}</p>
                                <span class="status-badge mt-2 inline-block ${of.status==='نشط'?'bg-green-500/10 text-green-500':'bg-red-500/10 text-red-500'}">${of.status}</span>
                            </div>
                            <div class="flex gap-2">
                                ${of.status !== 'نشط' ? `<button onclick="action('approveOffice', '${of.id}')" class="bg-green-600/20 border border-green-500/30 text-green-400 hover:bg-green-600 hover:text-white p-3 px-5 rounded-2xl text-[10px] font-black transition-all">تفعيل</button>` : ''}
                                <button onclick="action('blockOffice', '${of.id}')" class="bg-orange-600/20 text-orange-400 p-3 rounded-2xl text-[10px] font-bold border border-orange-600/10 hover:bg-orange-600/40 transition-all">حظر</button>
                                <button onclick="action('deleteOffice', '${of.id}')" class="bg-red-600/20 text-red-400 p-3 rounded-2xl text-xs hover:bg-red-600/40 transition-all"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        }

        function renderOrderCard(o) {
            const status = o.status || "";
            const isTrouble = status.includes('⚠️') || status.includes('إلغاء');
            const isCompleted = status.includes('✅') || status.includes('مكتمل');
            const orderId = o.id || o.order_id;
            
            let cleanPhone = o.phone ? o.phone.toString().replace(/\s+/g, '') : '';
            if(cleanPhone.startsWith('07')) cleanPhone = '964' + cleanPhone.substring(1);

            return `
            <div class="admin-card p-6 mb-4 ${isCompleted?'order-completed':isTrouble?'order-trouble':'order-new'} text-right mx-2">
                <div class="flex flex-col md:flex-row justify-between items-start gap-4">
                    <div class="flex-1 w-full">
                        <span class="status-badge ${isCompleted ? 'bg-green-500/20 text-green-400 border border-green-500/30' : isTrouble ? 'bg-purple-600/20 text-purple-400 border border-purple-500/30' : 'bg-blue-600/20 text-blue-400 border border-blue-500/30'}">${status}</span>
                        <h3 class="text-xl font-black text-white mt-3">${o.car || 'سيارة'}</h3>
                        <p class="text-sm text-[#D4AF37] font-black">${Number(o.price || 0).toLocaleString()} د.ع</p>
                        
                        <div class="mt-4 grid grid-cols-2 gap-3 text-[11px] text-slate-300 bg-black/20 p-3 rounded-xl border border-white/5">
                            <p><i class="fas fa-user text-slate-500 ml-1"></i> ${o.name || '---'}</p>
                            <p><i class="fas fa-map-marker-alt text-slate-500 ml-1"></i> ${o.province || o.prov || '---'}</p>
                            <p><i class="fas fa-phone text-slate-500 ml-1"></i> ${o.phone || '---'}</p>
                            <p><i class="fas fa-building text-slate-500 ml-1"></i> <span class="text-orange-400 font-bold">${o.office || 'بانتظار مكتب'}</span></p>
                            <p class="col-span-2 text-blue-300 mt-1"><i class="fas fa-plus-circle ml-1"></i> الإضافة: ${o.addon || o.add_on || 'لا يوجد'}</p>
                        </div>
                    </div>

                    <div class="flex flex-col gap-2 w-full md:w-32 mt-2 md:mt-0">
                        <div class="flex gap-2">
                             <button onclick="sendReminder('${cleanPhone}', '${o.name}', '${o.car}')" class="flex-1 btn-remind-quick p-2.5 rounded-xl text-[10px] font-black hover:brightness-110 active:scale-95 transition-all"><i class="fas fa-bell"></i></button>
                            <button onclick="contactCustomer('${cleanPhone}')" class="flex-1 btn-whatsapp-quick p-2.5 rounded-xl text-[10px] font-black hover:brightness-110 active:scale-95 transition-all"><i class="fab fa-whatsapp"></i></button>
                        </div>
                        <div class="h-[1px] bg-white/10 my-2"></div>
                        <button onclick="action('adminReset', '${orderId}')" class="bg-blue-600/20 text-blue-400 p-2.5 rounded-xl text-[10px] font-black hover:bg-blue-600/40 transition-all border border-blue-500/20">إعادة للرادار</button>
                        <button onclick="action('deleteOrder', '${orderId}')" class="bg-red-600/10 text-red-500 p-2.5 rounded-xl text-[10px] font-bold hover:bg-red-600/30 transition-all border border-red-500/20"><i class="fas fa-trash ml-1"></i> حذف</button>
                    </div>
                </div>
            </div>`;
        }

        function sendReminder(phone, name, car) {
            const msg = `مرحباً سيد ${name} 🐋، نذكرك بموعد استلام سيارتك (${car}) اليوم. نرجو الحضور للمكتب. شكراً لك!`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function contactCustomer(phone) {
            window.open(`https://wa.me/${phone}?text=مرحباً بك في منصة الحوت..`, '_blank');
        }

        async function action(act, id) {
            if(!confirm("تأكيد هذا الإجراء الإداري؟")) return;
            try {
                const res = await fetch(`${scriptURL}?action=${act}&id=${id}`);
                const result = await res.json();
                if(result.success) loadData();
                else alert("فشل: " + result.message);
            } catch (e) { alert("خطأ في الاتصال بالسيرفر"); }
        }

        function switchTab(t) {
            currentTab = t;
            document.getElementById('btnOrders').className = `tab-btn flex-1 ${t==='orders' ? 'tab-active' : 'bg-slate-900 text-slate-500 border border-slate-800'}`;
            document.getElementById('btnOffices').className = `tab-btn flex-1 ${t==='offices' ? 'tab-active' : 'bg-slate-900 text-slate-500 border border-slate-800'}`;
            render();
        }

        document.getElementById('masterKey').addEventListener('keypress', (e) => { if(e.key === 'Enter') checkMasterKey(); });
    </script>
</body>
</html>
