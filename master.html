<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>السيادة المطلقة | منظومة الحوت</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: white; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none; }
        .login-screen { background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); }
    </style>
</head>
<body class="min-h-screen">

    <div id="masterLogin" class="fixed inset-0 z-[100] login-screen flex items-center justify-center p-6">
        <div class="max-w-md w-full glass p-10 rounded-[3rem] text-center border border-emerald-500/20">
            <div class="w-20 h-20 bg-emerald-500 rounded-3xl mx-auto flex items-center justify-center mb-6 shadow-2xl shadow-emerald-500/20">
                <span class="text-slate-900 text-4xl font-black font-mono">ح</span>
            </div>
            <h1 class="text-xl font-black mb-6 italic">غرفة العمليات المركزية</h1>
            <input type="password" id="masterPass" placeholder="كلمة مرور السيادة" 
                   class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl text-center mb-4 focus:border-emerald-500 outline-none transition-all tracking-[0.5em]">
            <button onclick="checkMasterAuth()" class="w-full bg-emerald-500 text-slate-900 py-5 rounded-2xl font-black hover:scale-95 transition-all shadow-lg italic">دخول للرادار 🔐</button>
        </div>
    </div>

    <div id="masterContent" class="hidden p-4 md:p-8 pb-20">
        <header class="max-w-7xl mx-auto mb-8 flex flex-col md:flex-row justify-between items-center bg-slate-900/80 p-6 rounded-[2.5rem] border border-emerald-500/20 shadow-2xl">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-emerald-500 rounded-2xl flex items-center justify-center font-black text-slate-900 text-2xl shadow-lg font-mono">ح</div>
                <div>
                    <h1 class="text-2xl font-black tracking-tight text-white italic">السيادة المطلقة</h1>
                    <p class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest italic font-mono">Al-Hut Master System v1.5</p>
                </div>
            </div>
            <div class="flex gap-4 mt-4 md:mt-0">
                <button onclick="logoutMaster()" class="text-[10px] text-red-500 font-black px-4 py-2 border border-red-500/20 rounded-xl italic">خروج آمن</button>
                <div class="glass px-6 py-2 rounded-2xl border-r-4 border-red-500 text-center">
                    <p class="text-[9px] text-gray-500 uppercase font-black italic">طلبات معلقة</p>
                    <p id="pendingCount" class="font-black text-xl text-red-500 italic">5</p>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto">
            <div class="flex flex-wrap gap-3 mb-8">
                <button onclick="showTab('orders')" id="btn-orders" class="tab-btn flex-1 bg-emerald-600 p-5 rounded-2xl font-black transition-all shadow-lg flex items-center justify-center gap-2 italic">📋 الرادار الحي</button>
                <button onclick="showTab('restaurants')" id="btn-restaurants" class="tab-btn flex-1 glass p-5 rounded-2xl font-black hover:bg-white/5 transition-all flex items-center justify-center gap-2 italic text-emerald-500">🍕 إدارة المطاعم</button>
                <button onclick="showTab('drivers')" id="btn-drivers" class="tab-btn flex-1 glass p-5 rounded-2xl font-black hover:bg-white/5 transition-all flex items-center justify-center gap-2 italic text-amber-500">🏍️ أسطول السواق</button>
            </div>

            <div id="orders" class="tab-content active glass p-6 md:p-10 rounded-[3rem]">
                <h2 class="text-xl font-black text-emerald-400 italic mb-8">📦 رادار الطلبات الحية</h2>
                <div id="liveOrdersContainer" class="space-y-4 opacity-30 text-center py-10 italic">
                   <p>🔍 بانتظار بث أول طلبية من مطعم معتمد...</p>
                </div>
            </div>

            <div id="restaurants" class="tab-content glass p-6 md:p-10 rounded-[3rem]">
                <div class="mb-12">
                    <div class="flex items-center gap-4 mb-8">
                        <span class="w-3 h-3 bg-red-500 rounded-full animate-ping"></span>
                        <h2 class="text-xl font-black text-red-500 italic uppercase font-bold tracking-tight">طلبات انضمام مطاعم جديدة</h2>
                    </div>
                    <div id="restaurantRequests" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-red-500/5 border border-red-500/20 p-6 rounded-[2.5rem]">
                            <div class="flex justify-between items-start mb-6">
                                <div>
                                    <h3 class="text-lg font-black text-white italic">مطعم كرز الشام</h3>
                                    <p class="text-[10px] text-gray-500 font-bold italic font-mono">ID: 199522003344</p>
                                </div>
                                <a href="tel:077XXXXXXXX" class="btn-call p-3 rounded-xl text-xs">📞</a>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="processAction('restaurant', 'approve', 'كرز الشام')" class="flex-1 bg-emerald-600 text-slate-900 py-4 rounded-2xl font-black italic text-sm">تفعيل ✅</button>
                                <button onclick="processAction('restaurant', 'delete', 'كرز الشام')" class="flex-[0.5] bg-red-600/20 text-red-500 py-4 rounded-2xl font-black italic text-sm">رفض</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="drivers" class="tab-content glass p-6 md:p-10 rounded-[3rem]">
                <div class="mb-12 border-r-4 border-amber-500 pr-6">
                    <h2 class="text-xl font-black text-amber-500 italic mb-8 uppercase">طلبات انضمام كباتن</h2>
                    <div id="driverRequests" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-amber-500/5 border border-amber-500/20 p-6 rounded-[2.5rem]">
                            <div class="flex justify-between items-start mb-6">
                                <div>
                                    <h3 class="text-lg font-black text-white italic">الكابتن: يونس الكركوكلي</h3>
                                    <p class="text-[10px] text-amber-500/50 font-mono italic">ID: 199022334455</p>
                                </div>
                                <a href="tel:077XXXXXXXX" class="btn-call p-3 rounded-xl text-xs font-bold italic font-bold tracking-widest uppercase italic font-bold font-bold font-bold font-bold">📞</a>
                            </div>
                            <button onclick="processAction('driver', 'approve', 'يونس')" class="w-full bg-amber-500 text-slate-900 py-4 rounded-2xl font-black italic text-sm">تفعيل الكابتن ✅</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // نظام الحماية البسيط
        const MASTER_SECRET = "112233"; // يفضل تغييرها لاحقاً

        function checkMasterAuth() {
            const pass = document.getElementById('masterPass').value;
            if (pass === MASTER_SECRET) {
                document.getElementById('masterLogin').classList.add('hidden');
                document.getElementById('masterContent').classList.remove('hidden');
                localStorage.setItem('whale_master_auth', 'true');
            } else {
                alert("رمز السيادة خاطئ ⚠️");
            }
        }

        window.onload = () => {
            if (localStorage.getItem('whale_master_auth') === 'true') {
                document.getElementById('masterLogin').classList.add('hidden');
                document.getElementById('masterContent').classList.remove('hidden');
            }
        };

        function logoutMaster() {
            localStorage.removeItem('whale_master_auth');
            location.reload();
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-emerald-600', 'shadow-lg', 'text-white');
                btn.classList.add('glass');
            });
            document.getElementById('btn-' + tabId).classList.add('bg-emerald-600', 'shadow-lg', 'text-white');
        }

        function processAction(type, action, name) {
            const msg = action === 'approve' ? `تفعيل ${name}؟` : `حذف ${name}؟`;
            if (confirm(msg)) {
                alert(`تم تنفيذ الإجراء بنجاح لـ ${name} ✅`);
                // هنا يتم تحديث الـ Google Sheets لاحقاً
            }
        }
    </script>
</body>
</html>
