<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>الحوت — دليل الحجوزات المركزية</title>
<meta name="theme-color" content="#F7F7F7">

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
/* ═══════════════════════════════════════════════════════════
   DESIGN SYSTEM — Call Center / Master Fleet
═══════════════════════════════════════════════════════════ */
:root {
  --bg: #F7F7F7;
  --white: #FFFFFF;
  --border: #EBEBEB;
  --border-d: #DDDDDD;
  --red: #FF385C;
  --red-d: #E31C5F;
  --red-l: #FFF0F2;
  --green: #00A699;
  --green-l: #E6F7F6;
  --amber: #FC642D;
  --amber-l: #FFF3EE;
  --blue: #0066CC;
  --blue-l: #EEF5FF;
  --tx0: #222222;
  --tx1: #484848;
  --tx2: #717171;
  --tx3: #AAAAAA;
  --sh-card: 0 4px 12px rgba(0,0,0,.06);
  --sh-hover: 0 8px 24px rgba(0,0,0,.1);
  --sh-btn: 0 4px 12px rgba(255,56,92,.25);
  --sh-modal: 0 16px 48px rgba(0,0,0,.18);
  --r2: 8px; --r3: 12px; --r4: 16px; --r5: 20px;
}

*,::before,::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'Cairo',sans-serif;color:var(--tx0);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
button,input,select{font-family:'Cairo',sans-serif;outline:none;}
.dn{display:none!important;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--border-d);border-radius:99px;}

/* ── HEADER ── */
.header{
  background:var(--white);border-bottom:1px solid var(--border);
  padding:14px 24px;display:flex;align-items:center;justify-content:space-between;
  z-index:100;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.03);
}
.h-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.h-logo-ic{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#FF385C,#E31C5F);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:var(--sh-btn);}
.h-title{font-size:1.1rem;font-weight:900;color:var(--tx0);}
.h-sub{font-size:.65rem;font-weight:700;color:var(--tx2);background:var(--bg);padding:2px 8px;border-radius:99px;border:1px solid var(--border);}
.h-status{display:flex;align-items:center;gap:6px;font-size:.75rem;font-weight:800;color:var(--green);background:var(--green-l);padding:6px 12px;border-radius:99px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── MAIN LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden;}

/* ── LEFT: PHONE ORDERS TRACKER ── */
.tracker-panel{
  width:350px;background:var(--white);border-left:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;z-index:10;
}
.tp-head{padding:16px;border-bottom:1px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:space-between;}
.tp-title{font-size:.9rem;font-weight:900;}
.tp-badge{background:var(--amber);color:#fff;font-size:.65rem;font-weight:900;padding:2px 8px;border-radius:99px;}
.tp-list{flex:1;overflow-y:auto;padding:12px;}
.tp-empty{text-align:center;padding:40px 20px;color:var(--tx3);font-size:.85rem;font-weight:700;}

/* Tracker Card */
.tc{background:var(--white);border:1px solid var(--border);border-radius:var(--r3);padding:12px;margin-bottom:12px;box-shadow:var(--sh-card);border-right:4px solid var(--border-d);}
.tc.pending{border-right-color:var(--amber);}
.tc.active{border-right-color:var(--blue);}
.tc-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.tc-cust{font-size:.85rem;font-weight:900;color:var(--tx0);}
.tc-timer{font-family:'IBM Plex Mono',monospace;font-size:.7rem;font-weight:800;color:var(--amber);background:var(--amber-l);padding:2px 6px;border-radius:6px;display:flex;align-items:center;gap:4px;}
.tc-car{font-size:.75rem;font-weight:700;color:var(--tx1);margin-bottom:4px;}
.tc-off{font-size:.65rem;font-weight:800;color:var(--tx2);background:var(--bg);padding:3px 8px;border-radius:6px;display:inline-block;margin-bottom:8px;}
.tc-acts{display:grid;grid-template-columns:1fr 1fr;gap:6px;border-top:1px solid var(--border);padding-top:8px;}
.tc-btn{padding:8px;border-radius:8px;border:none;font-size:.7rem;font-weight:800;cursor:pointer;font-family:'Cairo',sans-serif;transition:.2s;display:flex;align-items:center;justify-content:center;gap:4px;}
.tc-btn:active{transform:scale(.95);}
.tc-btn.wa{background:#dcfce7;color:#16a34a;border:1px solid #bbf7d0;}
.tc-btn.wa:hover{background:#25D366;color:#fff;}
.tc-btn.acc{background:var(--blue-l);color:var(--blue);}
.tc-btn.comp{background:var(--green);color:#fff;grid-column:1/3;box-shadow:0 4px 10px rgba(0,166,153,.2);}
.tc-btn.del{background:var(--red-l);color:var(--red);}

/* ── RIGHT: MASTER FLEET ── */
.fleet-panel{flex:1;display:flex;flex-direction:column;background:var(--bg);min-width:0;position:relative;}
.fp-filters{
  padding:16px 24px;background:var(--white);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;box-shadow:var(--sh-card);z-index:10;
}
.f-search{
  flex:1;min-width:200px;display:flex;align-items:center;gap:8px;
  background:var(--bg);border:1px solid var(--border-d);border-radius:99px;
  padding:8px 16px;transition:.2s;
}
.f-search:focus-within{border-color:var(--red);background:var(--white);box-shadow:0 0 0 3px var(--red-m);}
.f-search input{border:none;background:transparent;width:100%;font-size:.85rem;font-weight:700;color:var(--tx0);}
.f-sel{
  padding:9px 14px;border-radius:99px;border:1px solid var(--border-d);
  background:var(--white);font-size:.8rem;font-weight:800;color:var(--tx1);
  cursor:pointer;outline:none;transition:.2s;
}
.f-sel:focus{border-color:var(--red);}

.f-days-wrap{
  display:flex;align-items:center;gap:6px;background:var(--amber-l);
  border:1px solid rgba(252,100,45,.3);border-radius:99px;padding:6px 14px;
}
.f-days-wrap span{font-size:.75rem;font-weight:800;color:var(--amber);}
.f-days-in{
  width:40px;border:none;background:var(--white);border-radius:6px;
  text-align:center;font-weight:900;color:var(--tx0);padding:4px;
  font-family:'IBM Plex Mono',monospace;
}

.fp-count{font-size:.8rem;font-weight:800;color:var(--tx2);margin-right:auto;}

.fp-grid{
  flex:1;overflow-y:auto;padding:24px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;
}

/* Master Car Card */
.mc{
  background:var(--white);border:1px solid var(--border);border-radius:var(--r4);
  overflow:hidden;box-shadow:var(--sh-card);transition:.2s;display:flex;flex-direction:column;
  position:relative;
}
.mc.selected{border-color:var(--green);box-shadow:0 0 0 3px var(--green-l);}
.mc:hover{box-shadow:var(--sh-hover);transform:translateY(-3px);}
.mc-img{width:100%;height:160px;background:var(--light);position:relative;}
.mc-img img{width:100%;height:100%;object-fit:cover;}
.mc-noimg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem;color:var(--tx4);}
.mc-badge{position:absolute;top:10px;right:10px;background:rgba(255,255,255,.9);padding:3px 10px;border-radius:99px;font-size:.65rem;font-weight:900;}

/* Checkbox overlay */
.mc-check{
  position:absolute;top:10px;left:10px;width:26px;height:26px;
  background:rgba(255,255,255,.9);border:2px solid var(--border-d);
  border-radius:6px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:.2s;z-index:2;
}
.mc.selected .mc-check{background:var(--green);border-color:var(--green);color:#fff;}

.mc-office{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,.7);color:#fff;padding:4px 10px;border-radius:99px;font-size:.65rem;font-weight:800;backdrop-filter:blur(4px);display:flex;align-items:center;gap:5px;}
.mc-status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s infinite;}

.mc-bd{padding:14px;flex:1;display:flex;flex-direction:column;}
.mc-title{font-size:1.05rem;font-weight:900;margin-bottom:4px;color:var(--tx0);}
.mc-specs{display:flex;gap:6px;font-size:.7rem;font-weight:700;color:var(--tx2);margin-bottom:10px;flex-wrap:wrap;}
.mc-spec{background:var(--bg);padding:2px 8px;border-radius:6px;border:1px solid var(--border);}
.mc-price{font-size:1.15rem;font-weight:900;color:var(--green);margin-bottom:2px;}
.mc-price-sub{font-size:.65rem;font-weight:700;color:var(--tx3);margin-bottom:12px;}

.mc-acts{display:grid;grid-template-columns:1fr;gap:8px;margin-top:auto;}
.mcb{padding:10px;border-radius:8px;border:none;font-size:.8rem;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:.2s;font-family:'Cairo',sans-serif;}
.mcb:active{transform:scale(.95);}
.mcb.book{background:var(--red-l);color:var(--red);border:1px solid rgba(255,56,92,.2);}
.mcb.book:hover{background:var(--red);color:#fff;box-shadow:var(--sh-btn);}

/* Multi-Send FAB */
.fab-multi{
  position:absolute;bottom:30px;left:50%;transform:translateX(-50%);
  background:var(--green);color:#fff;padding:14px 28px;
  border-radius:99px;font-size:.9rem;font-weight:900;
  box-shadow:0 10px 25px rgba(0,166,153,.3);
  display:flex;align-items:center;gap:8px;cursor:pointer;
  transition:.3s cubic-bezier(.34,1.56,.64,1);z-index:9000;
}
.fab-multi:hover{transform:translateX(-50%) translateY(-3px);box-shadow:0 14px 30px rgba(0,166,153,.4);}
.fab-multi:active{transform:translateX(-50%) scale(.95);}
.fab-badge{background:#fff;color:var(--green);width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;}

/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:90000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.3s;}
.modal-overlay.open{opacity:1;pointer-events:auto;}
.modal-card{background:var(--white);width:100%;max-width:440px;border-radius:var(--r5);padding:24px;box-shadow:var(--sh-modal);transform:translateY(20px);transition:.3s;max-height:90vh;overflow-y:auto;}
.modal-overlay.open .modal-card{transform:translateY(0);}
.md-title{font-size:1.2rem;font-weight:900;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.md-close{background:none;border:none;font-size:20px;color:var(--tx3);cursor:pointer;}
.md-car-info{background:var(--bg);border:1px solid var(--border);border-radius:var(--r3);padding:12px;margin-bottom:16px;}
.md-ci-n{font-size:.9rem;font-weight:900;}
.md-ci-o{font-size:.75rem;font-weight:700;color:var(--tx2);}

.md-fld{margin-bottom:14px;position:relative;}
.md-lbl{font-size:.75rem;font-weight:800;color:var(--tx1);margin-bottom:6px;display:block;}
.md-in{width:100%;background:var(--white);border:1.5px solid var(--border-d);border-radius:var(--r2);padding:10px 14px;font-size:.85rem;font-weight:700;transition:.2s;}
.md-in:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-m);}
.crm-badge{font-size:.7rem;font-weight:800;margin-top:5px;display:inline-block;padding:3px 8px;border-radius:6px;}

.md-btn{width:100%;padding:14px;background:var(--red-g);color:#fff;border:none;border-radius:var(--r3);font-size:.95rem;font-weight:900;cursor:pointer;box-shadow:var(--sh-btn);margin-top:10px;font-family:'Cairo',sans-serif;}
.md-btn:active{transform:scale(.97);}

/* WhatsApp Modal Specifics */
.wa-tmps{margin-top:10px;}
.wa-tmp{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r3);padding:12px 14px;margin-bottom:10px;cursor:pointer;transition:.2s;display:flex;flex-direction:column;gap:6px;}
.wa-tmp:hover{border-color:rgba(37,211,102,.4);background:#f0fdf4;}
.wa-lbl{font-size:.85rem;font-weight:900;color:var(--tx0);}
.wa-txt{font-size:.75rem;font-weight:600;color:var(--tx2);line-height:1.5;}

/* TOASTS */
#toasts{position:fixed;top:max(16px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:99999;display:flex;flex-direction:column;gap:8px;width:min(90%,360px);pointer-events:none;}
.toast{background:var(--white);border:1px solid var(--border);border-radius:var(--r3);padding:14px;box-shadow:var(--sh-card);display:flex;align-items:center;gap:12px;font-weight:800;font-size:.85rem;animation:tIn .3s ease;pointer-events:auto;}
.toast-i{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;}
.toast.s .toast-i{background:var(--green);}
.toast.e .toast-i{background:var(--red);}
@keyframes tIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}

/* Mobile responsiveness */
@media(max-width:900px){
  .layout{flex-direction:column-reverse;}
  .tracker-panel{width:100%;height:45vh;border-left:none;border-top:2px solid var(--border-d);}
  .fp-grid{grid-template-columns:1fr 1fr;}
}
@media(max-width:600px){
  .fp-grid{grid-template-columns:1fr;padding:16px;}
  .fp-filters{flex-direction:column;align-items:stretch;}
}
</style>
</head>
<body>
<audio id="sndNew" src="https://actions.google.com/sounds/v1/alarms/submarine_dive_horn.ogg" preload="auto"></audio>
<div id="toasts"></div>

<header class="header">
  <a href="admin.html" class="h-logo">
    <div class="h-logo-ic">🐋</div>
    <div>
      <div class="h-title">دليل الحجوزات المركزية</div>
      <div class="h-sub">إدارة الأسطول والطلبات الهاتفية</div>
    </div>
  </a>
  <div class="h-status"><div class="dot"></div> متصل</div>
</header>

<div class="layout">
  <aside class="tracker-panel">
    <div class="tp-head">
      <div class="tp-title">الطلبات الهاتفية النشطة</div>
      <div class="tp-badge" id="trackerCount">0</div>
    </div>
    <div class="tp-list" id="trackerList">
      <div class="tp-empty">⏳ جاري التحميل...</div>
    </div>
  </aside>

  <main class="fleet-panel">
    <div class="fp-filters">
      <div class="f-search">
        <i data-lucide="search" size="18" color="var(--tx3)"></i>
        <input type="text" id="searchInput" placeholder="ابحث عن سيارة، لوحة، مكتب..." oninput="applyFilters()">
      </div>
      
      <select class="f-sel" id="cityFilter" onchange="applyFilters()">
        <option value="all">📍 كل المحافظات</option>
        <option value="بغداد">بغداد</option>
        <option value="أربيل">أربيل</option>
        <option value="كركوك">كركوك</option>
        <option value="السليمانية">السليمانية</option>
        <option value="الموصل">الموصل</option>
        <option value="النجف">النجف</option>
        <option value="كربلاء">كربلاء</option>
        <option value="البصرة">البصرة</option>
      </select>

      <select class="f-sel" id="catFilter" onchange="applyFilters()">
        <option value="all">🚗 كل الفئات</option>
        <option value="economy">اقتصادية</option>
        <option value="family">عائلية</option>
        <option value="luxury">فخمة VIP</option>
        <option value="wedding">زفاف</option>
      </select>

      <select class="f-sel" id="sortFilter" onchange="applyFilters()">
        <option value="default">↕️ الترتيب الافتراضي</option>
        <option value="price_asc">الأرخص أولاً</option>
        <option value="price_desc">الأغلى أولاً</option>
      </select>

      <div class="f-days-wrap">
        <span>🌙 الأيام:</span>
        <input type="number" id="globalDays" class="f-days-in" value="1" min="1" oninput="applyFilters()">
      </div>

      <div class="fp-count" id="fleetCount">0 سيارة متاحة</div>
    </div>

    <div class="fp-grid" id="fleetGrid">
      <div class="tp-empty" style="grid-column:1/-1">⏳ جاري جلب الأسطول المركزي...</div>
    </div>

    <div id="fabMultiWa" class="fab-multi dn" onclick="sendMultiWa()">
      <i data-lucide="send" size="18"></i> إرسال العروض للزبون
      <div class="fab-badge" id="fabCount">0</div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="bookModal" onclick="closeBookModal()">
  <div class="modal-card" onclick="event.stopPropagation()">
    <div class="md-title">
      <span>تأكيد الحجز الهاتفي</span>
      <button class="md-close" onclick="closeBookModal()">✕</button>
    </div>
    <div class="md-car-info">
      <div class="md-ci-n" id="md-car-name">--</div>
      <div class="md-ci-o" id="md-office-name">--</div>
    </div>
    <div class="md-fld">
      <label class="md-lbl">رقم هاتف الزبون</label>
      <input type="tel" class="md-in" id="md-cust-phone" placeholder="07XXXXXXXX" dir="ltr" style="text-align:right" oninput="checkCustomerHistory(this.value)">
      <div id="crmBadge" class="crm-badge" style="display:none"></div>
    </div>
    <div class="md-fld">
      <label class="md-lbl">اسم الزبون</label>
      <input type="text" class="md-in" id="md-cust-name" placeholder="الاسم الكامل">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="md-fld">
        <label class="md-lbl">عدد الأيام</label>
        <input type="number" class="md-in" id="md-days" value="1" min="1" oninput="calcTotal()">
      </div>
      <div class="md-fld">
        <label class="md-lbl">الإجمالي (د.ع)</label>
        <input type="text" class="md-in" id="md-total" readonly style="background:var(--bg);color:var(--green);font-weight:900;">
      </div>
    </div>
    <button class="md-btn" id="btnSubmitOrder" onclick="submitPhoneBooking()">تأكيد وإرسال للرادار 🚀</button>
  </div>
</div>

<div class="modal-overlay" id="waModal" onclick="closeWaModal()">
  <div class="modal-card" onclick="event.stopPropagation()">
    <div class="md-title">
      <span>مراسلة سريعة عبر واتساب</span>
      <button class="md-close" onclick="closeWaModal()">✕</button>
    </div>
    <div style="text-align:center;margin-bottom:10px;">
      <span style="background:var(--green-l);color:var(--green);padding:4px 12px;border-radius:99px;font-weight:800;font-size:.8rem;" id="wa-phone-disp">📱 ---</span>
    </div>
    <div id="wa-templates-list" class="wa-tmps">
      </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   CONFIG & FIREBASE
═══════════════════════════════════════════════════════════ */
const API_URL   = "https://script.google.com/macros/s/AKfycbwOZXSohTDG9nayqJ3caUqI6q50rGXaKiAYbBr-W6Xksq8qSQH_mxVU_o-7CJQrpUWa9A/exec";
const API_TOKEN = "HUT_CLOUD_2026";

let db;
try {
  firebase.initializeApp({
    apiKey:"AIzaSyAo1rmqUzieYZU3RIwXOAN87GkpNrp-_Hc",
    authDomain:"alhut-for-rent.firebaseapp.com",
    databaseURL:"https://alhut-for-rent-default-rtdb.europe-west1.firebasedatabase.app"
  });
  db = firebase.database();
} catch(e) { console.warn("Firebase Init Error"); }

/* ════ STATE ════ */
let gD = null;            
let fullFleet = [];       
let filteredFleet = [];   
let trackedOrders = [];   
let selectedCars = [];    
let bookingCtx = null; 
let waCtx = null; // For WhatsApp Modal {phone, type, order}
let timerInterval = null;

const $ = id => document.getElementById(id);
const fmt = n => Math.round(Number(n)||0).toLocaleString("ar-EG");
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
function safeJSON(o){ return JSON.stringify(o).replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }

function toast(msg, type="s") {
  const c=$("toasts"); const el=document.createElement("div"); el.className=`toast ${type}`;
  el.innerHTML=`<div class="toast-i">${type==="s"?"✓":"✕"}</div><div>${msg}</div>`;
  c.appendChild(el); setTimeout(()=>{el.style.opacity="0";setTimeout(()=>el.remove(),300);},3500);
}

document.addEventListener("DOMContentLoaded", () => {
  lucide.createIcons();
  fetchMasterData();
  startTrackerListener();
  timerInterval = setInterval(updateTimers, 60000); 
});

/* ═══════════════════════════════════════════════════════════
   FETCH MASTER DATA
═══════════════════════════════════════════════════════════ */
async function fetchMasterData() {
  try {
    // Parallel fetching for speed
    const [adminRes, fleetRes] = await Promise.all([
      fetch(`${API_URL}?action=getAdminFullData&token=${API_TOKEN}&_t=${Date.now()}`),
      fetch(`${API_URL}?action=getAvailableCars&token=${API_TOKEN}&_t=${Date.now()}`)
    ]);
    
    gD = await adminRes.json();
    const fData = await fleetRes.json();
    
    // Extract active fleet
    const rawCars = Array.isArray(fData) ? fData : (fData.cars || []);
    fullFleet = rawCars.filter(c => c.status !== "inactive");

    applyFilters();
  } catch(e) {
    $("fleetGrid").innerHTML = `<div class="tp-empty" style="grid-column:1/-1;color:var(--red)">❌ فشل جلب البيانات. تحقق من الاتصال بالإنترنت.</div>`;
  }
}

/* ═══════════════════════════════════════════════════════════
   FILTER & RENDER FLEET
═══════════════════════════════════════════════════════════ */
window.applyFilters = function() {
  if(!fullFleet.length) return;

  const q = $("searchInput").value.toLowerCase().trim();
  const cat = $("catFilter").value;
  const city = $("cityFilter").value;
  const sort = $("sortFilter").value;
  const daysMulti = Number($("globalDays").value) || 1;

  filteredFleet = fullFleet.filter(c => {
    let cCity = c.city || "";
    if(!cCity && gD && gD.carOffices) {
      const off = gD.carOffices.find(o => o.name === c.office_id);
      if(off) cCity = off.city || "";
    }

    if(city !== "all" && cCity !== city) return false;
    if(cat !== "all" && (c.cat||"economy").toLowerCase() !== cat) return false;
    if(q && !c.name.toLowerCase().includes(q) && !(c.office_id||"").toLowerCase().includes(q) && !(c.plate||"").toLowerCase().includes(q)) return false;
    return true;
  });

  if(sort === "price_asc") filteredFleet.sort((a,b) => (Number(a.price)||0) - (Number(b.price)||0));
  if(sort === "price_desc") filteredFleet.sort((a,b) => (Number(b.price)||0) - (Number(a.price)||0));

  $("fleetCount").textContent = `${filteredFleet.length} سيارة متاحة`;
  renderFleet(daysMulti);
};

function renderFleet(daysMulti) {
  const grid = $("fleetGrid");
  if(!filteredFleet.length) {
    grid.innerHTML = `<div class="tp-empty" style="grid-column:1/-1;font-size:1.2rem;">🚗 لا توجد سيارات تطابق بحثك</div>`;
    return;
  }

  const catNames = {economy:"اقتصادية", family:"عائلية", luxury:"فخمة VIP", wedding:"زفاف"};

  grid.innerHTML = filteredFleet.map(c => {
    const cName = esc(c.name);
    const oName = esc(c.office_id || "سيارة منصة");
    const basePrice = Number(c.price)||0;
    const calcPrice = basePrice * daysMulti; 
    
    const cat = catNames[c.cat] || c.cat || "اقتصادية";
    const img = c.photo_url ? `<img src="${esc(c.photo_url)}" loading="lazy">` : `<div class="mc-noimg">🚗</div>`;
    
    let isOnline = true; 
    if(gD && gD.carOffices && c.office_id !== "SHARED") {
      const off = gD.carOffices.find(o => o.name === c.office_id);
      if(off && off.status !== "active") isOnline = false;
    }
    const dotColor = isOnline ? "var(--green)" : "var(--tx3)";
    const isChecked = selectedCars.includes(String(c.id));

    return `
    <div class="mc ${isChecked ? 'selected' : ''}">
      <div class="mc-img">
        ${img}
        <div class="mc-check" onclick="toggleCarSelection('${esc(c.id)}')">
          ${isChecked ? '<i data-lucide="check" size="16"></i>' : ''}
        </div>
        <div class="mc-badge">${cat}</div>
        <div class="mc-office"><div class="mc-status-dot" style="background:${dotColor}"></div> 🏢 ${oName}</div>
      </div>
      <div class="mc-bd">
        <div class="mc-title">${cName}</div>
        <div class="mc-specs">
          <div class="mc-spec">🎨 ${esc(c.color||"—")}</div>
          <div class="mc-spec">🪪 ${esc(c.plate||"—")}</div>
        </div>
        <div class="mc-price">${fmt(calcPrice)} <span style="font-size:.7rem;color:var(--tx2)">د.ع</span></div>
        <div class="mc-price-sub">${fmt(basePrice)} د.ع لليوم × ${daysMulti} أيام</div>
        
        <div class="mc-acts">
          <button class="mcb book" onclick='openBookModal(${safeJSON(c)})'>
            <i data-lucide="phone-call" size="14"></i> حجز سريع
          </button>
        </div>
      </div>
    </div>`;
  }).join("");
  lucide.createIcons();
}

/* ═══════════════════════════════════════════════════════════
   MULTI-SELECT & SEND TO WHATSAPP
═══════════════════════════════════════════════════════════ */
window.toggleCarSelection = function(carId) {
  if(selectedCars.includes(carId)) {
    selectedCars = selectedCars.filter(id => id !== carId);
  } else {
    if(selectedCars.length >= 4) return toast("الحد الأقصى هو 4 سيارات في الرسالة", "e");
    selectedCars.push(carId);
  }
  
  const fab = $("fabMultiWa");
  if(selectedCars.length > 0) {
    fab.classList.remove("dn");
    $("fabCount").textContent = selectedCars.length;
  } else {
    fab.classList.add("dn");
  }
  
  const daysMulti = Number($("globalDays").value) || 1;
  renderFleet(daysMulti);
};

window.sendMultiWa = function() {
  if(selectedCars.length === 0) return;
  const daysMulti = Number($("globalDays").value) || 1;
  
  let txt = `*عروض تأجير السيارات من منصة الحوت* 🐋\n(المدة: ${daysMulti} أيام)\n\n`;
  
  selectedCars.forEach((id, idx) => {
    const c = fullFleet.find(x => String(x.id) === String(id));
    if(c) {
      txt += `*${idx+1}. ${c.name}*\n`;
      txt += `🎨 اللون: ${c.color||"—"}\n`;
      txt += `🏢 المكتب: ${c.office_id||"سيارة منصة"}\n`;
      txt += `💰 الإجمالي: ${fmt(c.price * daysMulti)} د.ع\n`;
      txt += `--------------------\n`;
    }
  });
  
  txt += `\nيرجى الرد برقم السيارة التي تناسبك لتأكيد الحجز.`;
  window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`, '_blank');
  
  selectedCars = [];
  $("fabMultiWa").classList.add("dn");
  applyFilters();
};

/* ═══════════════════════════════════════════════════════════
   MANUAL BOOKING & MINI CRM
═══════════════════════════════════════════════════════════ */
window.openBookModal = function(car) {
  bookingCtx = car;
  $("md-car-name").textContent = car.name;
  $("md-office-name").textContent = car.office_id || "سيارة منصة";
  $("md-cust-name").value = "";
  $("md-cust-phone").value = "";
  $("md-days").value = $("globalDays").value || "1";
  $("crmBadge").style.display = "none";
  calcTotal();
  $("bookModal").classList.add("open");
};

window.closeBookModal = function() {
  $("bookModal").classList.remove("open");
  bookingCtx = null;
};

window.calcTotal = function() {
  if(!bookingCtx) return;
  const d = Number($("md-days").value) || 1;
  const t = (Number(bookingCtx.price)||0) * d;
  $("md-total").value = fmt(t);
};

// MINI CRM
window.checkCustomerHistory = function(phone) {
  const badge = $("crmBadge");
  const p = phone.replace(/\D/g, "");
  if(p.length < 10) { badge.style.display = "none"; return; }
  
  if(!gD || !gD.carOrders) { badge.style.display = "none"; return; }
  
  const pastOrders = gD.carOrders.filter(o => {
    const oPhone = String(o.phone||"").replace(/\D/g, "");
    return oPhone && (oPhone.includes(p) || p.includes(oPhone));
  });
  
  const completed = pastOrders.filter(o => o.status === "completed").length;
  const cancelled = pastOrders.filter(o => o.status === "cancelled" || o.status === "rejected").length;
  
  badge.style.display = "inline-block";
  if(pastOrders.length === 0) {
    badge.style.background = "var(--blue-l)"; badge.style.color = "var(--blue)";
    badge.textContent = "🆕 زبون جديد";
  } else if(completed > 0) {
    badge.style.background = "var(--green-l)"; badge.style.color = "var(--green)";
    badge.textContent = `⭐ زبون موثوق (أكمل ${completed} حجوزات)`;
  } else if(cancelled > 0) {
    badge.style.background = "var(--red-l)"; badge.style.color = "var(--red)";
    badge.textContent = `⚠️ لديه ${cancelled} إلغاءات سابقة`;
  } else {
    badge.style.background = "var(--bg)"; badge.style.color = "var(--tx1)";
    badge.textContent = "معروف بالمنصة";
  }
};

window.submitPhoneBooking = async function() {
  const cName = $("md-cust-name").value.trim();
  const cPhone = $("md-cust-phone").value.trim();
  const days = Number($("md-days").value) || 1;
  
  if(!cName || !cPhone) return toast("أدخل اسم ورقم الزبون", "e");
  const total = (Number(bookingCtx.price)||0) * days;
  
  const btn = $("btnSubmitOrder");
  btn.textContent = "جاري الإرسال...";
  btn.disabled = true;

  try {
    const orderId = "PH" + Date.now();
    const orderObj = {
      id: orderId,
      car: bookingCtx.name,
      office: bookingCtx.office_id,
      name: cName,
      phone: cPhone,
      days: days,
      total: total,
      city: "حجز هاتفي مركز",
      status: "pending",
      source: "phone",
      created_at: new Date().toISOString()
    };
    
    if(db) {
      await db.ref(`hut_car_orders/${orderId}`).set(orderObj);
      toast("تم إنشاء الطلب وإرساله للرادار ✅");
      closeBookModal();
    } else {
      toast("فشل الاتصال بقاعدة البيانات", "e");
    }
  } catch(e) { toast("فشل إنشاء الطلب", "e"); }
  finally { btn.textContent = "تأكيد وإرسال للرادار 🚀"; btn.disabled = false; }
};

/* ═══════════════════════════════════════════════════════════
   PHONE ORDERS TRACKER (SIDEBAR)
═══════════════════════════════════════════════════════════ */
function startTrackerListener() {
  if(!db) return;
  db.ref("hut_car_orders").on("value", snap => {
    const all = snap.val() || {};
    trackedOrders = Object.values(all)
      .filter(o => o.source === "phone" && ["pending", "active"].includes(o.status))
      .sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
      
    renderTracker();
  });
}

function updateTimers() { if(trackedOrders.length > 0) renderTracker(); }

function getElapsedTime(isoString) {
  const diff = Math.floor((Date.now() - new Date(isoString).getTime()) / 60000);
  if(diff < 0) return "الآن";
  if(diff < 60) return `${diff} دقيقة`;
  return `${Math.floor(diff/60)} ساعة`;
}

function renderTracker() {
  const list = $("trackerList");
  $("trackerCount").textContent = trackedOrders.length;
  
  if(!trackedOrders.length) {
    list.innerHTML = `<div class="tp-empty">لا توجد طلبات هاتفية نشطة حالياً</div>`;
    return;
  }

  list.innerHTML = trackedOrders.map(o => {
    const isPending = o.status === "pending";
    const statusClass = isPending ? "pending" : "active";
    const timeElapsed = getElapsedTime(o.created_at);
    
    let acts = "";
    if(isPending) {
      acts = `
        <button class="tc-btn wa" onclick='openWaModal("partner", ${safeJSON(o)})'><i data-lucide="phone" size="12"></i> الشريك</button>
        <button class="tc-btn wa" onclick='openWaModal("customer", ${safeJSON(o)})'><i data-lucide="message-circle" size="12"></i> الزبون</button>
        <button class="tc-btn acc" onclick="adminConfirmOrder('${esc(o.id)}')"><i data-lucide="check" size="12"></i> تأكيد (وافق)</button>
        <button class="tc-btn del" onclick="adminCancelOrder('${esc(o.id)}')">✕ إلغاء</button>
      `;
    } else {
      acts = `
        <button class="tc-btn wa" onclick='openWaModal("customer", ${safeJSON(o)})'><i data-lucide="message-circle" size="12"></i> مراسلة الزبون</button>
        <button class="tc-btn comp" onclick="adminCompleteOrder('${esc(o.id)}', '${esc(o.office)}')"><i data-lucide="wallet" size="14"></i> تم التسليم (سجل العمولة)</button>
      `;
    }

    return `
    <div class="tc ${statusClass}">
      <div class="tc-hd">
        <div class="tc-cust">👤 ${esc(o.name)}</div>
        <div class="tc-timer"><i data-lucide="clock" size="12"></i> ${timeElapsed}</div>
      </div>
      <div class="tc-car">🚗 ${esc(o.car)}</div>
      <div class="tc-off">🏢 ${esc(o.office || "غير محدد")}</div>
      <div style="font-size:.8rem;font-weight:900;color:var(--green);margin-bottom:8px;">${fmt(o.total)} د.ع</div>
      <div class="tc-acts">${acts}</div>
    </div>`;
  }).join("");
  lucide.createIcons();
}

window.adminConfirmOrder = async function(id) {
  if(!confirm("تأكيد موافقة المكتب هاتفياً على هذا الطلب؟")) return;
  try {
    if(db) await db.ref(`hut_car_orders/${id}`).update({ status: "active", last_update: new Date().toISOString() });
    toast("تم تأكيد الطلب");
  } catch(e) {}
};

window.adminCancelOrder = async function(id) {
  if(!confirm("إلغاء الطلب نهائياً؟")) return;
  try {
    if(db) await db.ref(`hut_car_orders/${id}`).update({ status: "cancelled", last_update: new Date().toISOString() });
    toast("تم الإلغاء");
  } catch(e) {}
};

window.adminCompleteOrder = async function(id, officeName) {
  if(!confirm("هل استلم الزبون السيارة؟ (سيتم تسجيل العمولة للمنصة)")) return;
  try {
    toast("جاري التسجيل...", "s");
    await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({ action: "completeOrder", id: id, office: officeName, token: API_TOKEN })
    });
    toast("✅ تم تسجيل العمولة بنجاح!");
  } catch(e) { toast("خطأ", "e"); }
};

/* ═══════════════════════════════════════════════════════════
   SMART WHATSAPP MODAL
═══════════════════════════════════════════════════════════ */
function normalizePhone(p) {
  p = String(p||"").replace(/\D/g, "");
  if(p.startsWith("0")) p = "964" + p.slice(1);
  if(p.startsWith("7")) p = "964" + p;
  return p;
}

window.openWaModal = function(type, order) {
  waCtx = { type, order };
  let phone = "";
  
  if(type === "customer") {
    phone = normalizePhone(order.phone);
  } else {
    if(gD && gD.carOffices) {
      const off = gD.carOffices.find(o => o.name === order.office);
      if(off) phone = normalizePhone(off.phone);
    }
  }

  $("wa-phone-disp").textContent = phone ? `📱 +${phone}` : "📱 لا يوجد رقم متوفر";

  const templates = type === "customer" ? [
    { label: "تأكيد الحجز ✅", text: `مرحباً ${order.name}، تم تأكيد حجزك لسيارة (${order.car}) من مكتب ${order.office}. نتمنى لك رحلة موفقة! 🐋` },
    { label: "مشاركة الموقع 📍", text: `مرحباً، يرجى تزويدنا بموقعك الدقيق عبر الواتساب لتسهيل تسليم السيارة.` },
    { label: "صورة الهوية 🪪", text: `مرحباً، يرجى إرسال صورة الهوية أو إجازة السوق لإتمام الإجراءات بسرعة.` }
  ] : [
    { label: "تأكيد الطلب الهاتفي 📞", text: `مرحباً، يوجد طلب هاتفي لسيارة (${order.car}) للزبون ${order.name}. هل السيارة جاهزة للتسليم؟` },
    { label: "متابعة التأخير ⏳", text: `يرجى الانتباه لوجود طلب متأخر في الرادار الخاص بكم، يرجى تسليمه للزبون في أقرب وقت.` }
  ];

  $("wa-templates-list").innerHTML = templates.map((t, i) => `
    <div class="wa-tmp" onclick="sendSmartWaMsg('${phone}', '${encodeURIComponent(t.text)}')">
      <div class="wa-lbl">${t.label}</div>
      <div class="wa-txt">${t.text}</div>
    </div>
  `).join("");

  $("waModal").classList.add("open");
};

window.sendSmartWaMsg = function(phone, encodedMsg) {
  if(!phone || phone.length < 10) return toast("رقم الهاتف غير صالح", "e");
  window.open(`https://wa.me/${phone}?text=${encodedMsg}`, "_blank");
  closeWaModal();
};

window.closeWaModal = function() {
  $("waModal").classList.remove("open");
  waCtx = null;
};
</script>
