<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام الحوت | الإدارة العليا 👑</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --whale-gold: #D4AF37; 
            --whale-dark: #070B14;
            --glass-bg: rgba(15, 23, 42, 0.4);
            --glass-border: rgba(212, 175, 55, 0.15);
        }
        
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: var(--whale-dark); 
            color: #f8fafc; 
            overflow-x: hidden; 
            min-height: 100vh; 
        }
        
        /* تأثيرات الخلفية المتقدمة */
        .cyber-grid { 
            position: fixed; inset: 0; z-index: -2;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px); 
            background-size: 50px 50px; 
        }
        .glow-orb {
            position: fixed; top: -100px; right: -100px;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(212,175,55,0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%; z-index: -1; pointer-events: none;
        }

        /* التصميم الزجاجي (Glassmorphism) */
        .glass-panel { 
            background: var(--glass-bg); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); 
            border-radius: 1.5rem; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: all 0.3s ease;
        }
        .glass-panel:hover { border-color: rgba(212, 175, 55, 0.4); }

        /* أزرار وحالات */
        .btn-gold {
            background: linear-gradient(135deg, #D4AF37, #AA8A2A);
            color: #000; font-weight: 900;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            transition: all 0.2s;
        }
        .btn-gold:active { transform: scale(0.95); }
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-left: 5px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }

        /* شريط التمرير */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #070B14; }
        ::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 10px; }

        /* الإشعارات (Toasts) */
        .toast {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.9); border: 1px solid var(--whale-gold);
            padding: 12px 24px; border-radius: 50px; font-weight: bold;
            transition: bottom 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000; backdrop-filter: blur(10px); display: flex; align-items: center; gap: 10px;
        }
        .toast.show { bottom: 90px; }

        /* شريط التنقل السفلي للموبايل */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(7, 11, 20, 0.85); backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: env(safe-area-inset-bottom);
            z-index: 50; display: flex; justify-content: space-around;
        }
        .nav-item {
            padding: 15px; color: #64748b; font-size: 20px; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .nav-item.active { color: var(--whale-gold); transform: translateY(-3px); }
        .nav-text { font-size: 10px; font-weight: bold; }

        /* السكيليتون (تحميل) */
        .skeleton { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 8px; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="pb-24">

    <div class="cyber-grid"></div>
    <div class="glow-orb"></div>

    <div id="authOverlay" class="fixed inset-0 z-[100] bg-[#070B14]/95 backdrop-blur-2xl flex flex-col items-center justify-center p-6 transition-all duration-700">
        <div class="text-[#D4AF37] text-6xl mb-6 drop-shadow-[0_0_15px_rgba(212,175,55,0.5)]"><i class="fas fa-fingerprint"></i></div>
        <h2 class="text-white text-3xl font-black mb-2 tracking-tighter text-center">النظام المركزي</h2>
        <p class="text-xs text-slate-500 uppercase tracking-[0.3em] mb-10" style="font-family: 'Orbitron', sans-serif;">Enterprise Core Authentication</p>
        
        <div class="relative w-full max-w-sm glass-panel p-8">
            <label class="text-xs text-slate-400 font-bold mb-2 block">رمز السيادة (Master Key)</label>
            <input type="password" id="masterKey" autofocus
                   class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4 text-center text-3xl text-[#D4AF37] tracking-[0.5em] outline-none focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37] transition-all"
                   placeholder="••••">
            <button onclick="checkMasterKey()" class="w-full mt-6 btn-gold py-4 rounded-xl text-lg">
                فتح النظام <i class="fas fa-unlock-alt ml-2"></i>
            </button>
        </div>
    </div>

    <div id="mainContent" class="hidden opacity-0 transition-opacity duration-1000 pt-6 px-4 max-w-5xl mx-auto">
        
        <header class="flex justify-between items-center mb-8 glass-panel p-5">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-full bg-gradient-to-tr from-[#D4AF37] to-yellow-200 flex items-center justify-center text-xl text-black shadow-lg">
                    <i class="fas fa-user-tie"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black text-white">مرحباً، طه</h1>
                    <p class="text-[#D4AF37] text-xs font-bold mt-1"><span class="status-dot bg-green-500"></span> النظام متصل بالشبكة</p>
                </div>
            </div>
            <button onclick="loadData(true)" class="bg-slate-800 p-3 rounded-xl border border-slate-700 hover:border-[#D4AF37] text-blue-400 transition-all group">
                <i class="fas fa-sync-alt group-hover:rotate-180 transition-transform duration-500"></i>
            </button>
        </header>

        <div id="statsSection" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="glass-panel p-5 text-center">
                <i class="fas fa-chart-line text-blue-400 text-2xl mb-2"></i>
                <h3 class="text-slate-400 text-xs font-bold">إجمالي الطلبات</h3>
                <p class="text-2xl font-black text-white mt-1" id="statTotalOrders">-</p>
            </div>
            <div class="glass-panel p-5 text-center">
                <i class="fas fa-coins text-[#D4AF37] text-2xl mb-2"></i>
                <h3 class="text-slate-400 text-xs font-bold">حجم الإيرادات (د.ع)</h3>
                <p class="text-lg font-black text-[#D4AF37] mt-1" id="statRevenue">-</p>
            </div>
            <div class="glass-panel p-5 text-center">
                <i class="fas fa-handshake text-green-400 text-2xl mb-2"></i>
                <h3 class="text-slate-400 text-xs font-bold">الشركاء النشطين</h3>
                <p class="text-2xl font-black text-white mt-1" id="statActiveOffices">-</p>
            </div>
            <div class="glass-panel p-5 text-center relative">
                <i class="fas fa-clock text-orange-400 text-2xl mb-2"></i>
                <h3 class="text-slate-400 text-xs font-bold">بانتظار التفعيل</h3>
                <p class="text-2xl font-black text-orange-400 mt-1" id="statPendingOffices">-</p>
            </div>
        </div>

        <div id="searchContainer" class="mb-6 relative">
            <i class="fas fa-search absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-500"></i>
            <input type="text" id="searchInput" onkeyup="filterOrders()" placeholder="ابحث عن اسم الزبون أو رقم الهاتف..." 
                   class="w-full bg-slate-900/60 border border-slate-700 rounded-xl py-3 pr-12 pl-4 text-white focus:border-[#D4AF37] outline-none glass-panel">
        </div>

        <main id="content" class="space-y-4">
            <div class="glass-panel p-6 mb-4 flex flex-col gap-4">
                <div class="skeleton h-6 w-1/3"></div>
                <div class="skeleton h-4 w-1/4"></div>
                <div class="grid grid-cols-2 gap-3 mt-4">
                    <div class="skeleton h-8 w-full"></div>
                    <div class="skeleton h-8 w-full"></div>
                </div>
            </div>
        </main>
    </div>

    <nav class="bottom-nav hidden" id="bottomNav">
        <button onclick="switchTab('orders')" id="navOrders" class="nav-item active">
            <i class="fas fa-layer-group relative">
                <span id="badgeOrders" class="absolute -top-2 -right-3 bg-blue-500 text-white text-[9px] px-1.5 rounded-full border border-[#070B14] hidden">0</span>
            </i>
            <span class="nav-text">الطلبات</span>
        </button>
        <button onclick="switchTab('offices')" id="navOffices" class="nav-item">
            <i class="fas fa-briefcase relative">
                <span id="badgeOffices" class="absolute -top-2 -right-3 bg-red-500 text-white text-[9px] px-1.5 rounded-full border border-[#070B14] hidden">0</span>
            </i>
            <span class="nav-text">الشركاء</span>
        </button>
    </nav>

    <div id="sysToast" class="toast">
        <i id="toastIcon" class="fas fa-check-circle text-green-400"></i>
        <span id="toastMsg">تم التحديث بنجاح</span>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbxpAW6PZ9ykBmaIfuDxtxr3YOfcg95jXeFJ2FjX5GxGRiawUNHzs90rKBEUFOcf_z_n/exec";
        const MASTER_PASS = "2026"; 
        let currentTab = 'orders';
        let data = { orders: [], offices: [] };
        let refreshInterval;

        // نظام تسجيل الدخول
        function checkMasterKey() {
            const pass = document.getElementById('masterKey').value;
            if(pass === MASTER_PASS) {
                document.getElementById('authOverlay').classList.add('opacity-0', 'scale-110', 'pointer-events-none');
                setTimeout(() => {
                    document.getElementById('authOverlay').classList.add('hidden');
                    document.getElementById('mainContent').classList.remove('hidden');
                    document.getElementById('bottomNav').classList.remove('hidden');
                    setTimeout(() => {
                        document.getElementById('mainContent').classList.remove('opacity-0');
                    }, 50);
                }, 700);
                
                loadData();
                refreshInterval = setInterval(() => loadData(false), 30000); 
            } else {
                showToast("رمز السيادة غير صحيح، محاولة اختراق فاشلة!", "error");
                document.getElementById('masterKey').value = "";
            }
        }

        document.getElementById('masterKey').addEventListener('keypress', (e) => { if(e.key === 'Enter') checkMasterKey(); });

        // نظام الإشعارات المنبثقة
        function showToast(msg, type = "success") {
            const toast = document.getElementById('sysToast');
            document.getElementById('toastMsg').innerText = msg;
            const icon = document.getElementById('toastIcon');
            
            if(type === "success") {
                icon.className = "fas fa-check-circle text-green-400";
                toast.style.borderColor = "#22c55e";
            } else if(type === "error") {
                icon.className = "fas fa-exclamation-triangle text-red-500";
                toast.style.borderColor = "#ef4444";
            } else {
                icon.className = "fas fa-info-circle text-blue-400";
                toast.style.borderColor = "#3b82f6";
            }

            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // جلب البيانات
        async function loadData(manual = false) {
            try {
                if(manual) showToast("جاري فحص رادار الحوت...", "info");
                
                const res = await fetch(`${scriptURL}?action=getAdminFullData&t=${Date.now()}`);
                data = await res.json();
                
                updateStats();
                render();
                
                if(manual) showToast("تم تحديث البيانات بنجاح", "success");
            } catch (e) { 
                showToast("فقدان الاتصال بالسيرفر المركزي!", "error");
            }
        }

        // تحديث الإحصائيات
        function updateStats() {
            // الطلبات
            const totalOrders = data.orders.length;
            document.getElementById('statTotalOrders').innerText = totalOrders;
            
            const badgeOrders = document.getElementById('badgeOrders');
            if(totalOrders > 0) { badgeOrders.innerText = totalOrders; badgeOrders.classList.remove('hidden'); }
            
            // الإيرادات
            const revenue = data.orders.reduce((sum, order) => sum + Number(order.price || 0), 0);
            document.getElementById('statRevenue').innerText = revenue.toLocaleString();

            // المكاتب
            const activeCount = data.offices.filter(o => o.status === 'نشط').length;
            const pendingCount = data.offices.filter(o => o.status !== 'نشط').length;
            
            document.getElementById('statActiveOffices').innerText = activeCount;
            document.getElementById('statPendingOffices').innerText = pendingCount;
            
            const badgeOffices = document.getElementById('badgeOffices');
            if(pendingCount > 0) { badgeOffices.innerText = pendingCount; badgeOffices.classList.remove('hidden'); }
            else { badgeOffices.classList.add('hidden'); }
        }

        // فلترة البحث
        function filterOrders() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.order-card-item');
            cards.forEach(card => {
                const text = card.innerText.toLowerCase();
                card.style.display = text.includes(query) ? 'block' : 'none';
            });
        }

        // التبديل بين التبويبات
        function switchTab(t) {
            currentTab = t;
            document.getElementById('navOrders').classList.toggle('active', t === 'orders');
            document.getElementById('navOffices').classList.toggle('active', t === 'offices');
            
            document.getElementById('searchContainer').style.display = t === 'orders' ? 'block' : 'none';
            document.getElementById('searchInput').value = '';
            
            render();
        }

        // بناء الواجهة
        function render() {
            const container = document.getElementById('content');
            
            if (currentTab === 'orders') {
                if(data.orders.length === 0) {
                    container.innerHTML = `<div class="glass-panel p-10 text-center text-slate-500 font-bold"><i class="fas fa-box-open text-4xl mb-3 block opacity-50"></i> لا توجد طلبات حالياً</div>`;
                    return;
                }
                container.innerHTML = data.orders.slice().reverse().map(o => renderOrderCard(o)).join('');
            } else {
                if(data.offices.length === 0) {
                    container.innerHTML = `<div class="glass-panel p-10 text-center text-slate-500 font-bold"><i class="fas fa-store-slash text-4xl mb-3 block opacity-50"></i> لا يوجد شركاء مسجلين</div>`;
                    return;
                }
                container.innerHTML = data.offices.slice().reverse().map(of => renderOfficeCard(of)).join('');
            }
        }

        function renderOrderCard(o) {
            const status = o.status || "";
            const isCompleted = status.includes('✅') || status.includes('مكتمل');
            const isTrouble = status.includes('⚠️') || status.includes('إلغاء');
            
            let badgeClass = "bg-blue-500/20 text-blue-400 border-blue-500/30";
            let borderLeft = "border-l-4 border-blue-500";
            
            if(isCompleted) { badgeClass = "bg-green-500/20 text-green-400 border-green-500/30"; borderLeft = "border-l-4 border-green-500"; }
            else if(isTrouble) { badgeClass = "bg-red-500/20 text-red-400 border-red-500/30"; borderLeft = "border-l-4 border-red-500"; }

            let cleanPhone = o.phone ? o.phone.toString().replace(/\s+/g, '') : '';
            if(cleanPhone.startsWith('07')) cleanPhone = '964' + cleanPhone.substring(1);

            return `
            <div class="glass-panel p-5 order-card-item mb-4 ${borderLeft}">
                <div class="flex justify-between items-start mb-3">
                    <div>
                        <span class="text-[10px] px-2 py-1 rounded border ${badgeClass} font-bold">${status}</span>
                        <h3 class="text-xl font-black text-white mt-2">${o.car || 'غير محدد'}</h3>
                    </div>
                    <div class="text-left">
                        <p class="text-lg text-[#D4AF37] font-black">${Number(o.price || 0).toLocaleString()}</p>
                        <p class="text-[9px] text-slate-400">دينار عراقي</p>
                    </div>
                </div>
                
                <div class="bg-black/30 rounded-xl p-3 grid grid-cols-2 gap-2 text-xs text-slate-300 mb-4 border border-white/5">
                    <p><i class="fas fa-user text-slate-500 ml-1"></i> ${o.name || '---'}</p>
                    <p><i class="fas fa-phone text-slate-500 ml-1"></i> <span class="font-mono">${o.phone || '---'}</span></p>
                    <p><i class="fas fa-map-marker-alt text-slate-500 ml-1"></i> ${o.province || o.prov || '---'}</p>
                    <p><i class="fas fa-building text-slate-500 ml-1"></i> <span class="text-orange-300 font-bold">${o.office || 'بانتظار التأكيد'}</span></p>
                </div>

                <div class="flex gap-2">
                    <button onclick="sendReminder('${cleanPhone}', '${o.name}', '${o.car}')" class="flex-1 bg-blue-600/20 hover:bg-blue-600 text-blue-400 hover:text-white border border-blue-500/30 p-2 rounded-lg text-xs font-bold transition-all"><i class="fas fa-bell ml-1"></i> تذكير</button>
                    <button onclick="contactCustomer('${cleanPhone}')" class="flex-1 bg-green-600/20 hover:bg-green-600 text-green-400 hover:text-white border border-green-500/30 p-2 rounded-lg text-xs font-bold transition-all"><i class="fab fa-whatsapp ml-1"></i> مراسلة</button>
                    <button onclick="action('deleteOrder', '${o.id || o.order_id}')" class="bg-red-900/40 hover:bg-red-600 text-red-400 hover:text-white border border-red-500/30 px-4 rounded-lg transition-all"><i class="fas fa-trash"></i></button>
                </div>
            </div>`;
        }

        function renderOfficeCard(of) {
            const isActive = of.status === 'نشط';
            return `
            <div class="glass-panel p-5 mb-4 border-r-4 ${isActive ? 'border-green-500' : 'border-orange-500'}">
                <div class="flex justify-between items-center">
                    <div>
                        <h3 class="text-lg font-black text-white">${of.name}</h3>
                        <p class="text-[10px] text-slate-400 mt-1"><i class="fas fa-map-pin ml-1"></i> ${of.city} | الكود: <span class="font-mono text-blue-300">${of.id}</span></p>
                    </div>
                    <span class="text-[10px] px-2 py-1 rounded font-bold ${isActive ? 'bg-green-500/20 text-green-400 border border-green-500/30' : 'bg-orange-500/20 text-orange-400 border border-orange-500/30'}">${of.status}</span>
                </div>
                
                <div class="flex gap-2 mt-4 pt-4 border-t border-white/5">
                    ${!isActive ? `<button onclick="action('approveOffice', '${of.id}')" class="flex-1 bg-green-600/20 hover:bg-green-600 text-green-400 hover:text-white border border-green-500/30 p-2 rounded-lg text-xs font-bold transition-all"><i class="fas fa-check ml-1"></i> اعتماد</button>` : ''}
                    <button onclick="action('blockOffice', '${of.id}')" class="flex-1 bg-orange-600/20 hover:bg-orange-600 text-orange-400 hover:text-white border border-orange-500/30 p-2 rounded-lg text-xs font-bold transition-all"><i class="fas fa-ban ml-1"></i> إيقاف</button>
                    <button onclick="action('deleteOffice', '${of.id}')" class="bg-red-900/40 hover:bg-red-600 text-red-400 hover:text-white border border-red-500/30 px-4 rounded-lg transition-all"><i class="fas fa-trash"></i></button>
                </div>
            </div>`;
        }

        function sendReminder(phone, name, car) { window.open(`https://wa.me/${phone}?text=${encodeURIComponent(`مرحباً سيد ${name} 🐋، نذكرك بموعد استلام سيارتك (${car}) اليوم. نرجو الحضور للمكتب. شكراً لك!`)}`, '_blank'); }
        function contactCustomer(phone) { window.open(`https://wa.me/${phone}?text=مرحباً بك في منصة الحوت..`, '_blank'); }

        async function action(act, id) {
            if(!confirm("⚠️ تأكيد تنفيذ هذا الإجراء الإداري على قاعدة البيانات؟")) return;
            
            showToast("جاري تنفيذ الأمر...", "info");
            try {
                const res = await fetch(`${scriptURL}?action=${act}&id=${id}`);
                const result = await res.json();
                if(result.success) {
                    showToast("تم تنفيذ الإجراء بنجاح", "success");
                    loadData();
                } else {
                    showToast("فشل: " + result.message, "error");
                }
            } catch (e) { showToast("خطأ في الاتصال بقاعدة البيانات", "error"); }
        }
    </script>
</body>
</html>
