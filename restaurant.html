<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المطعم | منظومة الحوت</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; background: #f1f5f9; }</style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-xl mx-auto bg-white p-8 rounded-[2.5rem] shadow-2xl border border-slate-100">
        <h2 class="text-2xl font-black mb-8 text-center text-slate-800">إرسال طلبية جديدة 📦</h2>
        
        <div class="space-y-6">
            <div>
                <label class="text-sm font-bold text-slate-600 block mb-2">اختر منطقة التوصيل 📍</label>
                <select id="region" class="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl outline-none focus:border-emerald-500" onchange="calculatePrice()">
                    <option value="0" disabled selected>اختر المنطقة...</option>
                    <option value="2000">طريق بغداد (2,000 د.ع)</option>
                    <option value="2000">الواسطي (2,000 د.ع)</option>
                    <option value="2500">حزيران (2,500 د.ع)</option>
                    <option value="2500">الماس (2,500 د.ع)</option>
                    <option value="3000">عرفة (3,000 د.ع)</option>
                    <option value="3000">شارع المحافظة (3,000 د.ع)</option>
                </select>
            </div>

            <div>
                <label class="text-sm font-bold text-slate-600 block mb-2">رقم هاتف الزبون 📞</label>
                <input type="tel" class="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl outline-none" placeholder="077XXXXXXXX">
            </div>

            <div>
                <label class="text-sm font-bold text-slate-600 block mb-2">سعر الطعام (بدون التوصيل) 💰</label>
                <input type="number" id="foodPrice" class="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl outline-none font-bold text-emerald-600" placeholder="مثال: 15000" oninput="calculatePrice()">
            </div>

            <div class="bg-slate-900 text-white p-6 rounded-[2rem] space-y-2 shadow-inner">
                <div class="flex justify-between text-xs opacity-70">
                    <span>أجرة التوصيل:</span>
                    <span id="deliveryDisplay">0 د.ع</span>
                </div>
                <div class="flex justify-between text-xs opacity-70">
                    <span>عمولة المدير (تستقطع منك):</span>
                    <span>500 د.ع</span>
                </div>
                <div class="flex justify-between font-bold text-lg pt-2 border-t border-white/10">
                    <span>المجموع المطلوب من الزبون:</span>
                    <span id="totalDisplay" class="text-emerald-400">0 د.ع</span>
                </div>
            </div>

            <button class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-xl hover:bg-slate-800 transition-all active:scale-95 shadow-xl">بث الطلبية للمنظومة 🚀</button>
        </div>
    </div>

    <script>
        function calculatePrice() {
            const delivery = parseInt(document.getElementById('region').value) || 0;
            const food = parseInt(document.getElementById('foodPrice').value) || 0;
            const total = delivery + food;
            
            document.getElementById('deliveryDisplay').innerText = delivery.toLocaleString() + " د.ع";
            document.getElementById('totalDisplay').innerText = total.toLocaleString() + " د.ع";
        }
    </script>
</body>
</html>
