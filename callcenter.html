<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>الحوت — دليل الحجوزات المركزية</title>
<meta name="theme-color" content="#F7F7F7">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=IBM+Plex+Mono:wght@600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
/* ═══════════════════════════════════════════════════════════
   DESIGN SYSTEM — Call Center / Master Fleet
═══════════════════════════════════════════════════════════ */
:root {
  --bg: #F7F7F7;
  --white: #FFFFFF;
  --border: #EBEBEB;
  --border-d: #DDDDDD;
  --red: #FF385C;
  --red-d: #E31C5F;
  --red-l: #FFF0F2;
  --green: #00A699;
  --green-l: #E6F7F6;
  --amber: #FC642D;
  --amber-l: #FFF3EE;
  --blue: #0066CC;
  --blue-l: #EEF5FF;
  --tx0: #222222;
  --tx1: #484848;
  --tx2: #717171;
  --tx3: #AAAAAA;
  --sh-card: 0 4px 12px rgba(0,0,0,.06);
  --sh-hover: 0 8px 24px rgba(0,0,0,.1);
  --sh-btn: 0 4px 12px rgba(255,56,92,.25);
  --r3: 12px; --r4: 16px; --r5: 20px;
}

*,::before,::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'Cairo',sans-serif;color:var(--tx0);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
button,input,select{font-family:'Cairo',sans-serif;outline:none;}
.dn{display:none!important;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--border-d);border-radius:99px;}

/* ── HEADER ── */
.header{
  background:var(--white);border-bottom:1px solid var(--border);
  padding:14px 24px;display:flex;align-items:center;justify-content:space-between;
  z-index:100;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.03);
}
.h-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.h-logo-ic{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#FF385C,#E31C5F);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:var(--sh-btn);}
.h-title{font-size:1.1rem;font-weight:900;color:var(--tx0);}
.h-sub{font-size:.65rem;font-weight:700;color:var(--tx2);background:var(--bg);padding:2px 8px;border-radius:99px;border:1px solid var(--border);}
.h-status{display:flex;align-items:center;gap:6px;font-size:.75rem;font-weight:800;color:var(--green);background:var(--green-l);padding:6px 12px;border-radius:99px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── MAIN LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden;}

/* ── LEFT: PHONE ORDERS TRACKER ── */
.tracker-panel{
  width:340px;background:var(--white);border-left:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;
}
.tp-head{padding:16px;border-bottom:1px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:space-between;}
.tp-title{font-size:.9rem;font-weight:900;}
.tp-badge{background:var(--amber);color:#fff;font-size:.65rem;font-weight:900;padding:2px 8px;border-radius:99px;}
.tp-list{flex:1;overflow-y:auto;padding:12px;}
.tp-empty{text-align:center;padding:40px 20px;color:var(--tx3);font-size:.85rem;font-weight:700;}

/* Tracker Card */
.tc{background:var(--white);border:1px solid var(--border);border-radius:var(--r3);padding:12px;margin-bottom:12px;box-shadow:var(--sh-card);border-right:3px solid var(--border-d);}
.tc.pending{border-right-color:var(--amber);}
.tc.active{border-right-color:var(--blue);}
.tc-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.tc-cust{font-size:.85rem;font-weight:900;}
.tc-timer{font-family:'IBM Plex Mono',monospace;font-size:.7rem;font-weight:800;color:var(--amber);background:var(--amber-l);padding:2px 6px;border-radius:6px;display:flex;align-items:center;gap:4px;}
.tc-car{font-size:.75rem;font-weight:700;color:var(--tx1);margin-bottom:4px;}
.tc-off{font-size:.65rem;font-weight:800;color:var(--tx2);background:var(--bg);padding:3px 8px;border-radius:6px;display:inline-block;margin-bottom:8px;}
.tc-acts{display:grid;grid-template-columns:1fr 1fr;gap:6px;border-top:1px solid var(--border);padding-top:8px;}
.tc-btn{padding:8px;border-radius:8px;border:none;font-size:.7rem;font-weight:800;cursor:pointer;font-family:'Cairo',sans-serif;transition:.2s;}
.tc-btn:active{transform:scale(.95);}
.tc-btn.wa{background:#25D366;color:#fff;}
.tc-btn.acc{background:var(--blue-l);color:var(--blue);}
.tc-btn.comp{background:var(--green);color:#fff;grid-column:1/3;}
.tc-btn.del{background:var(--red-l);color:var(--red);}

/* ── RIGHT: MASTER FLEET ── */
.fleet-panel{flex:1;display:flex;flex-direction:column;background:var(--bg);min-width:0;}
.fp-filters{
  padding:16px 24px;background:var(--white);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;box-shadow:var(--sh-card);z-index:10;
}
.f-search{
  flex:1;min-width:200px;display:flex;align-items:center;gap:8px;
  background:var(--bg);border:1px solid var(--border-d);border-radius:99px;
  padding:8px 16px;transition:.2s;
}
.f-search:focus-within{border-color:var(--red);background:var(--white);box-shadow:0 0 0 3px var(--red-m);}
.f-search input{border:none;background:transparent;width:100%;font-size:.85rem;font-weight:700;color:var(--tx0);}
.f-sel{
  padding:9px 14px;border-radius:99px;border:1px solid var(--border-d);
  background:var(--white);font-size:.8rem;font-weight:800;color:var(--tx1);
  cursor:pointer;outline:none;
}
.f-sel:focus{border-color:var(--red);}
.fp-count{font-size:.8rem;font-weight:800;color:var(--tx2);margin-right:auto;}

.fp-grid{
  flex:1;overflow-y:auto;padding:24px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;
}

/* Master Car Card */
.mc{
  background:var(--white);border:1px solid var(--border);border-radius:var(--r4);
  overflow:hidden;box-shadow:var(--sh-card);transition:.2s;display:flex;flex-direction:column;
}
.mc:hover{box-shadow:var(--sh-hover);transform:translateY(-3px);}
.mc-img{width:100%;height:160px;background:var(--light);position:relative;}
.mc-img img{width:100%;height:100%;object-fit:cover;}
.mc-noimg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem;color:var(--tx4);}
.mc-badge{position:absolute;top:10px;right:10px;background:rgba(255,255,255,.9);padding:3px 10px;border-radius:99px;font-size:.65rem;font-weight:900;}
.mc-office{position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,.7);color:#fff;padding:3px 10px;border-radius:99px;font-size:.65rem;font-weight:800;backdrop-filter:blur(4px);}
.mc-bd{padding:14px;flex:1;}
.mc-title{font-size:1.05rem;font-weight:900;margin-bottom:4px;color:var(--tx0);}
.mc-specs{display:flex;gap:6px;font-size:.7rem;font-weight:700;color:var(--tx2);margin-bottom:10px;flex-wrap:wrap;}
.mc-spec{background:var(--bg);padding:2px 8px;border-radius:6px;border:1px solid var(--border);}
.mc-price{font-size:1.15rem;font-weight:900;color:var(--green);margin-bottom:12px;}
.mc-notes{font-size:.7rem;font-weight:600;color:var(--tx1);background:var(--amber-l);padding:8px;border-radius:8px;border:1px dashed rgba(252,100,45,.3);margin-bottom:12px;}
.mc-acts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:auto;}
.mcb{padding:10px;border-radius:8px;border:none;font-size:.75rem;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:.2s;}
.mcb:active{transform:scale(.95);}
.mcb.wa{background:var(--blue-l);color:var(--blue);}
.mcb.wa:hover{background:var(--blue);color:#fff;}
.mcb.book{background:var(--red-g);color:#fff;box-shadow:var(--sh-btn);}

/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:90000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.3s;}
.modal-overlay.open{opacity:1;pointer-events:auto;}
.modal-card{background:var(--white);width:100%;max-width:440px;border-radius:var(--r5);padding:24px;box-shadow:0 20px 40px rgba(0,0,0,.2);transform:translateY(20px);transition:.3s;}
.modal-overlay.open .modal-card{transform:translateY(0);}
.md-title{font-size:1.2rem;font-weight:900;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.md-close{background:none;border:none;font-size:20px;color:var(--tx3);cursor:pointer;}
.md-car-info{background:var(--bg);border:1px solid var(--border);border-radius:var(--r3);padding:12px;margin-bottom:16px;}
.md-ci-n{font-size:.9rem;font-weight:900;}
.md-ci-o{font-size:.75rem;font-weight:700;color:var(--tx2);}
.md-fld{margin-bottom:14px;}
.md-lbl{font-size:.75rem;font-weight:800;color:var(--tx1);margin-bottom:6px;display:block;}
.md-in{width:100%;background:var(--white);border:1.5px solid var(--border-d);border-radius:var(--r2);padding:10px 14px;font-size:.85rem;font-weight:700;transition:.2s;}
.md-in:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-m);}
.md-btn{width:100%;padding:14px;background:var(--red-g);color:#fff;border:none;border-radius:var(--r3);font-size:.95rem;font-weight:900;cursor:pointer;box-shadow:var(--sh-btn);margin-top:10px;}

/* Mobile responsiveness */
@media(max-width:900px){
  .layout{flex-direction:column-reverse;}
  .tracker-panel{width:100%;height:40vh;border-left:none;border-top:2px solid var(--border-d);}
  .fp-grid{grid-template-columns:1fr 1fr;}
}
@media(max-width:600px){
  .fp-grid{grid-template-columns:1fr;padding:16px;}
}
</style>
</head>
<body>
<audio id="sndNew" src="https://actions.google.com/sounds/v1/alarms/submarine_dive_horn.ogg" preload="auto"></audio>

<div id="toasts"></div>

<header class="header">
  <a href="admin.html" class="h-logo">
    <div class="h-logo-ic">🐋</div>
    <div>
      <div class="h-title">دليل الحجوزات المركزية</div>
      <div class="h-sub">إدارة الطلبات الهاتفية والأسطول</div>
    </div>
  </a>
  <div class="h-status"><div class="dot"></div> متصل بالشبكة</div>
</header>

<div class="layout">
  
  <!-- LEFT: TRACKER -->
  <aside class="tracker-panel">
    <div class="tp-head">
      <div class="tp-title">الطلبات الهاتفية النشطة</div>
      <div class="tp-badge" id="trackerCount">0</div>
    </div>
    <div class="tp-list" id="trackerList">
      <div class="tp-empty">⏳ جاري التحميل...</div>
    </div>
  </aside>

  <!-- RIGHT: MASTER FLEET -->
  <main class="fleet-panel">
    <div class="fp-filters">
      <div class="f-search">
        <i data-lucide="search" size="18" color="var(--tx3)"></i>
        <input type="text" id="searchInput" placeholder="ابحث عن سيارة أو مكتب..." oninput="applyFilters()">
      </div>
      <select class="f-sel" id="catFilter" onchange="applyFilters()">
        <option value="all">كل الفئات</option>
        <option value="economy">اقتصادية</option>
        <option value="family">عائلية</option>
        <option value="luxury">فخمة VIP</option>
        <option value="wedding">زفاف</option>
      </select>
      <select class="f-sel" id="sortFilter" onchange="applyFilters()">
        <option value="default">ترتيب الافتراضي</option>
        <option value="price_asc">الأرخص أولاً</option>
        <option value="price_desc">الأغلى أولاً</option>
      </select>
      <div class="fp-count" id="fleetCount">0 سيارة متاحة</div>
    </div>

    <div class="fp-grid" id="fleetGrid">
      <div class="tp-empty" style="grid-column:1/-1">⏳ جاري جلب الأسطول المركزي...</div>
    </div>
  </main>
</div>

<!-- BOOKING MODAL -->
<div class="modal-overlay" id="bookModal" onclick="closeBookModal()">
  <div class="modal-card" onclick="event.stopPropagation()">
    <div class="md-title">
      <span>تأكيد الحجز الهاتفي</span>
      <button class="md-close" onclick="closeBookModal()">✕</button>
    </div>
    <div class="md-car-info">
      <div class="md-ci-n" id="md-car-name">تويوتا كامري</div>
      <div class="md-ci-o" id="md-office-name">مكتب النورس</div>
    </div>
    <div class="md-fld">
      <label class="md-lbl">اسم الزبون</label>
      <input type="text" class="md-in" id="md-cust-name" placeholder="الاسم الكامل">
    </div>
    <div class="md-fld">
      <label class="md-lbl">رقم هاتف الزبون</label>
      <input type="tel" class="md-in" id="md-cust-phone" placeholder="07XXXXXXXX" dir="ltr" style="text-align:right">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="md-fld">
        <label class="md-lbl">عدد الأيام</label>
        <input type="number" class="md-in" id="md-days" value="1" min="1" oninput="calcTotal()">
      </div>
      <div class="md-fld">
        <label class="md-lbl">الإجمالي (د.ع)</label>
        <input type="text" class="md-in" id="md-total" readonly style="background:var(--bg);color:var(--green);">
      </div>
    </div>
    <button class="md-btn" onclick="submitPhoneBooking()">تأكيد وإرسال للرادار 🚀</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   CONFIG & FIREBASE
═══════════════════════════════════════════════════════════ */
const API_URL   = "https://script.google.com/macros/s/AKfycbwOZXSohTDG9nayqJ3caUqI6q50rGXaKiAYbBr-W6Xksq8qSQH_mxVU_o-7CJQrpUWa9A/exec";
const API_TOKEN = "HUT_CLOUD_2026";
let MP = localStorage.getItem("hut_master_pass") || ""; // We assume admin is logged in from main dashboard

let db;
try {
  firebase.initializeApp({
    apiKey:"AIzaSyAo1rmqUzieYZU3RIwXOAN87GkpNrp-_Hc",
    authDomain:"alhut-for-rent.firebaseapp.com",
    databaseURL:"https://alhut-for-rent-default-rtdb.europe-west1.firebasedatabase.app",
    projectId:"alhut-for-rent"
  });
  db = firebase.database();
} catch(e) { console.warn("Firebase Init Error", e); }

/* ════ STATE ════ */
let fullFleet = [];
let filteredFleet = [];
let trackedOrders = [];
let bookingCtx = null; // {car object}
let timerInterval = null;

const $ = id => document.getElementById(id);
const fmt = n => Math.round(Number(n)||0).toLocaleString("ar-EG");
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function toast(msg, type="s") {
  const c=$("toasts"); const el=document.createElement("div"); el.className=`ti t${type}`;
  el.innerHTML=`<div class="ti-ic">${type==="s"?"✓":"✕"}</div><div class="ti-msg">${msg}</div>`;
  c.appendChild(el); setTimeout(()=>{el.style.opacity="0";setTimeout(()=>el.remove(),300);},3500);
}

document.addEventListener("DOMContentLoaded", () => {
  lucide.createIcons();
  fetchMasterFleet();
  startTrackerListener();
  
  // Timer loop for active phone orders
  timerInterval = setInterval(updateTimers, 60000); // update every minute
});

/* ═══════════════════════════════════════════════════════════
   FETCH MASTER FLEET
═══════════════════════════════════════════════════════════ */
async function fetchMasterFleet() {
  try {
    // Get ALL cars (active)
    const res = await fetch(`${API_URL}?action=getAvailableCars&token=${API_TOKEN}`);
    const data = await res.json();
    fullFleet = Array.isArray(data) ? data : (data.cars || []);
    
    // We only want cars that are available or belong to offices
    fullFleet = fullFleet.filter(c => c.status !== "inactive");
    
    applyFilters();
  } catch(e) {
    $("fleetGrid").innerHTML = `<div class="tp-empty" style="grid-column:1/-1;color:var(--red)">❌ فشل جلب الأسطول. تحقق من الاتصال.</div>`;
  }
}

function applyFilters() {
  const q = $("searchInput").value.toLowerCase().trim();
  const cat = $("catFilter").value;
  const sort = $("sortFilter").value;

  filteredFleet = fullFleet.filter(c => {
    if(cat !== "all" && (c.cat||"economy").toLowerCase() !== cat) return false;
    if(q && !c.name.toLowerCase().includes(q) && !(c.office_id||"").toLowerCase().includes(q)) return false;
    return true;
  });

  if(sort === "price_asc") filteredFleet.sort((a,b) => (Number(a.price)||0) - (Number(b.price)||0));
  if(sort === "price_desc") filteredFleet.sort((a,b) => (Number(b.price)||0) - (Number(a.price)||0));

  $("fleetCount").textContent = `${filteredFleet.length} سيارة متاحة`;
  renderFleet();
}

function renderFleet() {
  const grid = $("fleetGrid");
  if(!filteredFleet.length) {
    grid.innerHTML = `<div class="tp-empty" style="grid-column:1/-1;font-size:1.2rem;">🚗 لا توجد سيارات تطابق بحثك</div>`;
    return;
  }

  const catNames = {economy:"اقتصادية", family:"عائلية", luxury:"فخمة VIP", wedding:"زفاف"};

  grid.innerHTML = filteredFleet.map(c => {
    const cName = esc(c.name);
    const oName = esc(c.office_id || "سيارة منصة");
    const price = Number(c.price)||0;
    const cat = catNames[c.cat] || c.cat || "اقتصادية";
    const img = c.photo_url ? `<img src="${esc(c.photo_url)}" loading="lazy">` : `<div class="mc-noimg">🚗</div>`;
    
    // Notes logic: you can add specific office notes here if fetched from Admin data, 
    // for now we'll put a dummy note or format the color/plate
    const notes = c.office_id === "SHARED" ? "سيارة منصة مشتركة، متاحة للجميع." : `سيارة تابعة لمكتب ${oName}. يفضل التأكد من توفرها هاتفياً قبل إرسال العميل.`;

    return `
    <div class="mc">
      <div class="mc-img">
        ${img}
        <div class="mc-badge">${cat}</div>
        <div class="mc-office">🏢 ${oName}</div>
      </div>
      <div class="mc-bd">
        <div class="mc-title">${cName}</div>
        <div class="mc-specs">
          <div class="mc-spec">🎨 ${esc(c.color||"غير محدد")}</div>
          <div class="mc-spec">🪪 ${esc(c.plate||"غير محدد")}</div>
        </div>
        <div class="mc-price">${fmt(price)} <span style="font-size:.7rem;color:var(--tx2)">د.ع/يوم</span></div>
        <div class="mc-notes">📝 ${notes}</div>
        
        <div class="mc-acts">
          <button class="mcb wa" onclick='exportToWhatsApp(${safeJSON(c)})'>
            <i data-lucide="share-2" size="14"></i> إرسال للزبون
          </button>
          <button class="mcb book" onclick='openBookModal(${safeJSON(c)})'>
            <i data-lucide="phone-call" size="14"></i> حجز يدوي
          </button>
        </div>
      </div>
    </div>`;
  }).join("");
  lucide.createIcons();
}

/* ═══════════════════════════════════════════════════════════
   EXPORT TO WHATSAPP (SEND TO CUSTOMER)
═══════════════════════════════════════════════════════════ */
window.exportToWhatsApp = function(car) {
  const txt = `*عرض تأجير من منصة الحوت* 🐋\n\n🚗 السيارة: ${car.name}\n🏢 المكتب: ${car.office_id||"منصة الحوت"}\n🎨 اللون: ${car.color||"—"}\n💰 السعر اليومي: ${fmt(car.price)} د.ع\n\nللحجز والاستفسار يرجى الرد على هذه الرسالة بتأكيد رغبتك.`;
  window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`, '_blank');
};

/* ═══════════════════════════════════════════════════════════
   MANUAL BOOKING FLOW
═══════════════════════════════════════════════════════════ */
window.openBookModal = function(car) {
  bookingCtx = car;
  $("md-car-name").textContent = car.name;
  $("md-office-name").textContent = car.office_id || "سيارة منصة";
  $("md-cust-name").value = "";
  $("md-cust-phone").value = "";
  $("md-days").value = "1";
  calcTotal();
  $("bookModal").classList.add("open");
};

window.closeBookModal = function() {
  $("bookModal").classList.remove("open");
  bookingCtx = null;
};

window.calcTotal = function() {
  if(!bookingCtx) return;
  const d = Number($("md-days").value) || 1;
  const t = (Number(bookingCtx.price)||0) * d;
  $("md-total").value = fmt(t);
};

window.submitPhoneBooking = async function() {
  const cName = $("md-cust-name").value.trim();
  const cPhone = $("md-cust-phone").value.trim();
  const days = Number($("md-days").value) || 1;
  
  if(!cName || !cPhone) return toast("أدخل اسم ورقم الزبون", "e");
  
  const total = (Number(bookingCtx.price)||0) * days;
  
  const body = {
    action: "claimOrder", // Or a dedicated createPhoneOrder action if you have one, but we can simulate via API
    // Actually, to CREATE an order via API, we need a 'CREATE_ORDER' endpoint. 
    // Assuming the API supports booking cars:
    token: API_TOKEN,
    car_id: bookingCtx.id,
    car: bookingCtx.name,
    office: bookingCtx.office_id,
    name: cName,
    phone: cPhone,
    days: days,
    total: total,
    city: "حجز هاتفي مركز",
    addon: "حجز من الكول سنتر",
    source: "phone" // Special flag
  };

  // Because the standard backend might only have 'claimOrder' or 'completeOrder', 
  // We will directly inject it into Firebase for the tracker, AND call backend to register it if needed.
  // Assuming we can write directly to Firebase 'hut_car_orders' to bypass client-side limitations for Admins:
  try {
    const orderId = "PH" + Date.now();
    const orderObj = {
      id: orderId,
      car: bookingCtx.name,
      office: bookingCtx.office_id,
      name: cName,
      phone: cPhone,
      days: days,
      total: total,
      city: "مركز الاتصال",
      status: "pending",
      source: "phone",
      created_at: new Date().toISOString()
    };
    
    if(db) {
      await db.ref(`hut_car_orders/${orderId}`).set(orderObj);
      toast("تم إنشاء الطلب ورفعه للرادار ✅");
      closeBookModal();
    } else {
      toast("Firebase غير متصل", "e");
    }
  } catch(e) { toast("فشل إنشاء الطلب", "e"); }
};

/* ═══════════════════════════════════════════════════════════
   PHONE ORDERS TRACKER (SIDEBAR)
═══════════════════════════════════════════════════════════ */
function startTrackerListener() {
  if(!db) return;
  db.ref("hut_car_orders").on("value", snap => {
    const all = snap.val() || {};
    // Only track orders that are 'pending' or 'active' and specifically from phone (or just all active to help admin)
    // We will show ALL pending/active car orders so the Admin Call Center can manage them easily.
    trackedOrders = Object.values(all)
      .filter(o => ["pending", "active", "confirmed"].includes(o.status))
      .sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
      
    renderTracker();
  });
}

function updateTimers() {
  // Re-render to update elapsed time
  if(trackedOrders.length > 0) renderTracker();
}

function getElapsedTime(isoString) {
  const diff = Math.floor((Date.now() - new Date(isoString).getTime()) / 60000); // in minutes
  if(diff < 0) return "الآن";
  if(diff < 60) return `${diff} دقيقة`;
  return `${Math.floor(diff/60)} ساعة`;
}

function renderTracker() {
  const list = $("trackerList");
  $("trackerCount").textContent = trackedOrders.length;
  
  if(!trackedOrders.length) {
    list.innerHTML = `<div class="tp-empty">لا توجد طلبات نشطة حالياً</div>`;
    return;
  }

  list.innerHTML = trackedOrders.map(o => {
    const isPending = o.status === "pending";
    const statusClass = isPending ? "pending" : "active";
    const timeElapsed = getElapsedTime(o.created_at);
    
    // Warn if pending > 15 mins
    const warnColor = (isPending && timeElapsed.includes("دقيقة") && parseInt(timeElapsed) > 15) || timeElapsed.includes("ساعة") ? "color:var(--red);" : "";

    let acts = "";
    if(isPending) {
      acts = `
        <button class="tc-btn wa" onclick="waOffice('${esc(o.office)}')"><i data-lucide="phone" size="12"></i> اتصال المكتب</button>
        <button class="tc-btn acc" onclick="adminConfirmOrder('${esc(o.id)}')"><i data-lucide="check" size="12"></i> تأكيد (وافق)</button>
        <button class="tc-btn del" style="grid-column:1/3" onclick="adminCancelOrder('${esc(o.id)}')">✕ إلغاء الطلب</button>
      `;
    } else {
      acts = `
        <button class="tc-btn comp" onclick="adminCompleteOrder('${esc(o.id)}', '${esc(o.office)}')"><i data-lucide="wallet" size="14"></i> تم الاستلام (تسجيل العمولة)</button>
      `;
    }

    return `
    <div class="tc ${statusClass}">
      <div class="tc-hd">
        <div class="tc-cust">👤 ${esc(o.name)}</div>
        <div class="tc-timer" style="${warnColor}"><i data-lucide="clock" size="12"></i> ${timeElapsed}</div>
      </div>
      <div class="tc-car">🚗 ${esc(o.car)}</div>
      <div class="tc-off">🏢 ${esc(o.office || "غير محدد")}</div>
      <div style="font-size:.8rem;font-weight:900;color:var(--green);margin-bottom:8px;">${fmt(o.total)} د.ع</div>
      <div class="tc-acts">${acts}</div>
    </div>`;
  }).join("");
  
  lucide.createIcons();
}

/* ── TRACKER ACTIONS ── */
window.waOffice = function(officeName) {
  toast("يجب جلب رقم المكتب من قاعدة البيانات للاتصال به", "s");
  // If you have gD.carOffices accessible, you can find the phone here.
};

window.adminConfirmOrder = async function(id) {
  if(!confirm("تأكيد موافقة المكتب على هذا الطلب؟")) return;
  // Update status to active
  try {
    if(db) await db.ref(`hut_car_orders/${id}`).update({ status: "active", last_update: new Date().toISOString() });
    toast("تم تأكيد الطلب بنجاح");
  } catch(e) { toast("خطأ في التأكيد", "e"); }
};

window.adminCancelOrder = async function(id) {
  if(!confirm("إلغاء هذا الطلب وإزالته؟")) return;
  try {
    if(db) await db.ref(`hut_car_orders/${id}`).update({ status: "cancelled", last_update: new Date().toISOString() });
    toast("تم إلغاء الطلب");
  } catch(e) { toast("خطأ", "e"); }
};

window.adminCompleteOrder = async function(id, officeName) {
  if(!confirm("هل استلم الزبون السيارة؟ (سيتم إغلاق الطلب واحتساب العمولة لمحفظة المنصة)")) return;
  
  // Call the official backend API to ensure ledgers are updated properly
  try {
    toast("جاري تسجيل العمولة...", "s");
    await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({ action: "completeOrder", id: id, office: officeName, token: API_TOKEN })
    });
    toast("✅ تم الإغلاق وتسجيل العمولة بنجاح!");
  } catch(e) {
    toast("حدث خطأ أثناء التسجيل", "e");
  }
};
