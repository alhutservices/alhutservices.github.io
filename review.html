<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="docTitle">مراجعة الطلب | الحوت 🐋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #002349; --accent: #D4AF37; }
        body { font-family: 'Tajawal', sans-serif; background-color: #f0f4f8; overflow-x: hidden; }
        
        .main-card { 
            background: white; 
            border-radius: 3.5rem; 
            box-shadow: 0 25px 50px -12px rgba(0, 35, 73, 0.15); 
            border-top: 12px solid var(--main); 
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
        .info-item { background: #f8fafc; padding: 0.8rem; border-radius: 1.2rem; border: 1px solid #edf2f7; transition: 0.3s; }
        .info-item:hover { border-color: var(--accent); background: white; }
        .info-label { color: #94a3b8; font-size: 0.65rem; font-weight: 800; margin-bottom: 2px; }
        .info-value { color: var(--main); font-size: 0.85rem; font-weight: 900; }

        /* السعر النابض */
        .price-summary { 
            background: var(--main); 
            color: var(--accent); 
            border-radius: 2.5rem; 
            padding: 1.5rem; 
            box-shadow: 0 10px 20px rgba(0, 35, 73, 0.2);
            animation: pulse-price 2s infinite;
        }
        @keyframes pulse-price {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .btn-confirm { 
            background: var(--main); 
            color: white; 
            box-shadow: 0 15px 30px rgba(0, 35, 73, 0.3); 
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }
        .btn-confirm:active { transform: scale(0.95); }
        
        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .2em 0 0 rgba(0,0,0,0), .4em 0 0 rgba(0,0,0,0); } 40% { color: white; text-shadow: .2em 0 0 rgba(0,0,0,0), .4em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .2em 0 0 white, .4em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .2em 0 0 white, .4em 0 0 white; } }

        .map-badge { background: #eef2f7; color: #475569; padding: 10px 20px; border-radius: 15px; font-size: 11px; font-weight: bold; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="mainBox" class="max-w-md w-full main-card p-6 md:p-8">
        <div class="text-center mb-6">
            <div id="mainEmoji" class="text-5xl mb-2 drop-shadow-lg">📋</div>
            <h1 id="pageTitle" class="text-2xl font-black mb-1" style="color: var(--main);">مراجعة الطلب</h1>
            <p id="orderIdText" class="text-accent text-[10px] font-black bg-blue-50 px-3 py-1 rounded-full inline-block"></p>
        </div>

        <div id="detailsGrid" class="info-grid mb-5">
            </div>

        <div id="locationPreview" class="mb-6 text-center hidden">
             <a id="mapLink" href="#" target="_blank" class="map-badge hover:border-accent transition-all inline-flex items-center gap-2">
                <i class="fas fa-map-marked-alt text-blue-500"></i> <span id="mapText">عرض موقع التسليم</span>
             </a>
        </div>

        <div class="price-summary text-center mb-8">
            <p id="totalLabel" class="text-[10px] font-black opacity-80 uppercase mb-1 tracking-widest">المبلغ النهائي التقديري</p>
            <div class="flex items-center justify-center gap-1">
                <span id="totalVal" class="text-4xl font-black">0</span>
                <span class="text-sm font-bold opacity-80" id="currLabel">د.ع</span>
            </div>
        </div>

        <div class="space-y-3">
            <button id="mainSubmitBtn" onclick="confirmAndSubmit()" class="btn-confirm w-full py-5 rounded-2xl font-black text-xl flex items-center justify-center gap-3">
                <span id="btnSubmit">تأكيد وإرسال</span>
                <i id="submitIcon" class="fas fa-paper-plane"></i>
            </button>
            
            <button onclick="window.history.back()" class="w-full text-slate-400 font-bold text-xs hover:text-red-400 transition-all flex items-center justify-center gap-2">
                <i class="fas fa-arrow-right"></i> <span id="btnBack">تعديل البيانات</span>
            </button>
        </div>
        
        <p class="mt-6 text-[9px] text-center text-slate-400 font-bold leading-relaxed">
            بالضغط على تأكيد، سيتم معالجة طلبك فوراً <br> وإرساله لقسم الحجز في عائلة الحوت 🐋
        </p>
    </div>

    <script>
        const u = new URLSearchParams(window.location.search);
        const type = u.get('type') || 'personal';
        const lang = u.get('lang') || 'ar';

        window.onload = () => {
            const isRtl = (lang === 'ar' || lang === 'ku');
            document.getElementById('htmlTag').dir = isRtl ? 'rtl' : 'ltr';
            
            // تخصيص الثيم (نفس منطق صفحة النجاح)
            if(type === 'wedding') document.documentElement.style.setProperty('--main', '#be185d');
            else if(type === 'training') document.documentElement.style.setProperty('--main', '#7c3aed');

            // ملء رقم الطلب
            if(u.get('order_id')) {
                document.getElementById('orderIdText').innerText = `رقم المرجع: #${u.get('order_id')}`;
            }

            // رسم البيانات
            const fields = {
                name: "الاسم", 
                phone: "الهاتف", 
                car: "السيارة", 
                days: "المدة", 
                province: "المدينة"
            };

            let gridHtml = '';
            Object.keys(fields).forEach(key => {
                let val = u.get(key);
                if (val && val !== 'null') {
                    gridHtml += `
                        <div class="info-item">
                            <span class="info-label">${fields[key]}</span>
                            <span class="info-value">${val}</span>
                        </div>`;
                }
            });
            document.getElementById('detailsGrid').innerHTML = gridHtml;

            // السعر
            document.getElementById('totalVal').innerText = parseInt(u.get('total_price') || 0).toLocaleString();

            // الموقع
            if (u.get('location_link')) {
                document.getElementById('locationPreview').classList.remove('hidden');
                document.getElementById('mapLink').href = u.get('location_link');
            }
        };

        function confirmAndSubmit() {
            const btn = document.getElementById('mainSubmitBtn');
            const icon = document.getElementById('submitIcon');
            const txt = document.getElementById('btnSubmit');

            // تأثير التحميل قبل الانتقال
            btn.disabled = true;
            btn.style.opacity = '0.8';
            txt.innerText = 'جاري المعالجة';
            txt.classList.add('loading-dots');
            icon.className = 'fas fa-circle-notch animate-spin';

            setTimeout(() => {
                window.location.href = `success.html?${u.toString()}`;
            }, 1200);
        }
    </script>
</body>
</html>
