<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نحلة 🐝 | لوحة المطعم الفاخرة</title>
    
    <!-- الخطوط والأيقونات -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Bootstrap 5 RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Firebase SDK (V8) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // إدارة الإصدارات لضمان التحديث التلقائي
        const CURRENT_APP_VERSION = "35.1";
        if (localStorage.getItem('hut_res_app_version') !== CURRENT_APP_VERSION) {
            localStorage.setItem('hut_res_app_version', CURRENT_APP_VERSION);
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(regs => {
                    for (let reg of regs) reg.unregister();
                });
            }
            location.reload(true);
        }
    </script>

    <style>
        /* =========================================
           🐝 الهوية البصرية لشركة نحلة (Nahla Theme)
           ========================================= */
        :root {
            --nahla-yellow: #FFC107;
            --nahla-yellow-light: #FFF8E1;
            --nahla-yellow-dark: #F5B041;
            --accent: #111827;
            --success: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --bg-color: #F3F4F6;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.06);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, var(--nahla-yellow-light) 0%, transparent 50%),
                              radial-gradient(circle at bottom left, #E5E7EB 0%, transparent 50%);
            background-attachment: fixed;
            color: var(--accent);
            margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow);
            border-radius: 20px;
        }

        .btn-nahla {
            background: var(--nahla-yellow); color: var(--accent);
            border: none; border-radius: 16px; padding: 14px 20px;
            font-weight: 800; transition: all 0.2s; width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-size: 1.1rem;
        }
        .btn-nahla:active { transform: scale(0.97); }
        .btn-nahla:disabled { opacity: 0.7; cursor: not-allowed; }

        .hidden-section { display: none !important; }

        /* شاشة المصادقة */
        #loginSection {
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
        }
        .login-card { width: 100%; max-width: 400px; padding: 30px 20px; text-align: center; }
        .auth-input {
            width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 14px;
            border: 2px solid #E5E7EB; background: rgba(255,255,255,0.9);
            font-weight: bold; font-size: 1.1rem; text-align: center; transition: 0.3s;
        }
        .auth-input:focus { border-color: var(--nahla-yellow); outline: none; box-shadow: 0 0 0 4px rgba(255,193,7,0.2); }

        /* الهيدر والإحصائيات */
        .app-header {
            padding: 20px; background: var(--accent); color: white;
            border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
            position: sticky; top: 0; z-index: 100;
        }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .stat-card {
            background: rgba(255,255,255,0.1); border-radius: 16px; padding: 15px;
            border: 1px solid rgba(255,255,255,0.1); text-align: center;
        }

        /* التبويبات */
        .nav-tabs-custom { display: flex; padding: 15px 20px 5px 20px; gap: 10px; overflow-x: auto; }
        .nav-tab {
            padding: 10px 20px; border-radius: 20px; font-weight: bold;
            background: rgba(255,255,255,0.5); color: #4B5563;
            white-space: nowrap; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; gap: 8px;
        }
        .nav-tab.active { background: var(--nahla-yellow); color: var(--accent); box-shadow: 0 4px 10px rgba(255,193,7,0.3); }

        .tab-content { padding: 15px 20px 80px 20px; }

        /* نماذج الإدخال */
        .input-group-custom { margin-bottom: 15px; text-align: right; }
        .input-group-custom label { display: block; font-weight: bold; margin-bottom: 8px; color: #4B5563; }
        .form-control-nahla {
            width: 100%; padding: 14px; border-radius: 14px; border: 2px solid #E5E7EB;
            background: white; font-weight: 600; transition: 0.3s; font-size: 1rem;
        }
        .form-control-nahla:focus { border-color: var(--nahla-yellow); outline: none; }

        /* شريط تقدم الطلب */
        .order-card { padding: 20px; margin-bottom: 15px; position: relative; }
        .progress-track {
            height: 8px; background: #E5E7EB; border-radius: 4px;
            margin: 15px 0; overflow: hidden; position: relative;
        }
        .progress-fill {
            height: 100%; background: var(--nahla-yellow); border-radius: 4px;
            transition: width 0.5s ease;
        }
        .progress-fill.heading { background: #3B82F6; width: 33%; }
        .progress-fill.arrived { background: var(--warning); width: 66%; }
        .progress-fill.picked { background: var(--success); width: 100%; }

        .camera-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: #DBEAFE; color: #2563EB; padding: 20px; border-radius: 16px;
            font-size: 1.1rem; font-weight: bold; cursor: pointer; border: 2px dashed #93C5FD;
            transition: 0.3s;
        }
        .camera-btn:active { background: #BFDBFE; }

        /* Toast */
        .toast-nahla {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: white; padding: 12px 24px;
            border-radius: 30px; font-weight: bold; font-size: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 10000;
            display: flex; align-items: center; gap: 8px; opacity: 0; transition: 0.3s;
            pointer-events: none; white-space: nowrap;
        }
        .toast-nahla.show { opacity: 1; bottom: 40px; }
    </style>
</head>
<body>

    <!-- 🔐 شاشة المصادقة -->
    <div id="loginSection">
        <div class="text-center mb-4">
            <i data-lucide="store" style="width:60px; height:60px; color:var(--nahla-yellow);"></i>
            <h2 class="fw-bold m-0 text-dark mt-2">منصة نحلة 🐝</h2>
            <p class="text-muted fw-bold">إدارة المطاعم - الطلب السريع</p>
        </div>

        <div class="login-card glass-panel" id="authBox">
            <input type="tel" id="checkPhone" class="auth-input" placeholder="رقم هاتف المطعم (07...)">
            <input type="password" id="checkPassword" class="auth-input" placeholder="كلمة المرور">
            <button id="mainAuthBtn" class="btn-nahla mb-3" onclick="authAction()">دخول المنصة <i data-lucide="log-in"></i></button>

            <!-- حقول التسجيل -->
            <div id="registerFields" class="hidden-section border-top pt-3 mt-2">
                <h6 class="text-danger fw-bold mb-3">تسجيل مطعم جديد:</h6>
                <input type="text" id="regName" class="auth-input" placeholder="الاسم التجاري للمطعم">
                <input type="text" id="regArea" class="auth-input" placeholder="منطقة المطعم الأساسية">
                <select id="regPayType" class="auth-input">
                    <option value="المطعم يدفع">نظام الدفع: المطعم يدفع للكابتن</option>
                    <option value="مناصفة">نظام الدفع: مناصفة مع الكابتن</option>
                </select>
                <input type="text" id="regComm" class="auth-input" placeholder="قيمة العمولة (مثال: 2500 أو شهري)">
                <!-- قائمة المناطق والأسعار (للتسجيل) -->
                <textarea id="regPriceList" class="auth-input" rows="3" placeholder="اكتب مناطق التوصيل الخاصة بك مفصولة بفاصلة. (مثال: التحرير, الجامعة, تسعين) ليتم استخدامها في إرسال الطلبات"></textarea>
                <button class="btn-nahla mt-2 bg-dark text-white" onclick="submitRegistration()">إرسال طلب الانضمام</button>
            </div>
        </div>

        <div id="waitingBox" class="hidden-section text-center mt-4">
            <i data-lucide="loader-2" class="fa-spin text-warning" style="width:40px;height:40px;"></i>
            <h5 class="fw-bold mt-3">يتم تهيئة النظام...</h5>
        </div>
    </div>

    <!-- 🚀 لوحة التحكم الرئيسية -->
    <div id="dashboardSection" class="hidden-section">
        
        <!-- الهيدر -->
        <div class="app-header">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h4 class="fw-bold m-0" id="headerResName">مطعم ...</h4>
                    <span class="badge bg-success mt-1"><span style="width:8px;height:8px;background:white;border-radius:50%;display:inline-block;margin-left:4px;"></span> متصل بالرادار</span>
                </div>
                <i data-lucide="log-out" class="text-white-50" onclick="logout()" style="cursor:pointer; width:24px;"></i>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <small class="text-white-50 fw-bold d-block">طلبات الشهر</small>
                    <h3 class="fw-bold m-0 text-warning" id="statMonthOrders">0</h3>
                </div>
                <div class="stat-card">
                    <small class="text-white-50 fw-bold d-block">مبيعات اليوم</small>
                    <h3 class="fw-bold m-0 text-success" id="todayTotalSales">0 <small class="fs-6">د.ع</small></h3>
                </div>
            </div>
        </div>

        <!-- التبويبات -->
        <div class="nav-tabs-custom">
            <div class="nav-tab active" onclick="switchTab('tab-new-order', this)"><i data-lucide="plus-circle" style="width:18px;"></i> إرسال طلب</div>
            <div class="nav-tab" onclick="switchTab('tab-live-orders', this)"><i data-lucide="activity" style="width:18px;"></i> نشطة (<span id="activeCount">0</span>)</div>
            <div class="nav-tab" onclick="switchTab('tab-archive', this)"><i data-lucide="archive" style="width:18px;"></i> أرشيف اليوم</div>
        </div>

        <div class="tab-content">
            
            <!-- 1️⃣ إرسال طلب جديد (واجهة العمل السريع) -->
            <div id="tab-new-order">
                <div class="glass-panel p-4 mb-4">
                    
                    <div class="d-flex gap-2 mb-4">
                        <button class="btn btn-outline-dark w-50 fw-bold active" id="btnModeManual" onclick="switchOrderMode('manual')">إدخال نصي ✍️</button>
                        <button class="btn btn-outline-dark w-50 fw-bold" id="btnModePhoto" onclick="switchOrderMode('photo')">تصوير الوصل 📸</button>
                    </div>

                    <!-- الوضع اليدوي -->
                    <div id="manualOrderForm">
                        <div class="input-group-custom">
                            <label>المنطقة (مطلوب)</label>
                            <input type="text" id="customerArea" class="form-control-nahla" placeholder="اكتب المنطقة أو اختر من القائمة..." list="areaDatalist">
                            <datalist id="areaDatalist"></datalist>
                        </div>
                        
                        <div class="input-group-custom">
                            <label>المبلغ المطلوب للوصل مع التوصيل (مطلوب)</label>
                            <input type="number" id="orderPrice" class="form-control-nahla" placeholder="مثال: 15000">
                        </div>

                        <div class="input-group-custom">
                            <label>هاتف الزبون</label>
                            <input type="tel" id="customerPhone" class="form-control-nahla" placeholder="07...">
                        </div>

                        <div class="input-group-custom">
                            <label>تفاصيل الطلب (أقرب نقطة دالة، مكونات)</label>
                            <textarea id="customerDetails" class="form-control-nahla" rows="2" placeholder="اكتب هنا..."></textarea>
                        </div>
                    </div>

                    <!-- وضع صورة الوصل -->
                    <div id="photoOrderForm" class="hidden-section">
                        <!-- اختيار المنطقة إلزامي حتى مع الصورة ليعرف النظام أين يوجه السائق -->
                        <div class="input-group-custom">
                            <label class="text-primary">اختر منطقة التوصيل (مطلوب جداً لتوجيه الكابتن)</label>
                            <select id="photoAreaSelect" class="form-control-nahla mb-3">
                                <option value="">-- اضغط لاختيار المنطقة --</option>
                            </select>
                        </div>

                        <div class="text-center mt-2">
                            <input type="file" id="receiptPhoto" accept="image/*" capture="environment" class="d-none" onchange="handlePhotoSelect(event)">
                            <label for="receiptPhoto" class="camera-btn w-100">
                                <i data-lucide="camera" style="width:24px;height:24px;"></i> التقط صورة الوصل المكتوب
                            </label>
                            <img id="photoPreview" class="mt-3 rounded-4 w-100 hidden-section shadow-sm" style="max-height: 250px; object-fit: cover;">
                        </div>
                    </div>

                    <button class="btn-nahla mt-4 py-3" id="btnSubmitOrder" onclick="submitOrder()">إرسال الطلب الآن 🚀</button>
                </div>
            </div>

            <!-- 2️⃣ الطلبات النشطة -->
            <div id="tab-live-orders" class="hidden-section">
                <div id="liveOrdersContainer">
                    <div class="text-center text-muted mt-5 fw-bold opacity-50">
                        <i data-lucide="inbox" style="width:50px;height:50px;margin-bottom:10px;"></i><br>لا توجد طلبات نشطة
                    </div>
                </div>
            </div>

            <!-- 3️⃣ أرشيف اليوم -->
            <div id="tab-archive" class="hidden-section">
                <div class="glass-panel p-3">
                    <h5 class="fw-bold mb-3 d-flex justify-content-between align-items-center">
                        <span>المنجزة اليوم</span>
                        <span class="badge bg-success" id="archiveCount">0</span>
                    </h5>
                    <div id="archiveContainer"></div>
                </div>
            </div>

        </div>
    </div>

    <!-- إشعار عائم -->
    <div id="toast" class="toast-nahla"><i data-lucide="check-circle" id="toast-icon"></i> <span id="toast-msg">تم!</span></div>

    <!-- ==========================================
         🐝 المنطق البرمجي السريع (V35.1 Logic)
         ========================================== -->
    <script>
        lucide.createIcons();

        // 1. الإعدادات
        const API_URL = "https://script.google.com/macros/s/AKfycbyA5NXtyt_PelH9IKtZyBLd9UH0x_sn3dKKiak7N2mHahYUAN7Mz7ocYUB3BE4_mby4Ag/exec";
        const API_TOKEN = "NAHLA_SECURE_TOKEN_2026";
        const IMGBB_KEY = "789b29c3af80ee1628dab635bf502717"; 
        
        const firebaseConfig = { databaseURL: "https://nahla-delivery-6b06f-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. حالة التطبيق
        let resSession = JSON.parse(localStorage.getItem('hut_res_session')) || null;
        let isRegistering = false;
        let currentOrderMode = 'manual';
        let base64Receipt = null;
        let myAreasList = [];

        window.onload = () => {
            if (resSession && (Date.now() - resSession.timestamp < 24*3600000)) {
                enterDashboard();
            }
        };

        function showToast(msg, isSuccess = true) {
            document.getElementById('toast-msg').innerText = msg;
            document.getElementById('toast-icon').setAttribute('data-lucide', isSuccess ? 'check-circle' : 'alert-circle');
            lucide.createIcons();
            const t = document.getElementById('toast');
            t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
        }

        // 3. المصادقة
        async function authAction() {
            let rawPhone = document.getElementById('checkPhone').value.trim();
            let pass = document.getElementById('checkPassword').value.trim();
            let phone = rawPhone.replace(/[^\d]/g, '');
            if(phone.startsWith('0')) phone = phone.substring(1);
            if(!phone || !pass) return showToast("أدخل الرقم وكلمة المرور", false);

            const btn = document.getElementById('mainAuthBtn');
            btn.innerHTML = "جاري الاتصال... ⏳"; btn.disabled = true;

            if (isRegistering) {
                const regData = {
                    action: 'RESTAURANT_REG', token: API_TOKEN, phone: '0'+phone, password: pass,
                    name: document.getElementById('regName').value, area: document.getElementById('regArea').value,
                    pay: document.getElementById('regPayType').value, comm: document.getElementById('regComm').value,
                    priceList: document.getElementById('regPriceList').value
                };
                try {
                    await fetch(API_URL, { method: 'POST', body: JSON.stringify(regData) });
                    document.getElementById('authBox').classList.add('hidden-section');
                    document.getElementById('waitingBox').classList.remove('hidden-section');
                } catch(e) { showToast("فشل التسجيل. حاول ثانية.", false); }
            } else {
                try {
                    const res = await fetch(`${API_URL}?action=checkRes&phone=${phone}&password=${encodeURIComponent(pass)}&token=${API_TOKEN}`);
                    const data = await res.json();
                    
                    if (data.status === 'active' || data.status === 'inactive') {
                        // حفظ priceList ضمن الجلسة لاستخراج المناطق
                        resSession = { phone: '0'+phone, name: data.name, payType: data.payType, comm: data.comm, priceList: data.priceList, timestamp: Date.now() };
                        localStorage.setItem('hut_res_session', JSON.stringify(resSession));
                        enterDashboard();
                    } else if (data.status === 'pending' || data.status === 'waiting') {
                        document.getElementById('authBox').classList.add('hidden-section');
                        document.getElementById('waitingBox').classList.remove('hidden-section');
                    } else if (data.status === 'banned') {
                        showToast("❌ الحساب محظور.", false);
                    } else if (data.status === 'wrong_password') {
                        showToast("❌ كلمة المرور خاطئة.", false);
                    } else {
                        isRegistering = true;
                        document.getElementById('registerFields').classList.remove('hidden-section');
                        btn.innerHTML = "إكمال التسجيل";
                        showToast("الرقم غير مسجل، يرجى إكمال البيانات.", false);
                    }
                } catch(e) { showToast("خطأ بالاتصال", false); }
            }
            btn.disabled = false;
            if(!isRegistering) btn.innerHTML = "دخول المنصة <i data-lucide='log-in'></i>"; lucide.createIcons();
        }

        function logout() { localStorage.removeItem('hut_res_session'); location.reload(); }

        // 4. الدخول وتهيئة المناطق
        function enterDashboard() {
            document.getElementById('loginSection').classList.add('hidden-section');
            document.getElementById('dashboardSection').classList.remove('hidden-section');
            document.getElementById('headerResName').innerText = resSession.name;
            
            parseAndPopulateAreas();
            startHotDataListeners();
        }

        function parseAndPopulateAreas() {
            const listData = resSession.priceList || "";
            myAreasList = [];

            // محاولة الفهم إن كان JSON أو نص عادي مفصول بفواصل
            try {
                if(listData.startsWith('{') || listData.startsWith('[')) {
                    let parsed = JSON.parse(listData);
                    if(Array.isArray(parsed)) myAreasList = parsed;
                    else myAreasList = Object.keys(parsed);
                } else {
                    myAreasList = listData.split(/[,،\n-]/).map(s => s.trim()).filter(s => s.length > 0);
                }
            } catch(e) {
                myAreasList = listData.split(/[,،\n-]/).map(s => s.trim()).filter(s => s.length > 0);
            }

            // تعبئة Datalist (للوضع اليدوي)
            const datalist = document.getElementById('areaDatalist');
            datalist.innerHTML = '';
            myAreasList.forEach(area => {
                let opt = document.createElement('option'); opt.value = area; datalist.appendChild(opt);
            });

            // تعبئة Select (لوضع الصورة - إلزامي)
            const photoSelect = document.getElementById('photoAreaSelect');
            photoSelect.innerHTML = '<option value="">-- اضغط لاختيار المنطقة --</option>';
            myAreasList.forEach(area => {
                let opt = document.createElement('option'); opt.value = area; opt.innerText = area; photoSelect.appendChild(opt);
            });
            // إضافة خيار منطقة أخرى
            photoSelect.innerHTML += '<option value="أخرى">منطقة أخرى (غير مسجلة بالقائمة)</option>';
        }

        function switchTab(tabId, el) {
            document.querySelectorAll('.nav-tab').forEach(e=>e.classList.remove('active'));
            el.classList.add('active');
            ['tab-new-order', 'tab-live-orders', 'tab-archive'].forEach(id => document.getElementById(id).classList.add('hidden-section'));
            document.getElementById(tabId).classList.remove('hidden-section');
        }

        function switchOrderMode(mode) {
            currentOrderMode = mode;
            document.getElementById('btnModeManual').classList.toggle('active', mode==='manual');
            document.getElementById('btnModePhoto').classList.toggle('active', mode==='photo');
            document.getElementById('manualOrderForm').classList.toggle('hidden-section', mode!=='manual');
            document.getElementById('photoOrderForm').classList.toggle('hidden-section', mode!=='photo');
        }

        function handlePhotoSelect(event) {
            const file = event.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                base64Receipt = e.target.result;
                document.getElementById('photoPreview').src = base64Receipt;
                document.getElementById('photoPreview').classList.remove('hidden-section');
            };
            reader.readAsDataURL(file);
        }

        // 5. رفع الصورة (ImgBB) لتخفيف الضغط عن Firebase
        async function uploadImageToImgBB(base64Data) {
            let base64Image = base64Data.split(',')[1];
            let formData = new FormData();
            formData.append("image", base64Image);
            try {
                let res = await fetch("https://api.imgbb.com/1/upload?key=" + IMGBB_KEY, { method: "POST", body: formData });
                let data = await res.json();
                return data.data.url;
            } catch(e) { return null; }
        }

        // 6. الإرسال السريع للطلب (Fast Submit without changing tabs)
        async function submitOrder() {
            const btn = document.getElementById('btnSubmitOrder');
            
            const orderPayload = {
                id: 'HUT-' + Date.now(), restaurant: resSession.name, resPhone: resSession.phone,
                status: 'pending_driver', driverPhone: 'system_routing',
                timestamp: new Date().toISOString(), last_update: new Date().toISOString(),
                comm: resSession.comm, payType: resSession.payType,
                is_sovereign: false, ready_for_pickup: false
            };

            if (currentOrderMode === 'manual') {
                const area = document.getElementById('customerArea').value;
                const price = Number(document.getElementById('orderPrice').value);
                const phone = document.getElementById('customerPhone').value.replace(/[^\d]/g, '');
                
                if (!area || !price) return showToast("⚠️ يرجى إدخال المنطقة والمبلغ", false);
                
                orderPayload.area = area;
                orderPayload.price = price;
                orderPayload.details = document.getElementById('customerDetails').value + (phone ? ` | هاتف: ${phone}` : "");
                
            } else {
                const photoArea = document.getElementById('photoAreaSelect').value;
                if (!photoArea) return showToast("⚠️ يرجى اختيار منطقة التوصيل من القائمة للصورة", false);
                if (!base64Receipt) return showToast("⚠️ يرجى تصوير الوصل أولاً", false);

                orderPayload.area = photoArea;
                orderPayload.price = 0; // سيتم تحديده لاحقاً من قبل الكابتن أو بعد القراءة
                orderPayload.details = "طلب بوصل مصور";

                btn.innerHTML = "جاري رفع الصورة وإرسال الطلب... ⏳"; btn.disabled = true;
                
                // رفع الصورة
                const uploadedUrl = await uploadImageToImgBB(base64Receipt);
                if(uploadedUrl) orderPayload.photoUrl = uploadedUrl;
                else orderPayload.photoUrl = base64Receipt; // احتياطي
            }

            btn.disabled = true; btn.innerHTML = "جاري إرسال الطلب... 🚀";

            try {
                // إرسال لـ Firebase
                await db.ref(`active_orders/${orderPayload.id}`).set(orderPayload);
                
                // تسجيل في Sheets للإحصائيات (Fire-and-forget)
                fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'NEW_ORDER', order: orderPayload, token: API_TOKEN }) }).catch(()=>{});

                showToast("🎉 تم إرسال الطلب بنجاح!");
                
                // تصفير الحقول فقط والبقاء في نفس الصفحة (للعمل السريع)
                document.getElementById('customerArea').value = '';
                document.getElementById('orderPrice').value = '';
                document.getElementById('customerPhone').value = '';
                document.getElementById('customerDetails').value = '';
                document.getElementById('photoAreaSelect').value = '';
                base64Receipt = null; document.getElementById('photoPreview').classList.add('hidden-section');
                
            } catch (e) {
                showToast("❌ خطأ في الإرسال. تأكد من الإنترنت.", false);
            }
            btn.disabled = false; btn.innerHTML = "إرسال طلب آخر 🚀";
        }

        // 7. المستمعات (الرادار المباشر والأرشيف)
        function startHotDataListeners() {
            const cleanPhone = String(resSession.phone).replace(/^0+/, '');

            db.ref('active_orders').on('value', snap => {
                const allOrders = snap.val() || {};
                let liveHTML = '', archiveHTML = '', liveCount = 0, archCount = 0, sales = 0;
                
                const myOrders = Object.values(allOrders).filter(o => o.resPhone === resSession.phone || o.restaurant === resSession.name).sort((a,b)=> new Date(b.timestamp) - new Date(a.timestamp));

                myOrders.forEach(o => {
                    if (o.status === 'deleted') return;
                    
                    if (o.status === 'completed' || o.status === 'مكتمل') {
                        archCount++; sales += Number(o.price||0);
                        archiveHTML += `
                            <div class="glass-panel p-3 mb-2 border-end border-5 border-success">
                                <div class="d-flex justify-content-between">
                                    <h6 class="fw-bold m-0">#${o.id.substring(0,5)} | ${o.area}</h6>
                                    <span class="text-success fw-bold">${o.price} د.ع</span>
                                </div>
                                <small class="text-muted"><i data-lucide="check-circle" style="width:14px;"></i> تم التسليم بواسطة: ${o.driverPhone}</small>
                            </div>`;
                    } else {
                        liveCount++;
                        let barClass = '', statusText = '', btnAction = '';
                        if(o.status === 'pending_driver' || o.status === 'manual_pending') { barClass = ''; statusText = 'جاري البحث عن كابتن 🔍'; btnAction = `<button class="btn btn-sm btn-danger mt-2 w-100 fw-bold" onclick="cancelOrder('${o.id}')">إلغاء الطلب ✕</button>`;}
                        else if(['accepted','heading'].includes(o.status)) { barClass = 'heading'; statusText = `الكابتن متوجه إليك 🛵 (${o.driverPhone})`; btnAction = o.ready_for_pickup ? `<div class="text-success fw-bold text-center mt-2">✓ تم إبلاغ الكابتن بالجاهزية</div>` : `<button class="btn btn-sm btn-success mt-2 w-100 fw-bold" onclick="markReady('${o.id}')">الطلب جاهز للكابتن 🔔</button>`;}
                        else if(o.status === 'arrived_at_res') { barClass = 'arrived'; statusText = 'الكابتن بالمطعم 📍'; btnAction = `<div class="text-warning fw-bold text-center mt-2">سلم الطلب للكابتن</div>`;}
                        else if(o.status === 'picked_up') { barClass = 'picked'; statusText = 'بالطريق للزبون 💨'; }

                        liveHTML += `
                            <div class="order-card glass-panel">
                                <div class="d-flex justify-content-between align-items-start mb-2">
                                    <h6 class="fw-bold m-0 text-dark">#${o.id.substring(0,5)} <span class="badge bg-light text-dark ms-1">${o.area}</span></h6>
                                    <span class="fw-bold text-primary">${o.price > 0 ? o.price + ' د.ع' : 'بالصورة'}</span>
                                </div>
                                <div class="progress-track"><div class="progress-fill ${barClass}"></div></div>
                                <div class="text-center fw-bold" style="font-size:0.95rem;">${statusText}</div>
                                ${btnAction}
                            </div>`;
                    }
                });

                document.getElementById('liveOrdersContainer').innerHTML = liveHTML || `<div class="text-center text-muted mt-5 fw-bold opacity-50"><i data-lucide="check-circle" style="width:50px;height:50px;margin-bottom:10px;"></i><br>تم توصيل جميع الطلبات!</div>`;
                document.getElementById('activeCount').innerText = liveCount;
                document.getElementById('archiveContainer').innerHTML = archiveHTML || `<div class="text-center text-muted">لا يوجد طلبات منجزة اليوم.</div>`;
                document.getElementById('archiveCount').innerText = archCount;
                document.getElementById('todayTotalSales').innerHTML = `${sales} <small class="fs-6">د.ع</small>`;
                lucide.createIcons();
            });

            db.ref(`ledgers/restaurants/${cleanPhone}`).on('value', snap => {
                const ledger = snap.val() || { completed_orders: 0 };
                document.getElementById('statMonthOrders').innerText = ledger.completed_orders;
            });
        }

        function markReady(orderId) { db.ref(`active_orders/${orderId}`).update({ ready_for_pickup: true }); showToast("تم التنبيه 🔔"); }
        function cancelOrder(orderId) { if(confirm("إلغاء الطلب نهائياً؟")) db.ref(`active_orders/${orderId}`).update({ status: 'deleted' }); }

    </script>
