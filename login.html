<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة الشركاء | رادار الحوت 🐋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --whale-gold: #D4AF37; --whale-navy: #020617; }
        body { font-family: 'Tajawal', sans-serif; background: #010409; color: white; overflow: hidden; height: 100vh; }
        .trading-bg { position: fixed; inset: 0; background-image: linear-gradient(rgba(212, 175, 55, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(212, 175, 55, 0.02) 1px, transparent 1px); background-size: 40px 40px; z-index: -1; }
        .radar-scan { position: fixed; top: 0; left: 0; width: 100%; height: 2px; background: var(--whale-gold); animation: scan 6s linear infinite; opacity: 0.2; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .glass-card { background: rgba(13, 17, 23, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.2); box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .whale-input { width: 100%; padding: 1.1rem 3.5rem 1.1rem 1.1rem; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; color: white; transition: 0.4s; }
        .whale-input:focus { border-color: var(--whale-gold); box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); outline: none; }
        .trading-btn { background: var(--whale-gold); color: #000; font-weight: 900; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%); transition: 0.3s; }
        .trading-btn:hover { transform: scale(1.02); filter: brightness(1.1); }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="trading-bg"></div>
    <div class="radar-scan"></div>

    <div class="max-w-md w-full glass-card p-10 rounded-2xl relative z-10">
        <div class="text-center mb-8">
            <div class="inline-block p-4 rounded-full bg-black border border-yellow-500/20 mb-4">
                <span class="text-5xl">🐋</span>
            </div>
            <h2 class="text-3xl font-black tracking-widest uppercase italic" style="font-family: 'Orbitron', sans-serif;">
                AL-HUT <span class="text-[#D4AF37]">RADAR</span>
            </h2>
            <p class="text-[10px] text-slate-500 mt-2 tracking-[0.2em]">PARTNER AUTHENTICATION SYSTEM</p>
        </div>
        
        <div class="space-y-4">
            <div class="relative">
                <i class="fas fa-building absolute right-4 top-1/2 -translate-y-1/2 text-[#D4AF37]"></i>
                <input id="officeName" type="text" placeholder="اسم المكتب" class="whale-input font-bold">
            </div>
            
            <div class="relative">
                <i class="fas fa-location-dot absolute right-4 top-1/2 -translate-y-1/2 text-[#D4AF37]"></i>
                <select id="citySelect" class="whale-input font-bold appearance-none cursor-pointer">
                    <option value="" disabled selected>تحديد المدينة</option>
                    <option value="كركوك">كركوك</option>
                    <option value="بغداد">بغداد</option>
                    <option value="أربيل">أربيل</option>
                    <option value="السليمانية">السليمانية</option>
                    <option value="الموصل">الموصل</option>
                    <option value="البصرة">البصرة</option>
                    <option value="الأنبار">الأنبار</option>
                    <option value="ديالى">ديالى</option>
                </select>
            </div>

            <div class="relative">
                <i class="fas fa-fingerprint absolute right-4 top-1/2 -translate-y-1/2 text-[#D4AF37]"></i>
                <input id="idNumber" type="password" placeholder="كود الوصول" class="whale-input text-center tracking-[0.5em] font-black text-xl">
            </div>
            
            <button onclick="registerOffice()" id="loginBtn" class="w-full py-5 trading-btn mt-6 flex items-center justify-center gap-3">
                <span>تفعيل الرادار</span>
                <i class="fas fa-shield-halved"></i>
            </button>
        </div>
    </div>

    <script>
        // الرابط الجديد الموحد لمنظومة الحوت
        const scriptURL = "https://script.google.com/macros/s/AKfycbyVwGAVebQY8TJa_hd58eEsHrK7eYZ0iH68gmQrpGMkiYM7SvLWQkuGL9UD1kqHWq7z/exec";

        async function registerOffice() {
            const btn = document.getElementById('loginBtn');
            const data = {
                name: document.getElementById('officeName').value.trim(),
                city: document.getElementById('citySelect').value,
                id: document.getElementById('idNumber').value.trim()
            };

            if(!data.name || !data.id || !data.city) {
                return alert("يا حوت! أدخل كامل بياناتك.");
            }
            
            btn.disabled = true; 
            btn.innerHTML = `<i class="fas fa-sync fa-spin"></i> جاري التحقق...`;

            try {
                // استخدام الرابط الجديد مع تتبع التوجيهات
                const finalURL = `${scriptURL}?action=checkOfficeStatus&id=${data.id}&name=${encodeURIComponent(data.name)}&city=${encodeURIComponent(data.city)}&t=${Date.now()}`;
                
                const res = await fetch(finalURL, {
                    method: 'GET',
                    redirect: 'follow' // أساسي لنجاح الاتصال مع جوجل
                });

                if (!res.ok) throw new Error('فشل في الاتصال بالخادم');
                
                const result = await res.json();

                if (result.status === "نشط") {
                    localStorage.setItem('whale_office_data', JSON.stringify(data));
                    window.location.href = 'dashboard.html';
                } else if (result.status === "محظور") {
                    alert("⚠️ الدخول مرفوض. هذا الحساب محظور.");
                } else {
                    alert("⏳ الحساب قيد المراجعة أو البيانات غير صحيحة.");
                }
            } catch (e) {
                console.error("Login Error:", e);
                alert("❌ فشل الاتصال بخادم الحوت. تأكد من إعدادات النشر 'Anyone' وتحديث الرابط.");
            } finally {
                btn.disabled = false; 
                btn.innerText = "تفعيل الرادار";
            }
        }
    </script>
</body>
</html>
