<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#050810">
    <title>رادار الحوت | نظام المكاتب 🐋</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { 
            --whale-gold: #E5C05C; 
            --whale-gold-dark: #B38F36;
            --bg-deep: #050810;
            --glass-bg: rgba(15, 23, 42, 0.6);
        }
        
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: var(--bg-deep); 
            color: #f8fafc; 
            overflow-x: hidden; 
            min-height: 100vh; 
            -webkit-tap-highlight-color: transparent;
        }
        
        /* خلفية الرادار المتحركة */
        .radar-bg {
            position: fixed; inset: 0; z-index: -2;
            background: 
                radial-gradient(circle at 50% 0%, rgba(229, 192, 92, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 50% 100%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
        }
        .grid-pattern {
            position: fixed; inset: 0; z-index: -1; opacity: 0.15;
            background-image: linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* شاشة تسجيل الدخول المدمجة */
        #portalOverlay { transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        .input-gold:focus { box-shadow: 0 0 15px rgba(229, 192, 92, 0.2); }

        /* الهيدر والتبويبات */
        .glass-header { 
            background: rgba(5, 8, 16, 0.8); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(229, 192, 92, 0.1); 
            position: sticky; top: 0; z-index: 50; padding-top: max(1rem, env(safe-area-inset-top));
        }
        
        .segment-control {
            background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 1rem; padding: 4px; display: flex; position: relative;
        }
        .segment-btn {
            flex: 1; padding: 10px 0; text-align: center; font-size: 13px; font-weight: 700;
            color: #64748b; border-radius: 0.8rem; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; z-index: 2;
        }
        .segment-btn.active { color: #000; text-shadow: 0 1px 2px rgba(255,255,255,0.3); }
        .segment-indicator {
            position: absolute; top: 4px; bottom: 4px; border-radius: 0.8rem;
            background: linear-gradient(135deg, var(--whale-gold), var(--whale-gold-dark));
            box-shadow: 0 4px 15px rgba(229, 192, 92, 0.3);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1;
        }

        /* بطاقات الطلبات العالمية */
        .enterprise-card { 
            background: var(--glass-bg); backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 1.5rem; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4); 
            transition: all 0.3s ease; position: relative; overflow: hidden;
            animation: slideUp 0.5s ease-out forwards;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .enterprise-card:active { transform: scale(0.98); }
        .card-glow { position: absolute; top: 0; right: 0; width: 100px; height: 100px; background: radial-gradient(circle, rgba(229, 192, 92, 0.15) 0%, transparent 70%); pointer-events: none; }

        .data-pill { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 1rem; }
        
        /* الأزرار الاحترافية */
        .btn-prime { 
            background: linear-gradient(135deg, #E5C05C, #B38F36); color: #000; 
            font-weight: 900; box-shadow: 0 5px 20px rgba(229, 192, 92, 0.25); 
            transition: 0.3s; 
        }
        .btn-prime:active { box-shadow: 0 2px 10px rgba(229, 192, 92, 0.2); }
        
        /* شريط الإنذار الذكي (HUD) */
        #hudAlert {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(220, 38, 38, 0.95); backdrop-filter: blur(10px);
            border: 1px solid #ef4444; color: white; padding: 12px 24px;
            border-radius: 50px; z-index: 1000; box-shadow: 0 10px 40px rgba(220, 38, 38, 0.5);
            display: flex; align-items: center; gap: 15px; font-weight: bold;
            transition: top 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        #hudAlert.show { top: 20px; animation: pulse-border 2s infinite; }
        @keyframes pulse-border { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        /* سكيليتون التحميل */
        .skeleton-loader { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        /* تخصيص SweetAlert ليناسب ثيم الحوت */
        .swal2-popup { background: #0f172a !important; border: 1px solid rgba(229,192,92,0.2) !important; border-radius: 2rem !important; color: white !important; }
        .swal2-title { color: #E5C05C !important; font-family: 'Tajawal', sans-serif !important; }
        .swal2-confirm { background: linear-gradient(135deg, #E5C05C, #B38F36) !important; color: #000 !important; font-weight: bold !important; border-radius: 1rem !important; }
        .swal2-cancel { background: #334155 !important; border-radius: 1rem !important; }
    </style>
</head>
<body class="pb-24">

    <div class="radar-bg"></div>
    <div class="grid-pattern"></div>

    <audio id="radarSound" src="https://actions.google.com/sounds/v1/alarms/alarm_clock_ringing_rising.ogg" preload="auto" loop></audio>

    <div id="portalOverlay" class="fixed inset-0 z-[100] bg-[#050810]/95 backdrop-blur-2xl flex flex-col items-center justify-center p-6 hidden">
        <div class="w-24 h-24 bg-gradient-to-br from-[#1e293b] to-black border border-[#E5C05C]/30 flex items-center justify-center rounded-3xl shadow-[0_0_30px_rgba(229,192,92,0.15)] text-5xl mb-6">🐋</div>
        <h2 class="text-white text-3xl font-black mb-2 tracking-tighter text-center">بوابة الشركاء</h2>
        <p class="text-[#E5C05C] text-xs font-bold tracking-[0.2em] mb-10">AL-HUT RADAR SYSTEM</p>
        
        <div class="w-full max-w-sm bg-[var(--glass-bg)] p-8 rounded-3xl border border-[#E5C05C]/10 shadow-2xl">
            <label class="text-xs text-slate-400 font-bold mb-2 block">كود المكتب (Office ID)</label>
            <input type="text" id="officeIdInput" 
                   class="input-gold w-full bg-[#050810]/80 border border-slate-700 rounded-xl p-4 text-center text-2xl text-white outline-none focus:border-[#E5C05C] transition-all mb-6"
                   placeholder="أدخل الكود هنا">
            <button onclick="loginOffice()" class="w-full btn-prime py-4 rounded-xl text-lg flex items-center justify-center gap-2">
                <span>تفعيل الرادار</span> <i class="fas fa-satellite-dish"></i>
            </button>
        </div>
        <p class="text-[10px] text-slate-500 mt-8 text-center"><i class="fas fa-lock mr-1"></i> الاتصال مشفر ومحمي بأنظمة الحوت المتقدمة</p>
    </div>

    <div id="hudAlert">
        <i class="fas fa-satellite-dish animate-pulse text-xl"></i>
        <span>يوجد طلب جديد في الرادار!</span>
        <button onclick="stopAlert()" class="bg-black/30 hover:bg-black/50 p-2 rounded-full ml-2 transition-all">
            <i class="fas fa-volume-mute"></i>
        </button>
    </div>

    <header class="glass-header px-5 pb-4 mb-6">
        <div class="flex items-center justify-between mb-5">
            <div class="flex items-center gap-3">
                <div class="relative">
                    <div class="w-12 h-12 bg-gradient-to-br from-[#1e293b] to-black border border-[#E5C05C]/30 flex items-center justify-center rounded-2xl shadow-lg shadow-[#E5C05C]/10 text-2xl">🐋</div>
                    <div class="absolute -bottom-1 -right-1 w-4 h-4 bg-green-500 border-2 border-[#050810] rounded-full"></div>
                </div>
                <div>
                    <h2 id="navOfficeName" class="font-black text-xl text-white">...</h2>
                    <p id="navCity" class="text-[#E5C05C] font-bold text-[10px] tracking-widest mt-0.5 uppercase"><i class="fas fa-location-crosshairs mr-1"></i> جاري التحديد</p>
                </div>
            </div>
            <button onclick="logout()" class="w-10 h-10 bg-slate-800/50 text-slate-400 hover:text-red-400 rounded-full transition-all flex items-center justify-center border border-slate-700">
                <i class="fas fa-power-off text-sm"></i>
            </button>
        </div>

        <div class="segment-control">
            <div id="segmentIndicator" class="segment-indicator" style="width: 33.33%; left: 0;"></div>
            <button onclick="switchTab('new', 0)" id="tabNew" class="segment-btn active">الرادار 📡</button>
            <button onclick="switchTab('mine', 1)" id="tabMine" class="segment-btn">التنفيذ 📦</button>
            <button onclick="switchTab('done', 2)" id="tabDone" class="segment-btn">الأرشيف ✅</button>
        </div>
    </header>

    <main id="mainContainer" class="px-4 max-w-lg mx-auto space-y-4">
        <div class="enterprise-card p-6">
            <div class="flex justify-between mb-4"><div class="skeleton-loader h-6 w-1/2"></div><div class="skeleton-loader h-6 w-1/4"></div></div>
            <div class="grid grid-cols-2 gap-3 mb-4"><div class="skeleton-loader h-16 w-full"></div><div class="skeleton-loader h-16 w-full"></div></div>
            <div class="skeleton-loader h-12 w-full rounded-xl"></div>
        </div>
    </main>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbxpAW6PZ9ykBmaIfuDxtxr3YOfcg95jXeFJ2FjX5GxGRiawUNHzs90rKBEUFOcf_z_n/exec";
        let officeData = null;
        let currentTab = 'new', allOrders = [], lastKnownNewOrders = -1;

        // التحقق عند فتح الملف
        window.onload = () => {
            const savedData = localStorage.getItem('whale_office_data');
            if (savedData) {
                officeData = JSON.parse(savedData);
                document.getElementById('portalOverlay').classList.add('hidden');
                initRadarApp();
            } else {
                document.getElementById('portalOverlay').classList.remove('hidden');
            }
        };

        // نظام تسجيل الدخول المدمج
        async function loginOffice() {
            const inputId = document.getElementById('officeIdInput').value.trim();
            if (!inputId) return Swal.fire('تنبيه', 'يرجى إدخال كود المكتب أولاً', 'warning');

            Swal.fire({ title: 'جاري الاتصال بالخوادم...', text: 'يتم الآن التحقق من الهوية', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });

            try {
                // نستخدم دالة getAdminFullData لسحب قائمة المكاتب والتحقق منها برمجياً
                const res = await fetch(`${scriptURL}?action=getAdminFullData&t=${Date.now()}`);
                const data = await res.json();
                
                // البحث عن المكتب بواسطة الكود (ID)
                const office = data.offices.find(o => o.id == inputId);

                if (office) {
                    if (office.status === 'نشط') {
                        officeData = office;
                        localStorage.setItem('whale_office_data', JSON.stringify(office));
                        
                        Swal.fire({ icon: 'success', title: 'تم التحقق بنجاح', text: 'مرحباً بك في نظام الحوت', timer: 1500, showConfirmButton: false });
                        
                        document.getElementById('portalOverlay').classList.add('opacity-0', 'scale-110', 'pointer-events-none');
                        setTimeout(() => {
                            document.getElementById('portalOverlay').classList.add('hidden');
                            initRadarApp();
                        }, 700);

                    } else {
                        Swal.fire('حساب موقوف', 'عذراً، حساب هذا المكتب قيد المراجعة أو تم إيقافه من قبل الإدارة العليا.', 'error');
                    }
                } else {
                    Swal.fire('خطأ في المطابقة', 'الكود الذي أدخلته غير صحيح، يرجى التأكد والمحاولة مرة أخرى.', 'error');
                }
            } catch (e) {
                Swal.fire('فقدان الاتصال', 'حدث خطأ في الاتصال بالسيرفر، يرجى التحقق من جودة الإنترنت.', 'error');
            }
        }

        // تشغيل الرادار بعد الدخول أو عند وجود بيانات محفوظة
        function initRadarApp() {
            document.getElementById('navOfficeName').innerText = officeData.name;
            document.getElementById('navCity').innerHTML = `<i class="fas fa-location-crosshairs text-[9px] mr-1"></i> ${officeData.city}`;

            // نافذة الترحيب (مهمة لتفعيل الصوت في المتصفحات)
            Swal.fire({
                title: 'جاهز للعمل؟ 🐋',
                text: `مكتب ${officeData.name} متصل الآن في ${officeData.city}`,
                icon: 'info',
                confirmButtonText: 'فتح الرادار',
                allowOutsideClick: false
            }).then(() => { fetchOrders(); });
        }

        // --------------------------------------------------------
        // الكود التشغيلي للرادار (نفس السابق)
        // --------------------------------------------------------
        async function fetchOrders() {
            if(!officeData) return;
            try {
                const res = await fetch(`${scriptURL}?action=getAllOrders&t=${Date.now()}`);
                allOrders = await res.json();
                checkNewOrdersAlert();
                renderCards();
            } catch(e) { console.error("Network Error"); }
        }

        function checkNewOrdersAlert() {
            const officeCity = (officeData.city || "").trim();
            const myNewOrders = allOrders.filter(o => {
                const prov = (o.province || o.prov || "").trim();
                return prov === officeCity && (o.status.includes("جديد") || o.status.includes("الانتظار"));
            }).length;

            if (lastKnownNewOrders !== -1 && myNewOrders > lastKnownNewOrders) playAlert();
            lastKnownNewOrders = myNewOrders;
        }

        function playAlert() {
            document.getElementById('radarSound').play().catch(e => console.log(e));
            document.getElementById('hudAlert').classList.add('show');
            if ('vibrate' in navigator) navigator.vibrate([200, 100, 200]);
        }

        function stopAlert() {
            document.getElementById('radarSound').pause(); 
            document.getElementById('radarSound').currentTime = 0;
            document.getElementById('hudAlert').classList.remove('show');
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            Swal.fire({ toast: true, position: 'bottom-end', icon: 'success', title: 'تم النسخ!', showConfirmButton: false, timer: 1500 });
        }

        function renderCards() {
            const container = document.getElementById('mainContainer');
            const officeCity = officeData.city.trim();
            
            let list = allOrders.filter(o => {
                const status = (o.status || "");
                const prov = (o.province || o.prov || "").trim();
                if(currentTab === 'new') return prov === officeCity && (status.includes("جديد") || status.includes("الانتظار"));
                if(currentTab === 'mine') return o.office === officeData.name && status === "تم الاستلام";
                if(currentTab === 'done') return o.office === officeData.name && (status.includes("✅") || status.includes("⚠️"));
            });

            if(!list.length) {
                container.innerHTML = `
                    <div class="text-center py-24 px-4 opacity-50">
                        <i class="fas ${currentTab === 'new' ? 'fa-satellite-dish animate-pulse' : currentTab === 'mine' ? 'fa-box-open' : 'fa-archive'} text-5xl text-slate-500 mb-4"></i>
                        <h3 class="text-lg font-bold text-slate-300">لا توجد بيانات</h3>
                        <p class="text-xs text-slate-500 mt-2">نظام الحوت متصل وينتظر التحديثات...</p>
                    </div>`;
                return;
            }

            container.innerHTML = list.map(o => {
                const mapURL = o.map || o.location_link || "#";
                const isMapValid = mapURL.startsWith("http");
                const orderId = o.id || o.order_id;
                
                let cleanPhone = o.phone ? o.phone.toString().replace(/\s+/g, '') : '';
                if(cleanPhone.startsWith('07')) cleanPhone = '964' + cleanPhone.substring(1);

                return `
                <div class="enterprise-card p-5">
                    <div class="card-glow"></div>
                    <div class="absolute right-0 top-0 bottom-0 w-1 ${currentTab === 'new' ? 'bg-blue-500' : currentTab === 'mine' ? 'bg-orange-500' : 'bg-green-500'}"></div>
                    
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="text-xl font-black text-white leading-tight">${o.car}</h3>
                            <p class="text-[10px] text-[#E5C05C] mt-1 bg-[#E5C05C]/10 inline-block px-2 py-0.5 rounded border border-[#E5C05C]/20"><i class="fas fa-tag mr-1"></i> ${o.addon || o.add_on || 'أساسي'}</p>
                        </div>
                        <button onclick="copyToClipboard('${orderId}')" class="text-[10px] font-mono text-slate-400 bg-slate-800 hover:bg-slate-700 px-2 py-1 rounded flex items-center gap-1 transition-all">
                            ${orderId} <i class="far fa-copy"></i>
                        </button>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-2 mb-5">
                        <div class="data-pill">
                            <p class="text-[9px] text-slate-400 mb-0.5"><i class="fas fa-user"></i> الزبون</p>
                            <p class="font-bold text-sm truncate">${o.name}</p>
                        </div>
                        <div class="data-pill border-[#E5C05C]/30 bg-[#E5C05C]/5">
                            <p class="text-[9px] text-[#E5C05C]/80 mb-0.5"><i class="fas fa-wallet"></i> السعر</p>
                            <p class="font-black text-sm text-[#E5C05C]">${Number(o.price || 0).toLocaleString()} <span class="text-[9px]">د.ع</span></p>
                        </div>
                    </div>

                    ${currentTab === 'new' ? 
                        `<button onclick="confirmAction('${orderId}', 'claim', 'استلام الطلبية', 'هل أنت مستعد لتنفيذ هذا الطلب الآن؟')" class="w-full btn-prime py-3.5 rounded-xl text-base flex items-center justify-center gap-2">
                            <span>استلام الطلب الآن</span> <i class="fas fa-bolt text-lg"></i>
                        </button>` : 
                      currentTab === 'mine' ? 
                        `<div class="space-y-2">
                            <div class="flex gap-2">
                                <a href="tel:${o.phone}" class="flex-1 bg-slate-800 text-white hover:bg-slate-700 py-3 rounded-xl text-center font-bold text-xs flex items-center justify-center gap-2 transition-all"><i class="fas fa-phone text-blue-400"></i> اتصال</a>
                                <a href="https://wa.me/${cleanPhone}?text=مرحباً بك من مكتب ${officeData.name} لتأجير السيارات، بخصوص طلبك في نظام الحوت.." target="_blank" class="flex-1 bg-slate-800 text-white hover:bg-slate-700 py-3 rounded-xl text-center font-bold text-xs flex items-center justify-center gap-2 transition-all"><i class="fab fa-whatsapp text-green-400 text-lg"></i> مراسلة</a>
                                <a href="${isMapValid ? mapURL : '#'}" target="_blank" onclick="${!isMapValid ? "Swal.fire('تنبيه','الموقع الجغرافي غير مرفق','info'); return false;" : ""}" class="flex-1 bg-slate-800 text-white hover:bg-slate-700 py-3 rounded-xl text-center font-bold text-xs flex items-center justify-center gap-2 transition-all"><i class="fas fa-location-arrow text-red-400"></i> خريطة</a>
                            </div>
                            <div class="flex gap-2 pt-1">
                                <button onclick="confirmAction('${orderId}', 'complete', 'تأكيد التسليم', 'هل تم تسليم السيارة للزبون واستلام المبلغ بنجاح؟')" class="flex-[3] bg-green-600 hover:bg-green-500 text-white py-3.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-all">
                                    <i class="fas fa-check-circle"></i> تم التسليم
                                </button>
                                <button onclick="confirmAction('${orderId}', 'cancelRequest', 'طلب إلغاء', 'هل تريد فعلاً إرجاع الطلب للرادار المركزي لوجود مشكلة؟', 'warning')" class="flex-[1] bg-red-500/10 text-red-500 border border-red-500/20 hover:bg-red-500 hover:text-white rounded-xl flex items-center justify-center transition-all">
                                    <i class="fas fa-times"></i>
                                </button>
                            </div>
                        </div>` : 
                        `<div class="text-center p-3 bg-black/40 rounded-xl text-[11px] font-black ${o.status.includes('✅') ? 'text-green-400 border border-green-500/20' : 'text-slate-400 border border-slate-700'} tracking-wider">${o.status}</div>`
                    }
                </div>
            `}).reverse().join('');
        }

        // دالة الإجراءات مع SweetAlert2
        function confirmAction(id, act, title, text, icon = 'question') {
            Swal.fire({
                title: title, text: text, icon: icon,
                showCancelButton: true, confirmButtonText: 'نعم، تأكيد', cancelButtonText: 'تراجع',
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) executeAction(id, act);
            });
        }

        async function executeAction(id, act) {
            Swal.fire({ title: 'جاري التنفيذ...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
            try {
                const res = await fetch(`${scriptURL}?action=${act}&id=${id}&office=${encodeURIComponent(officeData.name)}`);
                const result = await res.json();
                if(result.success) {
                    stopAlert();
                    Swal.fire({ icon: 'success', title: 'تم بنجاح!', text: 'تم تحديث قاعدة بيانات الحوت.', timer: 2000, showConfirmButton: false });
                    fetchOrders();
                } else {
                    Swal.fire({ icon: 'error', title: 'خطأ', text: result.message });
                }
            } catch(e) { Swal.fire({ icon: 'error', title: 'فقدان الاتصال', text: 'تأكد من جودة الإنترنت وحاول مجدداً.' }); }
        }

        // حركة التبويبات السلسة
        function switchTab(t, index) {
            currentTab = t;
            document.querySelectorAll('.segment-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');
            
            // تحريك المؤشر الذهبي
            const indicator = document.getElementById('segmentIndicator');
            indicator.style.left = `${index * 33.33}%`;
            
            renderCards();
        }

        // تسجيل الخروج
        function logout() { 
            Swal.fire({
                title: 'تسجيل الخروج', text: 'هل أنت متأكد من مغادرة الرادار؟', icon: 'warning',
                showCancelButton: true, confirmButtonText: 'خروج', cancelButtonText: 'بقاء', confirmButtonColor: '#ef4444'
            }).then((result) => {
                if (result.isConfirmed) { 
                    localStorage.removeItem('whale_office_data'); 
                    officeData = null;
                    document.getElementById('portalOverlay').classList.remove('hidden', 'opacity-0', 'scale-110', 'pointer-events-none');
                    document.getElementById('officeIdInput').value = '';
                }
            });
        }
        
        // تحديث البيانات كل 30 ثانية
        setInterval(fetchOrders, 30000);
        
        // دعم الدخول بزر Enter
        document.getElementById('officeIdInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') loginOffice();
        });
    </script>
</body>
</html>
