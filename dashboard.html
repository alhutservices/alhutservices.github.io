<style>
/* ══════════════════════════════════════════════════════════════
   DESIGN SYSTEM — AIRBNB LIGHT THEME
══════════════════════════════════════════════════════════════ */
:root {
  --bg: #F7F7F7;
  --white: #FFFFFF;
  --primary: #FF385C;     /* Airbnb Coral Red */
  --primary-d: #D90B38;
  --primary-l: #FFF0F2;
  --success: #00A699;     /* Airbnb Green */
  --success-l: #E6F7F6;
  --text-main: #222222;
  --text-muted: #717171;
  --text-light: #B0B0B0;
  --border: #EBEBEB;
  --border-d: #DDDDDD;
  
  --sh-sm: 0 2px 8px rgba(0,0,0,.04);
  --sh-md: 0 6px 16px rgba(0,0,0,.08);
  --sh-lg: 0 12px 32px rgba(0,0,0,.12);
  --sh-btn: 0 4px 14px rgba(255,56,92,.25);
  
  --r3: 12px; --r4: 16px; --r5: 24px;
  --nav: 70px;
}

*,::before,::after{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg); font-family:'Cairo',sans-serif;
  color:var(--text-main); overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
}
.dn{display:none!important;}
button,input,select,textarea{font-family:'Cairo',sans-serif;color:inherit;outline:none;}

/* ── Loading & Toasts ── */
#loadingScreen{position:fixed;inset:0;z-index:60000;background:rgba(255,255,255,.9);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:15px;}
.spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#ldMsg{font-weight:700;color:var(--text-main);}

#toasts{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:99999;display:flex;flex-direction:column;gap:10px;width:min(90%,360px);pointer-events:none;}
.toast{background:var(--white);border:1px solid var(--border);border-radius:var(--r3);padding:14px;box-shadow:var(--sh-md);display:flex;align-items:center;gap:12px;font-weight:700;font-size:.85rem;animation:tIn .3s ease;}
.toast-i{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;}
.toast.s .toast-i{background:var(--success);}
.toast.e .toast-i{background:var(--primary);}
@keyframes tIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}

/* ── Auth Page ── */
.auth-wrapper{min-height:100vh;display:flex;flex-direction:column;background:var(--white);}
.a-header{padding:40px 20px 20px;text-align:center;border-bottom:1px solid var(--border);}
.a-logo{width:60px;height:60px;background:var(--primary-l);color:var(--primary);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px;}
.a-title{font-size:1.6rem;font-weight:900;color:var(--text-main);letter-spacing:-.5px;}
.a-sub{color:var(--text-muted);font-weight:600;font-size:.9rem;}

.auth-tabs{display:flex;background:var(--bg);border-radius:99px;margin:20px;padding:4px;}
.at-btn{flex:1;text-align:center;padding:10px;font-weight:700;font-size:.85rem;color:var(--text-muted);border-radius:99px;cursor:pointer;transition:.2s;}
.at-btn.on{background:var(--white);color:var(--text-main);box-shadow:var(--sh-sm);}

.a-body{padding:10px 20px 40px;max-width:500px;margin:0 auto;width:100%;}
.a-panel{display:none;} .a-panel.on{display:block;}

.fld{margin-bottom:16px;}
.lbl{display:block;font-size:.8rem;font-weight:800;margin-bottom:6px;color:var(--text-main);}
.inp{width:100%;border:1px solid var(--border-d);border-radius:var(--r3);padding:14px;font-size:.9rem;font-weight:600;transition:.2s;}
.inp:focus{border-color:var(--text-main);box-shadow:0 0 0 1px var(--text-main);}

.ptype-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
.ptype{border:1px solid var(--border-d);border-radius:var(--r3);padding:14px 5px;text-align:center;cursor:pointer;transition:.2s;}
.ptype.on{border-color:var(--primary);background:var(--primary-l);color:var(--primary);}
.ptype-ic{margin-bottom:4px;} .ptype-tx{font-size:.7rem;font-weight:800;}

.btn-main{width:100%;background:var(--primary);color:var(--white);border:none;border-radius:var(--r3);padding:15px;font-size:1rem;font-weight:800;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-main:active{transform:scale(.98);}
.map-box{height:160px;border-radius:var(--r3);border:1px solid var(--border-d);position:relative;overflow:hidden;}

/* ── Dashboard Layout ── */
.d-header{background:var(--white);border-bottom:1px solid var(--border);padding:max(16px,env(safe-area-inset-top)) 20px 16px;position:sticky;top:0;z-index:100;}
.dh-row{display:flex;justify-content:space-between;align-items:center;}
.dh-name{font-size:1.2rem;font-weight:900;color:var(--text-main);}
.dh-badge{font-size:.7rem;font-weight:700;color:var(--text-muted);background:var(--bg);padding:4px 10px;border-radius:99px;}

.kpi-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:20px;}
.kpi-c{background:var(--white);border:1px solid var(--border);border-radius:var(--r4);padding:16px;box-shadow:var(--sh-sm);}
.kpi-v{font-size:1.4rem;font-weight:900;color:var(--text-main);}
.kpi-l{font-size:.75rem;font-weight:600;color:var(--text-muted);margin-top:2px;}

.page-body{padding:0 20px calc(var(--nav) + 30px);}
.sec-title{font-size:1.1rem;font-weight:800;margin-bottom:16px;}

/* ── Cards (Radar) ── */
.ord-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r4);padding:16px;margin-bottom:16px;box-shadow:var(--sh-sm);}
.oc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;border-bottom:1px solid var(--bg);padding-bottom:12px;}
.oc-id{font-family:'IBM Plex Mono',monospace;font-weight:700;color:var(--text-muted);font-size:.8rem;}
.oc-st{font-size:.7rem;font-weight:800;padding:4px 10px;border-radius:99px;}
.st-pend{background:var(--primary-l);color:var(--primary);}
.st-act{background:var(--blue-l);color:var(--blue);}
.st-done{background:var(--success-l);color:var(--success);}
.oc-mid{margin-bottom:12px;}
.oc-svc{font-size:1rem;font-weight:800;margin-bottom:4px;}
.oc-info{font-size:.8rem;color:var(--text-muted);font-weight:600;}
.oc-bot{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--bg);padding-top:12px;}
.oc-price{font-size:1.1rem;font-weight:900;color:var(--text-main);}
.oc-acts{display:flex;gap:8px;}
.btn-sm{padding:8px 14px;border-radius:8px;font-size:.8rem;font-weight:800;border:none;cursor:pointer;}
.btn-sm.pri{background:var(--primary);color:#fff;}
.btn-sm.sec{background:var(--bg);color:var(--text-main);border:1px solid var(--border-d);}
.btn-sm.wa{background:#25D366;color:#fff;}

/* ── Inventory Gallery (New) ── */
.inv-grid{display:grid;grid-template-columns:1fr;gap:16px;margin-top:20px;}
@media(min-width:768px){.inv-grid{grid-template-columns:1fr 1fr;}}
.inv-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r4);overflow:hidden;box-shadow:var(--sh-sm);}
.inv-img{width:100%;height:160px;object-fit:cover;background:var(--bg);}
.inv-body{padding:16px;}
.inv-title{font-size:1.05rem;font-weight:800;margin-bottom:4px;}
.inv-price{font-size:.9rem;font-weight:800;color:var(--success);margin-bottom:12px;}
.inv-stats{display:flex;gap:12px;background:var(--bg);padding:10px;border-radius:8px;margin-bottom:12px;}
.ist{flex:1;text-align:center;}
.ist-v{font-size:.9rem;font-weight:900;} .ist-l{font-size:.65rem;color:var(--text-muted);font-weight:700;}
.inv-toggles{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:12px;}

/* Switch */
.switch{position:relative;display:inline-block;width:44px;height:24px;}
.switch input{opacity:0;width:0;height:0;}
.slider{position:absolute;cursor:pointer;inset:0;background-color:#ccc;transition:.4s;border-radius:34px;}
.slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background-color:white;transition:.4s;border-radius:50%;}
input:checked + .slider{background-color:var(--success);}
input:checked + .slider:before{transform:translateX(20px);}

/* ── Modals & Bottom Sheets ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50000;display:flex;align-items:flex-end;justify-content:center;}
.bottom-sheet{background:var(--white);width:100%;max-width:500px;border-radius:24px 24px 0 0;padding:24px;box-shadow:var(--sh-lg);animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.wa-tpl{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px;cursor:pointer;transition:.2s;}
.wa-tpl:hover{border-color:var(--success);background:var(--success-l);}

/* ── Bottom Nav ── */
.bnav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);background:var(--white);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;z-index:9000;padding-bottom:env(safe-area-inset-bottom);}
.bni{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--text-light);font-weight:700;font-size:.65rem;cursor:pointer;transition:.2s;}
.bni.on{color:var(--primary);}
</style>
</head>

window.onload = () => {

window.switchAuth = (mode, btn) => {
  document.querySelectorAll('.at-btn').forEach(b => b.classList.remove('on'));

  $("panel-login").classList.remove("on");
  $("panel-register").classList.remove("on");
  $("panel-"+mode).classList.add("on");

function initPickerMap() {
  if(pickerMap) { setTimeout(() => pickerMap.invalidateSize(), 300); return; }
  pickerMap = L.map("pickerMap", { zoomControl: false }).setView([regLat, regLng], 13);
  L.control.zoom({ position: "bottomleft" }).addTo(pickerMap);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", { maxZoom: 19 }).addTo(pickerMap);
  pickerMap.on("move", () => { const c = pickerMap.getCenter(); regLat = c.lat; regLng = c.lng; });
}

window.locateMe = () => {
  if(!navigator.geolocation) return toast("GPS غير مدعوم", "e");
  showLoad(true, "تحديد الموقع...");
  navigator.geolocation.getCurrentPosition(
    pos => { showLoad(false); regLat = pos.coords.latitude; regLng = pos.coords.longitude; pickerMap.flyTo([regLat, regLng], 16); },
    () => { showLoad(false); toast("قم بتفعيل الـ GPS", "e"); }
  );
};

window.doLogin = async () => {
  const name = $("lg-name").value.trim();
  const pass = $("lg-pass").value.trim();
  if(!name || !pass) return toast("أدخل البيانات كاملة", "e");
  
  showLoad(true, "تسجيل الدخول...");
  try {
    let res = await fetch(`${API_URL}?action=checkCarOffice&name=${encodeURIComponent(name)}&pass=${encodeURIComponent(pass)}&token=${API_TOKEN}`);
    let data = await res.json();
    let type = "car";
    
    if(data.status === "not_found") {
      res = await fetch(`${API_URL}?action=checkHotel&name=${encodeURIComponent(name)}&pass=${encodeURIComponent(pass)}&token=${API_TOKEN}`);
      data = await res.json();
      type = "hotel";
    }
    
    showLoad(false);
    if(data.status === "wrong_password") return toast("كلمة المرور خاطئة", "e");
    if(data.status === "not_found") return toast("الحساب غير موجود", "e");
    if(data.status === "blocked") return toast("الحساب موقوف من الإدارة", "e");
    
    pData = { name: data.name||name, type, id: data.id||name, city: data.city||"", pass };
    localStorage.setItem("hut_partner_sess", JSON.stringify(pData));
    bootDashboard();
  } catch(e) { showLoad(false); toast("فشل الاتصال", "e"); }
};

window.doRegister = async () => {

  const city = $("rg-city").value;
  const pass = $("rg-pass").value.trim();

/* ════════════════════════════════════════════════════════

════════════════════════════════════════════════════════ */
function startRadarListener() {
  const path = pData.type === "hotel" ? "hut_hotel_bookings" : "hut_car_orders";
  db.ref(path).on("value", snap => {
    const orders = snap.val() || {};
    let pendingCount = 0;
    let html = '';
    
    Object.values(orders).sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).forEach(o => {
      // Filter logic
      if(pData.type === "hotel" && o.hotel_id !== pData.id) return;
      if(pData.type === "car" && o.city !== pData.city && o.status === "pending") return;
      
      const isMine = o.office === pData.name || (pData.type === "hotel" && o.status !== "pending");
      const isGlobalPending = o.status === "pending";
      
      if(isMine || isGlobalPending) {
        if(o.status === "pending") pendingCount++;
        html += buildOrderCard(o);
      }
    });
    
    $("radar-badge").textContent = `${pendingCount} جديد`;
    if(html) { $("orders-list").innerHTML = html; lucide.createIcons(); }
    else { $("orders-list").innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-muted);font-weight:700;border:1px dashed var(--border);border-radius:16px;">لا توجد طلبات في الرادار حالياً.</div>`; }
  });
}

function buildOrderCard(o) {
  const isPending = o.status === "pending";
  const isDone = o.status === "completed" || o.status === "cancelled";
  const stClass = isPending ? "st-pend" : isDone ? "st-done" : "st-act";
  const stText = isPending ? "معلق" : isDone ? "مغلق" : "جاري التنفيذ";
  const title = pData.type === "hotel" ? o.room_type : o.car;
  const custName = o.name || o.guest_name || "زبون";
  
  let actions = '';
  if(isPending) {
    actions = `<button class="btn-sm pri" onclick="acceptOrder('${o.id}')">✅ قبول</button>
               <button class="btn-sm sec" onclick="rejectOrder('${o.id}')">✕ رفض</button>`;
  } else if (!isDone) {
    actions = `<button class="btn-sm sec" onclick="completeOrder('${o.id}')">🔑 إنهاء التأجير</button>`;
    // WhatsApp Quick Reply Button
    actions += `<button class="btn-sm wa" onclick="openWaModal('${custName}', '${o.phone||o.guest_phone||''}', '${title}', '${o.total}')"><i data-lucide="message-circle" size="14"></i> واتساب</button>`;
  }

  return `
    <div class="ord-card">
      <div class="oc-top">
        <span class="oc-id">#${o.id}</span>
        <span class="oc-st ${stClass}">${stText}</span>
      </div>
      <div class="oc-mid">
        <div class="oc-svc">${title}</div>
        <div class="oc-info">👤 ${custName} | 📅 ${o.date || o.date_arrive}</div>
      </div>
      <div class="oc-bot">
        <div class="oc-price">${fmt(o.total)} د.ع</div>
        <div class="oc-acts">${actions}</div>
      </div>
    </div>
  `;
}

window.acceptOrder = async (id) => {
  showLoad(true, "تأكيد الطلب...");
  const action = pData.type === "car" ? "claimOrder" : "confirmBooking";
  const body = { action, id, token: API_TOKEN };
  if(pData.type === "car") body.office = pData.name; else body.hotel = pData.name;
  
  try {
    await fetch(API_URL, { method: "POST", body: JSON.stringify(body) });

};

window.completeOrder = async (id) => {

// ── Image Compression (Canvas) ──
function compressImage(file, maxDim=1000, quality=0.8) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if(width > maxDim || height > maxDim) {
          if(width > height) { height = Math.round(height * maxDim / width); width = maxDim; }
          else { width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#ffffff"; ctx.fillRect(0,0,width,height);
        ctx.drawImage(img,0,0,width,height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

};

// ── ImgBB Upload ──
async function uploadToImgBB(b64) {
  if(!b64) return "";
  try {
    const raw = b64.includes(",") ? b64.split(",")[1] : b64;
    const formData = new FormData();
    formData.append("key", IMGBB_KEY);
    formData.append("image", raw);
    
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 15000);
    
    const res = await fetch("https://api.imgbb.com/1/upload", { method: "POST", body: formData, signal: controller.signal });
    clearTimeout(timeoutId);
    const data = await res.json();
    return (data && data.success) ? data.data.url : "";
  } catch(e) { return ""; }
}

window.submitInventory = async () => {
  const name = $("inv-name").value.trim();
  const price = $("inv-price").value.trim();
  
  if(!name || !price) return toast("أدخل الاسم والسعر", "e");

  showLoad(true, "رفع الصورة للسحابة...");
  const photoUrl = await uploadToImgBB(invBase64);
  if(!photoUrl) { showLoad(false); return toast("فشل رفع الصورة لـ ImgBB", "e"); }

  showLoad(true, "حفظ البيانات في النظام...");
  
  try {
    if(pData.type === "car") {
      const cat = $("inv-cat").value;
      const plate = $("inv-plate").value.trim();
      await fetch(API_URL, { method: "POST", body: JSON.stringify({
        action: "ADD_CAR_TO_FLEET", token: API_TOKEN, office_id: pData.id,
        name, price, cat, plate, color: "غير محدد", photo_url: photoUrl
      })});
    } else {
      // HOTEL ROOM
      await fetch(API_URL, { method: "POST", body: JSON.stringify({
        action: "ADD_HOTEL_ROOM", token: API_TOKEN, hotel_id: pData.id,
        name, price, photo_url: photoUrl
      })});
    }
    
    showLoad(false);
    toast("تمت إضافة العنصر بنجاح!");
    closeAddModal();
    fetchInventory(); // Refresh gallery
    
  } catch(e) { showLoad(false); toast("خطأ في الاتصال", "e"); }
};

/* ════════════════════════════════════════════════════════
   FETCH & RENDER INVENTORY GALLERY
════════════════════════════════════════════════════════ */
async function fetchInventory() {
  const container = $("inventory-list");
  container.innerHTML = `<div style="text-align:center;padding:20px;width:100%;grid-column:1/-1;">جاري جلب الأصول...</div>`;
  
  try {
    // In V9.2, we fetch Available Cars. If hotel rooms API is missing, we simulate it or fetch hotels data.
    // Assuming backend returns it based on action.
    const action = pData.type === "car" ? "getAvailableCars" : "getHotelsForCity"; 
    // We pass token. For cars, the backend returns all, we filter client side.
    const res = await fetch(`${API_URL}?action=${action}&token=${API_TOKEN}`);
    const data = await res.json();
    
    inventoryList = [];
    if(pData.type === "car") {
      inventoryList = data.filter(c => String(c.office_id) === String(pData.id));
    } else {
      // If Hotel, ideally backend has getHotelRooms. If not, we show a fallback.
      if(data.rooms) inventoryList = data.rooms; 
      else container.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-muted);font-weight:700;border:1px dashed var(--border);border-radius:16px;grid-column:1/-1;">لم يتم إضافة غرف بعد. اضغط على (+ إضافة جديد) باللأعلى.</div>`;
    }

    if(inventoryList.length > 0) {
      container.innerHTML = inventoryList.map(item => `
        <div class="inv-card">
          <img src="${item.photo_url || 'https://via.placeholder.com/400x200?text=No+Image'}" class="inv-img">
          <div class="inv-body">
            <div class="inv-title">${item.name}</div>
            <div class="inv-price">${fmt(item.price)} د.ع</div>
            <div class="inv-stats">
              <div class="ist"><div class="ist-v">${item.orders || 0}</div><div class="ist-l">عملية حجز</div></div>
              <div class="ist"><div class="ist-v" style="color:var(--success)">${fmt((item.orders||0)*item.price)}</div><div class="ist-l">إيرادات (د.ع)</div></div>
            </div>
            <div class="inv-toggles">
              <span style="font-size:.8rem;font-weight:700;color:var(--text-muted);">حالة التوفر</span>
              <label class="switch">
                <input type="checkbox" checked onchange="toggleItemStatus('${item.id}', this)">
                <span class="slider"></span>
              </label>
            </div>
          </div>
        </div>
      `).join('');
    } else if (pData.type === "car") {
      container.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-muted);font-weight:700;border:1px dashed var(--border);border-radius:16px;grid-column:1/-1;">لا توجد سيارات في أسطولك بعد.</div>`;
    }
  } catch(e) {
    container.innerHTML = `<div style="text-align:center;padding:20px;color:var(--primary);grid-column:1/-1;">فشل جلب البيانات. تحقق من اتصالك.</div>`;
  }
}
