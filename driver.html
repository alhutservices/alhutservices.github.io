<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق السائق | نظام المدير الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; }</style>
</head>
<body class="bg-gray-50 max-w-md mx-auto min-h-screen shadow-2xl relative">
    <div class="bg-slate-900 p-6 text-white rounded-b-3xl shadow-xl">
        <h1 class="text-xl font-bold">أهلاً بك يا بطل 🏍️</h1>
        <p class="text-[10px] opacity-60 italic text-emerald-400">أنت الآن ضمن حماية خوارزمية المدير</p>
    </div>
    <div class="p-6">
        <div class="bg-white p-4 rounded-2xl shadow-lg flex justify-between mb-6 border-b-2 border-emerald-500">
            <div><p class="text-[10px] text-gray-400">أرباح اليوم</p><p class="text-xl font-bold">45,000 د.ع</p></div>
            <div class="text-left"><p class="text-[10px] text-gray-400">طلباتك</p><p class="text-xl font-bold text-emerald-600">12</p></div>
        </div>
        <div class="bg-emerald-50 border-2 border-emerald-200 p-6 rounded-3xl space-y-4 shadow-md">
            <span class="bg-emerald-600 text-white text-[10px] px-2 py-1 rounded-full font-bold">طلب متاح للعدالة ⚖️</span>
            <div>
                <h3 class="font-bold text-lg text-slate-800 italic">مطعم "البركة المركزي"</h3>
                <p class="text-sm text-gray-600">الوجهة: كركوك - حي الواسطي</p>
                <p class="text-sm font-bold text-indigo-600 mt-1">السعر: 15,000 د.ع</p>
            </div>
            <button class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-lg shadow-xl active:scale-95 transition-transform">قبول المهمة فوراً ✅</button>
        </div>
    </div>
    <div class="absolute bottom-4 w-full px-8">
        <p class="text-center text-[9px] text-amber-600 leading-tight">⚠️ قد ببطء لسلامتك؛ نظام المدير يراقب جودة القيادة.</p>
    </div>
</body>
</html>
