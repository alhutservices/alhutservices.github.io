<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق السائق | أسطول الحوت</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; background: #000; color: #fff; }</style>
</head>
<body class="max-w-md mx-auto min-h-screen relative">
    <header class="p-8 bg-slate-900 rounded-b-[3rem] shadow-2xl">
        <h1 class="text-xl font-black text-emerald-500 italic uppercase tracking-tighter">Whale Logistics</h1>
        <p class="text-[10px] text-gray-500">نظام إدارة المهام الميدانية</p>
    </header>

    <div class="p-6">
        <div class="bg-[#0a0a0a] border border-white/5 p-8 rounded-[2.5rem] shadow-2xl">
            <div class="flex justify-between items-center mb-10">
                <span class="bg-emerald-600 text-black px-4 py-1 rounded-full text-[10px] font-black italic">مهمة جديدة متوفرة</span>
                <span class="text-xs font-mono text-gray-500">ID: #HK-882</span>
            </div>

            <div class="space-y-10">
                <div class="flex gap-4">
                    <div class="text-2xl">📍</div>
                    <div><p class="text-[10px] text-gray-500 uppercase font-bold">عنوان التوصيل</p><p class="text-xl font-bold">كركوك - حي الواسطي / قرب جامع المدينة</p></div>
                </div>

                <div class="flex gap-4">
                    <div class="text-2xl">💰</div>
                    <div><p class="text-[10px] text-gray-500 uppercase font-bold">قيمة الطلب الكلية (يدفعها الزبون)</p><p class="text-3xl font-black text-white">18,500 <span class="text-xs font-normal">د.ع</span></p></div>
                </div>

                <div class="flex gap-4">
                    <div class="text-2xl">📞</div>
                    <div><p class="text-[10px] text-gray-500 uppercase font-bold">رقم هاتف الزبون</p><p class="text-xl font-bold text-blue-400">077XXXXXXXX</p></div>
                </div>

                <div class="bg-emerald-500/10 p-6 rounded-3xl border border-emerald-500/20">
                    <p class="text-[10px] text-emerald-500 uppercase font-bold text-center mb-1 italic">أجرة التوصيل الصافية لك</p>
                    <p class="text-4xl font-black text-emerald-500 text-center italic">3,500 <span class="text-sm">د.ع</span></p>
                </div>
            </div>

            <button class="w-full bg-emerald-500 text-black py-6 mt-10 rounded-2xl font-black text-xl hover:scale-95 transition-transform">قبول المهمة فوراً ✅</button>
        </div>
    </div>
</body>
</html>
