<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق السائق | منظومة الحوت</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #000; color: #fff; }
        .receipt-card { background: linear-gradient(145deg, #0f172a, #020617); border: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-10">
    <header class="p-8 bg-slate-900 rounded-b-[3.5rem] border-b border-emerald-500/30 shadow-2xl">
        <h1 class="text-xl font-black text-emerald-500 italic uppercase tracking-tighter text-center font-mono">Whale Logistics</h1>
        <p class="text-[10px] text-gray-500 text-center mt-2 italic font-bold tracking-widest uppercase">الجيل الأول - كركوك</p>
    </header>

    <main class="p-6">
        <div class="receipt-card p-8 rounded-[3rem] shadow-2xl relative overflow-hidden border-t-4 border-emerald-500">
            
            <div id="receiptOnlyView" class="space-y-4">
                <div class="flex justify-between items-center mb-6">
                    <span class="bg-amber-500 text-black px-4 py-1 rounded-full text-[10px] font-black">وصل مصور 📸</span>
                    <span class="text-xs font-mono text-gray-500">#HK-990</span>
                </div>
                
                <p class="text-[10px] text-gray-500 font-bold mr-2 italic">اعتمد على تفاصيل الوصل أدناه:</p>
                <div class="rounded-[2.5rem] overflow-hidden border-2 border-white/10 shadow-2xl shadow-black">
                    <img src="https://via.placeholder.com/500x700?text=صورة+الوصل+تظهر+هنا" class="w-full h-auto" alt="Receipt">
                </div>
                <p class="text-[9px] text-center text-gray-600 mt-4 italic">اضغط على الصورة لتكبيرها 🔍</p>
            </div>

            <div id="manualInfoView" class="hidden space-y-6">
                <div class="flex justify-between items-center mb-6">
                    <span class="bg-emerald-600 text-black px-4 py-1 rounded-full text-[10px] font-black uppercase">بيانات يدوية ✍️</span>
                    <span class="text-xs font-mono text-gray-500">#HK-990</span>
                </div>

                <div class="bg-white/5 p-6 rounded-[2rem] border border-white/5 flex items-center gap-5">
                    <span class="text-3xl">📍</span>
                    <div>
                        <p class="text-[10px] text-gray-400 font-bold uppercase">منطقة التوصيل</p>
                        <p class="text-xl font-black text-white">طريق بغداد</p>
                    </div>
                </div>

                <div class="bg-white/5 p-6 rounded-[2rem] border border-white/5 flex items-center justify-between">
                    <div class="flex items-center gap-5">
                        <span class="text-3xl">📞</span>
                        <div>
                            <p class="text-[10px] text-gray-400 font-bold uppercase">رقم الزبون</p>
                            <p class="text-xl font-black text-blue-400 font-mono tracking-wider">077XXXXXXXX</p>
                        </div>
                    </div>
                    <a href="tel:077XXXXXXXX" class="bg-blue-600 p-4 rounded-2xl hover:scale-110 transition-transform">📱</a>
                </div>
            </div>

            <div class="mt-10">
                <button class="w-full bg-emerald-500 text-black py-6 rounded-[2rem] font-black text-xl active:scale-95 transition-all shadow-xl shadow-emerald-900/40">
                    تأكيد التسليم بنجاح ✅
                </button>
            </div>
        </div>
        
        <div class="mt-8 text-center px-6">
            <p class="text-[10px] text-emerald-500/50 font-bold italic leading-relaxed">
                "نظام الحوت يضمن حقك؛ كل خطوة موثقة، وكل طلب هو نجاح جديد لك."
            </p>
        </div>
    </main>

    <script>
        // هذا السكريبت البسيط هو "المخ" الذي يقرأ نوع الطلب
        // سنفترض وجود متغير يسمى orderType يأتي من السيرفر
        let orderType = "photo"; // جرب تغيير القيمة إلى "manual" لترى النتيجة

        if (orderType === "manual") {
            document.getElementById('manualInfoView').classList.remove('hidden');
            document.getElementById('receiptOnlyView').classList.add('hidden');
        } else {
            document.getElementById('manualInfoView').classList.add('hidden');
            document.getElementById('receiptOnlyView').classList.remove('hidden');
        }
    </script>
</body>
</html>
