<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المطعم | منظومة الحوت</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f8fafc; }
        .tab-btn.active { background-color: #0f172a; color: white; }
        .hidden-input { display: none; }
        .btn-glow { box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.2); }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-xl mx-auto bg-white p-6 md:p-10 rounded-[3rem] shadow-2xl border border-slate-100">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black text-slate-900 italic">إرسال طلبية جديدة</h2>
            <p class="text-xs text-gray-400 mt-2 font-bold uppercase tracking-widest">Al-Hut Advanced Logistics</p>
        </div>

        <div class="bg-amber-50 border-r-4 border-amber-500 p-4 rounded-2xl mb-8">
            <p class="text-[11px] text-amber-900 leading-relaxed">
                <strong>💡 تنبيه للمطعم:</strong> يفضل استخدام "الإدخال اليدوي" لتزويد السائق ببيانات دقيقة، مما يسرع عملية التوصيل ويضمن تقديم أفضل خدمة لزبائنكم الكرام.
            </p>
        </div>

        <div class="flex gap-2 mb-8 bg-slate-100 p-1 rounded-2xl">
            <button onclick="switchTab('manual')" id="manualBtn" class="tab-btn active flex-1 py-3 rounded-xl font-bold text-sm transition-all">إدخال بيانات ✍️</button>
            <button onclick="switchTab('camera')" id="cameraBtn" class="tab-btn flex-1 py-3 rounded-xl font-bold text-sm transition-all text-slate-500">تصوير وصل 📸</button>
        </div>
        
        <form id="orderForm" class="space-y-8">
            <div id="manualSection" class="space-y-6">
                <div>
                    <label class="text-sm font-black text-slate-700 block mb-3 mr-2">📍 منطقة التوصيل</label>
                    <select id="region" class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-emerald-500 transition-all font-bold">
                        <option value="0" disabled selected>حدد المنطقة من القائمة...</option>
                        <option value="2000">طريق بغداد (توصيل: 2,000)</option>
                        <option value="2000">الواسطي (توصيل: 2,000)</option>
                        <option value="2500">حزيران (توصيل: 2,500)</option>
                        <option value="2500">الماس (توصيل: 2,500)</option>
                        <option value="3000">عرفة (توصيل: 3,000)</option>
                        <option value="3000">شارع المحافظة (توصيل: 3,000)</option>
                    </select>
                </div>

                <div>
                    <label class="text-sm font-black text-slate-700 block mb-3 mr-2">📞 رقم هاتف المستلم</label>
                    <input type="tel" class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-emerald-500" placeholder="077XXXXXXXX">
                </div>
            </div>

            <div id="cameraSection" class="hidden-input space-y-4 text-center">
                <div onclick="document.getElementById('receiptImage').click()" class="border-4 border-dashed border-slate-200 rounded-[2.5rem] p-12 cursor-pointer hover:bg-slate-50 hover:border-emerald-300 transition-all group">
                    <div class="text-5xl mb-4 group-hover:scale-110 transition-transform">📷</div>
                    <p class="font-bold text-slate-600">اضغط لالتقاط صورة الوصل</p>
                    <p class="text-[10px] text-gray-400 mt-2 italic">سيتم إرسال الصورة مباشرة لرادار السائق</p>
                    <input type="file" id="receiptImage" accept="image/*" capture="camera" class="hidden" onchange="previewImage(event)">
                </div>
                <div id="previewContainer" class="hidden p-4 bg-emerald-50 rounded-3xl border border-emerald-100">
                    <p class="text-xs text-emerald-700 font-bold mb-3">تم تجهيز صورة الوصل بنجاح ✅</p>
                    <img id="imagePreview" src="#" class="mx-auto rounded-2xl max-h-48 shadow-lg border-2 border-white">
                </div>
            </div>

            <button type="submit" class="w-full bg-slate-900 text-white py-6 rounded-[2rem] font-black text-xl hover:bg-slate-800 transition-all active:scale-95 btn-glow flex items-center justify-center gap-3">
                بث الطلبية لأسطول الحوت 🚀
            </button>
        </form>
    </div>

    <script>
        function switchTab(type) {
            const manualSec = document.getElementById('manualSection');
            const cameraSec = document.getElementById('cameraSection');
            const manualBtn = document.getElementById('manualBtn');
            const cameraBtn = document.getElementById('cameraBtn');

            if (type === 'manual') {
                manualSec.classList.remove('hidden-input');
                cameraSec.classList.add('hidden-input');
                manualBtn.classList.add('active', 'text-white');
                cameraBtn.classList.remove('active', 'text-white');
                cameraBtn.classList.add('text-slate-500');
            } else {
                manualSec.classList.add('hidden-input');
                cameraSec.classList.remove('hidden-input');
                cameraBtn.classList.add('active', 'text-white');
                manualBtn.classList.remove('active', 'text-white');
                manualBtn.classList.add('text-slate-500');
            }
        }

        function previewImage(event) {
            const preview = document.getElementById('imagePreview');
            const container = document.getElementById('previewContainer');
            const file = event.target.files[0];
            
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    container.classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            }
        }
    </script>
</body>
</html>
